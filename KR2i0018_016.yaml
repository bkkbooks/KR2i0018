body:
  text: 南唐書音釋習氏眀晉紹漢比宋論乃章漢事失于陳志唐尚有是書戚光既校之并音釋夲紀一之三烈祖苐一昪音弁日光貌眀也又喜樂貌或作忭憲宗苐八子憲宗凡二十子見唐書宗室丗系表城昇州古金陵唐稱昇州城始東南跨淮水即今城也又見後周宗傳蒜山在鎮江城西三里捭闔捭通作擺開也鬼谷子有捭闔篇蘓秦學捭闔揣摩銅駞橋即今金陵城東十里銅橋据五代史及金陵志駞衍文茀音弗草多也詩茀厥草豐南郊牛頭山有廢宫址相傳為是山見浮屠傳大廟金陵志今乾眀尼寺是其址玄武湖見馮延巳傳鍾山在城東北十五里即蔣山東南之鎭名山也迎鑾䫈見揚州馬元康胡恢宋陽羡馬令祖元康丗家金陵多記唐事書未成而䘚令于崇寜間繼成南唐書三十卷恢金陵人宋華州推官甞篆太學石經博物强記臧否人物能詩按南唐諸書有烈祖開基志十卷唐滁州刺史王顔撰𧺫天祐乙丑止昇元癸卯烈祖實録十三卷内缺二卷呉録二十卷並高逺撰逺傳書未成卒㷊其草故多遺落江南錄十卷宋太宗以徐鉉湯悦皆唐舊臣命撰之晁無咎曰王安石言鉉書至亡國之際不言其君之過但以曆數存亡論之扵春秋箕子之義為得也然潘佑以直見殺而鉉書佑死以妄豈帷厚誣忠臣其欺君亦甚丗多以此言為然獨劉道得佑子華所上父事迹畧与江南錄同乃知鉉等非欺誣也悅即投崇義避宋諱改姓因并易名江南别録四卷宋陳彭年撰呉唐四主傳也南唐近事二卷江表傳三卷並鄭文宝撰江南野史二十卷宋龍衮撰凡八十四傳江南館載二卷其序言鉉等奉詔為江南錄後王舉路振陳彭年楊億皆有書大槩皆不足以史稱而衮尤甚熈寧八年得鄭君所遺扵楚州其事有六家所遺或小異者刪落是正以類相従云鄭君序者皆不著名巳上并馬胡二家凡十一書惟陸㳺編取折衷成此書也㳺亦不著名以他書􅊲而知豈時以私著避也元宗苐二璟俱永切不音景逿字通作逖近濁唐天文志流星尾長丈餘出紫薇入濁大星自東濁際西流有聲如雷竇苹音訓曰天与地際處曰濁案宋天文志有星出濁有星出東壁東北速行至濁沒六月朔日食五分至酉六刻帶二分入濁不見七月月食丑五刻虧見東北方食及二分半入濁不見食甚及復五月月食戍一刻虧見東南方濁未圓六分仕東井度中至五刻復以日月食朔望出沒之際觀竇說益眀矣又凡此書星變五代史通鑑皆不載盖其史失之少㣲長垣各四星在南方張度贇於倫切美好也瑫他勞切玉名郴痂林切琛暹纎榜音彭笞擊也漢書㮄笞又篣格彭􅊲字通用一作㮄霣通作隕清流關在滁州西南二十里周之捷時宋太祖為将孫晟即孫忌信祖郭威即帝位稱周追尊高祖璟廟號信祖訹雪律切音戍說文誘也或作怵漠書怵扵邪說如湻曰見誘怵也今俗猶云相謏怵謏音小後主苐三煜音燿殷崇義見烈祖紀馬元康下㬥張張通作漲漲亦通平聲江淹詩雲霞肅川漲皖合版切山在舒州咼彦咼字書口戾也俗作喎不言是姓姓書無咼姓但有過渦二姓並音戈過風俗通夏諸侯國氏焉漢有兖州刺史詡急就章有過說春秋寒浞處其子澆于過謂之過澆少康滅之以封諸侯其地漢東萊掖縣北過鄊是也宋季有尚書郎勗望出高平渦楚大夫封渦因氏焉三輔决錄有扶風太守尚或以咼即渦非也宋季猶有過勗或曰即過後卋去足如隨為隋爾亦非也鄭樵氏族畧以古帝名為氏者女媧之後有媧氏媧與咼音同而字近咼當是媧而去女文爾案秋浦志載池牧守自言康震蕭復至南唐鄭彦華咼彦凡九十五人惜彦事蹟莫􅊲也鍾蒨字徳林案徐鉉王夫人墓志王太原人家豫章蒨父司徒纉戌是邦因娶焉二子長懐建由校書郎歷東府掾以羣從百口家豫章辤禄公朝因除洪州都督府司馬次蒨也以屬詞敦行從事戚籓累登臺郎為集賢殿學士㑹中令齊王避親譲寵授鉞臨川朝廷慎選英僚以光幕府除撫州觀察判官檢校屯田郎中既拜而夫人疾亟以交泰元年卒于京師嘉瑞坊官舎鉉又有保大九年送徳林貟外赴東府亞尹詩序鉉等餞于石頭城分題為詩蒨有賦山别諸知巳詩云暮景江亭上雲山日望多只愁辤輦轂長恨隔嵯峨有意圗功業無心憶薛蘿親朋将逺别且共醉笙歌又克復揚州後以蒨輟侍從攝尹正東府鉉等分韻賦詩弟鍇亦與有序蒨有得新鴻别諸同志詩云隨陽來萬里點點度遥空影落長江水聲悲半夜風殘秋辤絶漠無定似驚蓬我有離羣恨飄飄似此鴻蒨之才譽亦可見矣但馬承信兄弟事未詳舊嘉瑞坊在今城内東南隅蒨倉甸切青山案郡志後主獵于青山一牝狙觸網淚下稽顙屡顧其腹後主命虞人守之其夕生二子還幸大理寺親錄囚一文辟婦以孕在獄適産二子因得減死山在城東三十五里然城南四十里亦有青山但郡志所傳若頗悉爾膜拜長跪拜也膜音謨唐年世緫釋凡七十二年唐天祐元年甲子昭宗天復四年改元朱温殺帝立哀帝蜀仍稱天復二年乙丑蜀天復五年三年丙寅蜀天復六年四年丁卯蜀天復七年朱温纂位稱梁開平元年五年戊辰晉𡵨淮南蜀武成元年六年巳已晉𡵨淮南七年庚午晉岐呉岐王承制加淮南楊隆演嗣呉王八年辛未晉岐呉蜀永平元年梁乾化元年九年王申晉𡵨呉十年癸酉晉𡵨呉十一年甲戍晉岐吳十二年乙亥晉岐呉梁貞眀元年十三年丙子晉岐呉蜀通正元年十四年丁丑魯岐吳蜀天漢元年漢乹亨元年十五年戊寅晉岐吳蜀光天元年十六年已卯晉岐呉義元年蜀乹徳元年十七年庚辰晉岐十八年辛巳晉岐呉順義元年梁龍徳元年十九年壬午晉岐同光元年癸未晉荘宗復唐改元岐㝷内属二年甲申三年乙酉天成元年丙戍眀宗立改元呉越宝正元年二年丁亥呉乹貞元年三年戊子漢大有元年四年巳丑呉太和元年長興元年庚寅二年辛卯三年壬辰四年癸已應順元年甲午閔帝立遇弑末帝立改元清泰清泰二年乙未呉天祚元年蜀眀徳元年三年丙申石敬瑭因契丹立號晉天福元年自天祐至是三十三年昇元元年丁酉烈祖即位古今之亂唐末極矣然清泰方絶昇元已建天命人心無絶也孰謂五季無君㢤二年戊戍蜀廣政元年三年已亥閩永隆元年四年戊子五年辛丑六年壬寅漢光天元年七年癸卯元宗立改元保大殷天徳元年漢乾和元年保大二年甲辰晉開運元年三年乙已四年丙午五年丁末晉亡六年戊申漢乹祐元年七年巳酉八年庚戍漢亡九年辛亥周廣順元年十年王子十一年癸丑十一年甲寅周顯徳元年十三年乙卯十四年丙辰十五年丁已北漢天㑹元年中興元年戊午初改交泰元宗十六年始奉周顯徳年去帝號自昇元至是三十二年天祐至是五十五年自武徳至是三百四十二年矣使元宗䏻安天命事大國以存宗祀周能卋敦王道以賔之則三代之意也周顯徳六年元宗十七年已未天子命城金陵七年元宗十八年庚申宋建隆元年宋建隆二年元宗十九年辛酉元宗殂後主即位仍奉其正朔宋又始稱詔于唐三年後主二年壬戍乾徳元年後主三年癸亥二年後主四年甲子三年後主五年乙丑四年後主六年丙寅五年後主七年丁卯開寳元年後主八年戊辰二年後主九年己巳三年後主十年庚午四年後主十一年辛未五年後主十二年王申六年後主十三年癸酉甲戍歲後主十四年宋開宝七年乙亥歲後主十五年宋開宝八年後主城䧟被執唐亡自烈祖至是三主凡三十九年自髙祖至是凡三百五十九年殷周革命而祀宋囯隨之丗宗猶祀為宋之君度不逮丗宗矣州軍總音釋凡州軍三十八昇都金陵府以宣之當塗廣信并置蕪湖銅陵繁昌來属及當塗為䧺逺軍復以池之青陽來属与舊領上元江寧句容漂水溧陽為十縣也揚東都江都府改江陽為廣陵以海陵興化属泰以天長置軍㝷改曰建武軍改揚子曰永貞以白沙鎮為迎鑾鎮雄割楊之六合天長置楚以鹽城屬泰呉順化軍宋淮安泗滁改永陽曰來安和光黄舒蘄廬昭順軍夀清順軍海泰以揚之海陵置領揚之興化楚之鹽城置㤗興如皐濠定逺軍通靜海軍雄逺軍見昇州潤鎮海軍常宣見昇州攝州池康化軍置銅陵呉改至德為建徳饒永平軍置徳興信置鉛山江德化軍置徳安順昌湖口流㝷屬池改潯陽曰徳化東洪南都南昌府置清江改新吴為奉新置靖安鄂武昌軍筠割洪之髙安置上髙萬載南城置建武筠州以出竹名宋瑞州軍呉招武軍袁置萬載吉置龍泉䖍昭信軍石城上金龍南贑州建永安軍改忠義軍置㱕化建寧汀劒割建汀置南漳名以泉泰屬泉清源軍列傳一之五五宋齊丘苐一詩凡三十四韻有曰山蹙龍乕徤水黒螭蜃作日晩嚴城鼓風來䔥寺鐸金桃帶葉摘緑李和衣嚼塵飛景陽井草含臨春閣一日賢太守与我觀槖籥乃陪烈祖登金陵城中鳳凰臺作今石刻王紹顔奉敕書貞竹無盛衰媚栁摇先落一聮小異耳昇元中敕立周宗苐二臺城六朝宫也在都城内北烈祖因築府就為宫宋為府治為行宫在在今郡城内北志謂之舊子城郡城亦烈祖祖築子城郡城北古城皆近南爾摺幞頭角見李建勲画影皆軟褁公服一如盛唐也徐鍇鍇音楷又音皆九江謂鐡為鍇諦音帝審也邊鎬鎬音好彬見元宗紀柴克宏苐三頵麋又音贇頭大也王㑹􅋶音叨弓衣也㳺簡言讟音讀怨謗也刁彦能舉刀示先主先主盖舊書文當云烈祖也鍾謨沾沾自衒沾音瞻輕薄也漢魏其傳沾沾自喜衒音縣說文自矜也朱匡業苐五朱元叛元宗議親征元本作烈祖今按其事正之朱令贇見元宗紀江文蔚苐七捨爵䇿勲出左氏捨舎去聲馮延已苐八頵見上柴克宏傳延魯玄武湖在金陵城北南唐近事湖周廻十數里幕府雞籠蔣山環聳左右名園勝境掩映如画六朝舊迹多出其間毎歲菱藕罟網之利不下數千云案湖宋王安石言開為田今成平陸矣孫忌豆盧姓出羌地彭師暠暠字通作皓皜韓熈載苐九梅嶺岡在城南郡志謝公墓上有無字碑今皆失其処慕容紹宗案北史紹宗初事爾朱歸高歡歡命其子澄用之故曰神武遺言實表知人之鍳劉仁贍苐十夀州本漢夀春周世宗得夀州徙其軍淮北下蔡改名忠正軍以旌仁瞻之節復以夀州故治立夀春縣隷忠正軍本置安豐軍于夀舂縣今安豐路也潘佑子見上馬元康下嚴續肝肺附見漢書劉向衞青傳肝肺相附着也附通作腑音副張易嵬峩即巍峩嵬巍古通喑噁史記韓信傳喑噁叱咤索隱曰喑扵鴆切噁烏路切懐怒氣也漢書作音烏猝嗟晉灼曰音烏恚怒聲也郭廷謂苐十一笮通作筰音昨以竹索爲槗也字又音窄而義異林仁肇擿音剔挑也發也漢趙廣漢傳發姦擿伏揚子擿埴索塗字又通作摘擲而音義異盧綘新淦漢縣隋以屬吉州宋以屬臨江軍淦水出焉淦從水金聲古暗切陳喬脱屣屣音徙孟子猶棄敝蹝也又通作躧履不躡根也屣所寄切李元清苐十二趫音驕善走也捷也魏岑怵見上元宗紀作訹元宗子從善苐十三悁縈縁切詩憂心悁悁益兼絹絓捐委之義雜藝方士呉廷紹苐十四飴音怡餳也潘扆紫極宫南唐近事扆後欲傳其法于人夢其師怒擅洩靈術傳非其人隂奪其法禁不復能劒云㝷病終紫極宫臨終上言乞桐棺葬近地後當尸解上從之使中貴人護葬金波園保大中元宗命親信發冡觀之骸骨尚在迄無異焉耿先生煼火乾也亦作炒㷅方山在城東南三十里外吳葛仙翁所居有丹井一名天印山有宝華宫碑宫基經火正當井處故老云常時即焚之也節義史諜諜通作牒札也漢志披圗諜呉媛媛音援女賢也字又通作姢晬祖對切子生一歲也浮屠苐十五身毒身音捐又音乾毒音篤國在大夏東南今呼天竺盖身毒聲轉為天篤篤省作竺又轉為竹音也衣裓語岀佛書裓音刻字書衣裙也牛頭山在城南三十里即晉王導指為天闕者契丹旃俗作氊賮徐刅切㑹礼之才也通作贐漢書唐書作進高麗倭窩龜玆音丘慈巳上音釋姑据所知亦有特畧之者加詳者幸觀者審焉南唐書音釋終
