body:
  text: 南唐書列傳卷苐十一郭廷謂字信臣彭城人父全義仕為濠州觀察使廷謂㓜好學善書扎騎射補殿前承㫖出為濠州中門使全義䘚擢荘宅使即為州監軍周侵淮南廷謂與州将黄仁謹約以死守籍州民不逞者聚扵僧寺嚴兵守之日給食隨所能使造守具故周師終不知城中虗實乆不可下元宗歎其忠因大發戦棹命與林仁肇援夀州周世宗聞之徙下蔡浮橋扵渦口築壘夾淮東西以護橋扼濠夀之衝暑而淮漲廷謂掩不備輕舟泝流急趋渦口将麾兵㫁笮周人覘知設伏待之廷謂将至橋得其情駐軍不進襲敗周将武行徳周務勍于㝎逺斬首數百行徳挺身遯䘚㷊浮橋周兵死者不可計遂盡㷊軍資取良馬數百進武功殿使就遷州刺史猶以爲賞薄又遷團練使兼上淮水陸應援使及紫金山之戦唐将帥多降于周廷謂獨還軍守濠州治壁壘繕戈甲爲守備世宗復南征廷謂表金陵請援且言周師日張碩卑辭請和以俟機㑹夜出敢死士千餘襲破周營㷊雲梯洞屋周人大驚相蹂踐死者甚衆然援師不至世宗親攻城㷊戦艦數百艘殺二千人進攻羊馬城又殺數百人遣諜持詔諭降廷謂廷謂度不能支奉表于周􅈤言丗受本國爵命家在江南欲遣使禀命國主世宗許之為緩攻及廷謂使還知金陵䘚不能救集将士扵壘門南嚮慟哭再拜乃降世宗見廷謂賜宴勞之曰兵興以來江南敗亡相踵惟卿能犯渦口浮橋破㝎遠寨足報國矣濠州小城使汝主自守豈䏻固㢤賜襲衣金帶良馬及器皿萬餘拜亳州防禦使以其弟廷讚為和州刺史囙命帥濠州兵東攻天長下之遷樓櫓戦櫂左右廂都監入國朝至靜江軍節度觀察留後知梓州代㱕賜第東都䘚年五十四廷謂事母孝朝夕束帶立侍寒暑不變為政亦有恵愛方廷謂降周時令其錄事參軍鄱陽李延鄒草降表延鄒責以忠義不為具草廷謂愧其言然業巳降必欲得表以兵脅之延鄒投筆曰大丈夫終不負國為叛臣作降表遂遇害元宗聞之召見延鄒子命以官張彦卿史失其鄊里世家保大末周世宗南侵彦卿為楚州防禦使周師鋭甚旬日間海泰州靜海軍皆破元宗亦命㷊東都官寺民廬徙其民渡江世宗親御旗鼓攻楚州自城巳外皆已下發州民濬老􅔏河遣齊雲戦艦數百自淮入江勢如震霆烈熖彦卿獨不為動及梯衝臨城鑿城為窟室實薪而焚之城皆摧圮遂䧟彦卿猶列陣城内誓死奮擊謂之巷闘日暮轉至州廨長短兵皆盡彦卿取䋲牀搏戦及兵馬都監鄭昭業等千餘人皆死之無一人生降者周兵死傷亦甚衆世宗怒盡屠城中居民㷊其室廬然得彥卿子光祐不殺也元宗下詔贈彦卿侍中天長縣時陞爲䧺州刺史建武軍使易文贇亦固守聞楚州陷遂降彦卿馬元康書以爲彦能亦莫知孰是也論曰彦卿守椘州孤壘無援當百倍之師身可碎志不可踰雖劉仁贍殆不能過而史家傳載獨畧至其名亦或不同扵虖何其重不幸也林仁肇建陽人事閩為禆将沈毅果敢文身為虎軍中謂之林虎子閩亡久不見用㑹周侵淮南元宗遣使至福建募勇士得仁肇及陳徳誠鄭彦華皆㧞為将仁肇率偏師援夀州攻城南大寨有功又破濠州水柵擢淮南屯營應援使時周人正陽浮橋初成扼援師道路仁肇率敢死士千人以舟實薪芻乗風舉火㷊橋周将張永徳來爭㑹風囘火不得施我兵少却永徳鼓譟乗之遂敗仁肇獨騎一馬為殿永徳引弓射之屡将中仁肇輙格去永徳驚曰此壮士不可逼也遂捨之而還及割地元宗以為潤州節度使徙鄂州又徙南都留守開寶中宻言于後主曰宋淮南諸州戍守单弱而連年出兵滅蜀平荆朗今又取嶺表徃返數千里師旅罷敝此在兵家為有可乗之勢請假臣兵數萬出夀春渡淮據正陽因思舊之民以復故境彼縱來援吾形勢巳固必不淂志兵起之日請以臣舉兵外叛聞事成國家享其利不成族臣家眀陛下不預謀後主懼不敢従時皇甫繼勳朱令贇掌兵柄忌仁肇䧺略謀有以中之㑹朝貢使自京師囘擿使言仁肇宻通中朝見其画像于禁中且已為築大苐以待其至後主方任繼勳等惑其言使人持酖徃毒之仁肇少病風口氣常臭醫云肺掩不正及遇酖家人恠其不臭俄䘚初仁肇尤為陳喬所知至是喬歎曰國勢如此而殺忠臣吾不知所稅駕也然不䏻白其誣仁肇䘚逾年後主遂見討又逾年國為墟矣盧絳字晉卿冝春人自言唐中書舎人歙州刺史肇之後初名表慕晉魏絳更焉讀書略通大指喜論當世利病然脫畧䋲檢每以博奕角觝為事舉進士不中為吉州囘運務計吏盗庫金事覺當伏危法乃更儒服亡去至新淦客于土豪陳氏與其子弟共學絳好縱横兵書日夜讀之陳氏察其非士流謂曰朝廷方求賢豪吾子其可久留此乎因厚具装遣行絳将還冝春中途飲博盡費其􅏻比至家毋及兄弟皆鄙誚之絳乃入廬山白鹿洞書院猶亡賴以屠販為事多脅取同舎生金又持搉貨誣山中浮屠以邀賄謝人皆患苦之與諸葛濤蒯鼇號廬山三害朱弼為國子助教将捕治其罪復亡去徃來金陵丹陽間遇大寒平地躍𧺫折簷桷為薪以自濟守倉吏召㱕使躍倉檐自氣樓入倉中盜米一夕徃返數十久之乃上書論事未報詣樞宻使陳喬口陳所上書詞辯従横喬聳然異之用為本院承㫖授沿江廵檢募亡命習水戦使馬䧺王川軍等分将之要吴越兵于海門屡獲舟艦以善戦聞開寳中宻説後主曰吴越仇讎腹心之疾也它日必為北兵嚮導以攻我臣屡與之角知其易與不如先事出不意滅之後主曰然則大朝且見討柰何絳曰臣請詐以宣歙叛陛下聲言伐叛且賂吴越乞兵吴越之兵勢不得不出俟其來拒擊之而臣躡其後國可覆也滅吴越則國威大振北兵不敢動矣後主不聴及王師來討以絳為淩波都虞候㳂江都部署守秦淮水柵戦屡勝諸将忌其能共說後主遣絳出援潤州乃授昭武軍節度留後帥八千人陣于潤州城下北軍不敢逼入城拒守而節度使劉澄謀因計事斬絳以城降絳覺之澄乃謂絳曰都城危甚萬一不守守此何為綘曰君為守不可棄城冝赴難者綘也是夕澄遣裨将出送降款絳帥部下馳出欲冒圍入金陵圍堅不可入乃走保宣州金陵城陷諸郡皆下絳獨不降謀南據閩中過歙州怒刺史龔慎儀不出迎殺之而行太祖使絳弟襲招絳絳初欲殺襲以眀不屈已而䘚降至京師授兾州團練使遇龔慎儀兄子贊善大夫頴于朝詬絳曰是殺我叔父者執至殿陛訴冤詔属吏樞宻使曺彬言其才略可甫碩宥其死使自効太祖曰是貌類侯覇榮何可留也斬于西市絳臨刑大呼曰陛下不記以鐡劵誓書招臣乎覇榮河東将嘗來降已而復叛㱕弑其主劉繼㤙者故太祖深悪之蒯鼇宣城人善属文南唐承唐末文體纎麗之弊士率不䏻自振鼇獨不事華藻以理趣爲本有承平餘風然居鄊飲博無行不爲人士所容乃去入廬山國學亡賴尤甚晩乃勵風操尚信義一言之出必復而後巳嘗蓄龍尾研友人欲之而不言鼇亦心許之未及予也一日友人不告而㱕鼇悔恨徒歩數百里追及授研而還猶以素行爲有司所擯終國亡不仕久之逰京師擢進士苐仕至殿中丞樊若水欲薦于朝鼇耻之亟致仕歸隱廬山數年䘚陳喬字子喬廬陵玉笥人父濬事吴為翰林學士烈祖時以兵部尚書䘚喬㓜敏悟文辭清麗事親以考聞濬死撫恤族黨均財給之親踈無間起家為太常寺奉禮郎歷屯田貟外郎中書舎人淮南兵興元宗憂蹙不知所為陳覺李徴古請以宋齊丘攝政元宗怒度群臣必持不可乃促召喬草詔如覺徴古言喬請對未報排宫門入頓首曰陛下既署此則百官朝請皆㱕齊丘尺地一民非陛下有陛下縱脱屣萬乗獨不念先帝中興大業之艱難乎讓皇幽囚丹陽宫陛下所親見也它日垂涕求為田舎翁不可得矣元宗笑而止引喬入見后及諸子曰此忠臣也及齊丘黨與皆斥喬與齊丘尤親厚獨得不坐遷都豫章以喬輔太子留金陵後主嗣位歷吏部侍郎翰林學士承旨樞宻副使遂以門下侍郎兼樞宻使貶制度改右内史侍郎兼光政院使輔政喬風度淹雅小心守法度然短扵才畧吏胥多交通權倖侮文法不能察也太祖遣使召後主入朝後主欲徃以喬為介喬曰徃必見留如社稷何後主懼見討喬曰陛下不得已當以臣為解及兵圍金陵太祖又遣進奉使江國公従謙諭指欲後主自㱕且命曺彬緩攻以俟之而喬堅持不可劉澄以潤州降後主方惶惑欲置其家不問喬憤切曰人臣受重寄一旦開門迎敵此豈可容悉収其父母妻子斬之扵是人皆知喬必死國事矣及城将陷後主自爲降欵命喬與清源郡公仲㝢詣曺彬喬持款㱕府投承霤中復入見云自古無不亡之國降亦無由得全徒取辱耳請背城一戦而死後主握喬手涕泣不能従喬曰如此則不如誅臣㱕臣以拒命之罪後主又不従乃掣手而去至政事堂召二親吏解所服金帶與之曰善藏吾骨遂自縊二吏徹榻瘞之金陵平家人謀改葬求屍不獲或見一丈夫衣黄半臂舉手障面及彂瘞如所見云陳起蘄州人性剛鯁尤惡妖異昇元中以進士起家為黄梅令時縣境獨木村有妖人諸佑挾左道自言數世不食肉能使冨者貧貧者冨俚民稍稍従之初有徒數十人積數年従者至數百男女無别號曰忍辱夜行晝伏取資于盗相與倡言佑有神術能升虗空入水火州縣亦惮之不敢問起到官邑人畢賀佑獨偃蹇不至起乃按户籍取佑為里正不服嫚言曰吾且斷令頭起吿廵檢使周鄴出兵捕佑等獲之不能神皆就執縛搜其家得乗輿服器遂斬之鄴欲宥其婦女童稚起曰此皆瀆亂人倫不可使有遺育乃併斬之起由是知名官至監察御史年南唐書列傳卷苐十一
