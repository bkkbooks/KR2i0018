body:
  text: 南唐書列傳卷苐十二周惟簡鄱陽人隱居眀易後主聞其名召至金陵起布衣為集賢殿侍講頃之以虞部郎中致仕還山金陵受圍間道召還入後苑講否卦後主思得竒士能使兵間者張洎薦惟簡可以談笑和解乃授給事中副徐鉉使京師後主手疏言惟簡託志妙門存心道典伴臣修飬不預公途蓋為之聲價兾動朝聽比至太祖召見詰責鉉猶􅈤奏不已惟簡惶恐反言曰臣本野人未嘗仕宦李煜强遣來未嘗預聞使指伏聞終南山多靈藥碩得棲隱太祖許之金陵平命為國子周易博士判監事或謂曰終南之言不酬且得罪惟簡不得巳上表求解官以遂初志改虞部郎中致仕授其子繕京兆鄠縣主簿使就飬太平興國中復表求仕授太常博士遷水部貟外郎卒繕後舉進士中苐仕亦至尚書郎鄭彥華福州閩人祖父丗為福建諸州刺史彥華少隸節度使李弘義帳下嘗射殺乳虎以勇聞元宗出師攻福州大將王崇文遣卒李興登樓車罵弘義弘義不勝憤募生得興者彥華請行夜縋出城外伏壕傍興猶嫚罵不巳彥華操長鉤鉤得興挾以登城城上皆鼓譟弘義得興而甘心焉崇文不能下城遁去歲餘劒州刺史陳誨以水軍來攻彥華適出屯候官以所部降誨誨與語竒之署軍校南唐與周師相拒淮南彥華大小百餘戰身被五十餘創纍遷至鎮海軍節度使加同平章事後主見討王師自采石作浮梁渡江後主命彥華督舟師萬人又遣别將杜真率步兵萬人同逆戰後主親遣行戒之曰水陸兩軍相表裏則吾事濟矣比與王師遇真以所部力戰彥華擁兵不救真敗而潰金陵聞之喪氣遂閉壘自守以至國破亦不能正彥華之罪矣彥華從後主入朝為右千牛衛將軍太宗征太原及幽州用彥華為將無功猶歷諸衛將軍至左千牛衛大將軍卒年七十三子文寶初事後主以文學選為清源公仲㝢掌書記遷校書郎㱕朝南唐故臣皆許録用文寶獨不自言後主以環衛奉朝請不納客謁文寶乃被蓑荷笠作漁者以見寬譬久之後主歎其忠後中進士苐仕至兵部貟外郎國史有傳李貽業故唐時平章事蔚從曽孫父戴唐末苐進士奔吳為起居郎貽業事烈祖至翰林學士烈祖晏駕大臣欲奉宋后臨朝命中書侍郎孫忌草遺制貽業獨奮曰此姦人所為也大行常謂婦人預政亂之本也安肯自為此若果宣行貽業當對百官裂之㑹宋后亦不許于是臨朝之議遂寢元宗語貽業曰疾風知徑草于卿見之保大中以兵部侍郎卒諡曰簡初戴為人簡率無威儀貽業又甚于父平居頽然不言是非國有大議必首斷之尤好飲酒嘗折簡招親友曰今夕佳月能相過乎比客集貽業已大醉指酒壺曰本用相待酒興忽來自倒之矣其踈豁大抵類此劉崇俊字德修楚州山陽人祖全以功臣為濠州刺史有威名全卒子仁規繼其任為政苛虐及卒崇俊繼之盡反仁規之政人懷其惠數年漸專恣不法多畜不逞使過淮剽掠獲美女良馬以自奉元宗升濠州為㝎逺軍因拜崇俊節度使以其子節尚大寧公主然元宗亦惡其為人㑹夀州姚景卒崇俊厚賂權貴求兼領夀州元宗乃陽若不解其意命移鎮夀州而遣楚州刺史劉彥貞馳入濠州代之崇俊自悼失計頗革心循法度未幾得疾卒年四十贈太尉諡曰威劉洞廬陵人隱居廬山二十年能詩長于五字唐律自言得賈島法後主嗣位尤屬意詩人或以洞言者洞遂獻詩百篇卷首石城篇其詞曰石城古渡頭一望思悠悠幾許六朝事不禁江水流後主讀之感愴不怡者久之因棄不復觀洞亦不復見省金陵受圍洞猶在城中國亡洞過故宫闕徘徊賦詩多感概悲傷不以不遇故有怨懟語未幾卒與洞同時有夏寶松者亦隱廬山相與為詩友洞有夜坐詩寶松有宿江城詩皆見稱一時號劉夜坐夏江城云江為宋人避亂徙閩元宗初設貢舉為屢為有司所黜嘗有題白鹿寺詩元宗南遷過寺讀而􅋢之為由是愈自負傲睨一時卒無薦引者居懷憤憤束書欲東走吳越為同謀者所彂按得其狀伏誅汪台符歙人能屬文烈祖初嘗上書論事合指宋齊丘頗抑之台符貽齊丘書誚其疾已才齊丘大怒密使人誘台符乘舟痛飲至石城蚵蚾磯下沉殺之郭昭慶廬陵人博學能自力嘗著唐春秋三十卷保大中獻所著治書補揚子尉辭不受後主時𣸪獻經國治民論擢著作郎時方奉中朝凡歲時慶賀貢方物箋表及廷勞宴餞之辭率命昭慶為之一日方晨起造朝暴卒伍喬廬江人居廬山國學數年力于學詩調寒苦每有瘦童羸馬之歎山中浮屠夢仰視見一大星芒色甚異㫄有人指之曰此伍喬星也既覺訪得喬乃傾資奉之使入金陵舉進士及試畫八卦賦霽後望鍾山詩故事中選者主司必延之升堂置酒時有宋貞觀者首就坐張洎續至主司覽其文揖貞觀南坐引洎坐于西酒數行喬始上卷主司歎其傑作乃徙貞觀處席北洎處席南以喬居賔席及覆考榜出喬果為首洎貞觀次之時稱主司精于衡鑑元宗亦大愛喬程文命勒石以為永式仕至考功貟外郎卒蕭儼廬陵人幼舉童子中其科稍長命為祕書省正字烈祖初歷大理司直刑部郎中以平怨稱烈祖晚服金石藥多㬥怒近臣數被譴罰宣徽副使陳覺不自安稱疾在告者數月及聞遺詔即以其日造朝儼劾奏覺傾耳私室以幸禍變請重置于法不報烈祖輔吳設法禁以良人為賤至是馮延巳延魯欲廣置妓妾輒矯遺制託稱民貧許賣子女儼駁曰昔延魯為東都判官已有此請大行以訪臣臣對曰陛下納麓之初出庫金贖民孰不㱕心今寶運中興人仰德澤奈何欲使鬻子資豪家役使乎大行以臣言為然將罪延魯臣曰此但智識淺陋耳非有他也罪之且塞言路大行乃斜封其奏抹三筆持入宫碩求之宫中既而果得留中章奏千餘皆斜封有一抹至三抹者遂得延魯奏然大臣亦方以豪侈相髙利于廣聲色因共為遺制已宣行不當追改遂巳元宗初以國讓景遂羣下持不可乃以景遂為諸道兵馬元帥景逹副之宣告國中以兄弟相傳之意儼極諌謂夏殷以來天下為家父子相傳不易之典也景遂景逹亦固讓不敢當然元宗意愈確不之聽江文蔚韓熙載典太常禮儀議烈祖稱宗儼獨建言帝王巳失之巳得之謂之反正非已失之自巳𣸪之謂之中興中興之君廟冝稱祖先帝興巳墜之業不應屈而稱宗文蔚亦以儼議為當遂用之保大二年元宗終欲傳位景遂下詔命總庶政惟樞密使魏岑查文徽許奏事餘非特召不得對儼上疏力爭㑹宋齊丘賈崇皆以為不可遂收所下詔其後元宗于宫中作大樓召近臣入觀皆歎其宏麗儼獨曰比景陽但少一井耳元宗怒貶舒州副使孫忌為觀察使遣州兵給儼實防衛之儼謂忌曰僕以言獲罪耳顧命之日君持異議幾危社稷君之罪豈不重于僕乎反見防何也忌慚即徹去俄召還後主初嗣位數與嬖幸奕棋儼入見作色投局于地後主大駭詰之曰汝欲效魏徴耶儼曰臣非魏徴則陛下亦非太宗矣後主為罷奕南唐亡儼以老病㱕鄊里杜門數年卒年七十餘劉承勳失其鄊里以善心計事烈祖為糧料判官遷德昌宮使德昌宫者蓋南唐內帑别藏也自吳建國有江淮之地比他國最為冨饒山澤之利歲入不資烈祖勵以節儉一金不妄用其積如山太子嘗欲一杉木作版障有司以聞烈祖書奏後曰杉木不乏但欲作戰艦以竹代之可也然德昌簿籍煩委無由勾校承勳獨任其事盜用無算保大後貢奉事興倉卒取辦愈得以為姦利畜妓樂數十百人每置一妓價數十萬教以藝又費數十萬而服飾珠犀金翠稱之又厚以寶貸賂遺權要故終無彂其罪者太祖平荆湖詔江南具舟漕其米入京師承勳狡默計後主終不䏻有其國欲預自結中朝為異時計乃請行督臣艦自長沙扺迎鑾千柂相銜太祖覺其意而惡之及國亡承勳㱕京師首自陳漕米事太祖曰此汝主勤王耳汝安得有勞叱出特命勿叙用久客無資裸袒乞食不勝凍餒而死李元清濠州人徙金陵趫捷善走能及奔馬常步入梁宋刺事開寶中後主以吉州永新與湖南鄰命元清為永新制置使每數月一託疾不坐衙輒微服入湖南境人無知者以故敵人動息皆知之纍年邊障晏然國亡㱕京師元清心不欲仕二國僞稱失眀召驗之揮刃將及頸而目不瞬乃放㱕濠州卒盧郢金陵人工屬文有勇力好吹鐡笛乾德中後主命韓德霸為都城烽火使警察非常怙權㬥橫國人望其前驅莫不奔避郢嘗遇之調笛自若德霸叱左右捕執郢奮臂擊十餘人皆顛躓乃直前捽德霸墜馬毆之敗面傷目德霸入訴後主叱之出顧近侍笑曰戎帥遇一措大不䏻自全面目尚敢訴耶遂罷其職後郢舉進士試王度如金玉賦擢苐一徐鉉娶郢姊嘗受後主命撰文纍日未就郢曰當試為君抒思適庭下有石十夫不能舉郢戲取㺯之有頃索酒頓飲數升復㺯如初忽顧筆吏口占使書不竄易一字鉉服其工後主亦以為遒俊可愛國亡㱕朝知金州卒朱弼字君佐建州人舉眀經苐一授國子助教知廬山國學盧絳蒯鼇諸葛濤飲博不逞患苦諸生學官依違無敢問者及弼至一切繩以禮法每升堂講說座下肅然絳等亦愧服引去生徒自四方來者數倍平時國亡補衡山縣主簿秩滿求為南嶽廟令卒王輿合淝人少與兄綰俱事吳武王輿初為小校從周本攻危全諷臨戰本視賊水柵部分諸將指㫄山頭一小營謂輿曰爾往為我取彼輿唯唯而色不欲行本曰爾憚往耶輿曰公必不以輿為不武請得此柵破之捨而趨彼何為木大喜曰爾亦知此為必爭之地耶吾本自行今為爾功勞而遣之輿乘輕舟襲破其前鋒遂排柵入諸軍繼進賊大潰積功遷至諸軍都虞候烈祖輔吳以腹心所寄進控鶴都虞候持重有謀甚見倚任久乃出為光州刺史初輿兄子為海州刺史叛附梁聞輿在光山遣間使通問輿執以㱕金陵因求罷郡入為左宣威統軍歷鎮海節度留後金吾衛大將軍武昌節度使與監軍甄廷堅不相得㑹廷堅被誣告有二志烈祖遣使械廷堅屬吏未至輿刺知之密告廷堅因為謀曰今獨可即日乘輕舟㱕闕待罪毋與中使遇廷堅恐懼不暇為他謀即從其計至金陵遇赦且以其先自歸淂免人推其長者元宗嗣位加同平章事保大二年卒年七十四輿少從軍攻潤州為臣弩所射中右耳矢自左耳出又中㫄一人猶立死輿扶㱕營臥百餘日復起耳至老不聵亦無瘢痍攻頴州倚營門仗劒驅士卒登城城上機石發中營門及鎧之半皆糜碎而輿不傷莫不異之兄綰亦至䖍州節度使魏岑字景山鄆州須城人善諂諛學揣摩尤為宋齊丘所知薦授校書郎保大中驟進至諌議大夫元宗自以唐子孫慨然有定中原復舊都之意有司請行南郊禮元宗曰俟天下為一然後告謝天地岑遂與陳覺馮延巳延魯更相倡和為拓境事嘗侍燕自言臣少逰元城樂其土風陛下還長安日乞為魏博節度使元宗欣然許之岑趨下殿再拜謝侍衛皆竊笑覺延魯攻福州岑為監軍應援使三人者暗懦專恣如一軍敗元宗初欲按軍法誅覺延魯而貸岑御史中丞江文蔚對仗彈奏請并岑誅之于是貶太子洗馬俄𣸪還故官李守貞叛漢來乞師岑乃力請出兵赴救于是元宗從之因以岑為㳂淮巡檢使無功而還岑自𣸪進姦諂彌甚鍾謨李德眀亦用事其趨向與岑雖異而迷國則均户部貟外郎范沖敏懷不平怵大將王建封上疏請盡逐之更用正人元宗怒併置沖敏建封于死岑自謂淂主眷愈無所憚夀州節度使劉彥貞以厚賂結岑為奧援岑所得不可數知遂肆言稱彥貞為將如韓白治民如龔黃其敢為誕欺如此元宗方倚以柄任㑹見冲敏為厲召道士上章訴天未幾卒南唐書列傳卷苐十二
