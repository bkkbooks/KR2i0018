body:
  text: 南唐書列傳卷苐二周宗字君太廣陵人少遇亂孤窮事烈祖為給使閑于擯相辭令方時艱難每使四方輒稱職端敏可仗㤙頋日洽烈祖鎮金陵為都押衙時用宋齊丘議迎吴譲皇都金陵繕府治為宫馬歩都虞候蔡弘業為宫城營奉使徙都統府于古臺城使都教練使孔昌祚營之都統府成凡二千四百間環一千五百步烈祖已徙居且迎譲皇矣宗請間曰若主上西遷則公當東駕勞費方始怨嗟将日聞矣烈祖納之託以歳不利而止自是宗孟預議論齊丘始忌之一日烈祖臨鏡理白鬚太息曰功業成而吾老矣柰何宗適侍側悟㣲指乃請如廣陵諷譲皇以禅代事亦請諭齊丘齊丘心忌大議自宗彂及其将還留與飲酒而遣騎以手䟽切諌烈祖得之大悔懼後數日齊丘馳至金陵為險語動烈祖請斬宗以謝國人烈祖将従之徐玠固爭事乃已但黜宗為池州副使玠乃與李建勲等言天人之望巳集宻定大計復召宗還舊職烈祖受禅宗躐進至内樞使同平章事遷侍中時以樞宻為内樞者猶避吴武王諱也烈祖常召宗及宋齊丘馬仁𥙿宴于崇英院歡宴道舊為樂它将相莫得預然待宗尤親厚不甚以職務嬰之宗亦能澹然畏逺權勢居家節儉俸賜皆積不用故齊丘黨雖日讒之不能害久之乃罷為江州節度使有俞文貞者早逰烈祖幕府宗及馬仁𥙿皆趋走執事左右及宗出鎭文貞仕宦蹭蹬猶為其州廵官方旅見輒越次問曰馬押衙亡恙宗曰馬相公已鎮廬州文貞頋同列匿笑而退他日預公設宗勸以酒文貞俛首曰下官小户令公所􅍄知也聞者大駭而宗怡然不動其寛厚如此徙宣州節度使入覲賜宴元宗親為摺襆頭脚以表殊禮復岀留守東都請老以司徒致仕㱕金陵馮延鲁代為留守㑹周師䧟廣陵延鲁自髠而逃見執于周人束縛桎梏僅得免死時人益以宗享福終始為異俄而宗病䘚年七十餘宋齊丘時以太傅奉朝請撫其棺哭曰君大黠來亦得時去亦得時元宗聞之不平二女皆為後主后徐鍇字椘金㑹稽人父延休字德文風度淹雅故唐乾符中進士昭宗狩石門無學士草詔延休來調官適在㫄近逆旅左右言其工文詞即召見命視草昭宗善之及還長安不淂用梁蔣元暉辟為其佐延休棄去依鍾傳扵洪州吴取江西得延休仕至光祿卿江都少尹䘚二子鉉鍇遂家廣陵鍇四歲而孤母方教鉉就學未暇及鍇鍇自能知書稍長文詞與鉉齊名昇元中議者以文人浮薄多用經義法律取士鍇恥之杜門不求仕進鉉與常夢錫同直門下省出鍇文示之夢錫賞􅋢不已薦于烈祖未及用而烈祖殂元宗嗣位起家秘書郎齊王景遂奏授記室時殷崇義為學士草軍書用事謬誤鍇竊議之崇義方得君誣奏鍇泄禁省語貶烏江尉嵗餘召還授右拾遺集賢殿直學士論馮延魯有罪無才人望至淺不當為廵撫使重忤權要以秘書郎分司東都然元宗􅋢其才復召為虞部貟外郎後主立遷屯田郎中知制誥集賢殿學士改官名拜右内史舎人賜金紫宿直光政殿兼兵吏部選事與兄鉉俱在近侍號二徐初鍇久次當遷中書舎人㳺簡言當國每抑之諧乃詣簡言簡言従容曰以君才地何止一中書舎人然伯仲並居清要亦物忌太甚不若少遲之鍇頗怏怏簡言徐出妓佐酒所歌詞皆鍇所為鍇大喜乃起謝曰丞相所言乃鍇意也㱕以告鉉鉉歎息曰汝癡絶乃為數闋歌換中書舎人乎鍇凡四知貢舉號得人後主裒所製文命為之序士以為榮鍇酷嗜讀書隆寒烈暑未嘗少輟後主嘗得周載齊職儀江東初無此書人無知者以訪鍇一一條對無所遺忘其博記如此既久處集賢朱黄不去手非暮不岀少精小學故所讐書尤審諦每指其家語人曰吾惟寓宿于此耳江南藏書之盛為天下冠鍇力居多後主嘗歎曰群臣勤其官皆如徐鍇在集賢吾何憂㢤李穆來使見鉉及鍇歎曰二陸之流也嘗夜直召對論天下事因及用人才行孰先後主曰多難當先才鍇曰有人才如韓彭而無行陛下敢以十萬兵付之乎後主稱善時國勢日削鍇憂憤鬱鬱得疾謂家人曰吾今乃免為俘虜矣開寳七年七月䘚年五十五贈禮部侍郎謚曰文著說文通釋方輿記古今國典賦苑歲時廣記及他文章凡數百卷鍇卒逾年江南見討比國破其遺文多散逸者查文徽歙州休寜人㓜好學能自刻苦手寫經史數百卷稍長任氣好俠聞人困乏雖不識必濟之家本冨坐是窮空不悔也或遺以金帛一夕盗入其家盡取去文徽不言雖鄰里莫知者久之盗敗于㫄邑移文訊驗人始知之咸推其量烈祖輔政初入謁烈祖召與語偉其論宋齊丘亦稱薦之徐知諤鎮浙西以文徽為其判官或獻玉杯知諤喜酬以錢百萬趣開宴出杯行酒至文徽偶墮地碎一坐皆驚而文徽自若烈祖受禅入為監察御史元宗立進諌議大夫中書舎人樞宻副使閩主延羲與其兄延政相攻延政以建州建國稱殷而延羲為其下所殺推立大捋朱文進元宗欲討文進文徽以為延政首亂當先致討有翰林待詔臧循者與文徽同里巷少嘗為賈入閩習知其山川險易為陳進兵之䇿文徽本好言兵遂請行元宗乃以為江西安撫使令至境上審觀可否文徽鋭于成功至上饒復命盛言必克詔彂洪州屯兵以邉鎬為将従文徽攻建州建人厭王氏之亂伐木開道迎我師行次益竹遇建州兵至又聞泉漳汀州皆㱕延政恐懼退保建陽時臧循亦為别将屯邵武延政襲破之獲循斬于建州軍聲大挫元宗遣何敬洙等來援敬洙鎬與建州兵相持文徽得建之降将孟堅使濳師出其後擊之建州兵大敗潰去遂傅其城雖下建州諸軍無紀律殺掠不禁民始失望有叛志矣元宗知而置不問䇿功遷撫州觀察使又拜建州留後由是文徽益自用時李弘義挾吴越兵據福州偽遣諜來告福州亂文徽喜率劍州刺史陳誨赴之誨将舟師至福州城下擊敗其兵執吴越将馬先進等三人文徽以歩騎繼至弘義陽遣䘚數百人出迎而設伏西門以待文徽傳令徑入其城陷伏中大敗墜馬被執送錢唐将士死者萬人元宗遣使㱕馬先進于吴越而求文徽吴越王遣還将發為置酒遇毒㱕至金陵毒始作元宗使醫視之醫以珠置口中有頃珠色變黒醫曰疾不可為然猶十年乃死文徽遂病瘖以工部尚書致仕朱元降周坐親黨安置宣州䘚年七十距遇毒之歳正十年云謚曰宣子元方元規元素元範元賞元方事後主為水部貟外郎吉王從謙掌書記従謙朝京師太祖命知制誥盧多遜燕従謙于館多遜奕棋次顧元方曰江南竟何如元方歛袵曰江南事大朝十餘年極君臣之禮不知其他多遜推枰媿謝曰勿謂江南無人使還通判建州盧綘據歙州傳檄至建元方立斬其使及絳平太祖聞元方所為大悦擢殿中侍御史知泉州䘚官元方子道龍圗閣待制始徙家海陵純厚長者以文行稱于時道從兄陶及事後主國亡入朝仕至秘書少監知審刑院與道尤極友􅋢自金陵破士族流離多貧困失職惟道兄弟盡力収恤聚食常數十百人得任子恩皆以与族人以少長為先後無親踈之間異姓亦分俸給之時其婚􅊚由是常苦貧而查氏至今為海陵望族許國籥皆其後也邊鎬金陵人少事烈祖為通事舎人以通敏稱保大初循州人張遇賢本羅縣小吏有神降于縣之刻衫鎮語人曰張遇賢非常人當事我遇賢徃事之㑹州境群盜𧺫各擁衆數百無所統相與禱于神神又大言曰張遇賢汝主也遇賢遂稱王改元置百官度嶺襲虔州節度使賈浩閉門登陴不敢出遇賢據白雲洞衆十餘萬元宗遣洪州營屯都虞候嚴思率所部討之鎬為監軍䖍有書生白昌𥙿沉宻有謀鎬引與㝎計刋木開道􅊞白雲洞㑹遇賢所事神棄去不復降語賊衆遂潰其禆将李台執之以降䇿功遷洪州營屯諸軍都虞候二年查文徽以樞宻副使出師伐建州詔鎬為行營招討洪撫饒信歙等州諸指揮都虞候從文徽行然衆纔數千戰敗退舎元宗聞之遣何敬洙祖全㤙姚鳳來援敬洙與鎬進兵奪其險要自崇安進次赤嶺與建兵方相持爲背水陣文徽使騎繚出建兵之後與敬洙鎬夾擊大破之遂取建州降王延政鎬又南取鐔州事平諸将皆爭功鎬獨無一言七年椘馬氏兄弟相攻希萼雖勝而尤無道元宗知楚難方殷以鎬爲信州刺史領屯營兵兼湖南安撫使駐袁州萍鄊有警許便冝従事楚人果復廢立鎬自萍鄊帥師入潭州遷馬氏之族及文武将吏于金陵遂拜潭州節度使南漢将潘崇徹攻郴州鎬岀兵爭之敗績遂失郴州鎬懼南漢㓂邊未已請除道全二州刺史詔以廖偃爲道州刺史張巒權知全州然湖湘之憂實不在南漢也自馬氏廢立以來帑庾空竭土地既㱕我馮延已為相矜平楚之功不欲取費于國專掊歛楚人以給經費人心巳離鎬柔而無㫁日飯沙門希福紀綱頽弛不之問初咸師朗來㱕以其所部為奉節軍従鎬入楚廩給薄于椘之降䘚偶語怨望而糧料使王紹顔每給奉節糧輒刻削之軍校孫朗欲殺紹顔紹顔匿囷下得免官屬請斬紹顔以謝将士鎬不聴朗乃謀殺鎬及紹顔據湖南㱕中原夜率所部取草燒府門火輒不彂良久傳漏者覺之以告鎬出衙兵以鬪勝貧未决鎬命吹角亂兵少以為将旦亟斬關奔朗州盡以潭州虗實告劉言言久懐叛志得朗言大喜遣其将王進逹周行逢來攻鎬初亦俻言已而聞人謂忠順傾意信之及言兵已㧞益陽遂夜棄城岀奔列城皆潰盡䘮楚地坐削官流饒州而它将棄城者皆斬初湘中謡言馬去不用鞭至是而驗十四年周師大入齊王景逹為元帥岀兵援夀州起鎬為大将戦敗被執丗宗命為右千牛衞上将軍及元宗割淮南地請􅉀丗宗乃㱕鎬䘚扵金陵南唐書列傳卷苐二南唐書本紀苐二元宗眀道崇德文宣孝皇帝名璟字伯玉烈祖長子毋曰宋皇后初名景通風度髙秀㓜工属文起家駕部郎中累進諸衞大将軍烈祖為齊王立為王太子固讓昇元初烈祖受禅封吴王徙齊王四年八月立為皇太子復固譲曰前卋以嫡庻不眀故早建元良示之分定如臣兄弟友􅋢尚何待此烈祖為其下詔稱其守廉退之風帥忠貞之節有子如此予𣸪何憂赦殊死以下臣民奉牋齊王如太子禮七年二月烈祖病疽秘之人皆莫知庚午疾亟太醫吴廷紹宻遣人告帝帝馳入宫侍疾扵東閤是夕烈祖崩祕不發喪而下詔命帝監國大赦頒賚有差丙子始宣遺詔保大元年春三月己卯朔烈祖殂已旬日帝猶未嗣位方泣譲諸弟奉化節度使周宗手取衮冕衣帝曰大行付陛下神器之重豈得固守小節是日即皇帝位大赦改元不待逾年遽改元識者非之百官進位二等将士皆有賜蠲民逋負租稅賜鰥寡孫獨粟帛尊皇后為皇太后立妃鍾氏為皇后以鎮南軍節度使宋齊丘為太保兼中書令奉化軍節度使周宗為侍中徙封夀王景遂為燕王宣城王景逹為鄂王閩使來弔祭升濠州為定遠軍秋七月徙燕王景遂為齊王鄂王景逹為燕王仍以景遂為諸道兵馬元帥居東宫景逹為副元帥詔中外以兄弟傅國之意八月乙卯立弟景逷為保寜王冬十月庚戌有星孛于東方嶺南妖賊張遇賢犯虔州詔遣洪州營屯都虞候嚴㤙帥師討之以通事舎人邊鎬監其軍其後擒遇賢及其黨黄伯雄曺景全斬扵金陵市十二月以太保中書令宋齊丘為鎮海軍節度使保大二年春正月侍中周宗罷為鎮南軍節度使左僕射兼門下侍郎平章事張居詠罷為鎮海軍節度使辛巳詔齊王景遂總庻政惟樞宻副使魏岑查文徽得奏事餘非召對不得見初烈祖尤􅋢景遂帝奉先志欲傳以位故有是詔宋齊丘蕭儼皆上書切諌未見聴侍衞都虞候賈崇叩閤請見曰臣事先帝三十年孜孜詢察下情猶患壅隔陛下始即位所委何人而頓與臣下踈絶如此因嗚咽流涕帝感悟命坐賜食遂収所下詔夏五月閩将朱文進弑其居曦自稱閩王遣使來告帝囚其使将討之議者謂閩亂由王延政當先討乃釋閩使遣還秋九月庚午朔日有食之冬十二月樞宻副使查文徽請討王延政詔以文徽為江西安撫使徃覘建州文徽固請乃以邊鎬為行營招討共攻延政敗績于盖竹保大三年春二月以何敬洙爲福建道行營招討祖全恩爲應援使姚鳳爲諸軍都監㑹查文徽進討秋七月星見而風雨八月甲子朔日有食之克建州執王延政㱕于金陵拜羽林大将軍升建州爲永安軍冬十月皇太后宋氏殂是歲升建州延平津爲劒州以建州之劒浦汀州之沙縣隷焉保大四年春正月以青陽公宋齊丘爲太傅兼中書令昭武軍節度使李建勲爲右僕射兼門下侍郎及中書侍郎馮延已皆平章事夏五月以樞宻使陳覺爲福建宣諭使使諭李弘義入朝不克覺擅發汀建撫信州兵趨福州帝遂命王崇文魏岑馮延魯㑹攻福州秋九月准南蟲食稼除民田稅冬十月庚辰圍福州改漳州為南州保大五年春正月立齊王景遂為皇太弟徙燕王景逹為齊王拜諸道兵馬元帥徙南昌王弘兾為燕王副元帥晉宻州刺史皇甫暉棣州刺史王達來㱕契丹耶律徳光以滅晉來吿捷且請㑹􅉀于境上帝不從遣工部郎中張易聘之請命使者如長安修奉諸陵契丹亦不從三月己亥吴越救福州兵自海道至我師與之戦敗績諸營皆潰夏四月壬申詔即軍中斬陳覺馮延魯餘将帥皆赦不問已而復詔械覺延魯還都既至貸死覺流蘄州延鲁流舒州五月帝聞契丹棄中原遁㱕詔曰乃眷中原我之故地以李金全為北面行營招討使六月聞漢入汴兵遂不出而金全猶不罷秋閏七月丁丑夜有彗出東方近濁其尾迹近側掃少微及長垣至八月壬辰乃沒八月太傅兼中書令宋齊丘罷為鎮南軍節度使保大六年夏六月庚寅朔日有食之九月漢護國軍節度使李守貞間道表求援師以鎮海軍節度使李金全為北面行營招討使救河中師次沂州冬十一月退保海州保大七年春正月淮北盗起以神衞都虞候皇甫暉将軍張巒蕭處贇監軍散騎常侍張義方帥師萬人出海泗招降納亳州蒙城鎭将咸師朗等以㱕夏六月癸酉朔日有食之冬十月我師渡淮攻正陽敗績十二月泉州刺史留従効兄南州刺史従願殺刺史董思安據南州自稱利史我不能問因升泉州為清源軍以従効為節度使保大八年春正月李金全始罷北面行營招討使二月福州遣諜者詣建州留後查文徽吿吴越戍䘚亂殺李弘義棄城去文徽信其言襲福州大敗被執而别将建州刺史陳誨以戦棹敗福州兵執其将馬先進俘于金陵秋七月㱕馬先進于吴越而求查文徽八月尚書郎周濬等三人奔漢九月椘朗州節度使馬希萼表請師詔加同平章事賜以鄂州今年租税命楚州團練使何敬洙帥師援之冬十月吴越㱕查文徽十一月甲子朔日有食之十二月馬希萼攻䧟潭州弑其君馬希廣楚将李彦温劉彦瑫各以千人來㱕保大九年春二月椘王希萼使掌書記劉光翰來貢方物三月壬戌朔以右僕射孫晟客省使姚鳳為楚王䇿禮使又以洪州營屯都虞候邊鎬為湖南安撫使便冝進討淮南饑夏五月􅉝未有星大如五升器自西南流墜西北光燭地聲如雷六月楚靜江軍指揮使王達執朗州節度使馬光恵㱕于金陵推辰州刺史劉言為朗州留後來請命秋九月楚将徐威等廢其君希萼邊鎬出萍鄊以討楚亂冬十月壬寅武安留後馬希崇請降鎬入潭州癸丑武昌節度使劉仁瞻帥舟師取岳州湖南遂平南漢來攻郴州䧟之周兖州節度使慕容彦超來乞援師從之保大十年春正月陞洪州髙安縣為筠州以清江萬載上髙三縣隷焉援兖州之師敗績于沐陽周人執我指揮使燕敬權二月周人㱕敬權使來言曰吾賊臣背畔爾國助之豈長計㢤且使潁州郭瓊遺我夀州劉彦貞書其詞曰大周潁州團練使郭瓊致書于淮南夀州節度使麾下自古有國皆惡叛臣貴邦何為常事招誘吴中多士無乃淺圗帝頗愧其言以翰林學士江文蔚知禮部貢舉放進士王克貞等三人及苐旋𣸪停貢舉三月以太弟太保馮延已為左僕射前鎮海節度使徐景運為中書侍郎及右㒒射孫忌並同平章事帝以南漢乗楚亂據桂冝等州将取之以知全州張巒兼桂州招討使夏四月丙戌朔日有食之命統軍侯訓帥五千人㑹張巒攻桂州敗績于城下訓死之巒収餘衆保全州周興順指揮使白進福以族來㱕秋九月召朗州劉言入朝冬十月劉言将王逵周行逢攻潭州壬辰㧞益陽寨戍将李建期死之丙申潭州節度使邉鎬棄城遁率丑劉言将蒲公益攻岳州刺史宋徳權監軍任鎬棄城遁十一月劉言盡據故楚地詔流邉鎬于饒州斬宋徳權任鎬于太社斬禆将申洪泰尹建于都門外平章事馮延巳孫忌皆罷延巳左僕射忌右僕射十二月雩都令趙暹奔周洪州大都督楚王馬希萼來朝留不遣是歲大旱保大十一年春三月以左僕射馮延已同平章事金陵火逾月㷊官寺民廬數千間復設貢舉夏六月不雨井泉竭涸淮流可􅍱旱蝗民饑流入周境冬十月築楚州白水塘以溉屯田遂詔州縣陂塘堙廢者皆修復之于是力役暴興楚州常州為甚帝使親吏車延䂓董其役發洪饒吉筠州民牛以徃吏縁為姦奪民田為屯田江淮騷然百姓以數丈竹去節㷊香扵中仰天訴冤者不可勝數知制誥徐鉉因奏事白之帝曰吾國兵數十萬安肯不食捍邊事有大利則舉國排之柰何鉉又力陳其弊帝乃遣鉉行視利害鉉至楚州悉取所奪田還民詰責車延規欲㮄之百姓感恱而帝左右交譛以為擅作威福帝大怒趣㱕将沉之江中既至怒少解流舒州而白水塘等役亦賴以止保大十二年春正月有大星霣于西北聲如雷二月命吏部侍郎朱鞏知禮部貢舉自十一年六月至于今年三月大饑疫命州縣鬻粥食餓者秋七月契丹使其舅來聘夜宴清風驛盗斬契丹使亡去捕之不得或以爲周人也自是契丹遂不至保大十三年春二月以中書侍郎知尚書省嚴續為門下侍郎平章事夏六月周攻秦鳳蜀使間使來吿難周下詔罪状我遣将李穀王彦超韓令坤等侵我淮南攻自夀州帝乃以神武統軍劉彦貞為北面行營都部署帥師三萬赴夀州奉化節度使同平章事皇甫暉為北面行營應援使常州團練使姚鳳為應援都監帥師三萬屯㝎逺縣召鎮南節度使宋齊丘入朝謀難冬十二月以安㝎郡公従嘉爲沿江廵撫使是歳天裂東北其長二十丈保大十四年春正月壬寅周帝親征劉彦貞與周師戦于正陽敗績彦貞戦死二月周師兼道襲清流關皇甫暉敗保滁州周師破城俘暉及姚鳳以㱕壬戌有星孛于参芒東南指帝遣泗州牙将王承朗奉書至徐州求成于周稱唐皇帝奉書于大周皇帝願以兄事歳獻方物太弟景遂亦移書周将帥皆不報己卯遣翰林學士鍾謨文理院學士李德眀使周奉表至下蔡行在貢金器千两銀器五千两錦綺紋帛二千匹及御衣犀帶茶藥又奉牛五百頭酒二千石犒軍請罷兵乙酉周師䧟東都執副留守馮延魯丁亥左神衞使徐象等十八人自夀州奔周天長制置使耿謙以城降于周遣園苑使尹廷範護遷譲皇之族于潤州廷範殺其男子六十人誅廷範以謝國人周師䧟泰州刺史方訥棄城遁帝遣間使求援于契丹至淮北爲周人所執吴越侵常州宣州靜海制置使姚彦洪奔吴越三月遣司空孫晟及禮部尚書王崇質使周削去帝號奉表請為外臣猶不許光州兵馬都監張延翰以城降于周刺史張紹遯還丁酉周師䧟舒州刺史周弘祚赴水死蘄州将李福殺知州王承雋降于周戊戌天成軍使蔡暉自夀州奔周周師䧟和州詔斬李徳眀于都市坐奉使請割地也吴越陷常州之郛執團練使趙仁澤燕王弘兾遣龍武都虞候柴克宏救常州壬子大敗吴越兵于常州斬獲萬計俘其将數十至潤州弘兾悉斬之壬戌夀州軍校陳延貞等十三人奔周是月命諸道兵馬元帥齊王景逹拒周夏四月𣸪泰州五月周帝北還秋七月復東都舒蘄光和滁州惟夀州之圍愈急冬十月周人害我行人周晟従者二百人皆以死獨貸鍾謨以為耀州司馬是歳詔者淮南屯田之害民者保大十五年春二月乙亥周帝親征齊王景逹自濠州遣邊鎬許文稹朱元帥兵數萬援夀州景逹用監軍使陳覺言謀奪朱元兵以楊守忠代之元遂舉寨降周禆将時厚卿獨不從見殺壬辰周師盡破我諸寨執邊鎬許文稹楊守忠餘衆悉潰景逹亦遁㱕金陵是役也所䘮四萬人三月誅朱元妻子丁未夀州劉仁瞻病革副使孫羽等代仁贍署表降于周辛亥晝晦雨沙如霧夏四月周帝北還冬十一月周帝𣸪親征十二月濠州刺史郭廷謂泗州刺史范再遇皆舉城降帝知東都必不守遣使㷊其官私廬舎徙其民于江南周師入揚州丁丑周師攻䧟泰州都城大火一日數發交泰元年春正月改元中興丙戌周師陷海州壬辰周師陷靜海軍丁未陷楚州防禦使張彦卿兵馬都監鄭昭業死之周師屠城㷊廬舎殆盡周師次雄州刺史易文贇舉城降州天長縣也三月大赦改元交泰以皇太弟景遂為天䇿上将軍晋王立燕王弘兾為皇太子参治朝政丁亥周帝次揚州辛卯遂至迎鑾鎮壬辰耀兵江口帝懼周師南渡遣樞宻使陳覺奉表貢方物請傳位太子弘兾以國為附庸周帝始采唐報囘紇可汗故事答帝璽書稱皇帝致書敬問江南國主帝遣閤門承旨劉承遇上表稱唐國主盡獻江北郡縣之未陷者鄂州漢陽汊川二縣在江北亦獻焉歳輪土貢數十萬而乞海陵鹽監南属不許後歳給贍軍鹽三十萬石庚子周帝賜書許帝奉正朔罷兵而不許傳位太子甲辰遣平章事馮延巳等使周犒軍及買宴夏五月下令去帝號稱國主去交泰年號稱顯德五年置進奏邸于汴都凡帝者儀制皆従貶損改名景以避周信祖諱告于太廟告廟之日金陵大霧通夕不解左僕射平章事馮延已罷為太子太傅門下侍郎平章事嚴續罷為太子少傅己酉周帝遣太府卿馮延魯衞尉少卿鍾謨賜國主御衣金玉帶錦帛羊馬及犒軍帛十万凡士䘚俘于周者皆遣還凡五千七百五十人冬十月甲午周帝㱕我臣馮延鲁許文稹邊鎬周廷􅌟國主皆不𣸪用十二月己亥暴宋齊丘陳覺李徴古罪放齊丘㱕九華山覺安置饒州徴古削官爵覺徴古㝷皆賜自盡齊丘眀年正月亦幽死顯徳六年秋七月鑄大錢文曰永通泉貨一當十與舊錢並行又鑄唐國通寳錢二當開通錢之一九月丙午太子弘兾䘚冬十一月建洪州為南都南昌府建隆元年春正月遣使莅誅鍾謨于饒州誅張巒于宣州大宋太祖皇帝受周禅放江南降将三十四人來㱕二月始鑄鐵錢三月遣使朝賀于京師秋七月遣禮部郎中龔慎儀朝于京師貢乘輿服御自是歳貢尤數歳費以萬計冬十月宋揚州節度使季重進叛來求援不許十一月丁未太祖平李重進國主遣右僕射嚴續犒軍蔣國公従鎰户部侍郎馮延魯朝貢建隆二年春二月國主遷于南都立吴王従嘉為王子留金陵監國國主舟行旌麾仗衞六軍百司凡千餘里不絶所過勞問髙年疾苦大宴于當塗至宋家洑暴風飄國主舟幾至北岸翌日従官皆乘輕舟奔問三月國主至南都太祖以國主遷都遣通事舎人王守貞來勞問南都廹隘群下皆思㱕國主亦悔遷北望金陵鬰鬱不樂澄心堂承旨秦承𥙿常引屏風障之復議柬遷未及行國主寝疾不𣸪進膳惟啜蔗漿嗅藕華六月己未疾革親書遺令留葬西山累土數尺為墳且曰違吾言非忠臣孝子夕有大星霣于南都庚申殂于長春殿年四十六後主不忍従遺令迎䘮還秋八月至金陵丁未殯于宫中萬夀殿告哀于京師且請追𣸪帝號太祖許之三年正月戊寅葬順陵元宗多才藝好讀書便騎善射在位㡬二十年慈仁恭儉禮賢睦族􅋢民字孤𥙿然有人君之度少喜棲隱築館于廬山瀑布前盖将終焉迫扵紹襲而止然自以唐室苗裔訹扵斥大境土之說及福州湖南再䘮師知攻取之難始議弭兵務農或曰願陛下十數年勿𣸪用兵元宗曰兵可終身不用何十數年之有㑹周師大舉寄任多非其人折北不支至于蹙國降號憂悔而殂悲夫論曰元宗舉閩楚之師境内虗耗及契丹滅晋中原有隙可乘而南唐兵力國用既已弗支􅍄視而不能出丗以為恨予謂不然唐有江淮比同時割據諸國地大力強人材衆多且據長江之險隱然大邦也若用得其人乗閩楚昏亂一舉而平之然後東取吴越南下五嶺成南北之勢中原雖欲睥睨豈易動㢤不幸諸将失律貪功輕舉大事弗成國勢遂弱非始謀之失所以行之者非也且陳覺馮延鲁輩用師閩椘猶䘮敗若此若北鄊而爭天下與秦晉趙魏之師戦于中原角一旦勝負其禍可勝言㢤予故具論其實如此後之覽者得以考觀焉南唐書本紀卷苐二
