body:
  text: 南唐書列傳卷苐十三烈祖元敬皇后宋氏小名福金父韞江夏人后㓜流離亂兵中昇州刺史王戎得后烈祖娶戎女后為媵得幸生元宗王氏早䘚義祖命烈祖以為繼室封廣平郡君晉􅀦君治内有法不妄言􅀏義祖殂于金􅁜烈祖在東都􅀅奔䘮后宻以大計諌止焉烈祖為齊王封王妃及受禅立為后従容裨贊多􅀁弘益烈祖嘗曰吾思有未逹后已悟矣昇元末烈祖服金石藥多㬥怒賴后以免譴者甚衆及殂中書侍郎孫忌懼魏岑馮延巳延鲁以東宫舊僚用事欲稱遺詔奉后臨朝聴政后不許曰此武后故事吾豈為之元宗即位尊后為皇太后保大三年十月䘚祔葬永陵烈祖後宫种氏名時光性警恵年十六入宫列樂部中俄得幸生景逷烈祖以受禅後􅀁得子甚愛之种氏寵日盛烈祖性嚴整嘗大怒聲如乳虎殿門環為震動左右皆䘮魂魄种氏左手持食右手進匕従容如平時烈祖怒亦頓解它日烈祖幸齊王宫遇王親理樂器大怒數日未解种氏負寵輙乗間言景逷才過齊王烈祖正色曰子有過父教之常禮也若何敢爾叱下殿去簪珥幽于别宫數月命度為尼景逿愛亦弛終烈祖丗獨不加封爵元宗即位始封景逷保寧王許种氏就飬于景逷宫中封王太妃宋后挾舊怨屡欲加害元宗力解之乃止元宗光穆皇后鍾氏父太章事吴為義祖裨􅀅義祖謀誅張灝令嚴可求喻太章伏􅋱士二十軰斬灝扵府太章許諾義祖疑其怯夜半徃止之曰僕毋老懼事不成欲徐圖之如何太章勃然曰言已出口豈有可巳之理眀日遂誅灝後頗恃功頡頑烈祖疑其難制義祖曰昔者吾赤族之旤間不容髮使無太章豈有今日冨貴耶柰何以薄物細故疑之乃命以太章次女配元宗即后也昇元中封齊王妃元宗即位立為皇后後主即位為太后以父名改稱聖尊后后􅃦疾後主朝夕侍側衣不解帶藥必親嘗乃進乾徳三年十月䘚是日雨沙于金􅁜後主毁瘠骨立杖而後䏻􅁸哀動左右葬順􅁜後主昭恵國后周氏小名娥皇司徒宗之女十九􅀊來㱕通書史善􅁔舞尤工琵琶嘗為夀元宗前元宗歎其工以燒槽琵琶賜之至于采􅃧奕棋靡不妙絶後主嗣位立為后寵嬖專房創為髙髻纎裳及首翹鬢朶之粧人皆効之嘗雪夜酣燕舉杯請後主起舞後主曰汝􅀎創為新聲則可矣后即命牋綴譜喉無滯音筆無停思俄頃譜成􅀁謂邀醉舞破也又有恨來遲破亦后􅀁製故唐盛時霓裳羽衣最為大曲亂離之後絶不復傳后得殘譜以琵琶奏之扵是開元天寳之遺音復傳于丗内史舎人徐鉉聞之扵􅀦工曺生鉉亦知音問曰法曲終則㣪此聲乃反急何也曺生曰舊譜實緩宮中有人易之非吉徴也後主以后好音律因亦躭嗜􅆸政事監察御史張憲切諌賜帛三十匹以旌敢言然不為輟也未幾后臥疾已革猶不亂親􅂑元宗􅀁賜燒槽琵琶及平時約臂玉環為後主别乃沐浴粧澤自内含玉䘚于瑶光殿年二十九葬懿􅁜後主哀自裂誄刻之石與后􅀁愛金屑檀槽琵琶同葬又作書燔之與訣自稱鰥夫煜其辭數千言皆極酸椘或謂后􅆍疾小周后巳入宫中后偶褰㡢見之驚曰汝何日來小周后尚㓜未知嫌疑對曰既數日矣后恚怒至􅋱面不外向故後主過哀以揜其迹云後主􅀦后周氏昭恵后妹也昭恵䘚未㡬後主居聖尊后䘮故中宫久虗開寳元年始議立后為繼室命太常愽士陳􅃱雍攷古今㳂革草具婚禮又命學士徐鉉史官潘佑参定文安郡公徐逰評其異同逰多是佑議遂施用之逾月逰病疽鉉懟其不主巳議戲語人曰周孔亦􅀎為厲乎后少以戚里間入宫掖聖尊后甚􅋢之故立焉被寵過于昭恵時後主于群花間作亭雕鏤華麗而極迫小僅容二人每與后酣飲其中􅀦亡従後主北遷封鄭􅀦夫人太平興􅀦三年後主殂后悲哀不自勝亦䘚後主保儀黄氏江夏人父守忠事湖南馬氏為偏裨􅁁鎬入長沙得黄氏納後宫後主見其美選為保儀以工書扎使專掌宮中書籍二周后相􅁇專房燕故保儀雖見賞識終不得數御幸也元宗後主俱喜書法元宗學羊欣後主學桞公􅁠皆得十九購藏鍾王己來墨帖至多保儀實掌之城􅀅䧟後主謂之曰此皆先帝􅀁寳城若不守汝即焚之無爲他人得及城䧟悉㷊無遺者保儀亦従北遷䘚于大梁又有宫人流珠者性通慧工琵琶後主演念家山破及昭恵􅀁作邀醉舞恨來遲二破久而忘之後主追念昭恵問左右無知者流珠獨􅀎追憶無􅀁忘失後主大喜後不知􅀁終烈祖五子宋皇后生元宗楚王景遷晉王景遂齊王景逹种氏生江王景逷景遷字子通㓜警敏讀書一覽􅂺不忘烈祖輔吳景遷尚吴公主爲駙馬都尉歷衙内馬􅇍軍都指揮使海州團練使左右軍都軍使遂以左僕射参政事留東都輔政時甫成童㝷加同平章事知左右軍使寝疾罷㱕金陵為諸道副都統以景遂代輔政景遷病逾年竟䘚年十九謚曰㝎無子初術士皆謂景遷貴不可言故烈祖在諸子中尤愛之及是始悟術士之妄景遂仕吴為門下侍郎烈祖受禅封夀王純厚夷淡有士君子之操讓皇之䘮景遂受命徃護䘮事望柩哀慟觀者聳歎烈祖殂元宗以位譲景遂大臣固持之而止眀年又命景遂總庶政已降詔僉謂不可乃􅀵􅀁下詔久之又以為太弟凡太子官属皆改為太弟官属景遂固辤雖不得命終恐懼不敢安処乃􅂑老子功成名遂身退之意自為字曰退身以見志平居好客喜属文燕集無虗日贊善大夫張易峭􅀡喜盡言景遂嘗賦詩頗纎麗易面規之景遂敬納又嘗怒碎玉杯于坐景遂亟摧謝無迕色及易出使契丹景遂上言力陳以為易􅀦士也冝夙夜納誨今使抗不測之淵報聘逺夷非􅀦之利元宗報之曰易固竒士海神當畏之竟遣行景遂在東宫十三年屡乞㱕藩交泰元年三月始改授天䇿上􅀅軍江南西道兵馬元帥洪州大都督太尉尚書令晉王以樞宻副使李徴古為鎭南節度副使佐之徴古習驕嫚至鎮專恣尤甚景遂積久不能堪欲斬之而自拘有司左右諌止初景遂之出鎭也弘兾為太子弘兾嘗被譴于元宗有􅂧立景遂之意景遂在鎮亦頗忽忽多忿躁嘗以忤意殺都押衙􅀽従範之子弘兾刺知之乃使親吏持酖遺従範使毒景遂景遂擊鞠而渴索漿従範毒􅄴以進之㬥䘚年三十九未歛體巳潰元宗素友愛聞訃悲悼左右欲少慰􅇚之因妄曰太弟初得疾忽語人曰上帝命我代許旌陽元宗始少解故被酖之事竟不之知廢朝七日贈太弟謚文成景逹生于吴順義四年是歲大旱烈祖方輔政極于焦勞七月既望雩而淂雨景逹以是日生烈祖喜故小名雨師稍長神􅀚爽邁異于他兒烈祖深器之受禅封信王烈祖欲以為嗣難于越次故不果烈祖殂景遷已前􅋱元宗稱疾固譲景遂欲以次及景逹承先帝遺意既迫扵群下之議不得行乃立景遂為太弟景逹自燕王徙封齊王為諸道兵馬元帥中書令景逹孝友純至嘗従逰後苑泛舟池中元宗舟覆景逹在他舟初不善泅遽躍入水中負元宗出人以為精誠􅀁感性剛正嫉惡朝廷嚴惮之帝每召宗室近臣曲宴馮延已延鲁魏岑陳覺軰憑寵􅀏呼㫄若無人景逹屡訶詰之復極諌元宗它日宴于東宫延巳愧二弟之命不出于已欲以虗辭為徳陽醉撫景逹背曰爾勿忘我景逹不勝其忽拂衣入奏請斬延巳元宗諭解久之乃巳張易語景逹曰殿下力未􅀎去羣小而數面折之使之懼而自謀豈易測㢤景逹悟自是畏禍遇曲宴輙以疾辤保大末淮南交兵景逹以元帥督師陳覺為監軍使軍政皆决扵覺景逹署牘尾而巳朱元叛夀州䧟皆覺為之景逹亦不䏻詰初出師五萬而俘􅋱亡叛者四萬景逹及覺引殘兵㱕金􅁜上還印綬元宗恐其無功自愧乃拜天䇿上􅀅軍浙西節度使景逹不敢當要鎮力辤改撫州大都督臨川牧在鎮十餘年後主嗣位加太師尚書令甚尊禮之䘚于鎮年四十八在烈祖諸子中㝡為夀矣贈太弟謚昭孝遺命留葬江州廬山初景逹好神仙道家之說記室徐鉉獻述仙賦以諷行于世景逷字宣逺烈祖初受禅以十二月二日為仁夀節景逷以是日生故小名仁夀烈祖甚愛之毋种氏得譴宋皇后鞠飬景逷如已出元宗嗣位封保寧王徙封信王出為䖍州節度使簡易節儉䖍人安其政贑令䘚尉邵繼良攝令以令成䘮日張樂宴飲景逷立奏黜之毎有小過掌書記孫峴苦言規正之景逷大重之峴䘚言及必流涕厚䘏其􅀌後主立進封江王加兼中書令元宗後主皆酷好浮屠羣臣化之政事日弛景逷獨尊六經名教排斥浮屠不少撓在鎮十一年䘚年三十一贈中書令謚昭順元宗十子弘兾弘茂後主従善従鎰従謙従慶従信凡八人可見而従慶従信失其官封又二人并逸其名鍾皇后生弘兾後主従善従謙自弘茂以下皆不知其毋弘兾元宗長子故唐之末民間相傳䜟曰東海鯉魚飛上天而烈祖果育扵徐氏因信符䜟又有䜟曰有一眞人在兾川開口持弓向左􅁁元宗欲其子應之乃名之曰弘兾初封東平公徒王南昌元宗嗣位以弟景遂為兵馬元帥景逹為副元帥誓于烈祖椊宫前約兄弟相傳而出弘兾留守東都及景遂為太弟又徙鎭潤州封燕王弘兾為人沉厚寡言周師䧟廣􅁜吴越亦攻我常州元宗念弘兾尚少不習軍旅事遣使召還都部􅀅趙鐸曰王雖冨于春秋然元帥之重衆心􅀁恃忽棄其師而㱕則部下必亂㱕欲何之弘兾善其言聞扵元宗即日大為􅀾守之備部分諸􅀅皆愜服士心元宗使龍武都虞􅀱柴克宏右衞􅀅軍陸孟俊救常州至潤州樞宻副使李徴古白以神衞統軍朱匡業代克宏㱕弘兾察克宏有才畧謂曰君苐前􅀾吾當拒守表言克宏决可破賊常州危在旦暮臨敵易􅀅兵家􅀁忌臣請以身保其功克宏亦感激思奮馳至常州果大破吴越兵斬首萬級獲其􅀅佐數十人俘于潤州弘兾以時方艱危悉驅出轅門斬之人壮其决然元宗以其專誅殺不悦者乆之及太弟景遂力請㱕藩而景逹爲元帥奔潰南㱕獨弘兾有功遂􅀇爲太子参决政事元宗仁厚羣下多傱弛至以弘兾以剛斷濟之紀綱頗振起而元宗復怒其不遵法度一日怒甚以打毬杖笞之曰吾行召景遂矣弘兾大懼故景遂遇酖語在其傳元宗既請􅉀于周以在位久耻于降屈屡遣使請于丗宗欲傳位弘兾使為大􅀦附庸丗宗賜書力止之其詞曰皇帝致書敬問江南􅀦主兹睹來章備形縟㫖叙此日傳譲之意述向來髙尚之心仍以數載以來交兵不息備陳追悔之事無非克責之辭雖古者省咎責躬因災致懼亦無以過也况君血氣方剛春秋􅂦盛為一方之英主得百姓之驩心豈可髙謝君臨􅁿辤世務與其慕希夷之道孰若懷康濟之誠且天災流行􅀦家代有昔之聖哲􅀁不􅀎逃苟盛徳之日新則景福之彌逺諒惟英敏必照誠懐書詞温潤略以敵􅀦元宗乃已丗宗遣使至亦别賜弘兾􅀦信以為常顯徳六年七月弘兾属疾數見景遂為厲九月丙午䘚有司謚曰宣武句容尉張洎上書謂丗子之徳在侍膳問安今標顕武功垂示後世非􅀁以防㣲杜漸也洎知元宗猶銜弘兾專殺事其説葢出扵揣摩元宗果大以為然改謚曰文獻而洎由此進用弘茂字子松元宗苐二子㓜頴異善􅁔詩格調清苦年十四為侍衞諸軍都虞􅃸封樂安公􅀐射擊刺皆精習又領兵職然不喜戎事每與賔客朝士燕逰惟以賦詩為樂初弘兾剛嚴人多惮之故時望㱕弘茂保大九年七月䘚追封慶王弘茂之㓜有異僧言人夀夭旤福多驗元宗使視弘茂僧書九十一字以獻及䘚年十九從善字子師元宗苐七子器度凝逺封紀􅀦公使周㑹帝即位厚其禮遣翰林學士王著送之初従善與鍾謨相附結謨􅂺請以従善為嗣元宗雖不従然意亦自􅋢従善其遷南都也使主扈従諸軍元宗殂未御梓宫従善􅂺従徐逰求遺詔逰厲色拒之至金􅁜具以事聞後主素友􅋢略不以介意愈加輯睦進封韓王及貶制度降南椘􅀦公開寶四年遣朝京師太祖已有意召後主㱕􅊴即拜従善泰寧軍節度使留京師賜甲苐汴陽坊封其毋􅁜氏吴􅀦太夫人後主聞命手䟽求従善㱕􅀦太祖不許以䟽示従善加㤙慰撫幕府􅀅吏皆授常参官以寵之而後主愈悲思每憑髙北望泣下霑􅁭左右不敢仰視由是歲時逰燕多罷不講嘗製却登髙文曰玉斝澄醪金槃繡糕茱房氣烈菊蕋香豪左右進而言曰惟芳時之令月可藉野以登髙矧上林之伺幸而秋光之待襃乎予告之曰昔予之壮也意如馬心如猱情槃樂恣􅌚賞忘勞悁心志扵金石泥花月于詩騷􅁿五􅁜之得侣陋三秦之選曹量珠聘妓紉綵維艘被墙宇以耗帛論丘山而委糟年年不負登臨節歳歳何曽捨逸遨小作花枝金剪菊長裁羅被翠為袍豈知萑葦乎性忘長夜之靡靡宴安其毒累大徳扵滔滔今予之齒老矣心悽焉而忉忉愴家難之如燬縈離緒之鬰陶陟彼岡􅀆跂予足望彼􅀜􅀆睇予目原有鴒􅀆相従飛嗟予季􅀆不來㱕空蒼蒼􅀆風凄凄心躑躅􅀆淚漣洏無一懽之可作有萬緒以􅆞悲嗚呼噫嘻爾之告我曽非􅀁冝従善妃屡詣後主􅃅泣後主聞其至輙避去妃憂憤而䘚國人哀憐之􅀦亡改授右神武大􅀅軍太平興國初改右千牛衞上􅀅軍雍熈四年䘚年四十八従鎰元宗弟八子初封舒􅀦公改封􅃽太祖親征􅀭州李重進遣従鎰朝行在進封鄧王出鎭宣州後主宴餞綺霞閣與近臣俱賦詩而後主自為序及貶制度降江􅀦公太祖以不朝來討後主遣従鎰貢帛二十萬匹白金二十萬觔大兵悉以南渡従鎰留京師館懷信驛捷奏至百僚稱賀閤門趣随班入邸吏亦謂當有貢獻其介潘慎修以為􅀦被討且亡而使者旅賀非禮但奉方物待罪太祖嘉其知禮為易供張加賜牲餼上樽命知制誥李穆送従鎰㱕國諭指令後主自㱕仍命曺彬等緩攻以俟之而後主䘚不行以至城䧟従鎰従後主北㱕改名従浦䘚従謙元宗苐九子數歳為奕棋詩有思致後主賞歎之歷封鄂國公冝春王吉王及貶制度降鄂􅀦公㱕朝為右神武大􅀅軍湻化五年九月以本官出為安逺行軍司馬後失其􅀁終後主二子仲㝢仲宣皆昭恵周后􅀁生仲㝢字叔章乾徳二年封清源郡公北㱕授右千牛衞大􅀅軍居後主䘮哀毀過制太宗憐之遣使勞問終䘮賜積珍坊苐一區久之自言族大家貧求治郡拜郢州刺史在郡以寛簡為治士民安之淳化五年八月䘚年三十七子正言亦好學早䘚無子後主之後遂􅅸仲宣小字瑞保與仲㝢同日封宣城公三歲誦孝經不遺一字宫中燕侍合禮如在朝廷昭恵后尤􅋢之乾徳二年䘚纔四歳追封岐王謚懷獻后先属疾聞仲宣夭悲哀增劇至于􅋱南唐書列傳卷苐十三
