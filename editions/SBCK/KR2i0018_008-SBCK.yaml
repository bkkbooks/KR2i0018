body:
  text: 南唐書列傳卷苐八馮延已字正中一名延嗣廣􅁜人父令頵事烈祖至吏部尚書致仕嘗為歙州鹽鐡院判官刺史滑言病篤或言已􅋱人情頗恟恟延已年十四入問疾出以言命謝􅀅吏外賴以安及長以文雅稱白衣見烈祖起家授祕書郎元宗以呉王為元帥用延巳掌書記與陳覺善因覺以附宋齊丘同府位髙者悉以計出之扵是無居已右者元宗亦頗悟其非端士而不􅀎去延巳負其才藝狎侮朝士嘗誚孫忌曰君有何􅀁解而為丞郎忌憤然答曰僕山東書生鴻筆麗藻十生不及君詼諧􅁔酒百生不及君諂媚險詐累刼不及君然上􅀁以寘君于王邸者欲君以道義䂓益非遣君為聲色狗馬之友也僕固無􅀁解君之􅀁解適足以敗􅀦家耳延已慙不得對給事中常夢􅃬屡言延已小人不可使在王右右烈祖感其言􅀅斥之㑹晏駕元宗立延已喜形于色未聴政屡入白事元宗方哀慕厭之謂曰書記自有常職餘各有司存何為不惮煩也乃少止保大初拜諌議大夫翰林學士遷户部侍郎翰林學士承㫖又進中書侍郎四年同平章事集賢殿大學士罷為太子少傅頃之拜撫州節度使以毋憂去鎮起復冠軍大􅀅軍召為太弟太保領潞州節俄以左㒒射同平章事延巳數居柄任揣元宗不􅀎察其姦遂肆為大言謂已之才畧經營天下有餘而人主躬覽庶務大臣備位安足致理元宗果謂然悉委以政凡事奏可而巳延巳初以文藝進實無他長紀綱頽弛吏胥用事軍旅一切以委􅁁帥無􅀁可否愈欲以大言葢衆而惑人主至譏􅀏烈祖戢兵以為齷齪無大略嘗曰安陸之役䘮兵數千輙食咨嗟者旬日此田舎翁安􅀎成天下事今上㬥師數萬于外宴樂擊鞠未嘗少輙此眞英雄主也九年湖南平而朗州劉言叛􅀔張甚元宗亦知用兵之難謂延巳與孫忌曰湖湘之役楚人求息肩吾之出師不復已耳今若授劉言旄節使和其民吾亦得休飬衡湘之民國其庶㡬乎忌即欲奉行延已方以克椘為功乃曰本朝出偏師平一國㝢縣震動今一旦三分棄其二傷威毁重非􅀁以示天下且諸􅀅行奏功矣持不下又不欲縁軍興􅂑資扵國以損其功遣使如長沙調兵賦苛征㬥歛重失民心言遂􅂑長沙盡據故楚地周人亦伺釁而動朝論藉藉延已力求去而元宗待之如初及周師大入盡失江北地始罷延已猶為太子少傅數月復相㑹疾改太子太傅建隆元年五月乙丑䘚年五十八謚忠肅延巳工詩雖貴且老不廢如宫瓦數行曉日龍旗百尺春風識者謂有元和詞人氣格尤喜為樂府詞元宗嘗因曲宴内殿従容謂曰吹皺一池春水何干卿事延巳對曰安得如陛下小樓玉笙寒之句時䘮敗不支􅀦㡬亡稽首稱臣扵敵奉其正朔以苟歳月而君臣相語乃如此延巳晚稍自厲為平恕蕭儼嘗廷斥其罪及為大理卿㫁軍使李甲妻獄失入坐􅋱議者皆以為當􅋱延已獨􅀭言曰儼為正卿誤殺一婦人即當以􅋱君等今議殺正卿他日孰任其責乃建議儼素有􅀡聲今􅀁坐已更赦宥冝加弘貸儼遂免人士尤稱之弟延鲁延鲁字􅅩文一名謐少負才名烈祖時與兄延巳俱事元帥府元宗立自禮部貟外郎爲中書舎人勤政殿學士有江州􅀚察使杜昌業者聞之歎曰封疆多難駕御賢傑必以爵禄延鲁一言合指遽寘髙位後有立大功者當以何官賞之然元宗愛其才不以爲躐進嘗内宴出寳器貯龍腦數觔賜群臣延鲁曰臣請効陳平均分之比遍賜猶餘其半輙曰敕賜錄事馮延鲁拜舞懷之元宗爲驩􅀏而罷保大中師出平建州以延鲁爲監軍使諸􅀅欲乗勝遂􅂑福州樞宻使陳覺欲自爲功乃請銜命宣慰召李弘義入朝既見弘義不敢􅀤還至劒州矯詔起􅁁兵命延鲁􅀅之元宗雖怒覺之􅌹兵業已行因命延鲁爲南面監軍使與覺及王崇文魏岑㑹攻福州􅂑其外郛㑹吴越􅀅余安援兵自海道至白蝦浦􅀅捨舟而濘淖不可行方布竹簀登㟁我軍曺射之簀不淂施延鲁曰弘義不降恃此援耳若麾我軍稍退使吴越兵至平地盡勦之城主降矣裨􅀅孟堅爭曰援兵已䧟􅋱地􅀅盡力與我􅀾勝負殆未可知延鲁不聴頃之吴越至岸鼓譟􅁬躍而前與城中夾擊我延鲁敗走俘馘五千人孟堅􅀾􅋱諸軍遂大潰􅋱者萬計委軍實戎器數十萬􅀦帑爲之虗耗延鲁引佩刀自刺人救之不􅋱朝廷議即軍中斬延鲁及覺既有命矣㑹宋齊丘以嘗薦覺使福州自劾乃詔械延魯覺還金􅁜属吏皆止流竄延鲁流舒州㑹赦復少府監元宗擇廷臣為廵撫使分按諸州延鲁在焉右拾遺徐鍇上䟽論其多罪無才不足辱臨遣不聴使還遷中書舎人以工部侍郎出為東都副留守周師南侵分兵下東都延鲁宭蹙自髠衣僧服而逃被執世宗􅇚之賜衣冠授給事中問江南事占奏詳華賜予加厚留大梁累年遷刑部侍郎得還拜户部尚書宋興􅀭州節度使李重進叛伏誅元宗遣延魯朝于行在太祖􅀅乗兵鋒南渡旌旗戈甲皆列江津厲色詰延鲁曰爾􅀦何為敢通吾叛臣延鲁色不變徐曰陛下徒知其通謀未知其事之詳也重進之使館于臣家􅀦主令臣語之曰大丈夫失意而反世亦有之但時不可耳方宋受禅之初人心未定上黨作亂大兵北征君不以此時友今内外無事乃欲以數千烏合之衆抗天下精兵吾寧能相助乎太祖初意延鲁必恐懼失次及聞其言乃大喜囙復問曰諸􅀅力請渡江卿以為何如延鲁曰重進自謂䧺傑無與敵者神武一臨敗不旋踵况小􅀦其􅀎抗天威乎然亦有可慮者本國侍衞數萬皆先主親兵誓同􅋱生固無降理大􅀦亦􅂢數萬人乃可况大江天塹風濤無常若攻城未下饟道不繼事亦可虞太祖因大􅀏曰朕本與卿􅃧耳豈聴卿㳺説㢤㑹捕重進叛䘚日戮數十人延魯因奏事言曰叛者獨一重進乎亦衆人乎謂衆人則陛下應天順人烏有此理獨一重進則脅従者何罪太祖感悟後􅀗者皆貸不誅厚賜遣延鲁㱕南渡之師由是亦輟後主嗣位延鲁頗自伐奉使之功嘗宴内殿後主親酌酒賜之飲固不盡誦詩及索琴自鼓以侑之延鲁猶自若後主優容不責也椘􅀦公従善入朝太祖授旄節留之􅊴下後主復遣延鲁入謝疾作不􅀎朝太祖待之素厚至是尤憐之遣使挾太醫護視詔放朝還金􅁜䘚于家子僎韓熈載知貢舉放及苐覆試被黜後與其弟侃儀价伉入宋繼􅂑名苐南唐公卿家莫􅀎及者价仕至殿中丞知福州至道咸平間歷典藩郡以政績聞延魯鋭于仕進然喜言髙退事嘗早朝集漏舎歎曰玄宗賜賀監三百里鑑湖非僕􅀁敢望得賜玄武湖亦遂素意徐鉉􅀏答曰上于近臣豈惜一玄武湖恨無知章爾延鲁不􅀎對孫忌髙宻人一名􅃫又名晟少舉進士如洛陽爲進士者例修􅁁幅尚名檢忌豪舉跌宕不能蹈䋲墨遂亡去渡河客趙魏間唐荘宗建號以豆慮革為相革雅知忌辟為判官遷著作郎眀宗天成中與髙輦同事秦王重榮従榮敗忌亡命至正陽未及渡追􅀐奄至亦疑其状偉異睨之忌不頋坐淮㟁捫敝衣齧蝨追者乃捨去渡淮至夀春節度使劉金淂之延與語忌陽瘖不對授館累日忽謁漢淮南王安廟金先使人伏神座下悉聞其􅀁禱乃送詣金􅁜時烈祖輔吴四方豪傑多至忌口吃初與人接不能道寒暄坐㝎辭辯鋒起人多憎嫉之而烈祖獨喜其文詞使出教令􅂺合指遂預禅代秘計每入見必移時乃出尤務謹宻人莫窺其際烈祖受禅歷中書舎人翰林學士中書侍郎元宗立齊王景遂排之出為舒州節度使治軍嚴有㱕化䘚二人正晝挺白刃入府求忌殺之入自西門吏士倉䘚莫􅀎禦適忌間行在東門聞亂得民家馬乗之奔桐城叛䘚不得忌乃殺都押衙李建崇而逸忌坐貶光禄卿元宗素重之不以為罪累遷左㒒射與馮延已並相毎鄙延巳侮誚之卒先罷保大十四年周師侵淮南圍夀州分兵破滁州擒皇甫暉江左大震以忌為司空使周奉表請為外臣忌見延已曰此行當属公然忌若辤則是負先帝也既行知不免中夜歎息語其副禮部尚書王崇質曰吾思之􅍄矣終不忍負永􅁜一抔土周世宗以樓車載忌扵夀州城下使招仁贍仁瞻望見忌戎服拜城上忌遥語之曰君受􅀦㤙不可開門納冦世宗詰之忌謝曰臣為唐大臣豈可教節度使外叛于是遣王崇質㱕而留忌㑹暑雨班師忌亦従至大梁館都亭驛遇入閤使班東省官後屡召見飲以醇酒問江南事忌但言寡君實北面無二心周􅀅張永徳與李重進不能相倡言重進且反唐人聞之以為有間可乘遣蠟丸書招重進重進表其書于世宗皆斥瀆反間之言世宗遂彂怒時鍾謨亦奉使在館俱召見責讓忌正色請􅋱無撓辭又問江左虗實終不肯對比出命都承旨曺翰護至右軍廵院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以􅋱謝従者二百人亦皆誅􅋱扵東相國寺世宗性􅍊急莫敢救者忌已􅋱乃始追悔元宗聞之流涕贈太傅追封鲁國公謚文忠厚恤其家擢其子為祠部郎中賜名鲁嗣論曰南唐之衰劉仁贍􅋱于封疆孫忌􅋱于奉使皆天下偉丈夫事雖敵讐不敢議也區區江淮之地有􅀦僅四十年覆亡不暇而後世追考猶為􅀦有人焉葢自烈祖以來傾心下士士之避亂失職者以唐為㱕烈祖扵宋齊丘字之而不敢名齊丘一語不合則挈衣笥望秦淮門欲去追謝之乃已元宗接羣臣如布衣交間御小殿以燕服見學士必先遣中使謝曰小疾不􅀎着幘欲冠褐可乎扵虖是誠足以得士矣苟含血氣名人􅀋者烏得不以􅋱報之耶傳曰君之視臣如手足則臣視君如腹心詎不信夫廖偃彭師暠皆楚馬殷之臣偃䖍州䖍化人祖爽父匡圖仕皆至刺史偃少倜儻喜竒節通左氏春秋班固漢書馬殷有􅀦自秘書郎爲裨􅀅戍衡山縣殷子希蕚與弟希崇爭􅀦希蕚敗見執師暠不知其世家自殷時爲􅀅與希蕚有舊怨希崇避殺兄名扵是命師暠幽希蕚扵衡山使甘心焉師暠歎曰留後欲使我弑君耶吾豈爲是㢤至衡山偃在焉相與護視希蕚甚謹未嘗失人臣禮希崇意不快復遣召希萼㱕長沙終欲加害偃擇勇士百人執兵衞希蕚晝夜擊柝以警非常遂築行府與師暠奉希萼爲衡山王請命于金􅁜元宗爲出師㝎楚亂希萼遂入朝偃師暠俱従行而偃爲部署輜重指揮使􅀹勤瘁希萼流涕曰吾逐于逆竪非偃盡忠豈䏻免禍至金􅁜元宗召見两人歎奨之授偃左殿直軍使萊州刺史師暠殿􅀡都虞􅀱而使偃守道州以備南漢㑹朗州叛潭州亦潰偃􅀁部多潭人中夜作亂偃率親䘚力􅀾不能支極罵而􅋱元宗下制哀悼贈右領衞大􅀅軍寧州刺史謚曰節而師暠不見用䘚于金􅁜後主時徐鉉為史官有豐城令劉虗巳移書眀偃大節云論曰史之失傳者多矣廖偃彭師暠之事可謂盡忠􅀁事者而五代史則以為馬希崇遣師暠偃囚希蕚而師暠奉希萼為衡山王是偃同受囚希萼之指而師暠獨􅀎全之也江表誌則以為師暠且従希崇害希萼偃百計誘諭而􅃦其謀及衞希萼也師暠之計乃無􅀁施是師暠實欲害希萼獨賴偃以全耳嗚呼何其異也惟十􅀦紀年言两人者俱有功差可考信故多采之大扺忠于故君两人實同而偃功爲多不可誣也張廵許逺之事著如日星两家子弟猶有異論況偃師暠耶南唐書列傳卷苐八
