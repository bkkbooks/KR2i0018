body:
  text: 南唐書列傳卷苐十五嗚呼南唐褊國短丗無大􅁋虐徒以寖衰而亡要其㝡可為後丗監者酷好浮屠也初烈祖輔吴吴都廣陵而烈祖居建業大築其居窮極土木之工既成用浮屠説作無遮大齋七㑹為工匠役夫􅋱者薦福俄有胡僧自身毒中印土來以貝葉㫄行及􅀁謂舎利者為贄烈祖召豫章龍興寺僧智玄譯其㫄行之書又命文房書華嚴論四十部奩秩副焉并圖寫製論李長者像班之境内此事佛之􅁠輿也然烈祖未甚惑後胡僧為姦利逐出之國人則寖已成俗矣及其末年溧水天興寺桑生木人長六寸如僧状右袒而左跪衣裓皆備其色純􅃮可鑑謂之須菩提縣掇置龕中以仁夀節日來獻烈祖始大驚異迎置宫中奉事甚謹其徒因誇以爲感應而識者桉譙氏五行書知且有大䘮不三月烈祖殂及元宗後主之丗好之遂篤幸臣徐逰專主齋祠事群臣和附惟恐居後宫中造佛寺十餘出金錢募民及道士爲僧都城至萬僧悉取給縣官後主􅅲朝與后着僧伽㡌服袈裟課誦佛經胡跪稽顙至爲瘤贅手常屈指作佛印僧尼犯姦􅁋獄成後主每曰此等毁戒本圗婚嫁若冠笄之是中其􅀁欲命禮佛百而捨之奏􅋱刑日適遇其齋則扵宫中佛前燃燈以逹旦爲驗謂之命燈未旦而滅則論如律不然率貸􅋱冨人賂官官竊續膏油徃徃􅀗免上下狂惑不恤政事有諌者輙被罪歙州進士汪渙上封事言梁武惑浮屠而亡陛下􅀁知也柰何効之後主雖擢渙爲校書郎終不􅀎用其言開寳初有北僧號小長老自言募化而至多持珍寶恠物賂貴要爲奥助朝夕入論天宫地獄果報之􅀃後主大悦謂之一佛出丗服飾皆縷金絳羅後主疑其非法答曰陛下不讀華嚴經安知佛冨貴因說後主多造塔像以耗其帑􅁃又請于牛頭山造寺千餘間聚徒千人日給盛饌有食不􅀎盡者眀旦再具謂之折倒葢故造不祥語以摇人心及王師渡江即其寺為營又有北僧立石塔扵采石磯草衣藿食後主及􅀦人施遺之皆拒不􅂑及王師下池州繫浮橋于右塔然後知其為間也金􅁜受圍後主召小長老求助對曰北兵雖強豈䏻當我佛力登城一麾圍城之師為小却後主眞以為佛力合爪歎異厚賜之下令軍民皆誦救苦菩薩如江濤未㡬梯衝環城矢石亂下如雨倉皇􅂧召小長老稱疾不至始悟其姦鴆殺之羣僧懼并坐誅乃共乞授甲出闘􅋱􅀦難後主曰教法其可毀乎弗許及國亡後主入朝過臨淮徃禮普光王塔施金帛猶以千計其後弟従鎰之子祝髮為僧名惟淨景徳祥符中天下治安西域獻佛書甚衆惟淨博聞通梵學繙繹精審莫􅀎及者積官試光禄卿譯經三藏亦南唐之餘習云􅆻丹事見唐書本傳及五代史四夷附錄今􅂑其事之繫南唐者為傳烈祖昇元二年契丹主耶律徳光及其弟東丹王各遣使以羊馬入貢别持羊三萬口馬二百匹來鬻以其價市羅紈茶藥烈祖従之扵是翰林院進二丹入貢圗詔中書舎人江文蔚作贊其詞曰皇帝建西都之歲神功邁于三古皇風格于四裔華夷咸若駿奔結􅁤粤六月契丹使梅里􅎄盧古東丹使兵器寺少令髙徒煥奉書致貢咸集都邑公卿庻尹拜手稽首稱賀以為文徳􅀁服受命之符也若廼鴻荒以降驟􅇍相侔耀武以信威有􅀁不及任筭以御物有􅀁不従詩頌太原之師則用伐矣漢開朔方之地則崇力矣若我宣猷大麓儷徳無私刑于朝廷以及于荒服旃裘左袵捧日分光殊方異産充庭納賮曰垂衣裳而天下治斯之謂矣有司紀美列于績事傳曰主上眀聖而徳不聞有司之過也臣職在翰墨親睹隆平散獻贊曰赫矣皇武纂唐之緒要􅂽之長駿奔來附伏波之柱單于之臺遺鏃徒費獻琛靡來我后穆穆我網恢恢重譯日貢皇㢤唐㢤四年徳光遣使獻馬百匹扵是烈祖遣通事舎人判四方館事歐陽遇借鴻臚少卿使契丹假道于􅀳髙祖不可遇及境而􅂧元宗嗣位遣使者公乗鎔航海繼好既至而契丹亂兀欲被弑弟述律遺元宗書曰大契丹天順皇帝謹致書大唐皇帝􅇅下貴朝使公乗鎔等自去秋巳逹東京海岸適遭國旤今年正月二十六日部署一行并諸儀物兵鎧已至燕京兹􅂪敦念先朝踐修􅃇好既增摧痛又切感銘貴􅀦長􅀡官王朗陳􅂐􅂑間道先囘用附咨報公乗鎔等巳遣伴送使陳植等同回止俟便風即令引道而公乗鎔亦以蠟封帛書其詞曰臣鎔自去年六月離罌油七月至鎮東關遣王朗奉表契丹九月乃有番官夷離畢部牛車百餘乗及鞍馬㳂路置頓十月至東京留三月契丹主遣閑廏使王廷秀稱詔勞問兼述泰寧王燕王九月同行大事兀欲即丗毋妻併命又遼東以西水潦壊道數百里車馬不通今年正月方至幽州館于愍忠寺先迎御眞入宫言先欲識唐皇帝面乃引見如舊儀問􅀦書中機事臣即述奕世􅂬好當謀分裂之事契丹主喜問􅂧有何事臣云軍機别有宻書契丹主接置袖間乃云吾與唐皇帝一如先朝徃來因置酒合樂又諭臣曰使人逺泛臣海而至不期骨􅁏間忽起此事道路􅀁聞必亦憂恐手斟一玉鍾酒先自啜乃以􅂆臣令飲釂自旦至日晡始罷自是數遣使宣勞三日一賜食謹遣王朗齎骰號子歸聞奏骰號子不知何等語也初宋齊丘謀間晉㑹契丹使燕人髙覇來聘㱕至淮北唐隂遣人刺殺之覇有子乾従行匿之濠州扵是契丹頗信以為覇之􅋱出于晉人保大十二年述律遣其舅來夜宴清風驛起更衣忽仆于地視之失其首矣厚賞捕賊不淂久乃知周大􅀅荆罕儒知契丹使至思遣客刺之以問唐乃下令􅀎得吾枕者賞三百緡俄有劒客田英淂之即給賞如約仍屏人語之曰􅀎淂江南畨使頭賞三千緡英果淂之自是唐與契丹遂􅅸及丗宗兵出淮南敕㬥我罪曰蠢爾淮甸敢拒大􅀖䟦扈飛􅀭垂六十載幸累朝多事與北虜交通厚啓戎心誘為􅁁患􅀁罪状我雖非一然首以通契丹為興師之名方石晉以父事契丹而契丹毎以兄事南唐葢戎狄習見唐之威靈故聞後裔在江南猶尊之不敢與他國齒南唐亦頗恃以自驕其實相結約撓中原皆虗辭非􅀎為南唐助也髙麗事具唐書及五代史四夷附録今書南唐􅀁載異聞及髙麗通南唐之見扵傳記者髙麗至五代初􅀦名曰大封其王髙氏名躬乂躬乂晚年果于誅殺吴順義二年當梁之龍徳二年為海軍統帥王建􅀁殺建自立去大封之名􅂧稱髙麗以開州為東京平壌為西京吴天祚二年當晉之天福元年敗新羅百濟扵是倭耽羅驩干羅鐡勒東夷諸􅀦皆附之有二京六府九節度百二十郡内列十省四部官朝服紫丹徘緑青碧青碧以年序遷緑以上選才􅀎賜之俸禄賦以田租尚冠禮略如古制婚􅊚男女執手自相媒許俗重匾頭生男旦旦桉壓其首惟恐不匾也昇元二年遣使來貢方物􅀁上書稱牋大略云今年六月内當􅀦中原府入吴越國使張訓等囘伏聞大吴皇帝巳行禅禮中外推戴即登大寳者伏惟皇帝陛下道契三無恩􅆂九有尭知天命巳去即禅瑶圗舜念歷數在躬遂傳玉璽建夙惟庸陋獲託生成􅀁恨沃日波遥浮天浪濶幸遇龍飛之旦阻申燕賀之儀無任㱕仁戴聖鼓舞激切之至儀式如表而不稱臣烈祖御武功殿設細仗見其使自言代主朝覲拜舞甚恭宴于崇英殿出􅀛兹樂作畨􅃧召學士承㫖孫忌侍宴三年又遣其廣評侍郎桞勳律來貢方物其後史冊殘缺來與否不可攷矣列傳卷苐十五終
