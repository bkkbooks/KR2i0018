body:
  text: 南唐書列傳卷苐十二周惟簡鄱陽人􅀮居眀易後主聞其名召至金􅁜起布衣為集賢殿侍講頃之以虞部郎中致仕還山金陵受圍間道召還入後苑講否卦後主思得竒士􅀎使兵間者張洎薦惟簡可以談􅀏和解乃授給事中副徐鉉使京師後主手䟽言惟簡託志妙門存心道典伴臣修飬不預公途葢為之聲價兾動朝聴比至太祖召見詰責鉉猶􅈤奏不已惟簡惶恐反言曰臣本野人未嘗仕宦李煜强遣來未嘗預聞使指伏聞終南山多􅂕藥􅂅得棲􅀮太祖許之金陵平命為􅀦子周易博士判監事􅂉謂曰終南之言不酬且得罪惟簡不得巳上表求解官以遂初志改虞部郎中致仕授其子繕京兆鄠縣主簿使就飬太平興􅀦中復表求仕授太常博士遷水部貟外郎䘚繕後舉進士中苐仕亦至尚書郎鄭彦華福州閩人祖父丗爲福建諸州刺史彦華少隸節度使李弘義帳下嘗射殺乳虎以勇聞元宗出師攻福州大􅀅王崇文遣䘚李興登樓車罵弘義弘義不勝憤募生得興者彦華請行夜縋出城外伏壕􅅖興猶嫚罵不巳彦華操長鉤鉤得興挾以登城城上皆鼓譟弘義得興而甘心焉崇文不能下城遯去歲餘劒州刺史陳誨以水軍來攻彦華適出屯􅃸官以􅀁部降誨誨與語竒之署軍校南唐與周師相拒淮南彦華大小百餘􅀾身被五十餘創累遷至鎭海軍節度使加同平章事後主見討王師自采石作浮梁渡江後主命彦華􅇂舟師萬人又遣别􅀅杜眞率􅇍兵萬人同逆􅀾後主親遣行戒之曰水陸兩軍相表裏則吾事濟矣比與王師遇眞以􅀁部力􅀾彦華擁兵不救眞敗而潰金陵聞之䘮氣遂閉壘自守以至國破亦不􅀎正彦華之罪矣彦華従後主入朝為右千牛衞􅀅軍太宗征太原及幽州用彦華為􅀅無功猶歴諸衞􅀅軍至左千牛衞大􅀅軍䘚年七十三子文寳初事後主以文學􅃟為清源公仲㝢掌書記遷校書郎㱕朝南唐故臣皆許錄用文寳獨不自言後主以環衞奉朝請不納客謁文寳乃被蓑荷笠作漁者以見寛譬久之後主歎其忠後中進士苐仕至兵部貟外郎國史有傳李貽業故唐時平章事蔚従曽孫父戴唐末苐進士奔吴為起居郎貽業事烈祖至翰林學士烈祖晏駕大臣欲奉宋后臨朝命中書侍郎孫忌草遺制貽業獨奮曰此姦人􅀁為也大行常謂婦人預政亂之本也安肯自為此若果宣行貽業當對百官裂之㑹宋后亦不許扵是臨朝之議遂􅃦元宗語貽業曰疾風知勁草扵卿見之保大中以兵部侍郎䘚謚曰簡初戴為人簡率無威儀貽業又甚于父平居頽然不言是非國有大議必首斷之尤好飲酒嘗折簡招親友曰今夕佳月􅀎相過乎比客集貽業已大醉指酒壺曰本用相待酒興忽來自倒之矣其踈豁大抵􅀋此劉崇俊字徳修楚州山陽人祖全以功臣為濠州刺史有威名全䘚子仁規􅁇其任為政苛虐及卒崇俊繼之盡反仁規之政人懷其恵數年漸專恣不法多畜不逞使過淮剽掠􅀗美女良馬以自奉元宗陞濠州為㝎逺軍因拜崇俊節度使以其子節尚大寧公主然元宗亦􅁖其為人㑹夀州姚景䘚崇俊厚賂􅁠貴求兼領夀州元宗乃陽若不解其意命移鎭夀州而遣楚州刺史劉彥貞馳入濠州代之崇俊自悼失計頗革心循法度未幾得疾䘚年四十贈太尉謚曰威劉洞廬􅁜人􅀮居廬山二十年能詩長扵五字唐律自言得賈島法後主嗣位尤属意詩人􅂉以洞言者洞遂獻詩百篇卷首石城篇其詞曰石城古渡頭一望思悠悠㡬許六朝事不禁江水流後主讀之感愴不怡者久之因棄不復􅀚洞亦不復見省金􅁜受圍洞猶在城中􅀦亡洞過故宫􅊴徘徊賦詩多感㮣悲傷不以不遇故有怨懟語未㡬䘚與洞同時有夏寳松者亦􅀮廬山相與為詩友洞有夜坐詩寳松有􅀫江城詩皆見稱一時􅃅劉夜坐夏江城云江為宋人避亂徙閩元宗初設貢舉為屡為有司􅀁黜嘗有題白鹿寺詩元宗南遷過寺讀而􅋢之為由是愈自負傲睨一時䘚無薦引者居懷憤憤束書欲東走吴越為同謀者􅀁彂按得其状伏誅汪台符歙人能属文烈祖初嘗上書論事合指宋齊丘頗抑之台符貽齊丘書誚其疾已才齊丘大怒宻使人誘台符乗舟痛飲至石城蚵蚾磯下沉殺之郭昭慶廬􅁜人博學􅀎自力嘗著唐春秋三十卷保大中獻􅀁著治書補揚子尉辤不受後主時􅂧獻經􅀦治民論擢著作郎時方奉中朝凡歲時慶賀貢方物牋表及廷勞宴餞之辭率命昭慶為之一日方晨起造朝􅍊䘚伍喬廬江人居廬山國學數年力于學詩調寒苦每有瘦童羸馬之歎山中浮屠夢仰視見一大星芒色甚異㫄有人指之曰此伍喬星也既覺訪得喬乃傾資奉之使入金􅁜舉進士及試畫八卦賦霽後望鍾山詩故事中選者主司必延之陞堂置酒時有宋貞觀者首就坐張洎續至主司覽其文揖貞觀南坐引洎坐于西酒數行喬始上卷主司歎其傑作乃徙貞􅀚處席北洎處席南以喬居賔席及覆考􅖑出喬果爲首洎貞􅀚次之時稱主司精扵衡鑑元宗亦大愛喬程文命勒石以爲永式仕至考功貟外郎卒蕭儼廬􅁜人幼舉童子中其科稍長命爲秘書省正字烈祖初歷大理司􅀡刑部郎中以平怨稱烈祖晚服金石藥多㬥怒近臣數被譴罰宣徽副使陳覺不自安稱疾在告者數月及聞遺詔即以其日造朝儼劾奏覺傾耳私室以幸禍變請重置于法不報烈祖輔吴設法禁以良人爲賤至是馮延巳延魯欲廣置妓妾輙矯遺制託稱民貧許賣子女儼駁曰昔延魯爲東都判官已有此請大行以訪臣臣對曰陛下納麓之初出庫金贖民孰不㱕心今寳運中興人仰徳澤柰何欲使鬻子資豪家役使乎大行以臣言爲然􅀅罪延魯臣曰此但智識淺陋耳非有他也罪之且塞言路大行乃斜封其奏抹三筆持入宫􅂅求之宫中既而果得留中章奏千餘皆斜封有一抹至三抹者遂得延魯奏然大臣亦方以豪侈相髙利于廣聲色因共爲遺制已宣行不當追改遂巳元宗初以􅀦譲景遂羣下持不可乃以景遂為諸道兵馬元帥景逹副之宣告􅀦中以兄弟相傳之意儼極諌謂夏殷以來天下為家父子相傳不易之典也景遂景逹亦固譲不敢當然元宗意愈確不之聴江文蔚韓熈載典太常禮儀議烈祖稱宗儼獨建言帝王巳失之巳得之謂之反正非已失之自巳􅂧之謂之中興中興之君廟冝稱祖先帝興巳墜之業不應屈而稱宗文蔚亦以儼議為當遂用之保大二年元宗終欲傳位景遂下詔命總庶政惟樞宻使魏岑查文徽許奏事餘非特召不得對儼上䟽力爭㑹宋齊丘賈崇皆以為不可遂収􅀁下詔其後元宗扵宫中作大樓召近臣入觀皆歎其宏麗儼獨曰比景陽但少一井耳元宗怒貶舒州副使孫忌為觀察使遣州兵給儼實防衞之儼謂忌曰僕以言獲罪耳頋命之日君持異議㡬危社稷君之罪豈不重扵僕乎反見防何也忌慚即徹去俄召還後主初嗣位數與嬖倖奕棋儼入見作色投局扵地後主大駭詰之曰汝欲効魏徴耶儼曰臣非魏徴則陛下亦非太宗矣後主為罷奕南唐亡儼以老病㱕鄊里杜門數年䘚年七十餘劉承勲失其鄊里以善心計事烈祖為糧料判官遷徳昌宮使德昌宫者盖南唐内帑别藏也自吴建國有江淮之地比他􅀦最為冨饒山澤之利歲入不資烈祖勵以節儉一金不妄用其積如山太子嘗欲一杉木作版障有司以聞烈祖書奏後曰杉木不乏但欲作􅀾艦以竹代之可也然德昌簿籍煩委無由勾校承勳獨任其事盗用無􅄸保大後貢奉事興倉䘚􅂑辦愈得以為姦利畜妓樂數十百人每置一妓價數十萬教以藝又費數十萬而服飾珠犀金翠稱之又厚以寳貸賂遺􅁠要故終無彂其罪者太祖平荆湖詔江南具舟漕其米入京師承勳狡默計後主終不䏻有其􅀦欲預自結中朝為異時計乃請行􅇂臣艦自長沙扺迎鑾千柂相銜太祖覺其意而惡之及􅀦亡承勳㱕京師首自陳漕米事太祖曰此汝主勤王耳汝安得有勞叱出特命勿叙用久客無資裸袒乞食不勝凍餒而􅋱李元清濠州人徙金􅁜趫捷善走能及奔馬常􅇍入梁宋刺事開寳中後主以吉州永新與湖南隣命元清為永新制置使每數月一託疾不坐衙輙微服入湖南境人無知者以故敵人動息皆知之累年􅁁障晏然􅀦亡㱕京師元清心不欲仕二國偽稱失眀召驗之揮刃􅀅及頸而目不瞬乃放㱕濠州䘚盧郢金􅁜人工属文有勇力好吹鐡􅅇乾徳中後主命韓徳覇爲都城烽火使警察非常怙權㬥横􅀦人望其前驅莫不奔避郢嘗遇之調笛自若徳覇叱左右捕執郢奮臂擊十餘人皆顛躓乃􅀡前捽德覇墜馬毆之敗面傷目徳覇入訴後主叱之出頋近侍􅀏曰戎帥遇一措大不䏻自全面目尚敢訴耶遂罷其職後郢舉進士試王度如金玉賦擢苐一徐鉉娶郢姊嘗受後主命􅁧文累日未就郢曰當試爲君抒思適庭下有石十夫不􅀎舉郢􅃧􅂑㺯之有頃索酒頓飲數升復㺯如初忽頋筆吏口占使書不竄易一字鉉服其工後主亦以爲遒俊可愛􅀦亡㱕朝知金州䘚朱弼字君佐建州人舉眀經苐一授國子助教知廬山國學盧絳蒯鼇諸􅁑濤飲博不逞患苦諸生學官依違無敢問者及弼至一切䋲以禮法每升堂講説座下肅然絳等亦愧服引去生徒自四方來者數倍平時國亡補衡山縣主簿秩滿求為南嶽廟令䘚王輿合淝人少與兄綰俱事吴武王輿初為小校従周本攻危全諷臨􅀾本視賊水柵部分諸􅀅指㫄山頭一小營謂輿曰爾徃為我􅂑彼輿唯唯而色不欲行本曰爾惮徃耶輿曰公必不以輿為不武請得此柵破之捨而趨彼何為木大喜曰爾亦知此為必爭之地耶吾本自行今為爾功勞而遣之輿乗􅁿舟襲破其前鋒遂排柵入諸軍繼進賊大潰積功遷至諸軍都虞􅃸烈祖輔吴以腹心􅀁􅀉進控鶴都虞􅀱持重有謀甚見􅀝任久乃出為光州刺史初輿兄子為海州刺史叛附梁聞輿在光山遣間使通問輿執以㱕金􅁜因求罷郡入為左宣威統軍歷鎮海節度留後金吾衞大􅀅軍武昌節度使與監軍甄廷堅不相得㑹廷堅被誣告有貳志烈祖遣使械廷堅属吏未至輿刺知之宻告廷堅因為謀曰今獨可即日乗􅁿舟㱕􅊴待罪毋與中使遇廷堅恐懼不暇為他謀即従其計至金􅁜遇赦且以其先自歸淂免人推其長者元宗嗣位加同平章事保大二年䘚年七十四輿少従軍攻潤州為臣弩􅀁射中右耳矢自左耳出又中㫄一人猶立􅋱輿扶㱕營臥百餘日復起耳至老不聵亦無瘢痍攻頴州倚營門仗劒驅士䘚登城城上機石􅀤中營門及鎧之半皆糜碎而輿不傷莫不異之兄綰亦至䖍州節度使魏岑字景山鄆州須城人善諂䛕學揣摩尤為宋齊丘􅀁知薦授校書郎保大中驟進至諌議大夫元宗自以唐子孫慨然有定中原復舊都之意有司請行南郊禮元宗曰俟天下為一然後告謝天地岑遂與陳覺馮延巳延鲁更相倡和為拓境事嘗侍燕自言臣少逰元城樂其土風陛下還長安日乞為魏博節度使元宗欣然許之岑趨下殿再拜謝侍衞皆竊􅀏覺延鲁攻福州岑為監軍應援使三人者暗懦專恣如一軍敗元宗初欲按軍法誅覺延鲁而貸岑御史中丞江文蔚對仗弹奏請并岑誅之扵是貶太子洗馬俄􅂧還故官李守貞叛漢來乞師岑乃力請出兵赴救扵是元宗従之因以岑為㳂淮廵檢使無功而還岑自􅂧進姦謟彌甚鍾謨李德眀亦用事其趨向與岑雖異而迷國則均户部貟外郎范沖敏懐不平怵大􅀅王建封上䟽請盡逐之更用正人元宗怒併置沖敏建封于􅋱岑自謂淂主眷愈無􅀁憚夀州節度使劉彦貞以厚賂結岑為奥援岑􅀁得不可數知遂肆言稱彦貞為􅀅如韓白治民如龔黄其敢為誕欺如此元宗方􅀝以柄任㑹見冲敏為厲召道士上章訴天未㡬䘚南唐書列傳卷苐十二
