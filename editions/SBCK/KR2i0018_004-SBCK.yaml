body:
  text: 南唐書列傳卷第四徐玠字藴圭彭城人事帥崔洪為軍吏洪避朱全忠南奔遣玠先見吴武王囙得事吴累居右職師出江西為糧料使江西平授吉州刺史玠初為小校以幹敏稱及治郡貪猥不治烈祖輔政罷之而義祖悦其善事人引以為副使遂見親狎玠挾􅀫怨且希義祖意每與嚴可求言烈祖踈財結士不冝久執􅀦􅁠請以嫡子知詢代之事垂行而義祖殂知詢繼立玠本詭譎多智善揣摩非􅀎為徐氏計也至是察知詢必敗反持其長短自結于烈祖烈祖亦遂􅋢之盡忘前事鎮金􅁜以為行軍司馬與周宗李建勲孫忌首参代吴秘計遂以佐命拜右丞相出為宣州節度使徙洪州兼中書令復召為司徒右丞相然徒崇以名位不復預政老而益貪鄙所至人患苦之好神仙之説常以下價市丹砂惡者治丹人以為􅀏保大元年五月䘚年七十六贈髙平郡王髙審思失其家世鄊里少以驍勇事吴武王従劉信平䖍州有功為人重厚沉默烈祖􅋢之用為神武統軍出鎮夀州兼侍中在鎮治守備常如有警􅂉曰以公威畧守堅城何太懼耶審思曰事變無常不可不過為之備及保大末周人來侵諸郡徃徃一鼓而下惟夀州䏻堅守以世宗英武􅀅士皆精練然逾年極兵力不可􅂑雖劉仁贍善守亦審思之遺績也䘚于鎮年七十五廢朝三日贈太師謚曰忠初術者悉言審思位不至刺史嘗受命刺常州固辤不敢行而其後位兼􅀅相終始冨貴術之不足信如此鍾謨字仲益㑹稽人徙建安李徳眀失其家世鄊里保大中俱爲尚書郎敏于占對元宗􅋢之而天資皆浮躁沾沾自衒反覆嶮􅇖朝士側目􅃅爲鍾李時魏岑巳年復用奸䛕彌甚謨徳眀雖與岑若不同至爲惡則合若符劵户部貟外郎范沖敏擿使軍帥王建封上書歷詆之請選用正人元宗大怒謂建封武人握兵不當􅂺議􅀦政流建封池州未至殺之沖敏棄市謨徳眀自謂君寵可沽愈縱肆㫄若無人徳眀嘗奏事别殿􅂑元宗所御筆記事元宗不􅀎堪曰卿他日自可持筆來徳眀亦自若謨遷翰林學士户部侍郎徳眀遷工部侍郎文理院學士元宗雅稱两人有辭辯欲令説周罷兵遣如夀州城下貢御服及犒軍牛酒世宗前知其欲以口舌㳺􅀃大陳兵衞戈㦸以見之謂曰江南自謂唐室苗裔衣冠禮樂異于他􅀦與朕隔一水未嘗遣使修好唯航海通北虜此何禮也今又比朕六􅀦愚主謂可説使罷兵何其不知朕也㱕語若主必臣事我則兵可罷不然徑徃金􅁜借府庫犒軍若君臣得無悔乎两人股栗不敢出言惟曰寡君震畏天威願獻壽濠泗楚光海六州及歳輸方物世宗以淮南諸州繼䧟欲盡􅂑江北地不許徳眀見周師急攻夀州度旦暮且下乃曰寡君未􅀎知大􅀦兵力乃爾願寛臣數日之誅㱕􅀦耴表盡獻江北郡縣世宗遣徳眀㱕以書諭江南君臣語多誚譲􅁜肆􅀦人已不堪而徳眀方盛稱世宗威徳請必割地元宗惡其言宋齊丘力詆割地爲無益陳覺言徳眀賣􅀦以恱敵不可赦徳眀佻薄語多過實知割地之說不行攘袂大言謂周師必克元宗益怒遂斬徳眀于都市不􅂧議割地謨因留不得㱕及孫忌之􅂮也謨亦在召中得不􅂮貶為耀州司馬及元宗割地稱臣如謨徳眀初議世宗乃召謨至京師授衞尉卿賜黄金五百两遣諭指扵元宗徃􅂧數四謨既矜肆以為世宗聴其言江左可藉以無恐元宗亦方賴其力心雖憾之體貌加厚以為禮部侍郎判尚書省而三省之事靡不預之勢焰赫然宋齊丘陳覺李徴古之􅂮皆出其計又白請雪徳眀之罪贈光禄卿謚曰忠太子弘兾􅂙總庶政謨薦其客閻式為司議郎百司􅀜啓必申之俄而世宗崩謨自揆無所恃頗若有失元宗遇之亦浸薄初李徳眀被誅唐鎬預其事至是鎬懼修怨不自安㑹鎬以納賄聞謨面詰其状鎬愈懼信州刺史張巒入為天威軍都虞􅀱謨素與之善每屏人共語􅂉至中夜又嘗請使巒帥帳下兵廵都城鎬廉得之因宻言謨徃來两􅀦挾周人以脅制朝廷今與典兵者交結又請令廵徼輦下其􅊶藏殆不可測謨㣲聞之念無以為竒貨㑹弘兾䘚後主以毋弟當立而謨嘗与元宗􅋢子從善同使周相與親厚乃言後主器􅁿志放無人君之度因盛稱従善才不知元宗建儲之意已决更以此忤指乃㬥其交結張巒等罪貶􅀦子司業又貶著作佐郎安置饒州遣中使領侍衞軍十人即日􅇂促乗驛而去謨時方病風眩在途賦詩十章語皆悽愴巒出為宣州副使建隆元年正月元宗聞太祖受周禅乃遣使如饒州賜謨􅂮問曰卿昔與孫忌使周忌􅂮而卿獨生還何也謨頓首服罪遂縊殺之巒亦坐誅謨有女感家禍不嫁為道士名守一博通孔老書尤善講􅀃端拱中京師建洞眞宫召守一為道職云常夢錫字孟啚扶風人或曰京兆萬年人也岐王李茂貞不貴文士故其俗以狗馬馳射博奕為豪夢錫少獨好學善属文累為秦隴諸州従事茂貞􅂮子従儼襲父位承制補寶雞令後唐長興初従儼入朝以夢錫従及鎮汴爲左右所譛遂來奔烈祖輔吴召置門下薦爲大理司直及受禅擢殿中侍御史禮部貟外郎益見奨遇遂直中書省􅂙掌詔命進給事中時以樞宻院隸東省故機事多委焉夢錫厚重方雅多識故事數言朝廷因楊氏覇􅀦之舊尚法律任俗吏人主親决細事煩碎失大體冝修復舊典以示後代烈祖納其言頗議簡易之法元宗在東宫有過失夢錫盡言規正無所撓始雖不悦終以諒􅈂多之及即位首召見慰勉欲用爲翰林學士以自近宋齊丘黨惡其不附已坐封駮制書貶池州判官及齊丘出鎮召爲户部郎中遷諌議大夫䘚以爲翰林學士復置宣政院于内庭以夢錫専掌宻命而魏岑已爲樞宻副使善迎合外結馮延已等相爲表裡夢錫終日論諍不􅀎勝罷宣政院猶爲學士如故乃稱疾縦酒希􅂧朝㑹鍾謨李徳眀分掌兵吏諸曺以夢錫人望言于元宗求爲長吏拜户部尚書知省事夢錫恥爲小人所惟薦固辤不得請惟署牘尾無所可否延已䘚文􅃱其閨門罪貶饒州團練副使夢錫時以醉淂疾元宗憐之留處東都留守周宗力􅂆夢錫止酒治疾従之乃少瘳召爲衞尉卿改吏部侍郎復爲學士交泰元年方與客坐談忽奄然䘚年六十一䘚後財逾月齊丘黨與敗元宗歎曰夢錫平生欲去齊丘恨不使見之贈右僕射謚曰康夢錫文章典雅有承平之風􅁔詩亦清麗然絶不喜􅀓于人剛褊少恕每以􅈂言忤物常與元宗苦論齊丘軰元宗辯博曲為解釋夢錫辭窮乃頓首曰大姦似忠陛下若終不覺悟家􅀦􅀅為􅇕矣元宗不答而心善之及割地降􅃅之後公卿在坐有言及周以為大朝者夢錫大􅀏曰汝軰嘗言􅃱君堯舜何故今日自為小朝耶衆皆默然散去每公卿㑹集輒喑嗚大咤驚其坐人以故不為時所親附然既沒皆以正人許之雖其仇讎不敢訾也史虗白字畏名世家齊鲁虗白􅀮居嵩少著書中原䘮亂與北海韓熙載來㱕時烈祖輔吴方任用宋齊丘虗白誦言曰吾可代彼齊丘不平欲窮其技􅀎召與宴飲設倡樂奕棋博􅃧酒數行使製書檄詩賦碑頌虗白方半醉命數人執􅁓口占筆不停綴俄而衆篇悉就詞采磊落坐客驚服虗白數為烈祖言中原方横流獨江淮豐阜兵食俱足當長驅以㝎大業毋失事機為它日悔烈祖不􅀎従虗白乃謝病去南逰至九江落星灣囙家焉常乗􅀟犢版轅挂酒壺車上山童總角負一琴一酒瓢以従徃來廬山絶意世事保大初熈載為史館修撰薦虗白可用元宗召見訪以􅀦事對曰草野之人漁釣而已安知􅀦家大計賜宴便殿醉溺于殿陛元宗曰眞􅀮者也賜田五頃放還山及元宗南逰豫章次蠡澤虗白鶴裘藜杖迎謁道㫄元宗駐蹕勞問曰處士居山亦嘗有所賦乎曰近得谿居詩一聮使誦之曰風兩揭却㞐渾家􅋨不知元宗變色厚賜粟帛上樽酒徐鉉髙越謂之曰先生髙不可屈盍使二子仕乎虗白曰野人有子賢則立功業以道事眀主愚則負薪捕麋以飬其毋僕未嘗介意也不敢以累公鉉越愧歎䘚年六十八􅀅終謂其子曰官賜吾美酒飲之畧盡尚留一榼吾死置藜杖及此酒于棺中四時勿用􅀕享無益􅂮者吾亦不歆子皆従之孫温天聖中仕爲虞部貟外郎獻虗白文集仁宗皇帝􅋢之追􅃅虗白沖靖先生沈彬洪州髙安人唐末浪跡湖湘􅀮雲陽山好神仙喜賦詩句法清美烈祖輔吳表授秘書郎與元宗逰俄懇求還山以吏部郎中􅃱仕元宗遷南都彬年八十餘來見曰臣久處山林不預丗事臣妻曰君主人郎君今爲天子何不一徃臣遂忘衰老而來元宗命毋拜厚賜粟帛以其子爲秘書省正字彬晚歳嘗䇿杖郊原手植一樹識之語其子曰吾當藏骨于此及䘚伐􅀣掘地至丈餘得一石槨製作精麗光潔可鑑盖上有篆云開成二年夀槨舉棺就之廣袤中度次子廷瑞有道術􅄝酒郤粒寒暑一單􅄄數十年不易跣行日數百里林棲露􅀫多在玉笥浮雲二山老而不衰後不知所終陳况閩人性夷澹􅀮于廬山四十年衣食乏絶不以動心苦思于詩得句未成章已播逺近元宗聞其名召見時方竒寒元宗見其衣單薄降手扎曰欲以綾綺衣賜卿卿必不受今賜朕自服紬縑衣三十事俄授江州士曺􅁺固辤㱕䘚于山中年七十餘陳曙蜀人嘗舉進士唐末避地淮南多遯于蘄州山中鄊人有㑹集􅂉􅀕神曙不待召而玉醉飽乃辤去由是人多設虗座陳酒肴以伺之同日㦯玉數家舎中唯一榻素書數卷與蛇虎雜居不設牕户雨雪滿室亦自若人有乗其出徃闚之者曙必自外來凡數十年顔髩不少異元宗命中書舎人髙越召之不肯起後徙居鄂渚及洪之西山不知所終陳陶嶺南人少學長安昇元中南奔􅀅求見烈祖自度不合乃􅀮洪州西山歎曰世豈無麟􅃫􅀦家自遺之耳保大末有星孛于参芒指東南陶語人曰􅀦其㡬亡乎果失淮南元宗南遷豫章至落星灣􅀅訪以天象恐陶不肎盡言以其素嗜鮓乃使人偽言賣鮓至門陶杲岀啗鮓喜甚賣鮓者曰官舟至落星矣處士知之乎陶􅀏曰星落不還元宗聞之不懌遂不􅂧問是歲果晏駕西山産靈藥陶与妻日斸而餌之不知所終開寳中南昌市有一老翁丫髻被褐與老嫗賣藥得錢則沽酒市鮓相對飲啖既醉􅁔舞道上其􅁔曰藍采和藍采和塵丗紛紛事更多何如賣藥沽美酒㱕去青厓拍手􅁔􅂉疑為陶夫婦云江夢孫字聿修潯陽人烈祖輔吴表為秘書郎夢孫數自言迂儒無禆益平生讀書欲小試于治民求為縣令方是時士之客于烈祖者率以功名冨貴自許而夢孫言獨如此烈祖以為不情不之許也求不已乃補天長令烈祖先持告身示之曰今日受此眀日趋走庭下矣曰此素志也庸何傷乃授之至天長吏白縣署正寝有􅁋厲不可居夢孫不従是夕果有恠並岀夢孫起㷊香曰夢孫受命為令當冶事于此鬼神有祠廟丘壟胡不各㱕其所吾行不欺暗室奚畏君等語訖皆歛迹夢孫治縣寛簡吏民安之逾年棄官去縣人􅃅泣送之數十里還家事􅁇母盡孝早暮潔衣冠視膳羞母食既徹為諸生講禮凡至疑義􅂺衽曰此科先儒猶多異同夢孫安敢輕言諸君自擇所長可也保大中䘚年八十五贈􅀦子司業毛炳洪州豐城人􅀮居廬山時為諸生講得錢即沽酒嘗醉臥道㫄有里正掖起之炳瞋目呵之曰􅋨者自醉醒者自醒亟去毋撓予睡後徙居南臺山數年忽書齊壁曰先生不住此千載惟空山因大􅋨一夕䘚與炳同時又有酒秃者焉酒秃姓髙氏駢族子棄家祝髮博極群書善講説而脱畧跌宕無日不醉後主召講華嚴梵行一品賚金帛甚厚玄􅄫即日盡送酒家日夜劇飲醉則従小兒數十浩􅁔道中􅁔曰酒􅇠酒秃何榮何辱但見衣冠成古丘不見江河變􅁜谷一日醉􅂮于石子岡南唐書列傳卷苐四
