front:
  text: 七張義方不知其所以進烈祖代吳用為侍御史義方旣就職卽上疏曰古之任御史者非止平獄訟肅班列也有怙威侮法棄忠賊義樹朋黨蔽聰明者得以糾彈至於人主好遊畋聲色說奢侈佞媚賞非功罰非罪得以論爭使諸侯不敢亂法百司不得盜權則御史為不失職今文武材行之士固不為乏而貪墨陵犯傷風敎棄仁義者猶未革心臣欲奉陛下徳音先舉忠孝潔亷請頒爵賞然後繩糾乖戾以正典刑小則上疏論列大則對仗彈奏臣每痛國家之敗非獨人君不明葢官卑者畏罪而不言位尊者持禄而不諫上下茍且至于淪亡今臣誠不忍忘君親之義有所不盡惟陛下幸赦之疏奏烈祖親札曰孤始受禪任義方以風憲乃能力振朝綱詞皆讜切可宣示朝野賜義方衣一襲以旌直言義方始名元達烈祖方倚以肅正邪慝取前朝王義方名以易之故義方得盡忠焉後之議者謂義方為御史彈劾奸邪諫正過失則可若請舉善頒爵賞則為奪輔相權矣然所言凜然守正有漢唐名臣之風惜其事跡散落不得盡載云李金全其先吐谷渾人事唐明宗為厮養以戰功貴事具五代史晉髙祖時為安州節度使任中門使胡漢榮漢榮貪戾專政失軍民心髙祖遣賈仁沼代歸京師金全奏漢榮病不任行仁沼至酖殺之事聞高祖乃以馬全節代金全鎭安州漢榮懼紿告日邸吏劉珂密遣人馳報朝廷召公有異處分金全懼使其從事張緯奉表詣金陵請降烈祖命鄂州屯營使李承裕段處恭帥兵三千人逆金全陳于城外俟金全出殿之而東承裕等至之夕金全帥數百人來奔而承裕違命輒大掠城中得金帛不可計數乃還晉將安審輝追敗之于馬黄谷處恭死於陣承裕帥餘兵扼雲夢橋復為審輝所敗執而殺之金全至拜天威統軍出為潤州節度使漢隱帝時李守貞以河中叛來乞師魏岑查文徽議宜為出師劉彥貞以攻取自任元宗欲藉金全宿將威望以為北面行營招討使救河中彥貞副之文徽為監軍使岑為􅆓淮廵檢使師出沭陽次沂州金全曰諸君以河中在何處而欲自此轉戰以前耶勢必不相及徒為國生事爾嘗會食帳中候騎告北兵數百竝澗皆羸弱諸將欲掩擊之金全下令曰敢言過澗者斬及莫伏兵四起旗幟蔽日金鼓聲聞十餘里諸將乃服金全善料敵逾月退保海州遂引歸金全曰吾全軍而還不得為無功矣拜右衛聖統軍領義成軍節度使兼侍中保大八年八月卒於金陵年六十多内寵子男女凡三十二人元宗命少府監王仲連持節册贈中書令諡曰順金全卒後閩楚之役興用事者皆少年不更軍旅覆敗相踵周人椉我罷弊攻取淮南國遂衰削不復能振人始思金全恨其已卒云皇甫暉魏州人事唐晉事具五代史契丹入中原暉時為密州刺史與棣州刺史王建俱來奔元宗遣使具舟檝逆之將至暉念本起盜賊不自安至秦淮赴水不死舟人援出之自言如履大石入朝歴歙州刺史神衛軍都虞候江州節度使加同中書門下平章事周師攻淮南為北面行營應援使會劉彥貞姚鳯兵以行彥貞舉動躁撓人測其必敗暉獨持重部分甚整士亦樂為用周人頗憚之及彥貞敗死暉鳯退保清流關周世宗親帥衆盡銳攻壽州而分兵襲清流暉陳山下周兵出山後要擊暉大敗猶收兵且戰且行入滁州滁州刺史王紹顏已委城遯暉無所歸方斷橋自守周兵渉水踰城而入執暉鳯送壽州行在見世宗曰臣力憊欲暫坐及坐曰欲暫臥不俟命而臥神色自若曰臣非不盡力國事南北勇怯不敵臣在晉屢與契丹戰安能如今日大朝兵甲之盛昨退保滁州城不意大軍攀堞如飛而入臣智力俱殫故被擒耳世宗賜之馬及衣帶數日創甚暉不肯治而死子繼勲繼勲少從暉兵間為軍校以父死難擢將軍歴池饒二州刺史頗以吏事稱入為神衛統軍都指揮使諸老將繼死繼勲雖尚少且無戰功徒以家世遂為大將資產優贍名園甲第冠于金陵多蓄聲妓厚自奉養及開寳中大兵傅城繼勲保惜富貴無効死之意第欲後主亟降聞諸軍敗績則幸災見于詞色偏裨有募死士謀夜出奮擊者輒鞭而囚之自度罪惡日聞稀復朝請後主召議事亦辭以軍務不至内結傳詔使一切蔽塞及後主登城見王師旌旗壘柵彌徧四郊始大駭失色繼勲從還至宫乃以屬吏始出宫門軍士雲集臠之斯須皆盡江文蔚字君章建安人博學工屬文後唐明宗時擢第為河南府館驛廵官坐秦王重榮事奪官南奔烈祖輔吳用為宣州觀察廵官歴比部員外郎知制誥國初改主客郎中拜中書舍人烈祖殂元宗以喪亂之後因恤舊典散亡命文蔚以給事中判太常卿事與韓熙載蕭儼共加討論時稱其精練保大初遷御史中丞持憲平直無所阿枉馮延已當國與弟延魯魏岑陳覺竊弄威福及伐閩敗績詔斬覺及延魯以謝國人而延已岑置不問文蔚對仗彈奏曰賞罰者帝王所重賞以進君子不自私恩罰以退小人不自私怒陛下踐阼以來所信重者馮延己延魯魏岑陳覺四人皆擢自下僚驟升髙位未嘗進一賢臣成國家之美隂狡圖權引用羣小陛下初臨大政常夢錫居封駁之職正言讜論首罹譴逐棄忠拒諫此其始也奸臣得計欲擅威權於是有保大二年正月八日敕公卿庶僚不得進見履霜堅氷言者恟恟再降御札方釋羣疑御史張緯論事忤傷權要其貶官敕曰㒺思職分傍有奏論御史奏彈尚為越職呪非御史孰敢正言嚴續國之戚里僃位大臣不附奸險尚遭排斥張義方上疏僅免嚴刑自是守正者得罪朋邪者信用上之視聽惟在數人雖日接羣臣終成孤立陛下深思遠慮始信終疑復常夢錫宥密擢蕭儼侍從授張緯赤令羣小疑懼與酷吏司馬正彞同惡相濟迫脅忠臣髙越之于盧氏義兼親故受其寄托痛其侵陵訴於君父乃敢蔽陛下聰明枉法竄逐羣凶勢力可以囘天在外者握兵居中者當國師克在和而三凶邀利迭為前却天生五材國之利器一旦為小人忿爭妄動之具使精銳者奔北饋運者死亡榖帛戈甲委而資㓂取弱鄰邦貽譏海内同列之中有敢議論則馮魏毁之於中正彞持之於外搆成罪狀死而後已今陳覺延魯雖已伏辜而魏岑猶在本根未殄枝榦復生馮延已善柔其色才業無聞憑恃舊恩遂階任用蔽惑天聰斂怨歸上高審知累朝宿將墳土未乾逐其子孫奪其居第使輿臺竊議將率狐疑陛下方以孝理天下而延己母封縣太君妻為國夫人與弟異居捨棄其母作為威福專任愛憎咫尺天威敢行欺罔以至綱紀大壊刑賞失中風雨由是不時隂陽以之失序傷風敗俗蠧政害人蝕日月之明累乾坤之徳天生魏岑道合延己蛇豕成性專利無厭逋迯歸國鼠姧狐媚讒疾君子交結小人善事延己遂當樞要面欺人主孩視親王侍燕諠譁遠近驚駭進俳優以取容作淫巧以求寵視國用如私財奪君恩為已恵上下相䝉道路以目征討之柄在岑折簡帑藏取與繫岑一言先帝卑宫勤儉陛下守之勿失而岑營建大第廣役丁夫孽子之居過于内殿亭觀之侈踰于上林前年建州勞還文徽入覲西苑會燕舍爵䇿勲岑披猖無禮狂悖妄言與延己用意多私行恩不當俾軍士懷恨怒之志受賞無感勵之心將挍爭功諠動京邑姧謀詭計誑惑國朝致漳州屠害使者福州違拒朝命百姓肝腦塗地國家帑藏空虚福州之役岑為東南面應援使而自焚營壁縱兵入城使窮㓂堅心大軍失勢軍法逗遛畏懦者斬律云主將守城為賊所攻不固守而棄去及守備不設為賊掩覆者皆斬昨敕赦諸將葢以軍威政令各非已出岑與覺延魯更相違戾互肆威權號令竝行理在無赦烈祖孝髙皇帝櫛風沐雨勤勞二紀成此慶基付之陛下比諸隣邦我為強國奈何賞罰大柄肆姧宄之謀軍國資儲為㓙狡所散昨天兵敗䘐統内震驚將雪宗廟之羞宜醢姧臣之肉已誅二罪未塞羣情盡去四凶方祛衆怒今民多饑饉政未和平東有伺隙之鄰北有霸強之國市里訛言遐邇危懼陛下宜軫慮殷憂誅鉏虺蜮延已不忠不孝在法難原魏岑同罪異誅觀聽疑惑請行典法以謝四方文蔚將上疏先具小舟載老母以待左降元宗果怒貶江州司士參軍而覺延魯以宋齊丘救解復皆不死延己雖蹔罷旋復柄用方宣延己制百官在廷常夢錫大言曰白麻雖佳要不如江文蔚疏耳逾年召還南唐建國以來憲度草創言事遇合即隨材進用不復設禮部貢舉至是始命文蔚以翰林學士知舉略用唐故事放進士廬陵王克貞等三人及第元宗問文蔚卿知舉取士孰與北朝文蔚曰北朝公薦私謁相半臣一以至公取才元宗嘉歎中書舍人張緯後唐應順中及第大䘖其言執政又皆不由科第進相與排沮貢舉遂復罷矣保大十年卒年五十二諡曰簡歐陽廣吉州吉水人保大中詣闕上書曰臣近遊潭州伏見節度使邊鎬偶逢聖代初非將才措置乖剌大失人心致奉節兵椉夜呼噪共焚譙門會明而遁不然幾致大變是仁不足惠下也朗陵近在肘腋曾不為虞乃圖桂林以取奔敗是智不足謀遠也與監軍使昌延恭不相協和動輙疑沮是義不足和衆也幕府無賢才是禮不足得士也號令朝出夕改是信不足使人也五者無一長考之前古未或不敗請擇帥濟師以全境土書入不省及失湖南元宗思廣言命授以官執政請召試廣言非人主尊賢待士之意不肯就試乃授本縣令亦辭不受而卒
