seq: 15
front:
  text: 十五嗚呼南唐偏國短世無大淫虐徒以寖衰而亡要其最可為後世監者酷好浮屠也初烈祖輔吳吳都廣陵而烈祖居建業大築其居窮極土木之工既成用浮屠説作無遮大齋七會為工匠役夫􅂮者薦福俄有胡僧自身毒中印土來以貝葉旁行及所謂舎利者為贄烈祖召豫章龍興寺僧智𤣥譯其㫄行之書又命文房書華嚴論四十部奩帙副焉并圖寫製論李長者像班之境内此事佛之權輿也然烈祖未甚惑後胡僧為姦利逐出之國人則寖已成俗矣及其末年溧水大興寺桑生木人長六寸如僧狀右袒而左跪衣裓皆僃其色如純漆可鑑謂之須菩提縣提置龕中以仁壽節日來獻烈祖始大驚異迎置宫中奉事甚謹其徒因夸以為感應而識者按譙氏五行書知且有大䘮不三月烈祖殂及元宗後主之世好之遂篤幸臣徐遊專主齋祠事羣臣和附惟恐居後宫中造佛寺十餘出金錢募民及道士為僧都城至萬僧悉取給縣官後主退朝與后頂僧伽㡌服袈裟課誦佛經胡跪稽顙至為瘤贅手常屈指作佛印僧尼犯姦淫獄成後主每曰此等毁戒本圖婚嫁若冠笄之是中其所欲命禮佛百而捨之奏􅂮刑日適遇其齋則於宫中佛前然燈以達旦為驗謂之命燈未旦而滅則論如律不然率貸􅂮冨人賂宦官竊續膏油往往獲免上下狂惑不恤政事有諫者輒被罪歙州進士汪渙上封事言梁武惑浮屠而亡陛下所知也奈何效之後主雖擢渙為挍書郎終不能用其言開寳初有北僧號小長老自言募化而至多持珍寳怪物賂貴要為奥助朝夕入論天宫地獄果報之説後主大悦謂之一佛出世服飾皆縷金絳羅後主疑其非法答曰陛下不讀華嚴經安知佛富貴因説後主多造塔像以耗其帑庾又請於牛頭山造寺千餘間聚徒千人日給盛饌有食不能盡者明旦再具謂之折倒葢故造不祥語以揺人心及王師渡江即其寺為營又有北僧立石塔於采石磯草衣藿食後主及國人施遺之皆拒不取及王師下池州繫浮橋於石塔然後知其為間也金陵受圍後主召小長老求助對曰北兵雖强豈能當我佛力登城一麾圍城之師為小却後主真以為佛力合掌歎異厚賜之下令軍民皆誦救苦菩薩聲如江濤未幾梯衝環城矢石亂下如雨倉皇復召小長老稱疾不至始悟其姦殺之羣僧懼併坐誅乃共乞授甲出鬭死國難後主曰敎法其可毁乎弗許及國亡後主入朝過臨淮往禮普光王塔施金帛猶以千計其後弟從鎰之子祝髮為僧名惟淨景徳祥符中天下治安西域獻佛書甚衆惟淨博聞通梵學繙譯精審莫能及者積官試光禄卿譯經三藏亦南唐之餘習云契丹事見唐書本傳及五代史四夷附録今取其事之繫南唐者為傳烈祖昇元二年契丹主耶律德光及其弟東丹王各遣使以羊馬入貢别持羊三萬口馬二百匹來鬻以其價市羅紈茶藥烈祖從之於是翰林院進二丹入貢圖詔中書舍人江文蔚作贊其詞曰皇帝建西都之嵗神功邁於三古皇風格於四裔華夷咸若駿奔結軌粤六月契丹使摩哩尼嚕古東丹使兵器寺少令高徒煥奉書致貢咸集都邑公卿庶尹拜手稽首稱賀以為文德所服受命之符也若廼鴻荒以降驟歩相侔耀武以信威有所不及任筭以御物有所不從詩頌太原之師則用伐矣漢開朔方之地則崇力矣若我宣猷大麓儷德無私刑于朝廷以及于荒服旃裘左袵捧日分光殊方異產充庭納賮曰垂衣裳而天下治斯之謂矣有司紀美烈於繢事傳曰主上明聖而德不聞有司之過也臣職在翰墨親覩隆平敢獻贊曰赫矣聖武纂堯之緒要荒之長駿奔臣附伏波之柱單于之臺遺鏃徒費獻琛靡來我后穆穆我網恢恢重譯日貢皇哉唐哉四年德光遣使獻馬百匹於是烈祖遣通事舍人副四方館事歐陽遇借鴻臚少卿使契丹假道於晉高祖不可遇及境而復元宗嗣位遣使者公乘鎔航海繼好既至而契丹主烏裕被殺弟舒嚕遺元宗書曰大契丹天順皇帝謹致書大唐皇帝闕下貴朝使公乘鎔等自去秋以達東京海岸適遭國禍今年二月二十六日部署一行并諸儀物兵鎧已至燕京兹䝉敦念先朝踐修舊好既增摧痛又切感銘貴國長直官王朗陳篆取間道先囘用附咨報公乘鎔等已遣伴送使陳植等同囘止俟便風即令引道而公乘鎔亦以蠟封帛書其詞曰臣鎔自去年六月離罌油七月至鎮東關遣王朗奉表契丹九月乃有番官伊勒希巴部牛車百餘乘及鞍馬治路置頓十月至東京留三日契丹主遣閑廐使王廷秀稱詔勞問兼述泰寧王燕王九月同行大事烏裕即世母妻併命又遼東以西水潦壞道數百里車馬不通今年正月方至幽州館於愍忠寺先迎御容入宫言先欲識唐皇帝面乃引見如舊儀問國書中機事臣即述奕世歡好當謀分裂之事契丹主喜問復有何事臣云軍機别有密書契丹主接置袖間乃云吾與唐皇帝一如先朝往來因置酒合樂又諭臣曰使人遠泛巨海而至不期骨肉間倐起此事道路所聞必亦憂恐手斟一玉鍾酒先自啜乃以勸臣令飲釂自旦至日晡始罷自是數遣使宣勞三日一賜食謹遣王朗齎骰號子歸聞奏骰號子不知何等語也初宋齊丘謀間晉會契丹使燕人高霸來聘歸至淮北唐陰遣人刺殺之霸有子乾從行匿之濠州於是契丹頗信以為霸之􅂮出於晉人保大十二年舒嚕遣其舅來夜宴清風驛起更衣忽仆於地視之失其首矣厚賞捕賊不得久乃知周大將荆罕懦知契丹使至思遣客刺之以間唐乃下令能得吾枕者賞三百緡俄有劒客田英得之即給賞如約仍屏人語之曰能得江南畨使頭賞三千緡英果得之自是唐與契丹遂絶及世宗兵出淮南勑暴我罪曰蠢爾淮甸敢拒大邦跋扈飛揚垂六十載幸累朝多事與北虜交通厚起戎心誘為邊患所罪狀我雖非一然首以通契丹為興師之名方石晉以父事契丹而契丹每以兄事南唐葢戎狄習見唐之威靈故聞後裔在江南猶尊之不敢與他國齒南唐亦頗恃以自驕其實相結約撓中原皆虚辭非能為南唐助也高麗事具唐書及五代史四夷附録今書南唐所載異聞及高麗通南唐之見於傳記者高麗至五代初國名曰大封其王高氏名躬乂躬乂晚年果於誅殺吳順義二年當梁之龍徳二年為海軍統帥王建所殺建自立去大封之名復稱高麗以開州為東京平壤為西京吳天祚二年當晉之天福元年敗新羅百濟於是倭耽浮驩於羅鐵勒東夷諸國皆附之有二京六府九節度百二十郡内列十省四部官朝服紫丹緋緑青碧青碧以年序遷緑以上選才能賜之俸禄賦以田租尚冠禮略如古制婚姻男女執手自相媒許俗重匾頭生男旦且按壓其首惟恐不匾也昇元二年遣使來貢方物所上書稱牋大略云今年六月内當國中原府入吳越國使張訓等囘伏聞大吳皇帝已行禪禮中外推戴即登大寶者伏惟皇帝陛下道契三無恩涵九有堯知天命已去即禪瑶圖舜念厯數在躬遂傳玉璽建夙惟庸陋獲託生成所恨沃日波遥浮天浪闊幸遇龍飛之旦阻申燕賀之儀無任歸仁戴聖鼓舞激切之至儀式如表而不稱臣烈祖御武功殿設細仗見其使自言代主朝覲拜舞甚恭宴於崇英殿出龜兹樂作畨戲召學士承㫖孫忌侍宴三年又遣其廣評侍郎柳勲律來貢方物其後史冊殘缺來與否不可攷矣
