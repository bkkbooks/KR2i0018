front:
  text: 二周惟簡鄱陽人隱居明易後主聞其名召至金陵起布衣為集賢殿侍講以虞部郎中致仕還山金陵受圍間道召還入後苑講否卦後主思得奇士能使兵間者張洎薦惟簡可以譚笑和解乃授給事中副徐鉉使京師後主手疏言惟簡託志妙門存心道典伴臣修養不預公途葢為之聲價冀動朝聽比至太祖召見詰責鉉猶懇奏不已惟簡惶恐反言曰臣本野人未嘗仕宦李煜强遣來未嘗預聞使指伏聞終南山多靈藥願得棲隱太祖許之金陵平命為國子周易博士判監事或謂曰終南之言不詶且得罪惟簡不得已上表求解官以遂初志改虞部郎中致仕授其子繕京兆鄠縣主簿使就養太平興國中復表求仕授太常博士遷水部員外郎卒繕後舉進士中第仕亦至尚書郎鄭彥華福閩人祖父世為福建諸州刺史彥華少𨽻節度使李𢎞義帳下常射殺乳虎以勇聞元宗出師攻福州大將王崇文遣卒李興登樓車罵𢎞義𢎞義不勝憤募生得興者彥華請行夜縋出城外伏壕傍興猶嫚罵不已彥華操長鉤鉤得興挾以登城城上皆鼓譟𢎞義得興而甘心焉崇文不能下城遯去嵗餘劒州刺史陳誨以水軍來攻彥華適出屯侯官以所部降誨誨與語奇之署軍校南唐與周師相拒淮南彥華大小百餘戰身被五十餘創累遷至鎭海軍節度使加同平章事後主見討王師自采石作浮梁度江後主命彥華督舟師萬人又遣别將杜貞率歩兵萬人同逆戰後主親遣行戒之曰水陸兩軍相表裏則吾事濟矣比與王師遇貞以所部力戰彥華擁兵不救貞敗而潰金陵聞之䘮氣遂閉壘自守以至國破亦不能正彥華之罪矣彦華從後主入朝為右千牛衛將軍太宗征太原及幽州用彥華為將無功猶歴諸衛將軍至左千牛衛大將軍卒年七十三子文寳初仕後主以文學選為清源公仲㝢掌書記遷校書郎歸朝南唐故臣皆許録用文寶獨不自言後主以環衛奉朝請不納客謁文寶乃被簑荷笠作漁者以見寛譬久之後主嘆其忠後中進士第仕至兵部員外郎國史有傳李貽業故唐時平章事蔚從曾孫父戴唐末第進士奔吳為起居郎貽業事烈祖至翰林學士烈祖晏駕大臣欲奉宋后臨朝命中書侍郎孫忌草遺制貽業獨奮曰此姦人所為也大行常謂婦人預政亂之本也安肯自為此若果宣行貽業當對百官裂之會宋后亦不許於是臨朝之議遂寢元宗語貽業曰疾風知勁草於卿見之保大中以兵部侍郎卒諡曰簡初戴為人簡率無威儀貽業又甚於父平居頺然不言是非國有大議必首斷之尤好飲酒常折簡招親友曰今夕佳月能相過乎比客集貽業已大醉指酒壺曰本用相待酒興忽來自倒之矣其疎豁大抵如此劉崇俊字徳修楚州山陽人祖全以功臣為濠州刺史有威名全卒子仁規繼其任為政苛虐及卒崇俊繼之盡反仁規之政人懷其惠數年漸專恣不法多畜不逞使過淮剽掠獲美女良馬以自奉元宗陞濠州為定遠軍因拜崇俊節度使以其子節尚太寧公主然元宗亦惡其為人會壽州姚景卒崇俊厚賂權貴求兼領壽州元宗乃陽若不解其意命移鎭壽州而遣楚州刺史劉彥貞馳入濠州代之崇俊自悼失計頗革心循法度未幾得疾卒年四十贈太尉諡曰威劉洞廬陵人隱居廬山二十年能詩長於五字唐律自言得賈島法後主嗣位尤屬意詩人或以洞言者洞遂獻詩百篇卷首石城篇其詞石城古渡頭一望思悠悠幾許六朝事不禁江水流後主讀之感愴不怡者久之因棄不復觀洞亦不復見省金陵受圍洞猶在城中國亡洞過故宫闕徘徊賦詩多感慨悲傷不以不遇故有怨懟語未幾卒與洞同時有夏寳松者亦隱廬山相與為詩友洞有夜坐詩寶松有宿江城詩皆見稱一時號劉夜坐夏江城云江為宋人避亂徙閩元宗初設貢舉為屢為有司所黜嘗有題白鹿寺詩元宗南遷過而愛之為由是愈自負傲睨一時卒無薦引者居懷憤憤束書欲東走吳越為同謀者所發按得其狀伏誅汪召符歙人能屬文烈祖初嘗上書論事合指宋齊丘頗抑之召符貽齊丘書誚其疾已才齊丘大怒密使人誘召符乘舟痛飲至石頭蚵蚾磯下沉殺之郭昭慶廬陵人博學能自力嘗著唐春秋三十卷保大中獻所著治書補揚子尉辭不受後主時復獻經國治民論擢著作郎時方奉中朝凡歳慶賀貢方物牋表及廷勞宴餞之辭率命昭慶為之一日方晨起造朝暴卒伍喬廬江人居廬山國學數年力於學詩調寒苦每有瘦童羸馬之歎山中浮屠夢仰視見一大星芒色甚異旁有人指之曰此伍喬星也既覺訪得喬乃傾資奉之使入金陵舉進士及試畫八卦賦霽後望鍾山詩故事中選者主司必延之陞堂置酒時有宋貞觀者首就坐張洎續至主司覽其文揖貞觀南坐引洎坐於西酒至數行喬始上卷主司歎其傑作乃徙貞觀處席北洎處席南以喬居賔席及覆考牓出喬果為首洎貞觀次之時稱主司精於衡鑑元宗亦大愛喬程文命勒石以為永式仕至考功員外卒蕭儼廬陵人幼舉童子中其科稍長命為秘書省正字烈祖初歴大理司自刑部郎中以平恕稱烈祖晚服金石藥多暴怒近臣數被譴罰宣徽副使陳覺不自安稱疾在告者數月及聞遺詔即以其日造朝儼劾奏覺傾耳私室以幸禍變宜重置於法不報烈祖輔吳設法禁以良人為賤至是馮延己延魯欲廣置妓妾輒矯遺制託稱民貧許賣子女儼駁曰昔延魯為東都判官已有此請大行以訪臣臣對曰陛下納麓之初出庫金贖民孰不歸心今寳運中興人仰徳澤奈何欲使鬻子資豪家役使乎大行以臣言為然將罪延魯臣曰此但智識淺陋耳非有他也罪之且塞言路大行乃斜封其奏抹三筆持入宫願求之宫中既而果得留中章奏千餘皆斜封有一抹至三抹者遂得延魯奏然大臣亦方以豪侈相高利於廣聲色因共謂遺制已宣行不當追改遂已元宗初以國讓景遂羣下持不可乃以景遂為諸道兵馬元帥景達副之宣告國中以兄弟相傳之意儼極諫謂夏殷以來天下為家父子相傳不易之典也景遂景達亦固讓不敢當然元宗意愈確不之聽江文蔚韓熙載典太常禮儀議烈祖稱宗儼獨建言帝王已失之已得之謂之反正非已失之自己復之謂之中興中興之君廟宜稱祖先帝興已墜之業不應屈而稱宗文蔚亦以儼議為當遂用之保大二年元宗終欲傳位景遂下詔命總庶政惟樞密使魏岑查文徽許奏事餘非特召不得對儼上疏力爭會宋齊丘賈崇皆以為不可遂收所下詔其後元宗於宫中作大樓召近臣入觀皆歎其宏麗儼獨曰比景陽但少一井耳元宗怒貶舒州副使孫忌為觀察使遣州兵給儼實防衛之儼謂忌曰僕以言獲罪耳顧命之日君持異議幾危社稷君之罪豈不重於僕乎反見防何也忌慚即撤去俄召還後主初嗣位數與嬖倖奕棋儼入見作色投局於地後主大駭詰之曰汝欲效魏徵耶儼曰臣非魏徵則陛下亦非太宗矣後主為罷奕南唐亡儼以老病歸鄉里杜門數年卒年七十餘劉承勲失其鄉里以善心計事烈祖為糧料判官遷德昌宫使徳昌宫者葢南唐内帑别藏也自吳建國有江淮之地比他國最為富饒山澤之利嵗入不貲烈祖勵以節儉一金不妄用其積如山太子嘗欲一杉木作版障有司以聞烈祖書奏後曰杉木不乏但欲作戰艦以竹代之可也然徳昌宫簿煩委無由勾校承勲獨任其事盜用無筭保大後貢奉事興倉猝取辦愈得以為姦利畜妓樂數十百人每置一妓價數十萬敎以藝又費數十萬而服飾珠犀金翠稱之又厚以寳貨賂遺權要故終無發其罪者太祖平荆湖詔江南具舟漕其米入京師承勲狡黠計後主終不能有其國欲預自結中朝為異時計乃請行督巨艦自長沙抵迎鑾千柁相衘太祖覺其意而惡之及國亡承勲歸京師首自陳漕米事太祖曰此汝主勤王耳汝安得有勞叱出特命勿叙用久客無資裸袒乞食不勝凍餒而死李元清濠州人徙金陵趫健善走能及奔馬常歩入梁宋刺事開寳中後主以吉州永新與湖南隣命元清為永新制置使每數月一託疾不坐衙輒微服入湖南境人無知者以故敵人動息皆知之累年邊障晏然國亡歸京師元清心不欲仕二國偽稱失明召騐之揮刃將及頸而目不瞬乃放歸濠州卒盧郢金陵人工屬文有勇力好吹鐵笛乾徳中後主命韓徳霸為都城烽火使警察非常怙權暴横國人望其前驅莫不奔避郢嘗遇之調笛自若德霸叱左右捕執郢奮臂擊十餘人皆顛躓乃直前捽徳霸墜馬敺之敗而傷目徳霸入訴後主叱之出顧近侍笑曰武帥遇一措大不能自全面目尚敢訴耶遂罷其職後郢舉進士試王度如金玉賦擢第一徐鉉娶郢姊嘗受後主命撰文累日未就郢曰當試為君杼思適庭下有石千夫不得舉郢戲取弄之有頃索酒頓飲數升復弄如初忽顧筆吏口占使書不竄易一字鉉伏其工後主亦以為遒俊可愛國亡歸朝知金州卒朱弼字君佐建州人舉明經第一授國子助敎知廬山國學盧絳蒯鼇諸葛濤飲博不逞患苦諸生學官依違無敢問者及弼至一切繩以禮法每升堂講說座下肅然絳等亦愧服引去徒自四方來者數倍平時國亡補衡山縣主簿秩滿求為南嶽廟令卒王輿合淝人少與兄綰俱事吳武王輿初為小校從周本攻危全諷臨戰本視賊水柵部分諸將指旁山頭一小營謂輿曰爾往為我取彼輿唯唯而色不欲行本曰爾憚往耶輿曰公必不以輿為不武請得此柵破之捨而趨彼何為本大喜曰爾亦知此為必爭之地耶吾本自行今為爾功勞而遣之輿乘輕舟襲破其前鋒遂排柵入諸軍繼進賊大潰積功遷至諸軍都虞候烈祖輔吳以腹心所寄進控鶴都虞候持重有謀甚見倚任久乃出為光州刺史初輿兄子為海州刺史叛附梁聞輿在光山遣間使通問輿執以歸金陵因求罷郡入為左宣威統軍歴鎮海節度留後金吾衛大將軍武昌節度使與監軍甄廷堅不相得㑹廷堅被誣告有貳志烈祖遣使械廷堅屬吏未至輿刺知之密告廷堅因為謀曰今獨可即日乘輕舟歸闕待罪毋與中使遇廷堅恐懼不暇為他謀即從其計至金陵遇赦且以其先自歸得免人推其長者元宗嗣位加同平章事保大二年卒年七十四輿少從軍攻潤州為巨弩所射中右耳矢自左耳出又中旁一人猶立死輿扶歸營臥百餘日復起耳至老不瞶亦無瘢痍攻頴州倚營門仗劒驅士卒登城城上機石發中營門及鎧之半皆糜碎而輿不傷莫不異之兄綰亦至䖍州節度使魏岑字景山鄆州須城人善諂䛕學揣摩尤為宋齊丘所知薦授校書郎保大中驟進至諫議大夫元宗自以唐子孫慨然有定中原復舊都之意有司請行南郊禮元宗曰俟天下為一然後告謝天地岑遂與陳覺馮延己延魯更相倡和為拓境事嘗侍燕自言臣少遊元城樂其風土陛下還長安日乞為魏博節度使元宗欣然許之岑趨下殿再拜謝侍衛皆竊笑覺延魯攻福州岑為監軍應援使三人者暗懦專恣如一軍敗元宗初欲按軍法誅覺延魯而貸岑御史中丞江文蔚對仗彈奏請并岑誅之於是貶太子洗馬俄復還故官李守貞叛漢來乞師岑乃力請出兵赴救於是元宗從之因以岑為㳂淮廵撿使無功而還岑自復進姦諂彌甚鍾謨李徳明亦用事其趨向與岑雖異而迷國則均户部員外郎范沖敏懷不平怵大將王建封上疏請盡逐之更用正人元宗怒併置沖敏建封於死岑自謂得主眷愈無所憚壽州節度使劉彥貞以厚賂結岑為奥援岑所得不可數知遂肆言稱彦貞為將如韓白治民如龔黄其敢為誕欺如此元宗方倚以柄任㑹見沖敏為厲召道士上章訴天未幾卒
