front:
  text: 十一郭廷謂字信臣彭城人父全義仕為濠州觀察使廷謂幼好學善書札騎射補殿前承㫖出為濠州中門使全義卒擢莊宅使即為州監軍周侵淮南廷謂與州將黄仁謹約以死守籍州民不逞者聚於僧寺嚴兵守之日給食隨所能使造守具故周師終不知城中虚實久不可下元宗歎其忠因大發戰櫂命與林仁肇援壽州周世宗聞之徙下蔡浮橋於渦口築壘夾淮東西以䕶橋扼濠壽之衝暑雨淮漲廷謂掩不僃輕舟泝流急趨渦口將麾兵斷笮周人覘知設伏待之廷謂將至揣得其情駐軍不進襲敗周將武行德周務勍於定遠斬首數百行德挺身遯卒焚浮橋周兵死者不可計遂盡焚軍資取良馬數百進武功殿使就遷州刺史猶以為賞薄又遷團練使兼上淮水陸應援使及紫金山戰唐將帥多降於周廷謂獨還軍守濠州治壁壘繕戈甲為守僃世宗復南征廷謂表金陵請援且言周師日張願卑辭請和以俟機會夜出敢死士千餘襲破周營焚雲梯洞屋周人大驚相蹂踐死者甚衆然援師不至世宗親攻城焚戰艦數百艘殺二千人進攻羊馬城又殺數百人遣諜持詔諭降廷謂廷謂度不能支奉表於周懇言世受本國爵命家在江南欲遣使稟命國主世宗許之為緩攻及廷謂使還知金陵卒不能救集將士於壘門南嚮慟哭再拜乃降世宗見廷謂賜宴勞之曰兵興以來江南敗亡相踵惟卿能犯渦口浮橋破定遠寨足報國矣濠州小城使汝主自守豈能固哉賜襲衣金帶良馬及器皿萬餘拜亳州防禦使以其弟廷讚為和州刺史因命帥濠州兵東攻天長下之遷樓櫓戰櫂左右廂都監入朝官至靜江軍節度觀察留後知梓州代歸賜第東都卒年五十四廷謂事母孝朝夕束帶立侍寒暑不變為政亦有惠愛方廷謂降周時令其錄事參軍鄱陽李延鄒草降表延鄒責以忠義不為具草廷謂愧其言然業已降必欲得表以兵脅之延鄒投筆曰大丈夫終不負國為叛臣作降表遂遇害元宗聞之召見延鄒子命以官張彥卿史失其鄉里世家保大末周世宗南侵彥卿為楚州防禦使周師銳甚旬日間海㤗州靜海軍皆破元宗亦命焚東都官寺民廬徙其民渡江世宗親御旗鼓攻楚州自城以外皆已下發州民濬老鸛河遣齊雲戰艦數百自淮入江勢如震霆烈焰彥卿獨不為動及梯衝臨城鑿城為窟室實薪而焚之城皆摧圮遂陷彥卿猶列陣城内誓死奮擊謂之巷鬭日暮轉至州廨長短兵皆盡彥卿取繩牀搏戰及兵馬都監鄭昭業等千餘人皆死之無一人生降者周兵死傷亦甚衆世宗怒盡屠城中諸民焚其室廬然得彥卿子光祐不殺也元宗下詔贈彥卿侍中天長縣時陞為雄州刺史建武軍使易文贇亦固守聞楚州陷遂降彥卿馬元康書以為彦能亦莫知孰是也論曰彥卿守楚州孤壘無援當百倍之師身可碎志不可渝雖劉仁贍殆不能過而史家傳載獨略至其名亦或不同於虖何其重不幸也林仁肇建陽人事閩為裨將沉毅果敢文身為虎軍中謂之林虎子閩亡久不見用㑹周侵淮南元宗遣使至福建募勇士得仁肇及陳德誠鄭元華皆㧞為將仁肇率偏師援壽州攻城南大寨有功又破濠州水柵推淮南屯營應援使時周人正陽浮橋初成扼援師道路仁肇率敢死士千人以舟實薪芻乘風舉火焚橋周將張永德來爭會風囘火不得施我兵少却永徳鼓噪乘之遂敗仁肇獨騎一馬為殿永徳引弓射之屢將中仁肇輒格去永徳驚曰此壯士不可逼也遂捨之而還及割地元宗以為潤州節度使徙鄂州又徙南都留守開寳中密言於後主曰宋淮南諸州戍守單弱而連年出兵滅蜀平荆湖今又取嶺表往返數千里師旅罷弊此在兵家為有可乘之勢請假臣兵數萬出壽春渡淮據正陽因思舊之民以復故境彼縱來援吾形勢已固必不得志兵起之日請以臣舉兵外叛聞事成國家饗其利不成族臣家明陛下不預謀後主懼不敢從時皇甫繼勲朱全贇掌兵柄忌仁肇雄略謀有以中之會朝貢使自京師囘擿使言仁肇密通中朝見其畵像於禁中且已為築大第以待其至後主方任繼勲等惑其言使人持酖往毒之仁肇少病風口氣常臭醫云肺掩不正及遇酖家人怪其不臭俄卒初仁肇尤為陳喬所知至是喬歎曰國勢如此而殺忠臣吾不知所稅駕也然不能白其誣仁肇卒逾年後主遂見討又逾年國為墟矣盧絳字晉卿宜春人自言唐中書舍人歙州刺史肇之後初名兗慕晉魏絳更焉讀書略通大指喜論當世利病然脫略繩檢每以博奕角觝為事舉進士不中為吉州囘運務計吏盜庫金事覺當伏危法乃更儒服亡去至新淦客於土豪陳氏與其子弟共學絳好縱横兵書日夜讀之陳氏察其非士流謂曰朝廷方求賢豪吾子其可久留此乎因厚具裝遣行絳將還宜春中途飲博盡費其裝比至家母及兄弟皆鄙誚之絳乃入廬山白鹿洞書院猶亡賴以屠販為事多脅取同舍生金又持㩁貨誣山中浮屠以邀賄謝人皆患苦之與諸葛濤蒯鼇號廬山三害朱弼為國子助敎將捕治其罪復亡去往來金陵丹陽間遇大寒平地躍起折簷桷為薪以自濟守倉吏召歸使躍倉簷自氣樓入倉中盜米一夕往返數十久之乃上書論事未報詣樞密使陳喬口陳所上書詞辨從横喬聳然異之用為本院承㫖授㳂江廵檢募亡命習水戰使馬雄王川軍等分將之要吳越兵於海門屢獲舟艦以善戰聞開寶中密説後主曰吳越仇讐腹心之疾也他日必為北兵鄉導以攻我臣屢與之角知其易與不如先事出不意滅之後主曰然則大朝且見討奈何絳曰臣請詐以宣歙叛陛下聲言伐叛且賂吳越乞兵吳越之兵勢不得不出俟其來拒擊之而臣躡其後國可覆也滅吳越則國威大振北兵不敢動矣後主不聽及王師來討以絳為淩波都虞候沿江都部署守秦淮水柵戰屢勝諸將忌其能共說後主遣絳出援潤州乃授昭武軍節度留後帥八千人陣於潤州城下北軍不敢逼入城拒守而節度使劉澄謀因計事斬絳以城降絳覺之澄乃謂絳曰都城危甚萬一不守守此何為絳曰君為守不可棄城宜赴難者絳也是夕澄遣裨將出送降欵絳帥部下馳出欲冐圍入金陵圍堅不可入乃走保宣州金陵城陷諸郡皆下絳獨不降謀南據閩中過歙州怒刺史龔愼儀不出迎殺之而行太祖使絳弟襲招絳絳初欲殺襲以明不屈已而卒降至京師授冀州團練使遇龔愼儀兄子贊善大夫潁於朝詬絳曰是殺我叔父者執至殿陛訴寃詔屬吏樞密使曹彬言其才略可用願宥其死使自効太祖曰是貌𩔖侯霸榮何可留也斬於西市絳臨刑大呼曰陛下不記以鐵劵誓書招臣乎霸榮河東將嘗來降已而復叛歸弑其主劉繼恩者故太祖深惡之蒯鼇宣城人善屬文南唐承唐末文體纎麗之弊士率不能自振鼇獨不事華藻以理趣為本有承平餘風然居鄉飲博無行不為人士所容廼去入廬山國學亡頼尤甚晩乃勵風操尚信義一言之出必復而後已嘗蓄龍尾硯友人欲之而不言鼇亦心許之未及予也一日友人不告而歸鼇悔恨徒歩數百里追及授硯而還猶以素行為有司所擯終國亡不仕久之遊京師擢進士第仕至殿中丞樊若水欲薦於朝鼇恥之亟致仕歸隱廬山數年卒陳喬字子喬廬陵玉笥人父濬事吳為翰林學士烈祖時以兵部尚書卒喬㓜敏悟文辭清麗事親以孝聞濬死撫恤族黨均財給之親疎無間起家為太常寺奉禮郎歴屯田員外郎中書舍人淮南兵興元宗憂蹙不知所為陳覺李徴古請以宋齊丘攝政元宗怒度羣臣必持不可乃促召喬草詔如覺徴古言喬請對未報排宫門入頓首曰陛下既署此則百官朝請皆歸齊丘尺地一民非陛下有陛下縱脫屣萬乘獨不念先帝中興大業之艱難乎讓皇幽囚丹陽宫陛下所親見也他日垂涕求為田舍翁不可得矣元宗笑而止引喬入見后及諸子曰此忠臣也及齊丘黨與皆斥喬與齊丘尤親厚獨得不坐遷都豫章以喬輔太子留金陵後主嗣位歴吏部侍郎翰林學士承㫖樞密副使遂以門下侍郎兼樞密使貶制度改右内史侍郎兼光政院使輔政喬風度淹雅小心守法度然短於才略吏胥多交通權倖侮文法不能察也太祖遣使召後主入朝後主欲往以喬為介喬曰往必見留如社稷何後主懼見討喬曰陛下不得已當以臣為解及兵圍金陵太祖又遣進奉使江國公從鎰諭指欲後主自歸且命曹彬緩攻以俟之而喬堅持不可劉澄以潤州降後主方惶惑欲置其家不問喬憤切曰人臣受重寄一旦開門迎敵此豈可容悉取其父母妻子斬之於是人皆知喬必死國事矣及城將陷後主自為降欵命喬與清源郡公仲㝢詣曹彬喬持欵歸府投承霤中復入見云自古無不亡之國降亦無由得全徒取辱耳請背城一戰而死後主握喬手涕泣不能從喬曰如此則不如誅臣歸臣以拒命之罪後主又不從乃掣手而去至政事堂召二親吏解所服金帶與之曰善藏吾骨遂自縊二吏徹榻瘞之金陵平家人謀改葬求尸不獲或見一丈夫衣黄半臂舉手障面及發瘞如所見云陳起蘄州人性剛硬尤惡妖異昇元中以進士起家為黄梅令時縣境獨木村有妖人諸佑挾左道自言數世不食肉能使富者貧貧者富俚民稍稍從之初有徒數十人積數年從者至數百男女無别號曰忍辱夜行晝伏取資於盜相與倡言佑有神術能升虚空入水火州縣亦憚之不敢問起到官邑人畢賀佑獨偃蹇不至起乃按户籍取佑為里正不服嫚言曰吾且斷令頭起告廵檢使周鄴出兵捕佑等獲之不能神皆就執縛搜其家得乘輿服器遂斬之鄴欲宥其婦女童稚起曰此皆瀆亂人倫不可使有遺育乃併斬之起由是知名官至監察御史卒
