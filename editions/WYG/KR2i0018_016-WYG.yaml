body:
  text: 舒蘄廬昭順軍壽清順軍海泰以揚之海陵置領揚之興化楚之鹽城置泰興如臯濠定逺軍通靜海軍雄遠軍見昇州潤鎮海軍常宣見昇州歙攝池康化軍置銅陵吳改至徳為建徳饒永平軍置徳興信置鉛山江奉化軍置徳安瑞昌湖口東流東流尋屬池改潯陽曰徳化洪南都南昌府闕置清江改新吳為奉新置靖安鄂武昌軍筠割洪之髙安置上高萬載清江筠音匀以南城置建武軍州以出竹名宋瑞州闕軍吳招武軍袁置萬載吉置龍泉䖍昭信軍置瑞金龍南石城上猶宋改贑州建永安軍改忠義軍置歸化建寜汀劒割建汀置南漳州改名以泉州之長泰屬泉清源軍列傳一之十五南唐書四之十八宋齊丘第一詩凡三十四韻有曰山蹙龍虎健水黒螭蜃作日晚嚴城鼓風來蕭寺鐸金桃帶葉摘緑李和衣嚼塵飛景陽井草合臨春閣一日賢太守與我觀槖籥乃陪烈祖登金陵城中鳯凰臺作今石刻王紹顔奉勅書貞竹無盛衰媚栁先揺落一聮小異昇元中敕立周宗第二臺城六朝宫也在都城内北烈祖因築府就為宫宋為府治後為行宫在今郡城内北志謂之舊子城郡城亦烈祖築子城郡城比古城皆近南爾摺襆頭角見李建勲等畵影皆輭裏公服一如盛唐也徐鍇鍇音楷又音皆九江謂鐡為鍇諦音帝審也邉鎬鎬音好郴見元宗紀柴克宏第三頵䴢又音贇頭大也王會弢音叨弓衣也游簡言讟音讀怨謗也刁彥能舉刀示先主先主葢舊書文當云烈祖也鍾謨第四沾沾自􅃷沾音曕輕薄也漢魏其傳沾沾自喜􅃷音縣説文自矜也朱匡業第五朱元叛元宗議親征元本作烈祖今按其事正之朱令贇贇見元宗紀江文蔚第七舍爵䇿勲出左氏舍去聲馮延己第八頵見上柴克宏傳延魯𤣥武湖在金陵城北南唐近事湖周廻十數里幕府雞籠蔣山環聳左右名園勝境掩映如畵六朝舊迹多出其間每栽菱藕罟網之利不下數千云案湖宋王安石言開為田今成平陸矣孫忌豆盧姓出北地彭師暠暠字通作皓皜韓熙載第九梅嶺岡在城南郡志謝公墓上有無字碑今皆失其處慕容紹宗案北史紹宗初事爾朱歸高歡歡命其子澄用之故曰神武遺言實表知人之鑒劉仁贍第十壽州本漢壽春周世宗得壽州徙其軍淮北下蔡改名忠正軍以旌仁贍之節復以壽州故治立壽春縣𨽻忠正軍宋置安豐軍於壽春縣今安豐路也潘佑見上馬元康下嚴續肺附見漢書劉向衛青傳肝肺相附著也附通作腑音副張易嵬峩即巍峩嵬巍古通喑噁史記韓信傳喑噁叱咤索隠曰喑於鴆切噁烏路切懷怒氣也漢書作音烏猝嗟晉灼曰音烏恚怒聲也郭廷謂第十一笮通作筰音昨以竹索為橋也字又音窄而義異林仁肇擿音剔挑也發也漢趙廣漢傳發姦擿伏揚子擿埴索塗字又通作摘擲而音義異盧絳新淦漢縣隋以屬吉州宋以屬臨江軍淦水出焉淦從水金聲古暗切陳喬脱屣屣音徙孟子猶棄敝蹤也又通作躧履不躡根也屣所寄切李元清第十二趫音驕善走也捷也魏岑怵見上元宗紀作訹元宗子從善第十三悁縈縁切詩憂心悁悁葢兼絹絓􅂢委之義雜藝方士吳廷紹第十四飴音怡餳也潘扆紫極宫南唐近事扆後欲傳其法於人夢其師怒擅洩靈術傳非其人隂奪其法寤不復能劒云尋病終紫極宫臨終上言乞桐棺葬近地後當尸解上從之使中貴人護葬金波圏保大中元宗命親信發冢觀之骸骨尚在迄無異焉耿先生煼火乾也亦作炒㷅方山在城東南三十里外吳葛仙翁所居有丹井一名天印山有寳華宫碑宫基經火正當井處故老云當時即焚之也節義史諜諜通作牒札也漢志披圖諜吳媛媛音援女賢也字又通作姢晬祖對切子生一嵗也浮屠第十五身毒身音捐又音乾毒音篤國在大夏東南今呼天竺葢身毒聲轉為天篤篤省作竺又轉為竹音也衣裓語出佛書裓音刻字書衣裾也牛頭山在城南三十里即晉王導指為天闕者契丹旃俗作氊賮徐刃切會禮之財也通作贐漢書唐書作進高麗倭窩龜兹音丘慈已上音釋姑据所知亦有特略之者加詳者幸觀者審焉南唐書音釋
