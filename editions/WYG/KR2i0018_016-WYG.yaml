front:
  text: 南唐書音釋習氏明晉紹漢比宋論乃章漢事失于陳志唐尚有是書戚光既校之并音釋本紀一之三南唐書一之三烈祖第一昇音弁曰光貌明也又喜樂貌或作忭憲宗第八子憲宗凡二十子見唐書宗室世系表城昇州古金陵唐稱昇州城始東南跨淮水即今城也又見後周宗傳蒜山在鎮江城西三里捭闔捭通作擺開也鬼谷子有捭闔篇蘇秦學捭闔揣摩銅駞橋即今金陵城東十里銅橋据五代史及金陵志駞衍文茀音弗草多也詩茀厥豐草南郊牛頭山有廢宫址相傳為是山見浮屠傳太廟金陵志今乾明尼寺是其址𤣥武湖見馮延已傳鍾山在城東北十五里即蔣山東南之鎮名山也迎鑾鎭見揚州馬元康胡恢宋陽羨馬令祖太學博士元康世家金陵多記唐事書未成而卒令於崇寜間繼成南唐書三十卷恢金陵人宋華州推官嘗篆太學石經博物强記臧否人物能詩案南唐諸書有烈祖開基誌十卷唐滁州刺史王顔撰起天祐乙丑止昇元癸卯烈祖實録十三卷内闕二卷吳録二十卷並髙遠撰逺傳書未成卒焚其草故多遺落江南録十卷宋太宗以徐鉉湯悦皆唐舊臣命撰之晁无咎曰王安石言鉉書至亡國之際不言其君之過但以歴數存亡論之於春秋箕子之義為得也然潘佑以直見殺而鉉書佑死以妄豈惟厚誣忠臣其欺君亦甚世多以此言為然獨劉道原得佑子華所上父事迹略與江南録同乃知鉉等非欺誣也悦即殷崇義避宋諱改姓因并易名江南别録四卷宋陳彭年撰吳唐四主傳也南唐近事二卷江表傳三卷並鄭文寳撰江南野史二十卷宋龍衮撰凡八十四傳江南館載二卷其序言鉉等奉詔為江南録後王舉路振陳彭年楊億皆有書大槩皆不足以史稱而衮尤甚熙寧八年得鄭君所遺於楚州其事有六家所遺或小異者刪落是正以𩔖相從云鄭君序者皆不著名已上并馬胡二家凡十一書惟陸游徧取折𠂻成此書也游亦不著名以他書考而知豈時以私著避也元宗第二璟俱永切不音景逷字通作逖近濁唐天文志流星尾長丈餘出紫㣲入濁大星自東濁際西流有聲如雷竇苹音訓曰天與地際處曰濁案宋天文志有星出濁有星出東壁東北速行至濁沒六月朔日食五分至酉六刻帶二分入濁不見七月月食丑五刻虧見東北方食及二分半入濁不見食甚及復五分月食戌一刻虧見東南方出濁未貟六分在東井度中至五刻復以日月食朔望出沒之際觀竇說盆明矣又凡此書星變五代史通鑑皆不載葢其史失之少微長垣各四星在南方張度贇於倫切美好也瑫他勞切玉名郴慶林切琛暹纖榜音彭笞擊也漢書榜笞又篣格彭考字通用一作榜霣通作隕清流關在滁州西南二十里周之㨗時宋太祖為將孫晟即孫忌信祖郭威即帝位稱周追尊髙祖璟廟號信祖訹雪律切音戌說文誘也或作怵漢書怵於邪説如淳曰見誘怵也今俗猶云相謏怵謏音小後主第三煜音燿耀也殷崇義見烈祖紀馬元康下暴張張通作漲漲亦通平聲江淹詩雲霞肅川漲皖合版切山在舒州咼彥咼字書口戾也俗作喎不言是姓姓書無咼姓但有過渦二姓並音戈過風俗通夏諸侯國氏焉漢有兖州刺史詡急就章有過説春秋寒浞處其子澆于過謂之過澆少康滅之以封諸侯其地漢東萊掖縣北過鄉是也宋季有尚書郎朂望出高平渦楚大夫封渦因氏焉三輔决録有扶風太守尚或以咼即渦非也宋季猶有過勗或曰即過後世去辵如隨為隋爾亦非也鄭樵氏族略以古帝名為氏者女媧之後有媧氏媧與咼音同而字近咼當是媧而去女文爾案秋浦志載池牧守自唐康震蕭復至南唐鄭彥華咼彥凡九十五人惜彥事績莫考也鍾蒨字徳林案徐鉉王夫人墓誌王太原人家豫章蒨父司徒纉戎是邦因娶焉二子長懐建繇校書郎歴東府掾以羣從百口家豫章辭禄公朝因除洪州都督府司馬次蒨也以屬詞敦行從事戚藩累登臺郎為集賢殿學士會中令齊王避親讓寵授鉞臨川朝廷憤選英僚以光幕府除撫州觀察判官檢校屯田郎中既拜而夫人疾亟以交泰元年卒于京師嘉瑞坊官舍鉉又有保大九年送徳林貟外赴東府亞尹詩序鉉等餞于石頭城分題為詩蒨有賦山别諸知己詩云暮景江亭上雲山日望多只愁辭輦轂長恨隔嵯峨有意圖功業無心憶薜蘿親朋將逺别且共醉笙歌又克復揚州後以蒨軗侍從攝尹正東府鉉等分韻賦詩弟鍇亦與有序蒨有得新鴻别諸同志詩云隨陽來萬里㸃㸃度遥空影落長江水聲悲半夜風殘秋辭絶漢無定似驚蓬我有離羣恨飄飄𩔖此鴻蒨之才譽亦可見矣但馬承信兄弟事未詳舊嘉瑞坊在今城内東南隅蒨倉甸切青山案郡志後主獵青龍山一牝狙觸網淚下稽顙屢顧其腹後主命虞人守之其夕生二子還幸大理寺親録囚一大辟婦以孕在獄適産二子因得减死山在城東三十五里然城南四十里亦有青山但郡志所傳若頗悉爾膜拜長跪拜也暯音謨唐年世總釋凡七十二年唐天祐元年甲子昭宗天復四年改元朱溫弑帝立哀帝蜀仍稱天復二年乙丑蜀天復五年三年丙寅蜀天復六年四年丁卯蜀天復七年朱溫簒位稱梁開平元年五年戊辰晉岐淮南蜀武成元年六年己巳晉岐淮南七年庚午晉岐吳岐王承制加淮南楊隆演嗣吳王八年辛未晉岐吳蜀永平元年梁乾化元年九年壬申晉岐吳十年癸酉晉岐吳十一年甲戌晉岐吳十二年乙亥晉岐吳梁貞明元年十三年丙子晉岐吳蜀通正元年十四年丁丑晉岐吳蜀天漢元年漢乾亨元年十五年戊寅晉岐吳蜀光天元年十六年己卯晉岐吳武義元年蜀乾徳元年十七年庚辰晉岐十八年辛巳晉岐吳順義元年梁龍徳元年十九年壬午晉岐同光元年癸未晉莊宗復唐改元岐尋内屬二年甲申三年乙酉天成元年丙戌明宗立改元吳越寳正元年二年丁亥吳乾貞元年三年戊子漢大有元年四年己丑吳太和元年長興元年庚寅二年辛卯三年壬辰四年癸巳應順元年甲午閔帝立遇弑末帝立改元清泰清泰二年乙未吳天祚元年蜀明德元年三年丙申石敬瑭因契丹立號晉天福元年自天祐至是三十三年昇元元年丁酉烈祖即位古今之亂唐末極矣然清泰方絶昇元已建天命人心無絶也孰謂五季無君哉二年戊戌蜀廣政元年三年己亥閩永隆元年四年庚子五年辛丑六年壬寅漢光天元年七年癸卯元宗立改元保大殷天徳元年漢乾和元年保大二年甲辰晉開運元年三年乙巳四年丙午五年丁未晉亡六年戊申漢乾祐元年七年己酉八年庚戌漢亡九年辛亥周廣順元年十年壬子十一年癸丑十二年甲寅周顯徳元年十三年乙卯十四年丙辰十五年丁巳北漢天會元年中興元年戊午初改交泰元宗十六年始奉周顯徳年去帝號自昇元至是二十二年天祐至是則五十五年自武徳至是三百四十二年矣使元宗能安天命事大國以存宗祀周能世敦王道以賔之則三代之意也周顯德六年元宗十七年己未天子命城金陵七年元宗十八年庚申宋建隆元年宋建隆二年元宗十九年辛酉元宗殂後主即位仍奉其正朔宋又始稱詔于唐三年後主二年壬戌乾徳元年後主三年癸亥二年後主四年甲子三年後主五年乙丑四年後主六年丙寅五年後主七年丁卯開寳元年後主八年戊辰二年後主九年己巳三年後主十年庚午四年後主十一年辛未五年後主十二年壬申六年後主十三年癸酉甲戌嵗後主十四年宋開寳七年乙亥嵗後主十五年宋開寳八年後主城陷被執唐亡自烈祖至是三主凡三十九年自高祖至是凡三百五十九年殷周革命而杞宋國隋之世梁猶祀焉宋之君度不逮世宗矣州軍總音釋凡州軍三十八昇都金陵府以宣之當塗廣信并置蕪湖銅陵繁昌來屬及當塗為雄遠軍復以池之青陽來屬與舊領上元江寜句容溧水溧陽為十縣也揚東都江都府改江陽為廣陵以海陵興化屬奉以天長置軍尋改曰建武軍改楊子曰永貞以其白沙鎭為迎鑾鎮雄割揚之六合天長置楚以鹽城屬泰吳順化軍宋淮安泗滁改永陽曰來安和光黄
