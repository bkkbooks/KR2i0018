front:
  text: 九孟堅始事建州王延政為將保大初查文徽討王氏之亂堅來降文徽即以兵付之出奇鏖擊有功及馮延魯之攻福州也堅亦在兵間吳越援兵自海道至阻淖不得登岸延魯不知兵急於破敵欲歛兵誘而蹙之堅諫曰吳越兵進退俱不能方致死于我使得至平地未見可勝也延魯大言曰吾自擊之無預君事吳越兵得平地果不可制李𢎞義兵自城中出盡銳夾擊延魯大敗棄軍遯堅力戰以死延魯雖貶而其黨方盛故堅之死事不見錄國人哀之陳誨建州人生數月趫健能馳走其父異之名之曰阿鐵長事王延政為將唐師攻建州傅其城誨數出挑戰先鋒橋道使王建封克外郛擒誨將斬之已解衣伏鑕忽脫身絶馳追者數十百輩莫能及自歸大將查文徽文徽駭異用為戰櫂指揮使領故部曲從攻福州馮延魯敗走諸營皆潰死者萬計委軍實戎器不可勝計誨獨殿後收所棄金帛二十萬以歸文徽鎭建州誨為劒州刺史諜者告吳越戍兵棄福州遯文徽暗而貪功即率誨俱進誨以戰艦入閩江適春雨江水暴漲一夕七百里抵城下擊敗福州兵獲其將馬先進葉仁安鄭彥華始知福州未嘗有變誨親故多在城中方遣間使招之文徽勒歩騎亦至福州來迎文徽傳令入城誨以所聞告且曰僕閩人也豈不能料閩人之情宜先立寨整衆俟所招親故來得其實徐圖之文徽曰狐疑且生變椉機據城上䇿也遂入誨知其必敗植旗鳴鼓列兵江干以須之文徽果敗被執誨全軍還劒州獻馬先進于金陵用鄭彥華為將唐兵兩取福州皆大敗塗地誨在兵間皆有功號名將遂為建州節度使兼侍中訓兵積穀隱然為大鎭嘗破福州兵于南臺江軍聲大震由是朝廷委以南方事而名其軍曰忠義及周兵入淮南誨遣子德誠率鎭兵赴難諸將多敗惟德誠頗有戰功拜和州刺史建隆三年六月誨引病求罷朝論難其代乃以弟劒州刺史謙為留後召誨還都後主親臨視七月卒諡忠烈閩之亂士民幾殲焉惟誨之宗族益盛謙與徳誠後亦繼領建州旄節諸子悉至顯官韓熙載字叔言北海人少隱嵩山唐同光中擢進士第父光嗣平盧節度副使軍中逐其帥符習推光嗣為留後明宗即位討亂光嗣坐死熙載來奔時烈祖輔吳方修明法令熙載年少放蕩不守名檢補和常滁三州從事時人士自中原至者多已擢用熙載在京洛早負才名乃獨落魄不偶亦不以介意烈祖受禪召為祕書郎使事元宗於東宫諭之曰以卿早奮名場疎雋未更事故使歴州縣之勞今用卿矣宜善自修飭輔吾兒也熙載亦不謝在東宫談燕而已不嬰世務元宗即位拜虞部員外郎史館修撰兼太常博士乃慨然曰先帝知我而不顯用是以我為慕容紹宗也始數言朝廷事所當施行者展盡無所囘隱宋齊丘馮延己等皆側目元宗意獨嘉之命權知制誥書命典雅有元和之風與徐鉉齊名時號韓徐契丹入汴晉少帝北遷熙載上疏曰陛下有經營天下之志今其時矣若戎主遁歸中原有主則不可圖矣不省陳覺馮延魯福州䘮師初議寘軍法齊丘為之請止削官遷外郡熙載上疏請無赦又數言齊丘黨與必基禍亂熙載不能飲酒齊丘誣以酒狂貶和州司士參軍徙宣州節度推官復入為虞部郎中史館修撰遷中書舍人周太祖有天下用事者猶議北伐熙載曰北伐吾本意也但今已不可耳郭氏姧雄曹馬之流雖有國日淺守境已固我兵妄動豈止無功耶言雖切而朝廷闇於機會經營中原之意終不已周人果以藉口兵入淮南齊王景達以兵馬元帥臨邊陳覺為監軍使熙載言出師大事也當先正名莫信於親王莫重於元帥安用監軍使哉亦不從熙載才氣逸發多藝能善談笑為當時風流之冠尤長於碑碣他國人不遠數千里輦金幣求之然性忽細謹老而益甚蓄妓四十輩縱其出與客雜居物議閧然熈載密語所親曰吾為此以自汚避入相爾老矣不能為千古笑端坐託疾不朝貶右庶子分司南都熈載盡斥諸妓後主喜留為祕書監俄復故官欲遂大用之而去妓悉還後主歎曰孤亦無如之何矣宿直宫中賜對多所𢎞益後主手教褒之進中書侍郎卒年六十九後主謂侍臣曰吾竟不得相熈載欲贈平章事古有是否或對曰晉劉穆之贈開府儀同三司即故事也乃贈右僕射同平章事廢朝三日謚文靖命葬梅嶺岡謝安故墓側著格言及後述三卷擬議集十五卷定居集二卷初熈載嘗使周及歸元宗歴問周之將相熈載曰趙㸃檢顧視非常殆難測也及太祖受禪人服其識朱元潁州沈丘人本姓舒少倜儻通左氏春秋與楊訥同為河中李守貞客守貞叛俱來乞兵楊訥者李平也語在平傳元既留事南唐以駕部員外郎待詔文理院數上書論事言今幸中原多故茍支嵗月非所以為國當取湖湘閩越錢塘以固基本且請專任軍旅以次討定用事者嫉其言共譛之以為遠人謀握兵包藏莫測遂罷待詔元失意縱酒不事事朝廷亦優容之保大末周師入淮南元請對言兵事元宗大悦命從齊王景達救壽州元善撫士卒與之同甘苦毎臨戰誓衆詞指慷慨流涕被面聞者皆有効死赴敵之意破舒和二州以功加淮南西北面行營應援都監與邊鎬許文縝柵紫金山軍聲頗振益柵且及壽州元恃功時或違景達節制監軍使陳覺與元素有隙且嫉其能屢表元本學縱横不可信不宜付以兵柄元宗乃命楊守忠代之守忠至元帥府景達檄元計事元憤怒欲自殺其客宋均曰丈夫何往不可乃為妻子死耶遂舉寨萬餘人降周由是諸軍皆潰邊鎬許文縝楊守忠皆被擒壽州不守遂畫江請盟矣元在江南娶查氏文徽女至是伏誅文徽累表乞貸死不從以珠覆尸於市哭之隕絶觀者皆為垂泣元歸周復姓舒世宗愛其驍果以為蔡州團練使其母猶在沈丘遂迎養焉太祖受禪遷汀州防禦使太平興國初卒諭曰亡國之君必先壞其紀綱而後其國從焉方是時疆場之臣非皆不才也敗於敵未必誅一有成功讒先殺之故強者玩㓂弱者降敵自古非一世也南唐如陳覺馮延魯查文徽邊鎬輩䘮敗塗地未嘗少正典刑朱元取兩州於周兵將遯之時固未為雋功而陳覺已不能容此元之所以降也元降諸將束手無策相與為俘纍以去而唐遂失淮南臣事于周雖未即亡而亡形成矣欲知南唐之亡者當於是觀之
