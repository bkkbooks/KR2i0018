seq: 10
front:
  text: 十劉仁贍字守惠淮陰洪澤人父金事吳武王有戰功至濠州團練使長子仁規娶武王女貴於其國嘗為清淮軍節度使仁贍略通儒術好兵書有名於國中事烈祖歴黄袁二州刺史入為龍衛軍都虞候拜鄂州節度使元宗伐楚仁贍帥舟師克巴陵撫納降附甚得人心保大中湖湘戍兵潰歸復失故楚地上書者多謂周人有南侵之謀淮上石偶人言元宗聞而惡之斷其首自六月至冬不雨長淮可渉民流入周邊城遮殺之不能禁唐亦興屯田修邊僃以壽州最為要地十三年徙仁贍為清淮軍節度使自楊氏有吳嵗暮淮涸輒增戍以備侵軼謂之把淺監軍吳廷紹以為無事徒費糧糗罷之仁贍表陳不可罷未及行周已遣將李穀王彥超韓令坤等帥師大入詔書暴我納李金全援李守貞慕容彥超結契丹太原之罪報至上下失色仁贍獨部分號令宴勞吏士閒暇如平時十一月出兵破城南大柵殺周兵數千人元宗遣神武統軍劉彥貞將三萬人救壽州十四年正月彥貞至來遠鎮距壽州二百里軍容甚盛李穀燒營夜遁保正陽彥貞率戰艦數百艘泝淮而上仁贍曰敵已畏君矣當持重養盛以俟閒若遽求戰而不能勝則大事去矣彥貞不從仁贍曰周人遯必設伏遇之將敗績乃率勵其下益兵固守彥貞果大敗没於陣伏尸三十餘里亡戈甲三十萬周世宗自將攻城屯於城西北淝水之陽徵宋亳陳潁許秦徐宿州丁夫數十萬僃攻城雲梯洞屋下臨城中數道同時進攻塡塹陷壁晝夜不少休如是者累月每鼓角四發聲震牆壁皆動我援兵在外者見利輒進常陷伏中以故屢敗而終不悟仁贍雖知外援之敗意氣益壯覘世宗在城下據胡牀督攻城仁贍素善射自引弓射之箭去胡牀數歩輒墮世宗命進胡牀於箭墮處後箭復遠數歩而墮仁贍知之投弓於地曰若天果不佑唐耶吾有死於城下耳終不失節於是世宗遣中使來諭曰知卿忠義然士民何罪又親駕臨城招之皆不從自正月至四月不可下世宗還京師揚㤗滁和舒蘄諸州皆復為唐守渦口定遠周兵戍守者亦皆為我師襲破江左幾復振而壽州之圍獨不解元宗遣元帥齊王景達以兵數萬來援分重兵據紫金山列寨十餘處與城中傳烽相應築甬道抵城通餽餉六月仁贍出兵殺周兵數百焚攻城洞屋甚衆周將李重進等兵力頗屈仁贍因請乘世宗之歸以邊鎬守城自出決戰景達畏懦又方任陳覺固不許仁贍憤鬱得疾少子崇諫夜泛小舟渡淮謀紓家禍為軍校所執仁贍命腰斬之監軍使文徳殿使周廷搆哭於中門又求救於仁贍妻薛氏薛氏曰崇諫幼子固所不忍然貸其死則劉氏為不忠之門促命斬之然後成䘮聞者皆為出涕十五年二月世宗復親征屢戰皆克唐軍被俘馘者四萬人餘衆不能復整朱元朱仁裕孫璘皆降周仁贍聞之扼吭憤歎世宗知壽州且下心獨嘉仁贍之忠恐城破殺之乃下詔諭使自擇禍福三月甲辰又耀兵城北而仁贍已困篤不知人監軍周廷搆營田副使孫羽等為仁贍表請降戊申世宗次城北受之舁仁贍至幄前撫勞嘉歎拜天平軍節度使兼中書令命還城養疾辛亥晝晦雨黄沙如霧世宗在下蔡疑有變馳騎覘之乃仁贍卒年五十八州人皆哭偏裨及士卒自剄以狥者數十人世宗遣使弔祭追封彭城郡王録其子崇讃為懐州刺史賜莊宅各一區元宗聞仁贍死哭之慟贈太師中書令諡忠肅嘆曰仁贍有知其肻捨我而受周命耶是夕夢仁贍若拜謝庭中加封衛王後主立進封越王開寳中仁贍子崇諒為進奉使太祖嘉其忠臣之後特命為都官郎中仁贍至今廟食壽春不絶論曰政和中先君㑹稽公為淮西常平使者實請於朝列仁贍於典祀且名其廟曰忠顯後又嘗寓家壽春方世宗攻下壽州廢為壽春縣而徙壽州於下蔡故壽春父老喜言仁贍死時事言其夫人不食五日而卒今傳記所不載廟在邑中歳時奉祀甚盛乾道淳熙之間予遊蜀在成都見梓潼令金君所藏周世宗除仁贍天平軍節度使告身白紙書墨色印文皆如新金君言仁贍獨一裔孫賣藥新安市客死無後故得之其詞與王溥所修周世宗實録皆合若歐陽氏五代史所稱盡忠所事抗節無虧前代名臣幾人可比予之南伐得汝為多葢摘取制中語載之本不相聮屬又頗有潤色也以仁贍之忠天報之宜如何而其後於今遂絶天理之難知如此可悲也夫潘佑幽州人祖貴事劉仁恭為將守光殺之父處常脱身南奔事烈祖為散騎常侍佑生而狷潔閉門苦學不交人事文章議論見推流輩陳喬輩薦于元宗起家祕書省正字後主在東宫開崇文館以招賢佑預其間及嗣位遷虞部員外郎史館修撰議納后禮援據精博遷知制誥召草勸南漢書文不加㸃遷中書舍人後主以潘卿稱之酷喜老莊之言嘗作文曰莊周有言得者時也失者順也安時處順則哀樂不能入也僕佩斯言久矣夫得者如人之有生自一歳至百嵗自少得壯自壯得老嵗運之來不可郤也此所謂得之者時也失之者亦如一歳至百嵗暮則失早今則失昔壯則失少老則失壯行年之去不可留也此所謂失之者順也凡天下之事皆然也達者知我無奈物何物亦無奈我何也其視天下之事如奔車之歴蟻垤也値之非得也去之非失也燕之南越之北日月所生是為中國其間含齒戴髪食粟衣帛者是為人剛柔動植林林而無窮者是為物以聲相命是為名倍物相聚是為利彚首而芸芸是為事事往而記於心為喜為悲為怨為恩其名雖衆實一心之變也始則無物終復何有而於是强分彼我彼謂我為彼我亦謂彼為彼彼自謂為我我亦自謂為我終不知孰為彼耶孰為我耶而世方狥欲嗜利繫心於物局促若轅下駒安得如列禦冦莊周者焚天下之轅釋天下之駒浩浩乎復歸於無物歟此吾平昔所言也足下之行書以贈别開寶五年更官名改内史舍人初與張洎親厚及俱在西省所趨既異情好頓衰每歎曰堂堂乎張也難與並為仁矣時南唐日衰削用事者充位無所為佑憤切上疏極論時政歴詆大臣將相詞甚激訐後主雖數賜手札嘉歎終無所施用佑七疏不止且請歸田廬乃命佑專修國史悉罷他職而佑復上疏曰三軍可奪帥也匹夫不可奪志也臣乃者繼上表章凡數萬言詞竆理盡忠邪洞分陛下力蔽姦邪曲容諂偽遂使家國愔愔如日將暮古有桀紂孫皓者破國亡家自己而作尚為千古所笑今陛下取則姦囘敗亂國家不及桀紂孫皓遠矣臣終不能與姦臣雜處事亡國之主陛下必以臣為罪則請賜誅戮以謝中外詞既過切張洎從而擠之後主遂發怒以潘佑素與李平善意佑之狂直多平激之而平又以建白造民籍為所排乃先收平屬吏併使收佑佑聞命自剄年三十六徙其家饒州處士劉洞賦詩弔之國中人人傳誦為泣下及王師南征下詔數後主殺忠臣葢謂佑也子華仕宋至屯田員外郎以疾致仕景徳中眞宗皇帝憐佑之忠起華於家授故官論曰佑學老莊齊死生輕富貴故其上疏縱言詆訐若惟恐不得死者雖激於一時忠憤亦少過矣後主非强愎雄猜之君而陷之於殺諫臣使佑學聖人之道知事君之義豈至是哉不幸既死同時諸臣已黙黙為降虜矣猶醜正嫉言視之如仇誣以狂愚惑溺淫祀左道之罪至斥為人妖雖後之良史有不能盡察其說者於戲悲夫李平本姓名曰楊訥少為嵩山道士與汝陰布衣舒元共學數年業成同游蒲中客於節度使李守貞守貞叛漢使兩人懷表間行乞師於金陵元宗為出師數萬為之聲援甫出境而守貞叛兩人無所復命且唐遇之厚因留事唐而訥始自稱李平元亦易姓朱元宗皆以為尚書郎吳越侵常州欲以平為將固辭遷衛尉少卿周兵取蘄州不能有復棄而歸乃以平為刺史朱元叛元宗以平本與元同歸唐慮其不自安召還金陵使者失指械平以歸元宗大驚慰勉之拜建州節度使召為衛尉卿潘佑好老莊平少為道士習其説因相與遊平請復井田法造民籍復造牛籍課民種桑後主本好古務農甚悦其言使判司農寺平急於成功施設無漸人不以為便後主亦中悔罷之而佑歴詆一時公卿獨稱薦平請以判司會府羣議益不平會佑以直諫得罪因坐以與平淫祀鬼神事繫平大理獄縊死獄中嚴續字興宗馮翊人祖實仕故唐為江淮水陸轉運判官徙家廣陵父可求為吳武王謀臣及景王宣王嗣立又皆有功宣王建國可求為尚書左僕射同平章事太和二年卒續十餘嵗以父䕃補千牛僃身遷秘書郎尚烈祖女生長富貴而性恭謹歴兵部侍郎尚書左丞元宗即位進禮部尚書中書侍郎出牧池州復拜中書侍郎兼三司使又出為江州節度使數年復入知尚書省遂為門下侍郎同平章事初續之未出池州也宋齊丘專國公卿多附之惟續持正不為屈翰林學士常夢錫嘗指言齊丘過咎元宗語之曰大臣惟嚴續能自立然才短恐不能勝其黨卿宜助之夢錫退諭指於續續因與夢錫親厚然不能盡用其言也卒為黨人所排與夢錫俱補外及為相雖自以肺腑盡忠不貳然寡學識聽用多非其人不能稱職或作螃蟹賦以譏切之是時以軍興百司政事往往歸樞密院續言多不見用求罷拜鎭海軍節度使屬疾還都已革猶不亂與客言論如平時後主使内夫人問之歴陳羣臣邪正某當進某當退辭氣慷慨不及其私翼日卒年五十七諡曰懿初續以不學見輕同列遂力敎子弟諸子及孫舉進士者十餘人張易字簡能魏州元城人高祖萬福故唐金吾將軍後徙萊州掖縣易性豪舉尚氣少讀書於長白山又徙王屋及嵩山苦學自勵食無鹽酪者五嵗齊有髙士王達靈居海上博學精識少許可易從之遊數年入洛舉進士不中以昇元二年南歸授校書郎大理評事時方重赤縣拜上元令元宗立以水部員外郎通判歙州刺史朱匡業平居甚謹然醉則使酒陵人果於誅殺無敢犯者易至赴其宴先已飲醉就席酒甫一再行擲杯推案攘袂大呼詬責鋒起匡業尚醒愕然不敢對惟曰通判醉甚不可當也易巍峩喑嗚自若俄引去匡業使吏掖就馬自是見易加敬不敢復使酒郡事亦賴以濟太弟景遂初立髙選宫僚召為贊善大夫景遂召飲以玉杯行酒因與坐客傳玩至易忽大言曰殿下有重寶輕士之意何耶抵於柱礎碎之坐皆失色其他規正皆𩔖此景遂不為忤待易益厚遷刑部郎中判大理寺周人南侵時江淮久安人不知戰我師屢北上下震恐易獨揚言朝路曰國家被山帶海守奕世之業昔者夫差以無道之兵威陵齊晉孫權以草創之國勢遏曹劉今若上下併力敵何足畏哉元宗聞而異之召使宿直禁中議事然亦不能用也陳覺李徵古方用事朝野側目易一日朝退歎曰吾忝廷尉職誅邪孽當手斃二豎以謝曠官俄以吳越犯邊出為宣歙招諭使判宣州前刺史方築州城役徒數萬一切罷遣之曰自守者弱遠圖者强何以城為吳越聞之懾服不敢復犯後主封吳王召易為吳王司馬東宫建又為左庶子後主即位遷右諫議大夫復判大理寺尋乞解大理改勤政殿學士判御史臺采武徳至寶歴君臣問對及臣下論奏骨鯁者七十事為七卷曰諫奏集上之註太𤣥未成卒年六十一龔慎儀後主時為給事中開寳三年高祖欲封南漢未決詔後主諭劉鋹令奉正朔後主乃遣慎儀持書使南漢書曰僕與足下叨累世之盟雖疆畿阻闊休戚實同敢奉尺書敬布腹心昨大朝伐楚足下疆吏弗靖遂成釁隙初為足下危之今敝邑使臣入貢皇帝幸以此宣示曰彼若能幡然改圖單車之使造廷則百萬之師不復出矣不然將有不得已者僕料大朝之心非貪土地也怒人不賔而已且古之用武不計强弱小大而必戰者有四父母宗廟之讐一也彼此烏合民無定心二也敵人進不捨我退無守路戰亦亡退亦亡三也彼有敗亡之勢我乘進取之機四也今足下與大朝無是四者而坐受天下之兵决一旦之命有國家利社稷者固如是乎夫彊則南面而王弱則玉帛事大屈伸在我何常之有違天不祥好戰危事天方相楚尚未可爭而況今日之事耶地莫險於劒閣而蜀亡矣兵莫强於上黨而李筠失守矣竊意足下國中必有矜智好謀之臣獻尊主强國之策以謂五嶺之險非可遽前堅壁清野絶其饟道依山阻水射以强弩彼雖百萬之兵安能成功不幸而敗則輕舟浮海猶足自全豈能以萬乘之主而屈於人哉此說士之常談可言而不可用異時王師南伐水陸並舉百道俱進豈暇俱絶其饟道盡保其壁壘或用吳越舟師自泉州航海不數日至足下國都矣人情恟恟則舟中皆為敵國忠義效死之士未易可見雖有巨海孰與足下俱行乎敢布腹心惟與大臣熟計之史館修撰潘佑之辭也鋹得書怒囚愼儀不遣後主表聞太祖遂决興師南漢平乃得歸後主之亡也慎儀為徽州刺史㑹昭武留後盧絳聞國破提兵自宣州欲入福建過歙慎儀閉城拒守絳怒曰愼儀吾故人何為見拒遣裨將馬雄攻之慎儀朝服而出為雄所害
