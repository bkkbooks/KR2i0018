seq: 4
front:
  text: 第四徐玠字藴圭彭城人事帥崔洪為軍吏洪避朱全忠南奔遣玠先見呉武王因得事呉累居右職師出江西為糧料使江西平授吉州刺史玠初為小校以幹敏稱及治郡貪猥不治烈祖輔政罷之而義祖悦其善事人引以為副使遂見親狎玠挾宿怨且希義祖意每與嚴可求言烈祖疎財結士不宜乆執國權請以嫡子知詢代之事垂行而義祖殂知詢繼立玠本詭譎多智善揣摩非能為徐氏計也至是察知詢必敗反持其長短自結於烈祖烈祖亦遂愛之盡忘前事鎮金陵以為行軍司馬與周宗李建勲孫忌等㕘代呉秘計遂以佐命拜右丞相出為宣州節度使徙洪州兼中書令復召為司徒右丞相然徒崇以名位不復預政老而益貪鄙所至人患苦之好神仙之説嘗以下價市丹砂惡者治丹人以為笑保大元年五月卒年七十六贈髙平郡王髙審思失其家世鄉里少以驍勇事呉武王從劉信平䖍州有功為人重厚沉黙烈祖愛之用為神武統軍出鎮夀州兼侍中在鎮治守備常如有警或曰以公威略守堅城何太懼邪審思曰事變無常不可不過為之備及保大末周人來侵諸郡往往一鼔而下惟夀州能堅守以世宗英武將士皆精練然逾年極兵力不可取雖劉仁贍善守亦審思之遺績也卒於鎮年七十五廢朝三日贈太師謚曰忠初術者悉言審思位不至刺史嘗受命刺常州固辭不敢行而其後位兼將相終始富貴術之不足信有如此鍾謨字仲益㑹稽人徙建安李徳明失其家世鄉里保大中俱為尚書郎敏於占對元宗愛之而天資皆浮躁沾沾自􅃷反覆嶮巇朝士側目號為鍾李時魏岑已斥復用姦諛彌甚謨徳明雖與岑若不同至為惡則合若符劵戸部員外郎范沖敏擿使軍帥王建封上書厯詆之請選用正人元宗大怒謂建封武人握兵不當輙議國政流建封池州未至殺之沖敏棄市謨徳明自謂君寵可怙愈縱肆旁若無人徳明嘗奏事别殿取元宗所御筆記事元宗不能堪曰卿它日自可持筆來徳明亦自若謨遷翰林學士戸部侍郎徳明遷工部侍郎文理院學士元宗雅稱兩人有詞辨欲令説周罷兵遣如夀州城下貢御服及犒軍牛酒世宗前知其欲以口舌游説大陳兵衛戈㦸以見之謂曰江南自謂唐室苗裔衣冠禮樂異於它國與朕隔一水未嘗遣使修好惟航海通北虜此何禮也今又比朕六國愚主謂可説使罷兵何其不知朕也歸語若主必臣事我則兵可罷不然徑往金陵借府庫犒軍若君臣得無悔乎兩人股栗不敢出言惟曰寡君震畏天威願獻夀濠泗楚光海六州及歲輸方物世宗以淮南諸州繼陷欲盡取江北地不許徳明見周師急攻夀州度旦暮且下乃曰寡君未能知大國兵力乃爾願寛臣數日之誅歸國取表盡獻江北郡縣世宗遣徳明歸以書諭江南君臣語多誚讓陵肆國人已不堪而徳明方盛稱世宗威徳請必割地元宗惡其言宋齊丘力詆割地為亡益陳覺言徳明賣國以悦敵不可赦徳明佻薄語多過實知割地之説不行攘袂大言謂周師必克元宗益怒遂斬徳明於都市不復議割地謨因留不得歸及孫忌之死也謨亦在召中得不死貶為耀州司馬及元宗割地稱臣如謨徳明初議世宗乃召謨至京師授衛尉卿賜黄金五百兩遣諭指於元宗往復數四謨既矜肆以為世宗聽其言江左可藉以無恐元宗亦方賴其力心雖憾之體貌皆厚以為禮部侍郎判尚書省而三省之事靡不預之勢焰赫然宋齊丘陳覺李徵古之死皆出其計又白請雪徳明之罪贈光禄卿謚曰忠太子𢎞冀㕘總庶政謨薦其客閻式為司議郎百司闗啓必由之俄而世宗崩謨自揆無所恃頗若有失元宗遇之亦寖薄初李徳明被誅唐鎬預其事至是鎬懼修怨不自安㑹鎬以納賄聞謨面詰其狀鎬愈懼信州刺史張巒入為天威軍都虞候謨素與之善每屏人共語或至中夜又嘗請使巒帥帳下兵巡都城鎬亷得之因密言謨往來兩國挾周人以脅制朝廷今與典兵者交結又請令巡徼輦下其包藏殆不可測謨㣲聞之念無以為奇貨㑹𢎞冀卒後主以母弟當立而謨嘗與元宗愛子從善同使周相與親厚乃言後主器輕志放無人君之度因盛稱從善才不知元宗建儲之意已决更以此忤㫖乃暴其交結張巒等罪貶國子司業又貶著作佐郎安置饒州遣中使領侍衛軍十人即日督促乗驛而去謨時方病風眩在途賦詩十章語皆悽愴巒出為宣州副使建隆元年正月元宗聞太祖受周禪乃遣使如饒州賜謨死問曰卿昔與孫忌使周忌死而卿獨生還何也謨頓首伏罪遂縊殺之巒亦坐誅謨有女感家禍不嫁為道士名守一博通孔老書尤善講説端拱中京師建洞真宫召守一為道職云常夢錫字孟圖扶風人或曰京兆萬年人也岐王李茂貞不貴文士故其俗以狗馬馳射博奕為豪夢錫少獨好學善屬文累為秦隴諸州從事茂貞死子從儼襲父位承制補寳雞令後唐長興初從儼入朝以夢錫從及鎮汴為左右所譖遂來奔烈祖輔呉召置門下薦為大理司直及受禪擢殿中侍御史禮部員外郎益見奬遇遂直中書省㕘掌詔命進給事中時以樞密院𨽻東省故機事多委焉夢錫重厚方雅多識故事數言朝廷因楊氏霸國之舊尚法律任俗吏人主親决細事煩碎失大體宜修復舊典以示後代烈祖納其言頗議簡易之法元宗在東宫有過失夢錫盡言規正無所撓始雖不悦終以諒直多之及即位首召見慰勉欲用為翰林學士以自近宋齊丘黨惡其不附已坐封駁制書貶池州判官及齊丘出鎮召為戸部郎中遷諫議大夫卒以為翰林學士復置宣政院於内庭以夢錫専掌密命而魏岑已為樞密副使善迎合外結馮延已等相為表裏夢錫終日論諍不能勝罷宣政院猶為學士如故乃稱疾縱酒希復朝㑹鍾謨李徳明分掌兵吏諸曹以夢錫人望言於元宗求為長吏拜戸部尚書知省事夢錫恥為小人所推薦固辭不得請惟署牘尾無所可否延已卒文致其閨門罪貶饒州團練副使夢錫時以醉得疾元宗憐之留處東都留守周宗力勸夢錫止酒治疾從之乃少瘳召為衛尉卿改吏部侍郎復為學士交泰元年方與客坐談忽奄然卒年六十一卒後財逾月齊丘黨與敗元宗嘆曰夢錫平生欲去齊丘恨不使見之贈右僕射謚曰康夢錫文章典雅有承平之風歌詩亦清麗然絶不喜𫝊於人剛褊少恕每以直言忤物嘗與元宗苦論齊丘輩元宗辯博曲為解釋夢錫詞窮乃頓首曰大姦似忠陛下若終不覺悟家國將為墟矣元宗不答而心善之及割地降號之後公卿在坐有言及周以為大朝者夢錫大笑曰汝輩嘗言致君堯舜何故今日自為小朝邪衆皆黙然散去每公卿㑹集輒喑嗚大咤驚其坐人以故不為時所親附然既沒皆以正人許之雖其仇讐不敢訾也史虚白字畏名世家齊魯虚白隠居嵩少著書中原喪亂與北海韓熈載來歸時烈祖輔呉方任用宋齊丘虚白誦言曰吾可代彼齊丘不平欲窮其技能召與宴飲設倡樂奕碁博戲酒數行使製書檄詩賦碑頌虚白方半醉命數人執紙口占筆不停綴俄而衆篇悉就詞采磊落坐客驚服虚白數為烈祖言中原方横流獨江淮豐阜兵食俱足當長驅以定大業毋失事機為他日悔烈祖不能從虚白乃謝病去南遊至九江落星灣因家焉常乗雙犢版轅掛酒壺車上山童總角負一琴一酒瓢以從往來廬山絶意世事保大初熈載為史館修撰薦虚白可用元宗召見訪以國事對曰草野之人漁釣而已安知國家大計賜宴便殿醉溺於殿陛元宗曰真隠者也賜田五頃放還山及元宗南遷豫章次蠡澤虚白鶴裘藜杖迎謁道旁元宗駐蹕勞問曰處士居山亦嘗有所賦乎曰近得谿居詩一聮使誦之曰風雨掲却屋渾家醉不知元宗變色厚賜粟帛上樽酒徐鉉髙越謂之曰先生髙不可屈肯使二子仕乎虚白曰野人有子賢則立功業以道事明主愚則負薪捕麋以養其母僕未嘗介意也不敢以累公鉉越媿歎卒年六十八將終謂其子曰官賜吾美酒飲之略盡尚留一榼吾死置藜杖及此酒於棺中四時勿用祭享無益死者吾亦不歆子皆從之孫温天聖中仕為虞部員外郎獻虚白文集仁宗皇帝愛之追號虚白沖靖先生沈彬洪州髙安人唐末浪迹湖湘隱雲陽山好神仙喜賦詩句法清美烈祖輔呉表授祕書郎與元宗遊俄懇求還山以吏部郎中致仕元宗遷南都彬年八十餘來見曰臣乆處山林不預世事臣妻曰君主人郎君今為天子何不一往臣遂忘衰老而來元宗命毋拜厚賜粟帛以其子為祕書省正字彬先嵗嘗䇿杖郊原手植一樹識之語其子曰吾當藏骨於此及卒伐樹掘地至丈餘得一石槨製作精麗光潔可鑑蓋上有篆云開成二年夀槨舉棺就之廣袤中度次子廷瑞有道術嗜酒却粒寒暑一單褐數十年不易跣行日數百里林棲路宿多在玉笥浮雲二山老而不衰後不知所終陳况閩人性夷澹隱於廬山四十年衣食乏絶不以動心苦思於詩得句未成章已播逺近元宗聞其名召見時方祁寒元宗見其衣單薄降手札曰欲以綾綺衣賜卿卿必不受今賜朕自服紬縑衣三十事俄授江州士曹掾固辭歸卒於山中年七十餘陳曙蜀人嘗舉進士唐末避地淮南多遯於蘄州山中鄉人有㑹集或祭神曙不待召而至醉飽乃辭去由是人多設虚座陳酒肴以俟之同日或至數家舍中惟一榻素書數卷與蛇虎雜居不設牕戸雨雪滿室亦自若人有乗其出往闚之者曙必自外來凡數十年顔鬢不少異元宗命中書舍人髙越召之不肯起後徙居鄂渚及洪之西山不知所終陳陶嶺南人少學長安昇元中南奔將求見烈祖自度不合乃隠洪州西山歎曰世豈無麟鳳國家自遺之耳保大末有星孛於參芒指東南陶語人曰國其幾亡乎果失淮南元宗南遷豫章至落星灣將訪以天象恐陶不肯盡言以其素嗜鮓乃使人偽言賣鮓至門陶果出啗鮓喜甚賣鮓者曰官舟至落星矣處士知之乎陶笑曰星落不還元宗聞之不懌遂不復問是歲果晏駕西山産靈藥陶與妻日斸而餌之不知所終開寳中南昌市有一老翁了結被褐與老嫗賣藥得錢則沽酒市鮓相對飲啗既醉歌舞道上其歌曰藍采和藍采和塵世紛紛事更多何如賣藥沽美酒歸去青崖拍手歌或疑為陶夫婦云江夢孫字聿修潯陽人烈祖輔呉表為祕書郎夢孫數自言迂儒無裨益平生讀書欲小試於治民求為縣令方是時士之客於烈祖者率以功名富貴自許而夢孫言獨如此烈祖以為不情不之許也求不已乃補天長令烈祖先持告身示之曰今日受此明日趨走庭下矣曰此素志矣庸何傷乃授之至天長吏白縣署正寢有淫厲不可居夢孫不從是夕果有怪並出夢孫起焚香曰夢孫受命為令常治事於此鬼神有祠廟丘壟胡不各歸其所吾行不欺暗室奚畏君等語訖皆斂迹夢孫治縣寛簡吏民安之逾年棄官去縣人號泣送之數十里還家事繼母盡孝早暮潔衣冠視膳羞母食既徹為諸生講禮凡至疑義輒斂衽曰此科先儒猶多異同夢孫安敢輕言諸君自擇所長可也保大中卒年八十五贈國子司業毛炳洪州豐城人隠居廬山時為諸生講得錢即沽酒嘗醉卧道旁有里正掖起之炳瞋目呵之曰醉者自醉醒者自醒亟去毋撓予睡後徙居南臺山數年忽書齋壁曰先生不住此千載惟空山因大醉一夕卒與炳同時又有酒秃者焉酒秃姓髙氏騈族子棄家祝髪博極羣書善講説而脱略跌宕無日不醉後主召講華嚴梵行一品賚金帛甚厚𤣥寂即日盡送酒家日夜劇飲醉則從小兒數十浩歌道中歌曰酒秃酒秃何榮何辱但見衣冠成古丘不見江河變陵谷一日醉死石子岡
