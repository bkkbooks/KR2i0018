body:
  text: 南唐書卷二宋陸游撰元宗本紀第二元宗明道崇徳文宣孝皇帝名璟字伯玉烈祖長子母曰宋皇后初名景通風度髙秀幼工屬文起家駕部郎中累進諸衛大將軍烈祖為齊王立為王太子固讓昇元初烈祖受禪封呉王徙齊王四年八月立為皇太子復固讓曰前世以嫡庶不明故早建元良示之定分如臣兄弟友愛尚何待此烈祖為下詔稱其守亷退之風師忠貞之節有子如此予復何憂赦殊死以下臣民奉牋齊王如太子禮七年二月烈祖病疽祕之人皆莫知庚午疾亟太醫呉廷紹密遣人告帝帝馳入宫侍疾於東閤是夕烈祖崩秘不發喪而下詔命帝監國大赦頒賚有差丙子始宣遺詔保大元年春三月已夘朔烈祖殂已旬日帝猶未嗣位方泣讓諸弟奉化節度使周宗手取衮冕衣帝曰大行付陛下神器之重豈得固守小節是日即皇帝位大赦改元不待逾年遽改元識者非之百官進位二等將士皆有賜蠲民逋負租稅賜鰥寡孤獨粟帛尊皇后為皇太后立妃鍾氏為皇后以鎮南軍節度使宋齊丘為太保兼中書令奉化軍節度使周宗為侍中徙封夀王景遂為燕王宣城王景達為鄂王閩使來弔祭升濠州為定逺軍秋七月徙燕王景遂為齊王鄂王景達為燕王仍以景遂為諸道兵馬元帥居東宫景達為副元帥仍詔中外以兄弟𫝊國之意八月乙夘立弟景逷為保寧王冬十月庚戌有星孛於東方嶺南妖賊張遇賢犯䖍州詔遣洪州營屯都虞候嚴恩帥師討之以通事舍人邊鎬監其軍其後擒遇賢及其黨黄伯雄曹景全斬於金陵市十二月以太保中書令宋齊丘為鎮海軍節度使保大二年春正月侍中周宗罷為鎮南軍節度使左僕射兼門下侍郎平章事張居詠罷為鎮海軍節度使辛已詔齊王景遂總庶政惟樞密副使魏岑查文徽得奏事餘非召對不得見初烈祖尤愛景遂帝奉先志欲傳以位故有是詔宋齊丘蕭儼皆上書切諌未見聽侍衛都虞候賈崇叩閤請見曰臣事先帝三十年孜孜詢察下情猶患壅隔陛下始即位所委何人而頓與臣下疎絶如此因嗚咽流涕帝感悟命坐賜食遂收所下詔夏五月閩將朱文進弑其君曦自稱閩王遣使來告帝囚其使將討之議者謂閩亂由王延政當先討乃釋閩使遣還秋九月庚午朔日有食之冬十二月樞密院使查文徽請討王延政詔以文徽為江西安撫使往覘建州文徽固請乃以邊鎬為行營招討共攻延政敗績于蓋竹保大三年春二月以何敬洙為福建道行營招討祖全恩為應援使姚鳳為諸軍都監㑹查文徽進討秋七月星見而風雨八月甲子朔日有食之克建州執王延政歸於金陵拜羽林大將軍升建州為永安軍冬十月皇太后宋氏殂是歲升建州延平津為劒州以建州之劒浦汀州之沙縣𨽻焉保大四年春正月以青陽公宋齊丘為太傅兼中書令昭武軍節度使李建勲為右僕射兼門下侍郎及中書侍郎馮延已皆平章事夏五月以樞密使陳覺為福建宣諭使使諭李宏義入朝不克覺擅發汀建撫信州兵趨福州帝遂命王崇文魏岑馮延魯㑹攻福州秋九月淮南蟲食稼除民田稅冬十月庚辰圍福州改漳州為南州保大五年春正月立齊王景遂為皇大弟徙燕王景達為齊王拜諸道兵馬元帥徙南昌王𢎞冀為燕王副元帥晉密州刺史皇甫暉棣州刺史王建來歸契丹耶律徳光以滅晉來告捷且請㑹盟於境上帝不從遣工部郎中張易聘之請命使者如長安脩奉諸陵契丹亦不從三月己亥呉越救福州兵自海道至我師與之戰敗績諸營皆潰夏四月壬申詔即軍中斬陳覺馮延魯餘將帥皆赦不問已而復詔械覺延魯還都既至貸死覺流蘄州延魯流舒州五月帝聞契丹棄中原遁歸詔曰乃眷中原我之故地以李金全為北面行營招討使六月聞漢入汴兵遂不出而金全猶不罷秋閏七月丁丑夜有彗出東方近濁其尾迹近側掃少微及長垣至八月壬辰乃沒八月太傅兼中書令宋齊丘罷為鎮南軍節度使保大六年夏六月庚寅朔日有食之九月漢䕶國軍節度使李守貞間道表求援師以鎮海軍節度使李金全為北面行營招討使救河中師次沂州冬十一月退保海州保大七年春正月淮北盜起以神衛都虞候皇甫暉將軍張巒蕭處贇監軍散騎常侍張義方帥師萬人出海泗招降納亳州䝉城鎮將咸師朗等以歸夏六月癸酉朔日有食之冬十月我師度淮攻正陽敗績十二月泉州刺史劉從効兄南州刺史從願殺刺史董思安據南州自稱刺史我不能問因升泉州為清源軍以從効為節度使保大八年春正月李金全始罷北面行營招討使二月福州遣諜者詣建州留後查文徽告呉越戍卒亂殺李𢎞義棄城去文徽信其言襲福州大敗被執而别將建州刺史陳誨以戰櫂敗福州兵執其將馬先進俘於金陵秋七月歸馬先進於呉越而求查文徽八月尚書郎周濬等三人奔漢九月楚朗州節度使馬希蕚表請師詔加同平章事賜以鄂州今年租稅命楚州團練使何敬洙帥師援之冬十月呉越歸查文徽十一月甲子朔日有食之十二月馬希蕚攻陷潭州弑其君馬希廣楚將李彦温劉彦瑫各以千人來歸保大九年春二月楚王希蕚使掌書記劉光翰來貢方物三月壬戌朔以右僕射孫晟客省使姚鳳為楚王䇿禮使又以洪州營屯都虞候邊鎬為湖南安撫使便宜進封淮南饑夏五月辛未有星大如五升器自西南流墜西北光燭地聲如雷六月楚静江軍指揮使王達執朗州節度使馬光恵歸於金陵推辰州刺史劉言為朗州留後來請命秋九月楚將徐威等廢其君希蕚命邊鎬出萍鄉以討楚亂冬十月壬寅武安留後馬希崇請降鎬入潭州癸丑武昌節度使劉仁贍帥舟師取岳州湖南遂平南漢來攻陷郴州周兗州節度使慕容彦超來乞援師從之保大十年春正月陞洪州髙安縣為筠州以清江萬載上髙三縣𨽻焉援兖州之師敗績於沭陽周人執我指揮使燕敬權二月周人歸敬權使來言曰吾賊臣背叛爾國助之豈長計哉且使潁州郭瓊遺我夀州劉彦貞書曰自古有國皆惡叛臣貴邦何為常事招誘呉中多士無乃淺圖帝頗愧其言以翰林學士江文蔚知禮部貢舉放進士王克貞等三人及第旋復停貢舉三月以太弟太保馮延已為左僕射前鎮海節度使徐景運為中書侍郎及右僕射孫忌並同平章事帝以南漢乘楚亂據桂宜等州將取之以知全州張巒兼桂州招討使夏四月丙戌朔日有食之命統軍侯訓帥五千人㑹張巒攻桂州敗績於城下訓死之巒收餘衆保全州周興順指揮使白進福以族來歸秋九月召朗州劉言入朝冬十月劉言將王逵周行逢攻潭州壬辰㧞益陽寨戍將李建期死之丙申潭州節度使邊鎬棄城遁辛丑劉言將蒲公益攻岳州刺史宋徳權監軍任鎬棄城遯十一月劉言盡據故楚地詔流邊鎬於饒州斬宋徳權任鎬於太社斬裨將申洪泰尹建於都門外平章事馮延已孫忌皆罷為左右僕射十二月雩都令趙暹奔周洪州大都督楚王馬希蕚來朝留不遣是歲大旱保大十一年春三月以左僕射馮延已同平章事金陵火逾月焚官寺民廬數千間復設貢舉夏六月不雨井泉竭涸淮流可渉旱蝗民饑流入周境冬十月築楚州白水塘以溉屯田遂詔州縣陂塘湮廢者皆脩復之於是力役暴興楚州常州為甚帝使親吏車延規董其役發洪饒吉筠州民牛以往吏緣為姦强奪民田為屯田江淮騷然百姓以數丈竹去節焚香於中仰天訴寃者不可勝數知制詔徐鉉因奏事白之帝曰吾國兵數十萬安肯不食捍邊事有大利則舉國排之奈何鉉又力陳其弊帝乃遣鉉行視利害鉉至楚州悉取所奪田還民詰責車延規欲榜之百姓感恱而帝左右交譖以為擅作威福帝大怒趣歸將沉之江中既至怒少解流舒州而白水塘等役亦賴以止保大十二年春正月有大星霣於西北聲如雷二月命吏部侍郎朱鞏知禮部貢舉自十一年六月至於今年三月大饑疫命州縣鬻粥食餓者秋七月契丹使其舅來聘夜宴清風驛盜斬契丹使亡去捕之不得或以為周人也自是契丹遂不至保大十三年春二月以中書侍郎知尚書省嚴續為門下侍郎平章事夏六月周攻秦鳳蜀使閒使來告難周下詔罪狀我遣將李穀王彦超韓令坤等侵我淮南攻自夀州帝乃以神武統軍劉彦貞為北面行營都部署帥師三萬赴夀州奉化節度使同平章事皇甫暉為北面行營應援使常州團練使姚鳳為應援都監帥師三萬屯定逺縣召鎮南節度使宋齊丘入朝謀難冬十二月以安定郡公從嘉為沿江巡撫使是歲天裂東北其長二十丈保大十四年春正月壬寅周帝親征劉彦貞與周師戰於正陽敗績彦貞戰死二月周師兼道襲清流闗皇甫暉敗保滁州周師破城俘暉及姚鳳以歸壬戌有星孛于參芒東南指帝遣泗州牙將王承朗奉書至徐州求成於周稱唐皇帝奉書於大周皇帝願以兄事歲獻方物太弟景遂亦移書周將帥皆不報己夘遣翰林學士鍾謨文理院學士李徳明使周奉表至下蔡行在貢金器千兩銀器五千兩錦綺紋帛二千疋及御衣犀帶茶藥又奉牛五百頭酒二千石犒軍請罷兵乙酉周師陷東都執副留守馮延魯丁亥左神衛使徐象等十八人自夀州奔周天長制置使耿謙以城降於周遣園苑使尹廷範䕶遷讓皇之族於潤州廷範殺其男子六十人誅廷範以謝國人周師陷泰州刺史方訥棄城遯帝遣間使求援於契丹至淮北為周人所執呉越侵常州宣州静海制置使姚彦洪奔呉越三月遣司空孫晟及禮部尚書王崇質使周削去帝號奉表請為外臣猶不許光州兵馬都監張延翰以城降於周刺史張紹遯還丁酉周師陷舒州刺史周𢎞祚赴水死蘄州將李福殺知州王承雋降於周戊戌天成軍使蔡暉自夀州奔周周師陷和州詔斬李徳明於都市坐奉使請割地也呉越陷常州之郛執團練使趙仁澤燕王𢎞冀遣龍武都虞侯柴克宏救常州壬子大敗呉越兵於常州斬獲萬計俘其將數十至潤州𢎞冀悉斬之壬戌夀州軍校陳延貞等十三人奔周是月命諸道兵馬元帥齊王景達拒周夏四月復泰州五月周帝北還秋七月復東都舒蘄光和滁州惟夀州之圍愈急冬十月周人害我行人孫晟從者二百人皆死獨貸鍾謨以為耀州司馬是歲詔省淮南屯田之害民者保大十五年春二月乙亥周帝親征齊王景達自濠州遣邊鎬許文稹朱元帥兵數萬援夀州景達用監軍使陳覺言謀奪朱元兵以楊守忠代之元遂舉寨降周裨將時厚卿獨不從見殺壬辰周師盡破我諸寨執邊鎬許文稹楊守忠餘衆悉奔潰景達亦遯歸金陵是役也所喪四萬人三月誅朱元妻子丁未夀州劉仁贍病革副使孫羽等代仁贍署表降於周辛亥晝晦雨沙如霧夏四月周帝北還冬十一月周帝復親征十二月濠州刺史郭廷謂泗州刺史范再遇皆舉城降帝知東都必不守遣使焚其官私廬舍徙其民於江南周師入揚州丁丑周師攻陷泰州都城大火一日數發交泰元年春正月改元中興丙戌周師陷海州壬辰周師陷靜海軍丁未陷楚州防禦使張彦卿兵馬都監鄭昭業死之周師屠其城焚廬舍殆盡周師次雄州刺史易文贇舉城降州天長縣也三月大赦改元交泰以皇太弟景遂為天䇿上將軍晉王立燕王𢎞冀為皇太子參治朝政丁亥周帝次揚州辛夘遂至迎鑾鎮壬辰耀兵江口帝懼周師南渡遣樞密使陳覺奉表貢方物請𫝊位太子𢎞冀以國為附庸周帝始采唐報囬紇可汗故事答帝璽書稱皇帝致書敬問江南國主帝遣閤門承㫖劉承遇上表稱唐國主盡獻江北郡縣之未陷者鄂州漢陽􅆜川二縣在江北亦獻焉歲輸土貢數十萬乞海陵鹽監南屬不許後歲給贍軍鹽三十萬石庚子周帝賜書許帝奉正朔罷兵而不許傳位太子甲辰遣平章事馮延已等使周犒軍及買宴夏五月下令去帝號稱國主去交泰年號稱顯徳五年置進奏邸於汴都凡帝者儀制皆從貶損改名景以避周信祖諱告於太廟告廟之日金陵大霧通夕不解左僕射平章事馮延已罷為太子太傅門下侍郎平章事嚴續罷為太子少傅己酉周帝遣太府卿馮延魯衛尉少卿鍾謨賜國主御衣金玉帶錦帛羊馬及犒軍帛十萬凡士卒俘於周者皆遣還凡五千七百五十人冬十月甲午周帝歸我臣馮延魯許文稹邊鎬周廷構國主皆不復用十一月己亥暴宋齊丘陳覺李徴古罪放齊丘歸九華山覺安置饒州徵古削官爵覺徵古尋皆賜自盡齊丘明年正月亦幽死顯徳六年秋七月鑄大錢文曰永通泉貨一當十與舊錢並行又鑄唐國通寶錢一當開通錢之二九月丙午太子𢎞冀卒冬十一月建洪州為南都南昌府建隆元年春正月遣何莅誅鍾謨於饒州誅張巒於宣州大宋太祖皇帝受周禪放江南降將三十四人來歸二月始鑄鐡錢三月遣使朝賀於京師秋七月遣禮部郎中龔慎儀朝於京師貢椉輿服御自是貢獻尤數歲費以萬計冬十月宋揚州節度使李重進叛來求援不許十一月丁未太祖平李重進國主遣右僕射嚴續犒軍蔣國公從鎰戸部侍郎馮延魯朝貢建隆二年春二月國主遷於南都立呉王從嘉為太子留金陵監國國主舟行旌麾仗衛六軍百司凡千餘里不絶所過勞問髙年疾苦大宴於當塗至宋家洑暴風飄國主舟幾至北岸翼日從官皆椉輕舟奔問三月國主至南都太祖以國主遷都遣通事舍人王守貞來勞問南都迫隘羣下皆思歸國主亦悔遷北望金陵鬱鬱不樂澄心堂承㫖秦承裕常引屏風障之復議東遷未及行國主寢疾不復進膳惟啜蔗漿嗅藕華六月己未疾革親書遺令留葬西山累土數尺為墳且曰違吾言非忠臣孝子夕有大星霣於南都庚申殂於長春殿年四十六後主不忍從遺令迎喪還秋八月至金陵丁未殯於宫中萬夀殿告哀於京師且請追復帝號太祖許之三年正月戊寅葬順陵元宗多才藝好讀書便騎善射在位幾二十年慈仁恭儉禮賢睦族愛民字孤裕然有人君之度少喜栖隱築館於廬山瀑布前蓋將終焉迫於紹襲而止然自以唐室苗裔訹於斥大境土之説及福州湖南再喪師知攻取之難始議弭兵務農或曰願陛下十數年勿復用兵元宗曰兵可終身不用何十數年之有㑹周師大舉寄任多非其人折北不支至於蹙國降號憂悔而殂悲夫論曰元宗舉閩楚之師境内虚耗及契丹滅晉中原有隙可椉而南唐兵力國用既已弗支熟視而不能出世以為恨予謂不然唐有江淮比同時割據諸國地大力强人材衆多且據長江之險隱然大邦也若用得其人椉閩楚昏亂一舉而平之然後東取呉越南下五嶺成南北之勢中原雖欲睥睨豈易動哉不幸諸將失律貪功輕舉大事弗成國勢遂弱非始謀之失所以行之者非也且陳覺馮延魯輩用師閩楚猶喪敗若此若北鄉而爭天下與秦晉趙魏之師戰於中原角一旦勝負其禍可勝言哉故予具論其實如此後之覽者得以考觀焉南唐書卷二欽定四庫全書南唐書卷三宋陸游撰後主本紀第三後主名煜字重光元宗第六子初名從嘉母曰光穆皇后鍾氏從嘉廣顙豐頰騈齒一目重瞳子文獻太子惡其有奇表從嘉避旤惟覃思經籍厯封安定郡公鄭王文獻太子卒徙呉王以尚書令知政事居東宫建隆二年遂立為太子元宗南巡太子留金陵監國以嚴續殷崇義輔之張洎主牋奏六月元宗殂太子嗣立於金陵更名煜居喪哀毁幾不勝赦境内尊鍾后曰聖尊后以后父名太章也立妃周氏為國后徙信王景逷為江王鄧王從善為韓王立弟從鎰為鄧王從謙為宜春王從信為文陽郡公從度為昭平郡公從度景遷子也令諸司四品至九品無職事者日二員待制於内殿以右僕射嚴續為司空平章事餘進位有差遣中書侍郎馮延魯於京師奉表陳襲位太祖賜詔答之自是始降詔秋九月太祖遣鞍轡庫使梁義來弔祭冬十月太祖遣樞密承㫖王文來賀襲位初元宗雖臣於周惟去帝號他猶用王者禮至是國主始易紫袍見使者使退如初服十二月置龍翔軍以教水戰建隆三年春三月遣馮延魯入貢京師泉州節度使中書令晉江王劉從効卒子紹鎡自稱留後四月泉州將陳洪進執紹鎡歸金陵推副使張漢思為留後六月遣客省使翟如璧入貢京師太祖放降卒千人南還冬十一月遣水部郎中顧彞入貢京師乾徳元年春正月太祖遣使來賜羊馬槖駞三月太祖出師平荆湖國主遣使犒軍夏四月泉州副使陳洪進廢張漢思自稱權知軍府來告國主即以洪進為節度使秋七月太祖詔國主遣還顯徳以來中朝將士在江南者及令揚州民遷江南者還其故土十二月國主表乞罷詔書不名之禮不從乾徳二年春三月行鐵錢每十錢以鐵錢六權銅錢四而行其後銅錢遂廢民間止用鐵錢末年銅錢一直鐵錢十比國亡諸郡所積銅錢六十七萬緡命吏部侍郎脩國史韓熈載知貢舉放進士王崇古等九人國主命中書舍人徐鉉覆試舒雅等五人雅等不就國主乃自命詩賦題以中書官蒞其事五人皆見黜秋八月太祖於江北置折博務禁商旅過江九月立子仲㝢為清源郡公仲宣宣城郡公十月甲辰仲㝢卒國后周氏已寢疾哀傷増革遂亦卒十一月太祖遣作坊副使魏丕來弔祭乾徳三年夏五月司空平章事嚴續罷為鎮海軍節度使秋九月雨沙聖尊后鍾氏殂冬十月太祖遣染院使李光圖來弔祭乾徳四年秋八月國主遣龔慎儀持書使南漢約與俱事中朝九月慎儀至番禺被執乾徳五年春命兩省侍郎諫議給事中中書舍人集賢勤政殿學士更直光政嚴召對咨訪率至夜分開寶元年春三月戊申以樞密使右僕射殷崇義為左僕射同平章事境内旱太祖賜米麥十萬石冬十一月立國后周氏開寶二年三月以游簡言為左僕射兼門下侍郎同平章事夏五月簡言卒是歲右僕射同平章亊殷崇義罷為潤州節度使同平章亊開寶三年夏太白晝見二日相觸開寶四年冬十月國主聞太祖滅南漢屯兵於漢陽大懼遣太尉中書令鄭王從善朝貢稱江南國主請罷詔書不名從之有商人來告中朝造戰艦數千艘在荆南請密往焚之國主懼不敢從開寶五年春二月國主下令貶損儀制改詔為教中書門下省為左右内史府尚書省為司㑹府御史臺為司憲府翰林院為文館樞密院為光政院大理寺為詳刑院客省為延賓院官號亦從改易以避中朝初金陵殿闕皆設鴟吻元宗雖臣於周猶如故乾徳後遇中朝使至則去之使還復設至是遂去不復用降諸弟封王者皆為公從善楚國從鎰江國從謙鄂國内史舍人張佖知禮部貢舉放進士楊遂等三人清耀殿學士張洎言佖多遺才國主命洎考覆遺不中第者於是又放王倫等五人閏月癸巳太祖命進奉使楚國公從善為泰寧軍節度使留京師賜第汴陽坊示欲召國主入朝也國主遣戸部尚書馮延魯謝從善爵命延魯至京師疾病不能朝而歸開寶六年夏太祖遣翰林院學士盧多遜來國主聞太祖欲興師上表願受爵命不許以司空殷崇義知左右内史事冬十月内史舍人潘佑上書切諌佑素與戸部侍郎李平交厚國主以為事皆由平始先以平屬吏遣使收佑佑自殺平縊死獄中皆徙其家外郡甲戌歲秋國主上表求從善歸國不許太祖遣閤門使梁迥來使從容言曰天子今冬行柴燎之禮國主宜往助祭國主不答九月丁夘復遣知制誥李穆為國信使持詔來曰朕將以仲冬有事圜丘思與卿同閲犧牲且諭以將出師宜早入朝之意國主辭以疾且曰臣事大朝冀全宗祀不意如是今有死而已時太祖已遣潁州團練使曹翰率師先出江陵宣徽南院使曹彬侍衛馬軍都虞候李漢瓊賀州刺史田欽祚率舟師繼發及是又命山南東道節度使潘美侍衛步軍都虞候劉遇東上閤門使梁迥率師水陸並進與國信使李穆同日行冬十月國主遣江國公從鎰貢帛二十萬疋白金二十萬斤又遣起居舍人潘慎修貢買宴帛萬疋錢五百萬築城聚糧大為守備閏十月王師拔池州國主於是下令戒嚴去開寶紀年稱甲戌歲辛未王師進拔蕪湖及雄逺軍呉越亦大舉兵犯常潤國主遺呉越王書曰今日無我明日豈有君一旦明天子易地賞功王亦大梁一布衣耳呉越王表其書於朝王師次采石磯作浮橋成長驅渡江遂至金陵每歲大江春夏暴漲謂之黄花水及王師至而水皆縮小國人異之國主以軍旅委皇甫繼勲機事委陳喬張洎又以徐元瑀刁衎為内殿傳詔而遽書警奏日夜狎至元瑀等輒屛不以聞王師屯城南十里閉門守陴國主猶不知也初烈祖有國凡民産二千以上出一卒號義軍分籍者又出一卒號生軍新置産亦出一卒號新擬軍客戸有三丁者出一卒號拔山軍元宗時許郡縣村社競渡毎嵗重午日官閲試之勝者給綵帛銀椀皆籍姓名至是盡取為卒號凌波軍民奴及贅壻號義勇軍募豪民以私財招聚亡賴亡命號自在軍至是又大蒐境内自老弱外皆募為卒號排門軍民間又有自相率拒敵以紙為甲農器為兵者號白甲軍凡十三等皆使捍禦然實皆不可用奔潰相踵乙亥嵗春二月壬戌王師拔金陵闗城三月丁巳呉越攻我常州權知州事禹萬誠以城降誅神衛都指揮使皇甫繼勲彗出五車色白長五尺夏六月轉見西方犯太㣲六十日滅王師及呉越圍潤州留後劉澄以城降呉越遂㑹王師圍金陵洪州節度使朱令贇帥勝兵十五萬赴難旌旗戰艦甚盛編木為栰長百餘丈大艦容千人令贇所椉艦尤大擁甲士建大將旗鼓將斷采石浮橋至皖口與王師遇傾火油焚北船適北風反焰自焚我軍大潰令贇及戰櫂都虞候王暉皆被執外援既絶金陵益危蹙王師百道攻城晝夜不休城中米斗萬錢人病足弱死者相枕籍國主兩遣徐鉉等厚貢方物求緩兵守祭祀皆不報冬十一月白虹貫日晝晦乙未城陷將軍咼彦馬承信及弟承俊帥壯士數百力戰而死勤政殿學士鍾蒨朝服坐於家亂兵至舉族就死不去光政使右内史侍郎陳喬請死不許自縊死國主帥司空知左右内史事殷崇義等肉袒降於軍門明年正月辛未至京師乙亥授右千牛衛上將軍封違命侯太宗即位加特進改封隴西公太平興國三年七月辛夘殂年四十二是日七夕也後主蓋以是日生贈太師追封呉王葬洛陽北邙山後主天資純孝事元宗盡子道居喪哀毁杖而後起嗣位之初屬保太軍興之後國削勢弱帑庾空竭専以愛民為急蠲賦息役以裕民力尊事中原不憚卑屈境内賴以少安者十有五年憲司章疏有繩糾過訐皆寢不下論决死刑多從末減有司固爭乃得少正猶垂泣而後許之常獵於青山還如大理寺親録繫囚多所原釋中書侍郎韓熙載奏獄訟有司之事囹圄非車駕所宜臨幸請罰内庫錢三百萬以資國用雖不聽亦不怒也殂問至江南父老有巷哭者然酷好浮屠崇塔廟度僧尼不可勝算罷朝輒造佛屋易服膜拜以故頗廢政事又置澄心堂於内苑引能文士及徐元機元榆元樞兄弟居其間中㫖由之而出中書密院乃同散地兵興之際降御札移易將帥大臣無知者皇甫繼勲誅死之後夜出萬人斫營招討使但署牒遣兵竟不知何往蓋皆澄心堂直承宣命也長圍既合内外隔絶城中之人惶怖無死所後主方幸淨居室聽沙門徳明雲真義倫崇節講楞嚴圓覺經用鄱陽隠士周惟簡為文館詩易侍講學士延入後苑講易否卦賜惟簡金紫羣臣皆知國亡在旦暮而張洎猶謂北師已老將自遁去後主益甘其言晏然自安命戸部員外郎伍喬于圍城中放進士孫確等三十八人及第其所施為大抵𩔖此故雖仁愛足以感其遺民而卒不能保社稷云南唐書卷三欽定四庫全書南唐書卷四宋陸游撰宋齊丘列傳第一宋齊丘字子嵩世為廬陵人父誠與鍾傳同起兵髙騈表傳為洪州節度使以誠副之卒官因家洪州齊丘好學工屬文尤喜縱横長短之説烈祖為昇州刺史齊丘因騎將姚克贍得見暇日陪燕游賦詩以獻曰養花如養賢去草如去惡松竹無時衰蒲栁先秋落烈祖奇其志待以國士從鎮京口入定朱瑾之難常參祕畫因説烈祖講典禮明賞罰禮賢能寛征賦多見聽用烈祖為築小亭池中以橋度至則徹之獨與齊丘議事率至夜分又為髙堂不設屏障中置灰爐而不設火兩人終日擁爐畫灰為字旋即平之人以比劉穆之之佐宋髙祖然齊丘資躁褊或議不合則拂衣徑起烈祖謝之乃已義祖獨惡其為人每欲進拔輒不果浮沉下僚十餘年義祖末年議者多請以徐氏諸子執國政烈祖聞之亟欲自請出鎮齊丘請徐之俄而義祖殂自殿直軍判官擢右司員外郎進右諫議大夫兵部侍郎居中用事且倚以為相齊丘自以資望尚淺或不為國中所服乃告歸洪州改葬因入九華山累啓求致仕不許時元宗已為大將軍烈祖以呉主命命元宗躬往迎之於是齊丘誼不得已而起遂拜中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔委齊丘左右之初烈祖權位日隆舉國皆知代謝之勢呉主謙恭無失徳烈祖懼羣情未協欲待嗣君與齊丘議合已而都押衙周宗揣微指請急至都以禪代事告齊丘齊丘黙計大議本自己出今若遽行則功歸周宗欲因以釣名乃留與夜飲亟遣使手書切諌以為時事未可後數日馳至金陵請斬宗以謝國人烈祖亦悔將從之徐玠固爭纔黜宗為池州副使玠乃與李建勲等遂極言宜從天人之望復召宗還舊職齊丘由是頗見疎忌留為諸道都統判官加司空無所闗預從容而已數請退烈祖以南園給之俄而齊國建猶以勲舊為左丞相而不預事李徳誠周本自廣陵持呉帝詔來行傳禪齊丘謂徳誠子建勲曰尊公呉室元勲今日掃地矣獨稱疾卧家不預勸進烈祖既受禪徐玠為侍中李建勲為中書侍郎同平章事周宗為樞密使齊丘但遷司徒中懐不平及宣制至布衣之交忽抗聲曰臣為布衣時陛下亦一刺史耳今為天子可不用老臣矣烈祖優容之嘗夜燕天泉閣李徳誠曰陛下應天順人惟宋齊丘不悦因出齊丘諷止勸進書烈祖却之曰子嵩三十年故人豈負我者齊丘頓首謝自是為求媚計更請降讓皇為公侯絶呉太子璉婚乆之表言備位丞相不當不聞國政又自陳為人所間烈祖大怒齊丘歸第白衣待罪而烈祖怒已解謂左右曰宋公有才特不識大體爾孤豈忘舊臣者命呉王璟持手詔召見遂以丞相同平章事寖復委任兼知尚書省事與張居詠李建勲更日入閤議政契丹耶律徳光遣使來齊丘隂謀間契丹使與晉人相攻則江淮益安密請厚其原幣遣還至淮北潛令人刺殺之契丹與晉人果成嫌隙齊丘親吏夏昌圖盜庫金數百萬特判傅輕典烈祖命斬昌圖齊丘慚稱疾求罷省事許之遂不復朝謁帝遣夀王景遂勞問許鎮故鄉始入朝因召與宴飲齊丘酒酣輒曰陛下中興實老臣之力乃忘老臣可乎烈祖怒曰太保始以游客干朕今為三公足矣齊丘詞色愈厲曰臣為游客時陛下亦偏裨耳今不過殺老臣遂引去烈祖頗悔明日手詔曰朕之性子嵩所知少相親老相怨可乎拜鎮南節度使至鎮起大第窮極宏麗坊中居人皆使修飾垣屋民不堪其擾有逃去者初赴鎮烈祖曰衣錦晝行古人所貴賜以錦袍親為著之遂服錦袍視事元宗即位召拜太保中書令與周宗並相齊丘之客最親厚者陳覺元宗亦以為才馮延已延魯魏岑查文徽與覺深相附結内主齊丘時人謂之五鬼相與造飛語傾周宗宗泣訴於元宗而岑覺又更相攻於是出齊丘為鎮海軍節度使齊丘怏怏力請歸九華舊隠從之賜號九華先生封青陽公食青陽一縣租税元宗欲傳位齊王景遂詔景遂總庶政惟魏岑查文徽得奏事餘非特召不得見國人大駭齊丘自九華上疏極論不可㑹言者衆元宗乃收所下詔或謂齊丘先帝勛舊不宜乆棄山澤遣馮延已召之不起遣燕王景達再持詔往乃起拜太傅中書令封衛國公賜號國老奉朝請然不得預政益輕財好客識與不識皆附之薦陳覺使福州諭李𢎞義入朝覺至福州不敢言而専命出兵敗事僉謂必坐誅齊丘上表待罪置不問覺亦不死齊丘方且怒韓熙載議其黨與黜之元宗不悦復使鎮洪州周侵淮北起齊丘為太師領劍南東川節度使進封楚國公與謀難齊丘固讓仍為太傅建議發諸州兵屯淮泗擇偏裨可任者將之周人未能測虚實勢不敢輕進及春水生轉饟道阻彼師老食匱自當北歸然後遣使乞盟度可無大喪敗元宗惶惑不能用又力陳割地無益與朝論頗異及明年暑雨周棄所得淮南地北歸議者謂扼險要擊可以有功且懲後齊丘乃謂擊之怨益深不如縱其歸以為徳由是周兵皆聚於正陽而夀州之圍遂不可解終失淮南方是時陳覺李徵古同為樞密副使皆齊丘之黨躁妄専肆無人臣禮自度事定必不為羣臣所容若齊丘專大柄則可以無患覺乃椉間言宋公造國於艱危如此陛下宜以國事一委宋公元宗意謀出齊丘大銜之㑹鍾謨使還挾周以為已重所言率見聽而謨本善李徳明欲為報讐屢陳齊丘椉國危殆竊懐非望且黨與衆謀不可測元宗遂命殷崇義草詔曰惡莫甚於無君罪莫深於賣國放歸九華山而不奪其官爵初命穴牆給食俄又絶之以餒卒諡醜繆覺徵古皆誅死未幾元宗燕居見齊丘為厲叱之不退遂遷南都後主立召其家還金陵廩給甚厚方齊丘敗時年七十三且無子若謂窺伺謀簒竊則過也特好權利尚詭譎造虛譽植朋黨矜功忌能飾詐䕶非富貴滿溢猶不知懼狃於要君闇於知人釁隙遂成䝉大惡以死悲夫論曰世言江南精兵十萬而長江天塹可當十萬國老宋齊丘機變如神可當十萬周世宗欲取江南故齊丘以反間死方五代之際天下分裂大亂賢人君子皆自引於深山大澤之間以不仕為得而馮道有重名於中原齊丘擅衆譽於江表觀其人可以知其時之治亂矣周師之犯淮南齊丘實預議論雖元宗不盡用然使展盡其籌䇿亦非能决勝保境者且世宗豈畏齊丘機變而間之者哉蓋鍾謨自周歸力排齊丘殺之故其黨附㑹為此説非其實也予論序齊丘事盡黜當時愛憎之論而録其實覽者得詳焉南唐書卷四欽定四庫全書南唐書卷五宋陸游撰周徐查邊列傳第二周宗字君太廣陵人少遇亂孤窮事烈祖為給使閑於擯相辭令方時艱難每使四方輙稱職端敏可仗恩顧日洽烈祖鎮金陵為都押衙時用宋齊丘議迎呉讓皇都金陵繕府治為宫馬步都虞候蔡𢎞業為宫城營奉使徙都統府於古臺城使都教練使孔昌祚營之都統府成凡二千四百間環一千五百步烈祖已徙居且迎讓皇矣宗請問曰若主上西遷則公當東駕勞費方始怨嗟將日聞矣烈祖納之託以歲不利而止自是宗益預議論齊丘始忌之一日烈祖臨鏡理白鬚太息曰功業成而吾老矣奈何宗適侍側悟㣲指乃請如廣陵諷讓皇以禪代事亦請諭齊丘齊丘心忌大議自宗發及其將還留與飲酒而遣騎以手疏切諫烈祖得之大悔懼後數日齊丘馳至金陵為險語動烈祖請斬宗以謝國人烈祖將從之徐玠固爭事乃已但黜宗為池州副使玠又與李建勲等言天人之望已集密定大計復召宗還舊職烈祖受禪宗躐進至内樞使同平章事遷侍中時以樞密為内樞者猶避呉武王諱也烈祖常召宗及宋齊丘馬仁裕宴於崇英院歡燕道舊為樂他將相莫預然待宗尤親厚不甚以職務嬰之宗亦能澹然畏逺權勢居家節儉俸賜皆積不用故齊丘黨雖日讒之不能害乆之乃罷為江州節度使有俞文貞者早遊烈祖幕府宗及馬仁裕皆趨走執事左右及宗出鎮文貞仕宦蹭蹬猶為其州巡官方旅見輙越次問曰馬押衙亡恙宗曰馬相公已鎮廬州文貞顧同列匿笑而退他日預公設宗勸以酒文貞俛首曰下官小戸令公所熟知也聞者大駭而宗怡然不動其寛厚如此徙宣州節度使入覲賜燕元宗親為摺襆頭脚以表殊禮復出留守東都請老以司徒致仕歸金陵馮延魯代為留守㑹周師陷廣陵延魯自髠而逃見執於周人束縳桎梏僅得免死時人益以宗享福終始為異俄而宗病卒年七十餘宋齊丘時以太傅奉朝請撫其棺哭曰君大黠來亦得時去亦得時元宗聞之不平宗二女皆為後主后徐鍇字楚金㑹稽人父延休字徳文風度淹雅故唐乾符中進士昭宗狩石門無學士草詔延休來調官適在旁近逆旅左右言其工文詞即召見命視草昭宗善之及還長安不得用梁蔣𤣥暉辟為其佐延休棄去依鍾傳於洪州呉取江西得延休仕至光禄卿江都少尹卒二子鉉鍇遂家廣陵鍇四嵗而孤母方教鉉就學未暇及鍇鍇自能知書稍長文詞與鉉齊名昇元中議者以文人浮薄多用經義法律取士鍇恥之杜門不求仕進鉉與常夢錫同直門下省出鍇文示之夢錫賞愛不已薦於烈祖未及用而烈祖殂元宗嗣位起家祕書郎齊王景達奏授記室時殷崇義為學士草軍書用事謬誤鍇竊議之崇義方得君誣奏鍇泄禁省語貶烏江尉嵗餘召還授右拾遺集賢殿直學士論馮延魯有罪無才人望至淺不當為巡撫使重忤權要以祕書郎分司東都然元宗愛其才復召為虞部員外郎後主立遷屯田郎中知制誥集賢殿學士改官名拜右内史舍人賜金紫宿直光政殿兼吏兵部選事與兄鉉俱在近侍號二徐初鍇久次當遷中書舍人游簡言當國每抑之鍇乃詣簡言簡言從容曰以君才地何止一中書舍人然伯仲並居清要亦物忌太盛不若少遲之鍇頗怏怏簡言徐出妓佐酒所歌詞皆鍇所為鍇大喜乃起謝曰丞相所言乃鍇意也歸以告鉉鉉歎息曰汝癡絶乃為數闋歌換中書舍人乎鍇凡四知貢舉號得人後主裒所製文命為之序士以為榮鍇酷嗜讀書隆寒烈暑未嘗少輟後主嘗得周載齊職儀江東初無此書人無知者以訪鍇一一條對無所遺忘其博記如此既久處集賢朱黄不去手非莫不出少精小學故所讐書尤審諦每指其家語人曰吾惟寓宿於此耳江南蔵書之盛為天下冠鍇力居多後主嘗歎曰羣臣勤其官皆如徐鍇在集賢吾何憂哉李穆來使見鍇及鉉歎曰二陸之流也嘗夜直召對論天下事因及用人才行孰先後主曰多難當先才鍇曰有人才如韓彭而無行陛下敢以兵十萬付之乎後主稱善時國勢日削鍇憂憤鬱鬱得疾謂家人曰吾今乃免為俘虜矣開寳七年七月卒年五十五贈禮部侍郎謚曰文著説文通釋方輿記古今國典賦苑嵗時廣記及他文章凡數百卷鍇卒逾年江南見討比國破其遺文多散逸者查文徽歙州休寧人幼好學能自刻苦手寫經史數百卷稍長任氣好俠聞人困乏雖不識必濟之家本富坐是窮空不悔也或遺以金帛一夕盜入其家盡取去文徽不言雖鄰里莫知者乆之盜敗於旁邑移文訊驗人始知之咸推其量烈祖輔政初入謁烈祖召與語偉其論宋齊丘亦稱薦之徐知諤領浙西以文徽為其判官或獻玉盃知諤喜酧以錢百萬趣開宴出盃行酒至文徽偶墮地碎一坐皆驚而文徽自若烈祖受禪入為監察御史元宗立進諌議大夫中書舍人樞密副使閩主延義與其兄延政相攻延政以建州建國稱殷而延義為其下所殺推立大將朱文進元宗欲討文進文徽以為延政首亂當先致討有翰林待詔臧循者與文徽同里巷少嘗為賈入閩習知其山川險易為陳進兵之䇿文徽本好言兵遂請行元宗乃以為江西安撫使令至境上審觀可否文徽鋭於成功至上饒復命盛言必克詔發洪州屯兵以邊鎬為將從文徽攻建州建人厭王氏之亂伐木開道迎我師行次蓋竹遇建州兵至又聞泉漳汀州皆歸延政恐懼退保建陽時臧循亦為别將屯邵武延政襲破之獲循斬於建州軍聲大剉元宗遣何敬洙等來援敬洙鎬與建州兵相持文徽得建之降將孟堅使潛師出其後擊之建州兵大敗潰去遂傅其城雖下建州諸軍無紀律殺掠不禁民始失望有叛志矣元宗知而置不問䇿功遷撫州觀察使又拜建州留後由是文徽益自用時李𢎞義挾呉越兵據福州偽遣諜來告福州亂文徽喜率劍州刺史陳誨赴之誨將舟師至福州城下擊敗其兵執呉越將馬先進等三人文徽以步騎繼至𢎞義陽遣卒數百人出迎而設伏西門以待文徽傳令徑入其城陷伏中大敗墜馬被執送錢塘將士死者萬人元宗遣使歸馬先進于呉越而求文徽呉越王遣還將發為置酒寘毒歸至金陵毒始作元宗使醫視之醫以珠置口中有頃珠色變黒醫曰疾不可為然猶十年乃死文徽遂病瘖以工部尚書致仕朱元降周坐親黨安置宣州卒年七十距遇毒之歲正十年云謚曰宣子元方元規元素元範元賞元方事後主為水部員外郎吉王從謙掌書記從謙朝京師太祖命知制誥盧多遜燕從謙於館多遜奕棋次顧元方曰江南竟何如元方歛衽曰江南事大朝十餘年極君臣之禮不知其他多遜推枰愧謝曰勿謂江南無人使還通判建州盧絳據宣州傳檄至建元方立斬其使及絳平太祖聞元方所為大悦擢殿中侍御史知泉州卒官元方子道龍圖閣待制始徙家海陵純厚長者以文行稱於時道從兄陶及事後主國亡入朝仕至祕書少監知審刑院與道尤極友愛自金陵破士族流離多貧困失職惟道兄弟盡力收恤聚食常數十百人得任子恩皆以與族人以少長為先後無親疎之間異姓亦分俸給之時其婚姻由是常苦貧而查氏至今為海陵望族許國籥皆其後也邊鎬金陵人少事烈祖為通事舍人以通敏稱保大初循州人張遇賢本羅縣小吏有神降於縣之刻杉鎮語人曰張遇賢非常人當事我遇賢往事之㑹州境羣盜起各擁衆數百無所統相與禱於神神又大言曰張遇賢汝主也遇賢遂稱王改元置百官度嶺襲䖍州節度使賈浩閉門登陴不敢出遇賢據白雲洞衆十餘萬元宗遣洪州營屯都虞候嚴思率所部討之鎬為監軍䖍有書生白昌裕沉密有謀鎬引與定計刋木開道襲白雲洞㑹遇賢所事神棄去不復降語賊衆遂潰其裨將李台執之以降䇿功遷洪州營屯諸軍都虞候二年查文徽以樞密副使出師伐建州詔鎬為行營招討洪撫饒信歙等州諸指揮都虞候從文徽行然衆纔數千戰敗退舍元宗聞之遣何敬洙祖全恩姚鳳來援敬洙與鎬進兵奪其險要自崇安進次赤嶺與建兵方相持為背水陣文徽使騎繚出建兵之後與敬洙鎬夾擊大破之遂取建州降王延政復取漳州事平諸將皆爭功鎬獨無一言七年楚馬氏兄弟相攻希蕚雖勝而尤無道元宗知楚難方殷以鎬為信州刺史領屯營兵兼湖南安撫使駐袁州萍鄉有警許便宜從事楚人果復廢立鎬自萍鄉帥師入潭州遷馬氏之族及文武將吏于金陵遂拜潭州節度使南漢將潘崇徹攻郴州鎬出兵爭之敗績遂失郴州鎬懼南漢寇邊未已請除道全二州刺史詔以廖偃為道州刺史張巒權知全州然湖湘之憂實不在南漢也自馬氏廢立以來帑蔵空竭土地既歸我馮延己為相矜平楚之功不欲取費於國専掊歛楚人以給經費人心已離鎬柔而無斷日飯沙門希福紀綱頺弛不之問初成師朗來歸以其所部為奉節軍從鎬入楚廩給薄于楚之降卒偶語怨望而糧料使王紹顔每給奉節糧輒刻削之軍校孫朗欲殺紹顔紹顔匿囷下得免官屬請斬紹顔以謝將士鎬不聽朗乃謀殺鎬及紹顔據湖南歸中原夜率所部取草燒府門火輒不發良乆傳漏者覺之以告鎬出衙兵與鬬勝負未决鎬命吹角亂兵少以為將旦亟斬闗奔朗州盡以潭州虚實告劉言言久懐叛志得朗言大喜遣其將王進逺周行逢來攻鎬亦備言已而聞人謂忠順傾意信之及言兵已拔益陽遂夜棄城出奔列城皆潰盡喪楚地坐削官流饒州而他將棄城者皆斬湘中謠言馬去不用鞭至是而驗十四年周師大入齊王景達為元帥出兵援夀州起鎬為大將戰敗被執世宗命為右千牛衛上將軍及元宗割淮南地請盟世宗乃歸鎬卒于金陵南唐書卷五欽定四庫全書南唐書卷六宋陸游撰周柴何王張馬游刁列傳第
