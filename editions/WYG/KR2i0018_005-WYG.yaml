front:
  text: 五義祖生六子知訓知詢知誨知諫知證知諤及烈祖開國惟知證知諤在餘皆前卒徐知證義祖第五子也事呉厯州刺史至節度使烈祖初尊義祖為太祖復姓改義祖封拜徐氏與李氏同知證王江改王魏元宗嗣位尤見尊禮内宴用家人禮起舞拜跪為夀知證亦以叔父自處無所讓卒年四十二徐知諤義祖第六子在呉亦為節鎮代知詢為金陵尹烈祖初封饒王進王梁鎮潤州兼中書令好奇寶怪物所蓄不可計有蜀估持鳳首至自言得之徼外蠻夷狀如雄雞廣五寸冠上正平可用為枕朱冠金喙文彩煥爛如生人咸異之一日遊蒜山除地為場連虎皮為大幄號虎帳與賓僚㑹飲其中忽暴風至裂帳盡碎如飛蝶知諤懼而歸屬疾數日卒平生常語客曰人生七十為大限吾生長王家窮極歡樂一日可敵世人二日年三十五其死乎至是如其言廢朝七日烈祖悲悼復詔不視朝者七日斂以衮冕及上方祕器謚曰懐十子皆貴顯國中所著文賦歌詩十卷號閣中集徐遊知誨子也初名景遊避元宗名去景字知誨於元宗有舊恩故元宗待遊及兄汝南郡公遼尤親厚出入宫省備顧問預籌畫専典宫室營繕及浮屠事當時言蠧政者以兩人為首後主嗣位好為文章遊復以能屬文見眤封文安郡公燕飲則流連酣咏更相倡和雖后妃在席不避也昭恵后好音時出新聲或得唐盛時遺曲遊輙從旁稱美有三閤狎客之風閒居講論古今得失後主設問遊具以所聞對或遊有疑以請後主亦引經義或古事稱制答之君臣相矜至國亡不悟也遊有巧思欹器之制乆不傳人無知者遊獨以意創製皆合古法太平興國中蘇易簡為學士得之暇日試於玉堂太宗皇帝聞而取視之歎賞不已方金陵之將亡也徐鍇屬疾忽夢巨人持大鐵簁取已及兄鉉幷遊同納簁中簁之鍇與遊皆墜地而鉉獨否俄鍇遊皆以疾卒云王建封上元人少從軍以任俠驍勇知名元宗取建州建封為先鋒橋道使焚建州外郛克之王延政降何敬洙功最諸將建封怒曰我縱火先登克城諸軍乃能入我功當第一敬洙因推之曰君言是也具以聞諸朝第賞拜信州刺史人皆多敬洙而薄建封陳覺馮延魯魏岑攻福州李𢎞義圍之敗呉越援兵福州援絶危蹙且拔矣而覺延魯岑各欲功在已不相應接偏裨莫肯用命故未能克覺奏請建封濟師建封率五千人㑹之破福州版寨入東武門而建封亦與諸將爭功遽斂兵先退𢎞義乗之我軍復敗遂潰而歸元宗深銜建封顧方治覺等擅興未及治也建封内不自安元宗懼其作亂召為天威軍都虞候付以親軍建封遂泰然恃恩僭侈無復顧憚戸部員外郎范沖敏疾魏岑鍾謨李徳明用事訹建封上書厯詆岑等請更用正人元宗遂發怒謂建封武臣握精兵敢干國政謀進退柄臣其漸不可長流池州未至殺之沖敏棄市未幾岑見沖敏為厲請道士上章訴天數月竟死云王彦儔蔡州上蔡人少為州軍校唐同光末諸郡多亂彦儔亦樂禍思奮㑹同列六人者來與謀曰四郊恟恟能者得富貴我輩不可後人彦儔許諾且曰今夕吾直府中公等可持兵來吾亦裹甲為内應既夜六人者如約俱至彦儔伏壯士盡捕斬之持其首叩帳門告刺史曰姦盜竊發幸已伏誅懼有佚黨為變願公亟號令以安衆心刺史驚喜而出彦儔即斬之歸其罪於六人者翼日悉族六家據蔡州無敢動唐兵來討彦儔自計不能守匿其妻子於村舍奉父母來奔烈祖輔呉以為都押衙厯和州刺史始遣間使迎妻子南歸彦儔有政績善撫境内和遂為富州入拜統軍自以發迹兇亂於是務為恭謹烈祖嘉之嘗升堂拜其父開國以為池州節度使常夢錫自給事中以直諫貶判官彦儔事之如在朝廷人士稱之卒於鎮朱匡業廬州舒城人父延夀以姊為呉武王夫人故自少得幸從征討摧堅陷陣功冠諸將好以寡擊衆不勝而返者必盡戮之嘗與梁戰遣二百人持大劒斫陣將行指一卒留之卒請行延夀以違命立斬之其令出必行皆類此然每得賞賜悉分賚其下無以入家者唐昭宗在岐下聞其名遣使間道授延夀蔡州節度使武王疑其難制誘殺之出夫人使更嫁然猶以舊功貸其妻子時匡業尚幼稍長授以官烈祖輔呉拔為軍校積功至諸軍都虞候嗜酒使氣烈祖優容之出為歙州刺史有政績改建州留後還朝授神衛統軍周侵淮南中外震駭盜投罅多竊發以匡業為内外巡檢使嚴而無私犯令無所貸中外肅然夜戸不閉正陽喪師朱元叛元宗議親征召匡業及統軍劉存中問以方略匡業輙對曰運數之興天地皆助大事若去雖英雄亦無如之何存中從旁贊之元宗怒貶匡業撫州團練使流存中饒州後主襲位召拜神武統軍加中書令卒子崇俊短陋羸瘠而妙於騎擊馳突若神早卒朱令贇大將軍業從子少從軍椎額鷹目趫捷善射積遷至鎮南節度使開寶中後主見討王師兵已圍金陵召令贇赴難軍至湖口與諸將謀曰今為前進則北軍據我後上江阻隔進未破敵退絶餽饟奈何乃檄南都留守柴克貞赴軍欲俟其至使代拒湖口及發而後主危急飛書督兵者接踵令贇不能守初議乃與戰棹都虞候王暉乗流而前自潯陽湖編木為大栰長百餘丈大艦至容千人將突下斷采石浮梁㑹江水涸舟栰艱阻王師得設備比至虎蹲洲合戰令贇所乗艦尤大建大將旗鼓王師舟小聚攻之令贇以火油縱燒王師不能支㑹北風反焰自焚水陸諸軍十五萬不戰皆潰令贇惶駭赴火死糧米戈甲俱焚無孑遺烟焰不止者旬日自是金陵外援遂絶以至於亡是時王師上露布稱生獲令贇則非也論曰金陵之被圍也以守備任皇甫繼勲以外援付朱令贇繼勲既懐貳心而令贇孺子復非大將才其亡宜矣使林仁肇不以間死盧絳得當攻守之任胡則申屠令堅輩宣力圍城中雖天威臨之豈易遽亡哉然則江南雖弱曹彬等所以成功者獨乗其任人乖剌而已吾以此知伐國之難也王崇文父綰呉大將崇文以門地選尚烈祖妹廣徳公主厯百勝永安二鎮廬陵民尚氣喜訟以先止為怯素號難治崇文一以法治之不少貸訟為衰息建州初平崇文安集之民忘其亂又渉武昌自南唐興崇文内典禁兵出更藩任位兼將相終始富貴而平居被服儒雅風度夷曠在武昌方閲騎士於鞠場傍古屋數十間崩壊聲震數里聞者莫知所為崇文指揮使令訖事不失常度竟亦不問後主初立上疏厯陳朝政賜書褒之加中書令卒胡則不知其世家後主末為江州指揮使金陵陷曹彬喻後主以手書命郡縣悉以城降書至江州刺史謝彦賓集將佐視之謀納欵則憤形於色亟出謂其下曰吾屬世受李氏恩安可負之且都城乆受圍此書真偽不可知刺史不忠欲汚吾州爾輩能從我死忠義乎衆皆曰善乃帥同列宋徳明等大譁入攻彦賓彦賓懼逃簷霤中執而殺之衆推則為刺史號令肅然莫敢不聽則嘗為夀州裨將從劉仁贍城守累年盡得其方略乃日夜閲丁壯勒部伍為堅壁死守計太祖命南面行營招安巡檢使曹翰攻之城帶江負山樓櫓髙險堅不可破屢遣使諭降則誓死不從翰軍死傷者衆詔書切責督戰㑹則疾革不能起城始陷衆猶巷鬭雪涕奮擊不少退翰軍尤多死則卧牀上翰執之數其違命之罪對曰犬吠非其主爾何怪也即舁置木驢上將磔之俄死腰斬其屍以徇幷殺宋徳明而隳其城七尺使後不可守時右補闕張霽被命知江州與翰偕行既入城翰軍士掠民家民訴於霽霽按誅軍士翰因發怒屠城死者數萬人取其屍投井坎皆滿溢餘悉投江流因誣奏霽太祖薄霽罪徙知饒州民家貲貨鉅萬翰悉取之初太祖聞江州城垂破遣使持詔賜翰使勿多殺使者至獨樹浦大風斷渡比至已無噍𩔖矣申屠令堅山東人少無賴勇敢絶人晉漢間嘗為盜被獲以計脱來歸保大末禦周師於夀春破城南大砦有功擢神武都虞候劉茂忠吉州安福人本名徹或謂之曰劉徹乃漢武帝也非人臣所能名乃改焉少亦為羣盜㑹赧書募盜為兵茂忠出應募且請擒盜自洗湔乃詐亡命入盜中自言工風雲占盜信之乃密約吏為内應悉擒戮無遺者惟廬陵鷓鴣洞賊帥呉先狡有謀且據巖險不可捕茂忠鞭二卒使佯為得罪奔先示以鞭創先乃納之月餘斬先其黨皆潰積功為吉州兵馬都押衙開寶中令堅為吉州刺史茂忠為袁州刺史金陵破後主歸京師兩人者相約不以主存亡易節誓死報國前二年令堅寐則夢與人鬭大呼而寤乃聚侍婢歌舞喧笑達旦始能寐至是若與人搏擊於帳中者踰時而卒茂忠度不能獨奮遂降將行悉燔州縣軍興料斂文籍所留田稅簿而已袁人徳之入朝舟次淮口謁闗吏稱袁州刺史吏擲刺於地曰此亡國之俘何刺史也叱令執杖庭㕘至京師授登州刺史闗吏抵罪適編管登州茂忠見之曰乃汝耶日責拜謁兩衙必令植立庭下吏慚憤死茂忠還朝病金痍卒喬匡舜字亞元髙郵人弱冠能屬文以典贍稱烈祖輔呉用為祕書省正字開國宋齊丘辟置幕中十餘年厯大理評事屯田員外郎齊丘喜人諛已而匡舜真率故雖賞其文藝未嘗薦拔烈祖獨知之嘗詔公卿舉可親民者意齊丘且舉匡舜奏上竟不及烈祖喟然謂常夢錫曰吾不意其捨匡舜也夢錫與韓熙載素惡齊丘每相語曰宋公誤識亞元正可怪也乆之齊丘出鎮豫章始表為節度掌書記保大中召為駕部郎中知制誥進中書舍人周侵淮南諸將無功元宗議親率六軍拒之匡舜上疏切諌帝怒坐以沮國動人心流撫州然亦卒不能親行也後主嗣位復起為司農少卿厯殿中監修國史給事中兼獻納使知貢舉放及第樂史輩五人多久滯名塲者時稱得人而少年輕薄子嘲之謂之陳橘成牓遷刑部侍郎老病乞骸骨歸後主憫其貧給俸終身開寶五年卒年七十五謚曰貞睦昭符金陵人不知所以進保大中為常州刺史郡當呉越之衝屢交兵城邑荒殘昭符為政寛簡招納逋亡未幾遂富實一日坐㕔事雷雨暴至電光如金蛇遶案吏卒皆震仆昭符不懾撫案叱之雷電遽散及舉案惟得鐵索重百斤昭符亦不變色徐命舉索納庫中顯徳五年元宗既稱藩於周秋八月命昭符為進奏使置邸大梁太祖受周禪昭符乃更名後主嗣位御宫門立金雞竿降赦如天子禮太祖聞而怒召昭符詰之色甚厲昭符徐以鄙語對太祖為笑因置不問然昭符常往來金陵時後主數貢奉帑蔵空竭昭符市於富民石守信家得絹十萬後主大悦太祖已遣李穆召後主入朝因問昭符曰汝度汝主來否對曰君命召不俟駕安有不來及後主稱疾王師致討昭符又言於太祖曰臣主必死社稷已而後主降罷奏邸不得調卒初名匡符建隆初改以避上名云
