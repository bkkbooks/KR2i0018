front:
  text: 十三烈祖元敬皇后宋氏小名福金父韞江夏人后幼流離亂兵中昇州刺史王戎得后烈祖娶戎女后為媵得幸生元宗王氏早卒義祖命烈祖以為繼室封廣平郡君晉國君治内有法不妄言笑義祖殂於金陵烈祖在東都將奔䘮后密以大計諫止焉烈祖為齊王封正妃及受禪立為后從容裨贊多所𢎞益烈祖嘗曰吾思有未達后已悟矣昇元末烈祖服金石藥多暴怒賴后以免譴者甚衆及殂中書侍郎孫忌懼魏岑馮延己延魯以東宮舊僚用事欲稱遺詔奉后臨朝聽政后不許曰此武后故事吾豈為之元宗即位尊后為皇太后保大三年十月卒袝葬永陵烈祖後宫种氏名時光性警惠年十六入宫列樂部中俄得幸生景逷烈祖以受禪後所得子甚愛之种氏寵日盛烈祖性嚴整嘗大怒聲如乳虎殿門環為震動左右皆䘮魂魄种氏左手持食右手進七從容如平時烈祖怒亦頓解他日烈祖幸齊王宫遇王親理樂器大怒數日未解种氏負寵輒乘間言景逷才過齊王烈祖正色曰子有過父敎之常禮也若何敢爾叱下殿去簮珥幽於别宫數月命度為尼景逷愛亦弛終烈祖世獨不加封爵元宗即位始封景逷保寧王許种氏就養於景逷宫中封王太妃宋后挾舊怨屢欲加害元宗力解之乃止元宗光穆皇后鍾氏父太章事吳為義祖裨將義祖謀誅張灝令嚴可求喻太章伏死士二十輩斬灝於府太章許諾義祖疑其怯夜半往止之曰僕母老懼事不成欲徐圖之如何太章勃然曰言已出口豈有可已之理明日遂誅灝後頗恃功頡頏烈祖疑其難制義祖曰昔者吾赤族之禍間不容髮使無太章豈有今日富貴耶奈何以薄物細故疑之乃命以太章次女配元宗即后也昇元中封齊王妃元宗即位立為皇后後主即位為太后以父名改稱聖尊后后寢疾後主朝夕侍側衣不解帶藥必親嘗乃進乾徳三年十月卒是日雨沙於金陵後主毁瘠骨立杖而後能起哀動左右葬順陵後主昭惠國后周氏小名娥皇司徒宗之女十九歳來歸通書史善歌舞尤工琵琶嘗為夀元宗前元宗歎其工以燒槽琵琶賜之至於采戲奕棋靡不妙絶後主嗣位立為后寵嬖專房創為高髻纖裳及首翹鬢朶之妝人皆效之嘗雪夜酣燕舉杯請後主起舞後主曰汝能創為新聲則可矣后即命牋綴譜喉無滯音筆無停思俄頃譜成所謂邀醉舞破也又有恨來遲破亦后所製故唐盛時霓裳羽衣最為大曲亂離之後絶不復傳后得殘譜以琵琶奏之於是開元天寶之遺音復傳於世内史舍人徐鉉聞之於國工曹生鉉亦知音問曰法曲終則緩此聲乃反急何也曹生曰舊譜實緩宫中有人易之非吉徵也後主以后好音律因亦躭嗜廢政事監察御史張憲切諫賜帛三十疋以旌敢言然不為輟也未幾后臥疾已革猶不亂親取元宗所賜燒槽琵琶及平時約臂玉環為後主别乃沐浴粧澤自内含玉卒於瑶光殿年二十九葬懿陵後主哀甚自製誅刻之石與后所愛金屑檀槽琵琶同葬又作書燔之與訣自稱鰥夫煜其辭數千言皆極酸楚或謂后寢疾小周后已入宫中后偶褰幔見之驚曰汝何日來小周后尚幼未知嫌疑對曰既數日矣后恚怒至死面不外向故後主過哀以揜其迹云後主國后周氏昭惠后妹也昭惠卒未幾後主居聖尊后䘮故中宫久虚開寳元年始議立后為繼室命太常博士陳致雍攷古今沿革草具婚禮又命學士徐鉉史官潘佑參定文安郡公徐遊評其異同遊多是佑議遂施用之逾月遊病疽鉉懟其不主已議戲語人曰周孔亦能為厲乎后少以戚里間入宫掖聖尊后甚愛之故立焉被寵過於昭惠時後主於羣花間作亭雕鏤華麗而極迫小僅容二人每與后酣飲其中國亡從後主北遷封鄭國夫人太平興國二年後主殂后悲哀不自勝亦卒後主保儀黄氏江夏人父守忠事湖南馬氏為偏裨邊鎬入長沙得黄氏納後宫後主見其美選為保儀以工書札使專掌宫中書籍二周后相繼專房燕暱故保儀雖見賞識終不得數御幸也元宗後主俱善書法元宗學羊欣後主學柳公權皆得十九購藏鍾王以來墨帖至多保儀實掌之城將陷後主謂之曰此皆先帝所寳城若不守汝即焚之無為他人得及城陷悉焚無遺者保儀亦從北遷卒於大梁又有宫人流珠者性通慧工琵琶後主演念家山破及昭惠后所作邀醉舞恨來遲二破久而忘之後主追念昭惠問左右無知者流珠獨能追憶無所忘失後主大喜後不知所終烈祖五子宋皇后生元宗楚王景遷晉王景遂齊王景達种氏生江王景逿景遷字子通幼警敏讀書一覽輒不忘烈祖輔吳景遷尚吳公主為駙馬都尉歴衙内馬歩軍都指揮使海州團練使左右軍都軍使遂以左僕射參政事留東都輔政時甫成童尋加同平章事知左右軍使寢疾罷歸金陵為諸道副都統以景遂代輔政景遷病逾年竟卒年十九諡曰定無子初術士皆謂景遷貴不可言故烈祖在諸子中尤愛之及是始悟術士之妄景遂仕吳為門下侍郎烈祖受禪封壽王純厚夷淡有士君子之操讓皇之䘮景遂受命往護䘮事望柩哀慟觀者聳歎烈祖殂元宗以位讓景遂大臣固持之而止明年又命景遂總庶政已降詔僉謂不可乃收所下詔久之又以為太弟凡太子官屬皆改為太弟官屬景遂固辭雖不得命終恐懼不敢安處乃取老子功成名遂身退之意自為字曰退身以見志平居好客善屬文燕集無虚日贊善大夫張易峭直喜盡言景遂嘗賦詩頗纖麗易面規之景遂敬納又嘗怒碎玉杯於坐景遂亟推謝無迕色及易出使契丹景遂上言力諫以為易國士也宜夙夜納誨今使航不測之淵報聘遠夷非國之利元宗報之曰易固奇士海神當畏之竟遣行景遂在東宫十三年屢乞歸藩交泰元年三月始改授天䇿上將軍江南西道兵馬元帥洪州大都督太尉尚書令晉王以樞密副使李徵古為鎮南節度副使佐之徵古習驕嫚至鎭專恣尤甚景遂積久不能堪欲斬之而自拘有司左右諫止初景遂之出鎮也𢎞冀為太子𢎞冀嘗被譴於元宗有復立景遂之意景遂在鎭亦頗忽忽多忿譟嘗以忤意殺都押衙袁從範之子𢎞冀刺知之乃使親吏持酖遺從範使毒景遂景遂擊鞠而渴索漿從範毒漿以進之暴卒年三十九未歛體已潰元宗素友愛聞訃悲悼左右欲少慰釋之因妄曰太弟初得疾忽語人曰上帝命我代許旌陽元宗始少解故被酖之事竟不之知廢朝七日贈太弟諡文成景達生於吳順義四年是嵗大旱烈祖方輔政極於焦勞七月既望雩而得雨景達以是日生烈祖喜故小名雨師稍長神觀爽邁異於他兒烈祖深器之受禪封信王烈祖欲以為嗣難於越次故不果烈祖殂景遷已前死元宗稱疾固讓景遂欲以次及景達承先帝遺意既迫於羣下之議不得行乃立景遂為太弟景達自燕王徙封齊王為諸道兵馬元帥中書令景達孝友純至嘗從遊後苑泛舟池中元宗舟覆景達在他舟初不善泅遽躍入水中負元宗出人以為精誠所感性剛正疾惡朝廷嚴憚之帝每召宗室近臣曲宴馮延己延魯魏岑陳覺輩憑寵笑呼旁若無人景達屢訶詰之復極諫元宗他日宴於東宫延己愧二弟之命不出於已欲以虚辭為徳陽醉撫景達背曰爾勿忘我景達不勝其忿拂衣入奏請斬延己元宗諭解久之乃已張易語景達曰殿下力未能去羣小而數面折之使之懼而自謀豈易測哉景達悟自是畏禍遇曲燕輒以疾辭保大末淮南交兵景達以元帥督師陳覺為監軍使軍政皆决於覺景達署牘尾而已朱元叛壽州陷皆覺為之景達亦不能詰初出師五萬而俘死亡叛者四萬景達及覺引殘兵歸金陵上還印綬元宗恐其無功自愧乃拜天䇿上將軍浙西節度使景達不敢當要鎭力辭改撫州大都督臨川牧在鎮十餘年後主嗣位加太師尚書令甚尊禮之卒於鎮年四十八在烈祖諸子中最為壽矣贈太弟諡昭孝遺命留葬江州廬山初景達好神仙道家之説記室徐鉉獻述仙賦以諷行於世景逷字宣遠烈祖初受禪以十二月二日為仁壽節景逷以是日生故小名仁壽烈祖甚愛之母种氏得譴宋皇后鞠養景逷如已出元宗嗣位封保寧王徙封信王出為䖍州節度使簡易節儉䖍人安其政贑令卒尉邵繼良攝令以令成䘮日張樂宴飲景逷立奏黜之毎有小過掌書記孫峴苦言規正之景逷大重之峴卒言及必流涕厚䘏其孤後主立進封江王加兼中書令元宗後主皆酷好浮屠羣臣化之政事日弛景逷獨尊六經名敎棑斥浮屠不少撓在鎮十一年卒年三十一贈中書令諡昭順元宗十子𢎞冀𢎞茂後主從善從鎰從謙從慶從信凡八人可見而從慶從信失其官封又二人并逸其名鍾皇后生𢎞冀後主從善從謙自𢎞茂以下皆不知其母𢎞冀元宗長子故唐之末民間相傳讖曰東海鯉魚飛上天而烈祖果育於徐氏因信符讖又有讖曰有一真人在冀川開口張弓向左邊元宗欲其子應之乃名之曰𢎞冀初封東平公徙王南昌元宗嗣位以弟景遂為兵馬元帥景達為副元帥誓於烈祖梓宫前約兄弟相傳而出𢎞冀留守東都及景遂為太弟又徙鎭潤州封燕王𢎞冀為人沉厚寡言周師陷廣陵吳越亦攻我常州元宗念𢎞冀尚少不習軍旅事遣使召還都部將趙鐸曰王雖富於春秋然元帥之重衆心所恃忽棄其師而歸則部下必亂歸欲何之𢎞冀善其言聞於元宗即日大為戰守之僃部分諸將皆愜服士心元宗使龍武都虞候柴克宏右衛將軍陸孟俊救常州至潤州樞密副使李徵古白以神衛統軍朱匡業代克宏歸𢎞冀察克宏有才略謂曰君第前戰吾當拒守表言克宏决可破賊常州危在旦暮臨敵易將兵家所忌臣請以身保其功克宏亦感激思奮馳至常州果大破吳越兵斬首萬級獲其將佐數十人俘於潤州𢎞冀以時方艱危悉驅出轅門斬之人壯其决然元宗以其專誅殺不悅者久之及太弟景遂力請歸藩而景達為元帥奔潰南歸獨𢎞冀有功遂立為太子參决政事元宗仁厚羣下多縱弛至是𢎞冀以剛斷濟之紀綱頗振起而元宗復怒其不遵法度一日怒甚以打毬杖笞之曰吾行召景遂矣𢎞冀大懼故景遂遇酖語在其傳元宗既請盟於周以在位久恥於降屈屢遣使請於世宗欲傳位𢎞冀使為大國附庸世宗賜書力止之其詞曰皇帝致書敬問江南國主茲睹來章僃形縟㫖叙此日傳讓之意述向來高尚之心仍以數載以來交兵不息僃陳追悔之事無非克責之辭雖古者省咎責躬因災致懼亦無以過也況君血氣方剛春秋鼎盛為一方之英主得百姓之驩心豈可高謝君臨輕辭世務與其慕希夷之道孰若懐康濟之誠且天災流行國家代有昔之聖哲所不能逃茍盛徳之日新斯景福之彌遠諒惟英敏必照誠懷書詞温潤略似敵國元宗乃已世宗遣使至亦别賜𢎞冀國信以為常顯徳六年七月𢎞冀屬疾數見景遂為厲九月丙午卒有司諡曰宣武句容尉張洎上書謂世子之德在侍饍問安今標顯武功垂示後世非所以防㣲杜漸也洎知元宗猶衘𢎞冀專殺事其說葢出於揣摩元宗果大以為然改謚曰文獻而洎由此進用𢎞茂字子松元宗第二子幼頴異善歌許格調清古年十四為侍衛諸軍都虞候封樂安公騎射擊刺皆精習又領兵職然不喜戎事每與賔客朝士燕遊惟以賦詩為樂初𢎞冀剛嚴人多憚之故時望歸𢎞茂保大九年七月卒追封慶王𢎞茂之幼有異僧言人壽夭禍福多騐元宗使視𢎞茂僧書九十一字以獻及卒年一十九從善字子師元宗第七子器度凝遠封紀國公使周會帝即位厚其禮遣翰林學士王著送之初從善與鍾謨相附結謨輒請以從善為嗣元宗雖不從然意亦自愛從善其遷南都也使主扈從諸軍元宗殂未御梓宫從善輒從徐遊求遺詔遊厲色拒之至金陵具以事聞後主素友愛略不以介意愈加輯睦進封韓王及貶制度降南楚國公開寳四年遣朝京師太祖已有意召後主歸闕即拜從善泰寜軍節度使留京師賜甲第汴陽坊封其母凌氏吳國太夫人後主聞命手疏求從善歸國太祖不許以疏示從善加恩慰撫幙府將吏皆授常參官以寵之而後主愈悲思每憑高北望泣下霑襟左右不敢仰視由是嵗時遊燕多罷不講常製却登高文曰玉斚澄醪金盤繡餻茱房氣烈菊蕋香豪左右進而言曰惟芳時之令月可藉野以登高矧上林之伺幸而秋光之待褒乎子告之曰昔子之壯也意如馬心如猱情槃樂恣驩賞忘勞悁心志於金石泥花月於詩騷輕五陵之得侣陋三秦之選曹量珠聘妓紉綵維艘被牆宇以耗帛論丘山而委糟年年不負登臨節嵗嵗何曾捨逸遨小作花枝金剪菊長裁羅被翠為袍豈知雈葦乎性忘長夜之靡靡宴安其毒累大德於滔滔今予之齒老矣心悽焉而忉忉愴家艱之如燬縈離緒之鬱陶陟彼岡兮跂予足望復關兮睇予目原有鴒兮相從飛嗟予李兮不來歸空蒼蒼兮風凄凄心躑躅兮淚連洏無一驩之可作有萬緒以纒悲於戲噫嘻爾之告我曽非所宜從善妃屢詣後主號泣後主聞其至輒避去妃憂憤而卒國人哀憐之國亡改授右神武大將軍太平興國初改右千牛衛上將軍雍熈四年卒年四十八從鎰元宗第八子初封舒國公改封蔣太祖親征揚州李重進遣從鎰朝行在進封鄧王出鎭宣州後主宴餞綺霞閣與近臣俱賦詩而後主自為序及貶制度降江國公太祖以不朝來討後主遣從鎰貢帛二十萬疋白金二十萬斤大兵悉已南渡從鎰留京師館懷信驛捷奏至百僚稱賀閣門趣隨班入邸吏亦謂當有貢獻其介潘慎修以為國被討瀕亡而使者旅賀非禮但奉方物以待罪太祖嘉其知禮為易供帳加賜牲餼上樽命知制誥李穆送從鎰歸國諭指令後主亟自歸仍命曹彬等緩攻以俟之而後主卒不行以至城陷從鎰從後主北歸改名從浦卒從謙元宗第九子數嵗為奕棋詩有思致後主賞歎之歴封鄂國公宜春王進吉王及貶制度降鄂國公歸朝為右神武大將軍淳化五年九月以本官出為安遠行軍司馬後不知其所終從慶失其官封從信逸其行實後主二子仲㝢仲宣皆昭惠周后所生仲㝢字叔章初封清源郡公國亡北遷宋授右千牛衛大將軍居後主䘮哀毁逾制太宗臨之遣使勞問終䘮賜積珍坊第一區久之自言族大家貧求治郡拜郢州刺史在郡以寛簡為治吏民安之淳化五年八月卒年三十七子正言好學亦早卒於是後主之後遂絶初江南聞後主㐫問父老皆巷哭及是其嗣續殄絶遺民猶為之興悼云仲宣小字瑞保與仲㝢同日受封仲宣封宣城公三嵗誦孝經不遺一字宫中燕侍合禮如在朝廷昭惠后尤愛之宋乾徳二年仲宣纔四嵗一日戲佛像前有大琉璃燈為猫觸墮地劃然作聲仲宣因驚癎得疾竟卒追封岐王諡懷獻時昭惠后已疾甚聞仲宣夭悲哀更劇數日而絶
