front:
  text: 三周本舒州宿松人漢南郡太守瑜之後瑜葬宿松即墓為祠子孫居其旁者猶數十家本少孤羈貧有勇力嘗獨格虎殺之呉武王起𨽻帳下勇冠三軍每奮躍先登攻堅摧鋒蒙犯矢石身無完膚戰罷輒自燒鐵烙其創食飲言笑自如累遷至淮南馬步使武王取江西撫州刺史危全諷率諸州兵十萬來争其地屯象牙潭楚人圍髙安以援全諷江西守將劉威警書至武王謀可將者列官嚴可求薦本時本從軍取蘇州不能下恥之稱疾卧家可求自往强起本本曰呉門之役非賊果强徒以我將帥權輕下皆専命故無功今必見起勿用偏裨乃可許之得精卒七千晨夜兼行武王初命之解髙安圍本曰楚人非欲下髙安第為全諷聲援爾今先敗全諷楚人必棄髙安走何足擊哉乃馳至象牙潭急擊之大破其軍擒全諷楚人亦遁吉州刺史彭玕信州刺史危仔昌皆棄城去江西之地始定本之初至也即揮兵進劉威欲留宴犒不許或曰敵兵盛宜審觀形勢何遽如此本曰賊衆加我十倍使我兵知之戰先奪氣矣急椉其鋒用之乃可有功已而果如所料武王奇其能遂用為信州刺史呉越將陳璋據衢州歸欵越人圍之武王遣本迎璋越人解圍出璋而列兵不動本遂以璋還裨將吕師造曰越有輕我心必怠請擊之本不可越人躡我軍至中道宿夜半本陽驚棄輜重走而設伏於旁越人果急追伏發前後夾擊盡殱其衆唐莊宗入洛呉遣司農卿盧蘋往聘還言莊宗知本名由是召為雄武統軍俄出鎮夀州改廬州加安西大將軍太尉中書令西平王本不知書然能尊禮儒士遇僚屬以禮士民愛之性朴拙無他才惟軍旅之事若生知者烈祖將受呉禪徐玠周宗等以本及李徳誠名位隆重諷之使率羣臣勸進本已昏老其子祚懼家禍代署表上之本初不知猶謂所親曰我受呉室厚恩老矣復能推戴異姓乎呉宗室臨川王濛廢居厯陽聞將傳禪乃殺監守者與親信兩人走詣本本即欲出見之祚固執不可本怒曰我家郎君也奈何不使我一見祚拒閉中門令外人執濛告之濛遂誅死本愧恨屬疾數月卒年七十七本晚好飲酒樂施予或曰公春秋已髙宜少儲積為子孫計本曰吾繫芒屩事呉武王位至將相何人所遺乎既卒太常言準令廢朝三日烈祖以本舊將命有司講求優典禮官言前朝嘗為汾陽王郭子儀廢朝五日詔用之謚恭烈葬給鹵簿子鄴鄴本長子也少驍勇每從其父征討本為信州刺史略地至建州道經險阨被圍垂困鄴躍馬救之手殺數十人翼本而出建人駭懼潰去事烈祖典親軍出為滁州刺史暴猛很戾常蓄飛揚之志烈祖以本故優容之聞厯陽公楊􅄥被執歎憤逾月國人亦以此稱其好義本卒後仕至廬州節度使昇元六年卒柴克宏父再用事呉有功至徳勝軍節度使克宏以父任為郎將嘗為宣州巡檢使初至城塹皆堙圮不治吏云自田頵王茂章李遇相繼叛無敢為守備者克宏嘻笑曰豈有是哉大加營繕後呉越兵至賴以得全積遷泗州刺史罷歸為龍武軍都虞候好施予不事産業故家常窮空然性豪舉博奕縱酒自若也時元宗自謂唐後規取中原復舊業羣臣多為大言以迎合主意克宏獨未嘗一語及軍旅人亦不以為知兵以故不遷久之出為撫州刺史時淮南交兵呉越伺間來寇克宏乃請効死行陣元宗嘉之授右衛將軍遣與右衛將軍袁州刺史陸孟俊同救常州精兵悉在江北克宏所將􅅻羸卒數千樞密副使李徵古給戈甲皆朽鈍克宏言於徵古曰卒已非素練得器械堅利猶可用奈何所給乃此等徵古嫚罵之見者皆忿克宏知徵古狂生不足與較是非怡然不少動至潤州徵古終不快白召克宏歸以神武衛統軍朱匡業代之燕王宏冀獨以為克宏可任卒遣行克宏帥師至常州徵古猶遣使趣其歸克宏曰吾計日破寇爾何為者必錢氏所遣奸人也命斬之使者曰受李樞密命來克宏曰李樞密來吾亦斬之遂斬使者以徇然後勒兵進大破呉越兵於常州斬萬級獲其將數十人自保大來邊事大起克敵之功莫先克宏者拜奉化軍節度使復上疏請援夀春行至泰興發瘍數日卒國人莫不痛惜謚威烈或云初克宏母自表其子可為將徵古抑之母又言克宏有父風茍不勝任分甘孥戮元宗始用焉及徵古誅死詔暴其罪亦以折辱克宏為言云何敬洙廣陵人幼遇亂呉將楚州刺史李簡得之給事左右簡酷暴僕使有小過率置之死不少貸敬洙與其伍戯小㕔下有持簡所寶硯過焉顧曰孰敢毁此者敬洙時被酒奮曰死生有命何不敢之有奪硯擲石階上碎之翼旦簡視事退聞硯毁詰主者具以實對即命擒至皆謂必死矣簡妻素奇敬洙匿之堂奥旬日簡謂已逃去亦置不問㑹有烏逐簡而噪避之亦隨至大怒曰恨何敬洙不在此敬洙善射命中無所遺故思之語未畢敬洙挾朱彈鐵丸拜於前拜起一發斃之簡大喜不復詰毁硯事有善相者簡使相諸子曰雖皆善然無及公者獨指敬洙曰此人殆過公簡由是益愛之及長用為軍校簡卒事烈祖為裨將進天威軍都虞候建州之役為行營招討馬步軍都指揮使㑹查文徽進討敬洙堅謂閩地僻陋不足勞大兵文徽開譬之不得已而行及平建州敬洙功最諸將然以功推王建封無吝色拜楚州團練使敬洙自以初事李簡於是州尤自感勵常㣲服逰里巷察民疾苦有科調輙先為經畫民不知勞坐聽事與賓佐譚讌民有訴事者立引入親自剖折曲直皆厭服而出保大八年楚朗州節度使馬希蕚來附且乞師元宗命敬洙援之遷武昌軍節度使周人侵淮南命武安軍節度使王進逵領所部舟師入江南境進逵奉詔行且遣部將潘叔嗣為先鋒取鄂州長山寨殺三千人元宗命敬洙清野入保敬洙格詔出城除地為戰塲曰敵至吾與丘民俱死於此丈夫豈能惴惴閉門自守邪㑹叔嗣自長山回戈襲朗州進逵狼狽而去人重其决加鎮國將軍中書令後主嗣位以病足乞解官授右衛上將軍芮國公致仕給全俸第門列㦸乾徳二年二月卒年七十七廢朝三日命樞密使中書侍郎朱鞏持節冊贈鄂州大都督左衛上將軍謚威烈王㑹廬州廬江人本名安少事呉武王王嘗臨戰升髙冢望敵安捧唾壺侍側左右皆注目前視忽有卒持矟徑趨王莫能禦者㑹置壺於地引弓射之一發而殪徐納弓弢中復捧壺立色不變王喜撫其背曰汝器度如此他日必富貴積功至袁州刺史烈祖代呉用為百勝軍節度使䖍州與嶺南地接南漢使者往來節度使當燕勞問遺而㑹故名犯漢王祖諱乃賜今名昇元五年卒年七十三張延翰字徳華宋州睢陽人故唐之末任為陜州司馬從父慎思擢徐州留後延翰往省之告以北方將亂欲避地江淮以全家祀慎思是其言慨然遣之入呉為鹽城令有治績烈祖以平章事領江州封潯陽侯表延翰為江州觀察巡官通判軍府事烈祖代呉入為侍御史判臺事張宣為左衛使恃功驕暴延翰廷劾之强豪屛跡進禮部侍郎自以起疏逺遭時被知得盡已才感槩自盡時未設貢舉士有獻書論事者第其優劣選用烈祖悉以委延翰號為精覈稱職兼選事務進孤貪吏不敢為姧利元宗輔政謂人曰張君議論公正處事悉有條理吾得傾心聽之由是六司綜領殆遍時望歸重拜中書侍郎同平章事時年纔五十餘人猶以為柄用晩屬疾益侵不復能治事烈祖以為國器方一意任之不許其去遣使勞問賜良藥旁午於道卒年五十七贈太𫝊馬仁裕徐州人唐北平王燧裔孫世為武寧軍校仁裕母方娠夢傳呼北平王來歸及生紫氣充庭數歲學兵法通解若素習遇亂南奔事烈祖為昇州牙吏烈祖領潤州仁裕監蒜山渡首聞朱瑾之亂馳入白之烈祖即日渡江定亂以功遷左領軍將軍厯楚州刺史右金吾衛大將軍烈祖代呉拜潤州節度使徙廬州為政寛簡亷平甚得民心昇元六年卒於鎮初烈祖左右小臣親信者惟周宗及仁裕兩人任遇略等宗力贊禪代事遂輔政其後富盛冠一時仁裕資長者獨退然安於外鎮晚益貧窶不悔也卒年六十三謚曰匡游簡言字敏中建安人父恭呉駕部員外郎知制誥簡言少孤力學起家祕書省正字烈祖鎮金陵以為戸曹㕘軍典元帥府書檄遷觀察推官烈祖代呉為中書舍人元宗嗣位遷翰林學士禮部侍郎貞介獨不附權要元宗頗重其為人命判中書省兼吏兵部選事裁抑僥倖憎疾者衆選人邵唐試判不中上書言簡言父恭嘗為鄂州林洪掌書記洪奬成朱温簒弑恭預其謀簡言逆臣子當斬請正國法元宗怒唐挾私忿謗讟决杖流饒州及淮南交兵呉越亦伺釁攻常州執團練使趙仁澤歸於錢塘仁澤見呉越王責以敗盟呉越王怒抉其口至耳方議遣使詰責呉越羣臣畏懾莫敢往元宗以命簡言簡言不辭見其子愻為千牛備身將發拜中書侍郎未出境召還及遷都豫章立呉王為太子留西都監國以簡言為輔簡言力辭言乆備近臣不忍去帷幄元宗嘉其一心事主無徼後福意即從其請更用嚴續而後主亦由是賢之拜吏部尚書知省事簡言親治簿書督責嚴峻人或以事請托必固違咈雖直亦不得伸議者譏其過拜左僕射兼門下侍郎同平章事疾已篤不及視事卒年五十七刁彦能字徳明上蔡人父禮遇亂徙家宣州彦能少孤事母篤孝家貧無以養乃事節度使王茂章茂章叛呉歸呉越彦能以帳下當從乃使家人扶其母俟於道左彦能泣告茂章曰彦能有老母在此不能捨而從公敢請死茂章哀其意許之乃馳還宣州而城中已亂彦能登城以劒招之曰我從王府來大軍已近爾輩無妄動衆信之稍定義祖聞而嘉之以為軍校事其子知訓於廣陵知訓狂恣彦能每切諫不聽然亦不加罪牙將馬謙以衆擁呉主登宫門將殺知訓彦能從朱瑾入手斬謙以獻賞賚甚厚然彦能警敏觀知訓必敗而人望在烈祖心常附焉知訓忌烈祖數欲害之嘗與烈祖飲酒而伏劒士室中彦能行酒以爪語烈祖烈祖悟亟起去又嘗從知訓宴烈祖於山光寺復欲加害弟知諫摘語烈祖烈祖亦馳去知訓取佩刀授彦能使追殺之及于途舉刀示先主乃還以不及告及知訓死義祖見彦能諫書歎異復使事知諌於潤州遷裨將烈祖代呉入為環衛遷至天威軍都虞候左衛使金陵數大水秦淮溢東闗尤被害彦能請築隄為斗門疏導之水患稍息元宗嗣立出為饒州節度使徙信州又徙建州留後撫州節度使彦能好讀書在鎮委任文吏頗有治稱好作詩嘗與李建勲相答贈建勲因燕見及之元宗笑曰殊不知彦能乃西班學士也性矜莊燕居容服不少惰時貴宴飲或蓬首裸袒彦能在坐則皆肅然保大末卒年六十八子衎事後主為祕書郎集賢校理以文翰見知擢直清輝殿閲中外章奏國亡入朝仕至兵部郎中直祕閣崇文院檢討淳淡夷粹恬於仕進暇日鼓琴圍碁不交人事衎孫約亦名士乆在三館晩築室潤州號藏春塢王安石蘇軾皆尊愛之
