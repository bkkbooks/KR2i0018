body:
  text: 南唐書列傳卷苐十三烈祖元敬皇后宋氏小名福金父韞江夏人后幼流離亂兵中升州刺史王戎得后烈祖娶戎女后為媵得幸生元宗王氏早卒義祖命烈祖以為繼室封廣平郡君晉國君治內有法不妄言笑義祖殂于金陵烈祖在東都將奔喪后密以大計諌止焉烈祖為齊王封王妃及受禪立為后從容裨贊多所弘益烈祖嘗曰吾思有未逹后已悟矣升元末烈祖服金石藥多㬥怒賴后以免譴者甚衆及殂中書侍郎孫忌懼魏岑馮延巳延魯以東宫舊僚用事欲稱遺詔奉后臨朝聽政后不許曰此武后故事吾豈為之元宗即位尊后為皇太后保大三年十月卒祔葬永陵烈祖後宫种氏名時光性警惠年十六入宫列樂部中俄得幸生景逖烈祖以受禪後所得子甚愛之种氏寵日盛烈祖性嚴整嘗大怒聲如乳虎殿門環為震動左右皆喪魂魄种氏左手持食右手進匕從容如平時烈祖怒亦頓解它日烈祖幸齊王宫遇王親理樂器大怒數日未解种氏負寵輒乘間言景逖才過齊王烈祖正色曰子有過父教之常禮也若何敢爾叱下殿去簪珥幽于别宫數月命度為尼景蕩愛亦弛終烈祖丗獨不加封爵元宗即位始封景逖保寧王許种氏就飬于景逖宫中封王太妃宋后挾舊怨屢欲加害元宗力解之乃止元宗光穆皇后鍾氏父太章事吳為義祖裨將義祖謀誅張灝令嚴可求喻太章伏死士二十輩斬灝于府太章許諾義祖疑其怯夜半往止之曰僕毋老懼事不成欲徐圖之如何太章勃然曰言已出口豈有可巳之理眀日遂誅灝後頗恃功頡頑烈祖疑其難制義祖曰昔者吾赤族之禍間不容髮使無太章豈有今日冨貴耶奈何以薄物細故疑之乃命以太章次女配元宗即后也升元中封齊王妃元宗即位立為皇后後主即位為太后以父名改稱聖尊后后寢疾後主朝夕侍側衣不解帶藥必親嘗乃進乾德三年十月卒是日雨沙于金陵後主毁瘠骨立杖而後䏻起哀動左右葬順陵後主昭惠國后周氏小名娥皇司徒宗之女十九歲來㱕通書史善歌舞尤工琵琶嘗為夀元宗前元宗歎其工以燒槽琵琶賜之至于采戲奕棋靡不妙絶後主嗣位立為后寵嬖專房創為髙髻纎裳及首翹鬢朵之粧人皆效之嘗雪夜酣燕舉杯請後主起舞後主曰汝能創為新聲則可矣后即命箋綴譜喉無滯音筆無停思俄頃譜成所謂邀醉舞破也又有恨來遲破亦后所製故唐盛時霓裳羽衣最為大曲亂離之後絶不復傳后得殘譜以琵琶奏之于是開元天寶之遺音復傳于丗內史舍人徐鉉聞之于國工曺生鉉亦知音問曰法曲終則㣪此聲乃反急何也曺生曰舊譜實緩宮中有人易之非吉徴也後主以后好音律因亦耽嗜廢政事監察御史張憲切諌賜帛三十匹以旌敢言然不為輟也未幾后臥疾已革猶不亂親取元宗所賜燒槽琵琶及平時約臂玉環為後主别乃沐浴粧澤自內含玉卒于瑶光殿年二十九葬懿陵後主哀自裂誄刻之石與后所愛金屑檀槽琵琶同葬又作書燔之與訣自稱鰥夫煜其辭數千言皆極酸椘或謂后寢疾小周后巳入宫中后偶褰㡢見之驚曰汝何日來小周后尚幼未知嫌疑對曰既數日矣后恚怒至死面不外向故後主過哀以掩其迹云後主國后周氏昭惠后妹也昭惠卒未幾後主居聖尊后喪故中宫久虗開寶元年始議立后為繼室命太常博士陳致雍考古今㳂革草具婚禮又命學士徐鉉史官潘佑參定文安郡公徐逰評其異同逰多是佑議遂施用之逾月逰病疽鉉懟其不主巳議戲語人曰周孔亦能為厲乎后少以戚里間入宫掖聖尊后甚􅋢之故立焉被寵過于昭惠時後主于群花間作亭雕鏤華麗而極迫小僅容二人每與后酣飲其中國亡從後主北遷封鄭國夫人太平興國三年後主殂后悲哀不自勝亦卒後主保儀黃氏江夏人父守忠事湖南馬氏為偏裨邊鎬入長沙得黃氏納後宫後主見其美選為保儀以工書扎使專掌宮中書籍二周后相繼專房燕故保儀雖見賞識終不得數御幸也元宗後主俱喜書法元宗學羊欣後主學桞公權皆得十九購藏鍾王己來墨帖至多保儀實掌之城將陷後主謂之曰此皆先帝所寶城若不守汝即焚之無為他人得及城陷悉㷊無遺者保儀亦從北遷卒于大梁又有宫人流珠者性通慧工琵琶後主演念家山破及昭惠所作邀醉舞恨來遲二破久而忘之後主追念昭惠問左右無知者流珠獨能追憶無所忘失後主大喜後不知所終烈祖五子宋皇后生元宗楚王景遷晉王景遂齊王景逹种氏生江王景逖景遷字子通幼警敏讀書一覽輒不忘烈祖輔吳景遷尚吳公主為駙馬都尉歷衙內馬步軍都指揮使海州團練使左右軍都軍使遂以左僕射參政事留東都輔政時甫成童尋加同平章事知左右軍使寢疾罷㱕金陵為諸道副都統以景遂代輔政景遷病逾年竟卒年十九諡曰㝎無子初術士皆謂景遷貴不可言故烈祖在諸子中尤愛之及是始悟術士之妄景遂仕吳為門下侍郎烈祖受禪封夀王純厚夷淡有士君子之操讓皇之喪景遂受命往護喪事望柩哀慟觀者聳歎烈祖殂元宗以位讓景遂大臣固持之而止眀年又命景遂總庶政已降詔僉謂不可乃收所下詔久之又以為太弟凡太子官屬皆改為太弟官屬景遂固辭雖不得命終恐懼不敢安處乃取老子功成名遂身退之意自為字曰退身以見志平居好客喜屬文燕集無虗日贊善大夫張易峭直喜盡言景遂嘗賦詩頗纎麗易面規之景遂敬納又嘗怒碎玉杯于坐景遂亟摧謝無忤色及易出使契丹景遂上言力陳以為易國士也冝夙夜納誨今使抗不測之淵報聘逺夷非國之利元宗報之曰易固竒士海神當畏之竟遣行景遂在東宫十三年屢乞㱕藩交泰元年三月始改授天䇿上將軍江南西道兵馬元帥洪州大都督太尉尚書令晉王以樞密副使李徴古為鎮南節度副使佐之徴古習驕嫚至鎮專恣尤甚景遂積久不能堪欲斬之而自拘有司左右諌止初景遂之出鎮也弘兾為太子弘兾嘗被譴于元宗有𣸪立景遂之意景遂在鎮亦頗忽忽多忿躁嘗以忤意殺都押衙袁從範之子弘兾刺知之乃使親吏持鴆遺從範使毒景遂景遂擊鞠而渴索漿從範毒漿以進之㬥卒年三十九未斂體巳潰元宗素友愛聞訃悲悼左右欲少慰釋之因妄曰太弟初得疾忽語人曰上帝命我代許旌陽元宗始少解故被鴆之事竟不之知廢朝七日贈太弟諡文成景逹生于吳順義四年是歲大旱烈祖方輔政極于焦勞七月既望雩而淂雨景逹以是日生烈祖喜故小名雨師稍長神觀爽邁異于他兒烈祖深器之受禪封信王烈祖欲以為嗣難于越次故不果烈祖殂景遷已前死元宗稱疾固讓景遂欲以次及景逹承先帝遺意既迫于群下之議不得行乃立景遂為太弟景逹自燕王徙封齊王為諸道兵馬元帥中書令景逹孝友純至嘗從逰後苑泛舟池中元宗舟覆景逹在他舟初不善泅遽躍入水中負元宗出人以為精誠所感性剛正嫉惡朝廷嚴憚之帝每召宗室近臣曲宴馮延已延魯魏岑陳覺輩憑寵笑呼㫄若無人景逹屢訶詰之復極諌元宗它日宴于東宫延巳愧二弟之命不出于已欲以虗辭為德陽醉撫景逹背曰爾勿忘我景逹不勝其忽拂衣入奏請斬延巳元宗諭解久之乃巳張易語景逹曰殿下力未能去羣小而數面折之使之懼而自謀豈易測哉景逹悟自是畏禍遇曲宴輒以疾辭保大末淮南交兵景逹以元帥督師陳覺為監軍使軍政皆决于覺景逹署牘尾而巳朱元叛夀州陷皆覺為之景逹亦不䏻詰初出師五萬而俘死亡叛者四萬景逹及覺引殘兵㱕金陵上還印綬元宗恐其無功自愧乃拜天䇿上將軍浙西節度使景逹不敢當要鎮力辭改撫州大都督臨川牧在鎮十餘年後主嗣位加太師尚書令甚尊禮之卒于鎮年四十八在烈祖諸子中最為夀矣贈太弟諡昭孝遺命留葬江州廬山初景逹好神仙道家之說記室徐鉉獻述仙賦以諷行于世景逖字宣逺烈祖初受禪以十二月二日為仁夀節景逖以是日生故小名仁夀烈祖甚愛之毋种氏得譴宋皇后鞠飬景逖如已出元宗嗣位封保寧王徙封信王出為䖍州節度使簡易節儉䖍人安其政贑令卒尉邵繼良攝令以令成喪日張樂宴飲景逖立奏黜之每有小過掌書記孫峴苦言規正之景逖大重之峴卒言及必流涕厚恤其孤後主立進封江王加兼中書令元宗後主皆酷好浮屠羣臣化之政事日弛景逖獨尊六經名教排斥浮屠不少撓在鎮十一年卒年三十一贈中書令諡昭順元宗十子弘兾弘茂後主從善從鎰從謙從慶從信凡八人可見而從慶從信失其官封又二人并逸其名鍾皇后生弘兾後主從善從謙自弘茂以下皆不知其毋弘兾元宗長子故唐之末民間相傳䜟曰東海鯉魚飛上天而烈祖果育于徐氏因信符䜟又有䜟曰有一真人在兾川開口持弓向左邊元宗欲其子應之乃名之曰弘兾初封東平公徒王南昌元宗嗣位以弟景遂為兵馬元帥景逹為副元帥誓于烈祖椊宫前約兄弟相傳而出弘兾留守東都及景遂為太弟又徙鎮潤州封燕王弘兾為人沉厚寡言周師陷廣陵吳越亦攻我常州元宗念弘兾尚少不習軍旅事遣使召還都部將趙鐸曰王雖冨于春秋然元帥之重衆心所恃忽棄其師而㱕則部下必亂㱕欲何之弘兾善其言聞于元宗即日大為戰守之備部分諸將皆愜服士心元宗使龍武都虞候柴克宏右衛將軍陸孟俊救常州至潤州樞密副使李徴古白以神衛統軍朱匡業代克宏㱕弘兾察克宏有才略謂曰君苐前戰吾當拒守表言克宏决可破賊常州危在旦暮臨敵易將兵家所忌臣請以身保其功克宏亦感激思奮馳至常州果大破吳越兵斬首萬級獲其將佐數十人俘于潤州弘兾以時方艱危悉驅出轅門斬之人壯其决然元宗以其專誅殺不悅者久之及太弟景遂力請㱕藩而景逹為元帥奔潰南㱕獨弘兾有功遂玄為太子參决政事元宗仁厚羣下多傱弛至以弘兾以剛斷濟之紀綱頗振起而元宗復怒其不遵法度一日怒甚以打毬杖笞之曰吾行召景遂矣弘兾大懼故景遂遇鴆語在其傳元宗既請􅉀于周以在位久耻于降屈屢遣使請于丗宗欲傳位弘兾使為大國附庸丗宗賜書力止之其詞曰皇帝致書敬問江南國主兹睹來章備形縟㫖叙此日傳讓之意述向來髙尚之心仍以數載以來交兵不息備陳追悔之事無非克責之辭雖古者省咎責躬因災致懼亦無以過也况君血氣方剛春秋鼎盛為一方之英主得百姓之歡心豈可髙謝君臨輕辭世務與其慕希夷之道孰若懷康濟之誠且天災流行國家代有昔之聖哲所不能逃苟盛德之日新則景福之彌逺諒惟英敏必照誠懷書詞溫潤略以敵國元宗乃已丗宗遣使至亦别賜弘兾國信以為常顯德六年七月弘兾屬疾數見景遂為厲九月丙午卒有司諡曰宣武句容尉張洎上書謂丗子之德在侍膳問安今標顯武功垂示後世非所以防微杜漸也洎知元宗猶銜弘兾專殺事其說蓋出于揣摩元宗果大以為然改諡曰文獻而洎由此進用弘茂字子松元宗苐二子幼頴異善歌詩格調清苦年十四為侍衛諸軍都虞候封樂安公騎射擊刺皆精習又領兵職然不喜戎事每與賔客朝士燕逰惟以賦詩為樂初弘兾剛嚴人多憚之故時望㱕弘茂保大九年七月卒追封慶王弘茂之幼有異僧言人夀夭禍福多驗元宗使視弘茂僧書九十一字以獻及卒年十九從善字子師元宗苐七子器度凝逺封紀國公使周㑹帝即位厚其禮遣翰林學士王著送之初從善與鍾謨相附結謨輒請以從善為嗣元宗雖不從然意亦自􅋢從善其遷南都也使主扈從諸軍元宗殂未御梓宫從善輒從徐逰求遺詔逰厲色拒之至金陵具以事聞後主素友􅋢略不以介意愈加輯睦進封韓王及貶制度降南椘國公開寶四年遣朝京師太祖已有意召後主㱕闕即拜從善泰寧軍節度使留京師賜甲苐汴陽坊封其毋陵氏吳國太夫人後主聞命手疏求從善㱕國太祖不許以疏示從善加恩慰撫幕府將吏皆授常參官以寵之而後主愈悲思每憑髙北望泣下霑襟左右不敢仰視由是歲時逰燕多罷不講嘗製却登髙文曰玉斝澄醪金槃繡糕茱房氣烈菊蕊香豪左右進而言曰惟芳時之令月可藉野以登髙矧上林之伺幸而秋光之待褒乎豫告之曰昔豫之壯也意如馬心如猱情槃樂恣􅌚賞忘勞悁心志于金石泥花月于詩騷輕五陵之得侣陋三秦之選曹量珠聘妓紉綵維艘被墻宇以耗帛論丘山而委糟年年不負登臨節歲歲何曽捨逸遨小作花枝金剪菊長裁羅被翠為袍豈知萑葦乎性忘長夜之靡靡宴安其毒纍大德于滔滔今豫之齒老矣心悽焉而忉忉愴家難之如燬縈離緒之鬱陶陟彼岡兮跂豫足望彼關兮睇豫目原有鴒兮相從飛嗟豫季兮不來㱕空蒼蒼兮風凄凄心躑躅兮淚漣洏無一歡之可作有萬緒以纏悲嗚呼噫嘻爾之告我曽非所冝從善妃屢詣後主號泣後主聞其至輒避去妃憂憤而卒國人哀憐之國亡改授右神武大將軍太平興國初改右千牛衛上將軍雍熙四年卒年四十八從鎰元宗弟八子初封舒國公改封蔣太祖親征揚州李重進遣從鎰朝行在進封鄧王出鎮宣州後主宴餞綺霞閣與近臣俱賦詩而後主自為序及貶制度降江國公太祖以不朝來討後主遣從鎰貢帛二十萬匹白金二十萬斤大兵悉以南渡從鎰留京師館懷信驛捷奏至百僚稱賀閣門趣隨班入邸吏亦謂當有貢獻其介潘慎修以為國被討且亡而使者旅賀非禮但奉方物待罪太祖嘉其知禮為易供張加賜牲餼上樽命知制誥李穆送從鎰㱕國諭指令後主自㱕仍命曺彬等緩攻以俟之而後主卒不行以至城陷從鎰從後主北㱕改名從浦卒從謙元宗苐九子數歲為奕棋詩有思致後主賞歎之歷封鄂國公冝春王吉王及貶制度降鄂國公㱕朝為右神武大將軍淳化五年九月以本官出為安逺行軍司馬後失其所終後主二子仲㝢仲宣皆昭惠周后所生仲㝢字叔章乾德二年封清源郡公北㱕授右千牛衛大將軍居後主喪哀毀過制太宗憐之遣使勞問終喪賜積珍坊苐一區久之自言族大家貧求治郡拜郢州刺史在郡以寬簡為治士民安之淳化五年八月卒年三十七子正言亦好學早卒無子後主之後遂絶仲宣小字瑞保與仲㝢同日封宣城公三歲誦孝經不遺一字宫中燕侍合禮如在朝廷昭惠后尤􅋢之乾德二年卒才四歲追封岐王諡懷獻后先屬疾聞仲宣夭悲哀增劇至于死南唐書列傳卷苐十三
