body:
  text: 南唐書列傳卷第四徐玠字藴圭彭城人事帥崔洪為軍吏洪避朱全忠南奔遣玠先見吳武王因得事吳纍居右職師出江西為糧料使江西平授吉州刺史玠初為小校以幹敏稱及治郡貪猥不治烈祖輔政罷之而義祖悅其善事人引以為副使遂見親狎玠挾宿怨且希義祖意每與嚴可求言烈祖踈財結士不冝久執國權請以嫡子知詢代之事垂行而義祖殂知詢繼立玠本詭譎多智善揣摩非能為徐氏計也至是察知詢必敗反持其長短自結于烈祖烈祖亦遂􅋢之盡忘前事鎮金陵以為行軍司馬與周宗李建勳孫忌首參代吳祕計遂以佐命拜右丞相出為宣州節度使徙洪州兼中書令復召為司徒右丞相然徒崇以名位不復預政老而益貪鄙所至人患苦之好神仙之說常以下價市丹砂惡者治丹人以為笑保大元年五月卒年七十六贈髙平郡王髙審思失其家世鄊里少以驍勇事吳武王從劉信平䖍州有功為人重厚沉默烈祖􅋢之用為神武統軍出鎮夀州兼侍中在鎮治守備常如有警或曰以公威略守堅城何太懼耶審思曰事變無常不可不過為之備及保大末周人來侵諸郡往往一鼓而下惟夀州䏻堅守以世宗英武將士皆精練然逾年極兵力不可取雖劉仁贍善守亦審思之遺績也卒于鎮年七十五廢朝三日贈太師諡曰忠初術者悉言審思位不至刺史嘗受命刺常州固辭不敢行而其後位兼將相終始冨貴術之不足信如此鍾謨字仲益㑹稽人徙建安李德眀失其家世鄊里保大中俱為尚書郎敏于占對元宗􅋢之而天資皆浮躁沾沾自衒反覆嶮巇朝士側目號為鍾李時魏岑巳年復用奸諛彌甚謨德眀雖與岑若不同至為惡則合若符劵户部貟外郎范沖敏擲使軍帥王建封上書歷詆之請選用正人元宗大怒謂建封武人握兵不當輒議國政流建封池州未至殺之沖敏棄市謨德眀自謂君寵可沽愈縱肆㫄若無人德眀嘗奏事别殿取元宗所御筆記事元宗不能堪曰卿他日自可持筆來德眀亦自若謨遷翰林學士户部侍郎德眀遷工部侍郎文理院學士元宗雅稱兩人有辭辨欲令說周罷兵遣如夀州城下貢御服及犒軍牛酒世宗前知其欲以口舌遊說大陳兵衛戈㦸以見之謂曰江南自謂唐室苗裔衣冠禮樂異于他國與朕隔一水未嘗遣使修好唯航海通北虜此何禮也今又比朕六國愚主謂可說使罷兵何其不知朕也㱕語若主必臣事我則兵可罷不然徑往金陵借府庫犒軍若君臣得無悔乎兩人股栗不敢出言惟曰寡君震畏天威願獻壽濠泗楚光海六州及歲輸方物世宗以淮南諸州繼陷欲盡取江北地不許德眀見周師急攻夀州度旦暮且下乃曰寡君未能知大國兵力乃爾願寬臣數日之誅㱕國耴表盡獻江北郡縣世宗遣德眀㱕以書諭江南君臣語多誚讓陵肆國人已不堪而德眀方盛稱世宗威德請必割地元宗惡其言宋齊丘力詆割地為無益陳覺言德眀賣國以恱敵不可赦德眀佻薄語多過實知割地之說不行攘袂大言謂周師必克元宗益怒遂斬德眀于都市不𣸪議割地謨因留不得㱕及孫忌之死也謨亦在召中得不死貶為耀州司馬及元宗割地稱臣如謨德眀初議世宗乃召謨至京師授衛尉卿賜黃金五百兩遣諭指于元宗往𣸪數四謨既矜肆以為世宗聽其言江左可藉以無恐元宗亦方賴其力心雖憾之體貌加厚以為禮部侍郎判尚書省而三省之事靡不預之勢焰赫然宋齊丘陳覺李徴古之死皆出其計又白請雪德眀之罪贈光祿卿諡曰忠太子弘兾參總庶政謨薦其客閻式為司議郎百司關啓必申之俄而世宗崩謨自揆無所恃頗若有失元宗遇之亦浸薄初李德眀被誅唐鎬預其事至是鎬懼修怨不自安㑹鎬以納賄聞謨面詰其狀鎬愈懼信州刺史張巒入為天威軍都虞候謨素與之善每屏人共語或至中夜又嘗請使巒帥帳下兵巡都城鎬廉得之因密言謨往來兩國挾周人以脅制朝廷今與典兵者交結又請令巡徼輦下其􅊶藏殆不可測謨微聞之念無以為竒貨㑹弘兾卒後主以毋弟當立而謨嘗與元宗􅋢子從善同使周相與親厚乃言後主器輕志放無人君之度因盛稱從善才不知元宗建儲之意已决更以此忤指乃㬥其交結張巒等罪貶國子司業又貶著作佐郎安置饒州遣中使領侍衛軍十人即日督促乘驛而去謨時方病風眩在途賦詩十章語皆悽愴巒出為宣州副使建隆元年正月元宗聞太祖受周禪乃遣使如饒州賜謨死問曰卿昔與孫忌使周忌死而卿獨生還何也謨頓首服罪遂縊殺之巒亦坐誅謨有女感家禍不嫁為道士名守一博通孔老書尤善講說端拱中京師建洞真宫召守一為道職云常夢錫字孟啚扶風人或曰京兆萬年人也岐王李茂貞不貴文士故其俗以狗馬馳射博奕為豪夢錫少獨好學善屬文纍為秦隴諸州從事茂貞死子從儼襲父位承制補寶雞令後唐長興初從儼入朝以夢錫從及鎮汴為左右所譛遂來奔烈祖輔吳召置門下薦為大理司直及受禪擢殿中侍御史禮部貟外郎益見奬遇遂直中書省參掌詔命進給事中時以樞密院隸東省故機事多委焉夢錫厚重方雅多識故事數言朝廷因楊氏霸國之舊尚法律任俗吏人主親决細事煩碎失大體冝修復舊典以示後代烈祖納其言頗議簡易之法元宗在東宫有過失夢錫盡言規正無所撓始雖不悅終以諒直多之及即位首召見慰勉欲用為翰林學士以自近宋齊丘黨惡其不附已坐封駮制書貶池州判官及齊丘出鎮召為户部郎中遷諌議大夫卒以為翰林學士復置宣政院于內庭以夢錫専掌密命而魏岑已為樞密副使善迎合外結馮延已等相為表裡夢錫終日論諍不能勝罷宣政院猶為學士如故乃稱疾縱酒希𣸪朝㑹鍾謨李德眀分掌兵吏諸曺以夢錫人望言于元宗求為長吏拜户部尚書知省事夢錫恥為小人所惟薦固辭不得請惟署牘尾無所可否延已卒文致其閨門罪貶饒州團練副使夢錫時以醉淂疾元宗憐之留處東都留守周宗力勸夢錫止酒治疾從之乃少瘳召為衛尉卿改吏部侍郎復為學士交泰元年方與客坐談忽奄然卒年六十一卒後財逾月齊丘黨與敗元宗歎曰夢錫平生欲去齊丘恨不使見之贈右僕射諡曰康夢錫文章典雅有承平之風歌詩亦清麗然絶不喜傳于人剛褊少恕每以直言忤物常與元宗苦論齊丘輩元宗辨博曲為解釋夢錫辭窮乃頓首曰大姦似忠陛下若終不覺悟家國將為墟矣元宗不答而心善之及割地降號之後公卿在坐有言及周以為大朝者夢錫大笑曰汝輩嘗言致君堯舜何故今日自為小朝耶衆皆默然散去每公卿㑹集輒喑嗚大咤驚其坐人以故不為時所親附然既沒皆以正人許之雖其仇讎不敢訾也史虗白字畏名世家齊魯虗白隱居嵩少著書中原喪亂與北海韓熙載來㱕時烈祖輔吳方任用宋齊丘虗白誦言曰吾可代彼齊丘不平欲窮其技能召與宴飲設倡樂奕棋博戲酒數行使製書檄詩賦碑頌虗白方半醉命數人執𥿄口占筆不停綴俄而衆篇悉就詞采磊落坐客驚服虗白數為烈祖言中原方橫流獨江淮豐阜兵食俱足當長驅以㝎大業毋失事機為它日悔烈祖不能從虗白乃謝病去南逰至九江落星灣因家焉常乘雙犢版轅挂酒壺車上山童總角負一琴一酒瓢以從往來廬山絶意世事保大初熙載為史館修撰薦虗白可用元宗召見訪以國事對曰草野之人漁釣而已安知國家大計賜宴便殿醉溺于殿陛元宗曰真隱者也賜田五頃放還山及元宗南逰豫章次蠡澤虗白鶴裘藜杖迎謁道㫄元宗駐蹕勞問曰處士居山亦嘗有所賦乎曰近得溪居詩一聮使誦之曰風兩揭却居渾家醉不知元宗變色厚賜粟帛上樽酒徐鉉髙越謂之曰先生髙不可屈盍使二子仕乎虗白曰野人有子賢則立功業以道事眀主愚則負薪捕麋以飬其毋僕未嘗介意也不敢以纍公鉉越愧歎卒年六十八將終謂其子曰官賜吾美酒飲之略盡尚留一榼吾死置藜杖及此酒于棺中四時勿用祭享無益死者吾亦不歆子皆從之孫溫天聖中仕為虞部貟外郎獻虗白文集仁宗皇帝􅋢之追號虗白沖靖先生沈彬洪州髙安人唐末浪跡湖湘隱雲陽山好神仙喜賦詩句法清美烈祖輔吳表授祕書郎與元宗逰俄懇求還山以吏部郎中致仕元宗遷南都彬年八十餘來見曰臣久處山林不預丗事臣妻曰君主人郎君今為天子何不一往臣遂忘衰老而來元宗命毋拜厚賜粟帛以其子為祕書省正字彬晚歲嘗䇿杖郊原手植一樹識之語其子曰吾當藏骨于此及卒伐樹掘地至丈餘得一石槨製作精麗光潔可鑑蓋上有篆云開成二年夀槨舉棺就之廣袤中度次子廷瑞有道術嗜酒郤粒寒暑一單褐數十年不易跣行日數百里林棲露宿多在玉笥浮雲二山老而不衰後不知所終陳况閩人性夷淡隱于廬山四十年衣食乏絶不以動心苦思于詩得句未成章已播逺近元宗聞其名召見時方竒寒元宗見其衣單薄降手扎曰欲以綾綺衣賜卿卿必不受今賜朕自服紬縑衣三十事俄授江州士曺掾固辭㱕卒于山中年七十餘陳曙蜀人嘗舉進士唐末避地淮南多遁于蘄州山中鄊人有㑹集或祭神曙不待召而玉醉飽乃辭去由是人多設虗座陳酒肴以伺之同日㦯玉數家舍中唯一榻素書數卷與蛇虎雜居不設窗户雨雪滿室亦自若人有乘其出往窺之者曙必自外來凡數十年顔鬢不少異元宗命中書舍人髙越召之不肯起後徙居鄂渚及洪之西山不知所終陳陶嶺南人少學長安升元中南奔將求見烈祖自度不合乃隱洪州西山歎曰世豈無麟鳳國家自遺之耳保大末有星孛于參芒指東南陶語人曰國其幾亡乎果失淮南元宗南遷豫章至落星灣將訪以天象恐陶不肯盡言以其素嗜鮓乃使人僞言賣鮓至門陶杲出啖鮓喜甚賣鮓者曰官舟至落星矣處士知之乎陶笑曰星落不還元宗聞之不懌遂不𣸪問是歲果晏駕西山産靈藥陶與妻日斸而餌之不知所終開寶中南昌市有一老翁丫髻被褐與老嫗賣藥得錢則沽酒市鮓相對飲啖既醉歌舞道上其歌曰藍采和藍采和塵丗紛紛事更多何如賣藥沽美酒㱕去青崖拍手歌或疑為陶夫婦云江夢孫字聿修潯陽人烈祖輔吳表為祕書郎夢孫數自言迂儒無禆益平生讀書欲小試于治民求為縣令方是時士之客于烈祖者率以功名冨貴自許而夢孫言獨如此烈祖以為不情不之許也求不已乃補天長令烈祖先持告身示之曰今日受此眀日趨走庭下矣曰此素志也庸何傷乃授之至天長吏白縣署正寢有淫厲不可居夢孫不從是夕果有怪並出夢孫起㷊香曰夢孫受命為令當冶事于此鬼神有祠廟丘壟胡不各㱕其所吾行不欺暗室奚畏君等語訖皆斂迹夢孫治縣寬簡吏民安之逾年棄官去縣人號泣送之數十里還家事繼母盡孝早暮潔衣冠視膳羞母食既徹為諸生講禮凡至疑義輒衽曰此科先儒猶多異同夢孫安敢輕言諸君自擇所長可也保大中卒年八十五贈國子司業毛炳洪州豐城人隱居廬山時為諸生講得錢即沽酒嘗醉臥道㫄有里正掖起之炳瞋目呵之曰醉者自醉醒者自醒亟去毋撓豫睡後徙居南臺山數年忽書齊壁曰先生不住此千載惟空山因大醉一夕卒與炳同時又有酒秃者焉酒秃姓髙氏駢族子棄家祝髮博極群書善講說而脫略跌宕無日不醉後主召講華嚴梵行一品賚金帛甚厚玄寂即日盡送酒家日夜劇飲醉則從小兒數十浩歌道中歌曰酒兔酒秃何榮何辱但見衣冠成古丘不見江河變陵谷一日醉死于石子岡南唐書列傳卷苐四
