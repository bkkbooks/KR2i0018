body:
  text: 南唐書列傳卷苐九孟堅始事建州王延政為将保大初查文徽討王氏之亂堅來降文徽即以兵付之出竒鏖擊有功及馮延魯之攻福州也堅亦在兵間吴越援兵自海道至阻淖不得登㟁延鲁不知兵急扵破敵欲歛兵誘而蹙之堅諌曰吴越兵進退俱不能方致死扵我使得至平地未見可勝也延鲁大言曰吾自擊之無預君事吴越得平地果不可制李弘義兵自城中出盡銳夾擊延鲁大敗棄軍遯堅力戦以死延魯雖貶而其黨方盛故堅之死事不見錄國人衰之陳誨違州人生數月趫徤能馳走其父異之名之曰阿鐡長事王延政為将唐師攻建州傅其城誨數出挑戦先鋒橋道使王建封克外郛擒誨将斬之已解衣伏鑕忽脱身絶馳追者數十百軰莫能及自㱕大将查文徽文徽駭異用為戦棹指揮使領故部曲従攻福州馮延鲁敗走諸營皆潰死者萬計委軍實戎器不可勝計誨獨殿後收所棄金帛二十萬以㱕文徽鎮建州誨為劍州刺史諜者告吴越戍兵棄福州遯文徽暗而貪功即率誨俱進誨以戦艦入閩江適春雨江水㬥漲一夕七百里扺城下擊敗福州兵獲其将馬先進葉仁安鄭彦華始知福州未嘗有變誨親故多在城中方遣間使招之文徽勒步騎亦至福州來迎文徽傳令入城誨以所聞告且曰僕閩人也豈不䏻料閩人之情冝先立寨整衆俟所招親故來得其實徐圗之文徽曰狐疑且生變乗機據城上䇿也遂入誨知其必敗植旗鳴鼓列兵江干以須之文徽果敗被執誨全軍還劒州獻馬先進扵金陵用鄭彦華為将唐兵两取福州皆大敗塗地誨在兵間皆有功號名将遂為建州節度使兼侍中訓兵積榖隱然為大鎮嘗破福州兵扵南臺江軍聲大震由是朝廷委以南方事而名其軍曰忠義及周兵入淮南誨遣子徳誠率鎮兵赴難諸将多敗惟徳誠頗有戦功拜和州刺史建隆三年六月誨引疾求罷朝論難其代乃以弟劒州刺史謙為留後召誨還都後主親臨視七月䘚謚忠烈閩之亂士民㡬殱焉惟誨之宗族益盛謙與徳誠後亦繼領建州旄節諸子悉至顯官韓熈載字叔言北海人少隱嵩山唐同光中擢進士苐父光嗣平盧節度副使軍中逐其帥符習推光嗣為留後眀宗即位討亂光嗣坐死熈載來奔時烈祖輔吴方修眀法令熈載年少放蕩不守名檢補和常滁三州従事時人士自中原至者多巳擢用熈載在京洛早負才名乃獨落魄不偶亦不以介意烈祖受禅召為祕書郎使事元宗扵東宫諭之曰以卿蚤奮名塲踈雋未更事故使歷州縣之勞今用卿矣冝善自修飾輔吾兒也熈載亦不謝在東宫談燕而巳不嬰世務元宗即位拜虞部貟外郎史館修撰兼太常博士乃慨然曰先帝知我而不顕用是以我為慕容紹宗也始數言朝廷事所當施行者展盡無所囘隱宋齊丘馮延巳軰皆側目元宗意獨嘉之命權知制誥書命典雅有元和之風與徐鉉齊名時號韓徐契丹入汴晉少帝北遷熈載上䟽曰陛下有經營天下之志今其時也若戎主遁㱕中原有主則不可圗矣不省陳覺馮延鲁福州䘮師初議寘軍法齊丘為之請止削官遷外郡熈載上䟽請無赦又數言齊丘黨與必基禍亂熈載不能飲酒齊丘誣以酒狂貶和州司士參軍徙宣州節度推官復入為虞部郎中史館修撰遷中書舎人周太祖有天下用事者猶議北伐熈載曰北伐吾夲意也但今已不可耳郭氏姦䧺曹馬之流雖有國日淺守境已固我兵妄動豈止無功耶言雖切而朝廷闇扵機㑹經營中原之志終不已周人果以藉口兵入淮南齊王景逹以兵馬元帥臨邊陳覺為監軍使熈載言出師大事也當先正名莫信扵親王莫重扵元帥安用監軍使㢤亦不従熈載才氣逸發多藝能善談笑為當時風流之冠尤長于碑碣他國人不逺數千里輦金帛求之然性忽細謹老而益甚畜妓四十軰傱其出與客雜居物議閧然熈載宻語所親曰吾為此以自汚避入相爾老矣不䏻為千古笑端坐託疾不朝貶右庶子分司南都熈載盡斥諸妓後主喜留為秘盡監俄復故官欲遂大用之而去妓悉還後主歎曰孤亦無如之何矣宿直宫中賜對多所弘益後主手教襃之進中書侍郎䘚年六十九後主謂侍臣曰吾竟不得相熈載欲贈平章事古有是否或對曰晉劉穆之贈開府儀同三司即故事也乃贈右僕射同平章事廢朝三日謚文靖葬梅嶺岡謝安故墓側著格言及後述三卷擬議集十五卷㝎居集二卷初熈載嘗使周及㱕元宗歷問周之将相熈載曰趙點檢頋視非常殆難測也及太祖受禅人服其識朱元穎州沈丘人本姓舒少倜儻通左氏春秋與楊納同為河中李守貞客守貞叛俱來乞兵楊訥者李平也語在平傳元既留事南唐以駕部貟外郎待詔文理院數上書論事言今幸中原多故苟支歲月非所以為國當取湖湘閩越錢塘以固基本且請專任軍旅以次討定用事者嫉其言共譛之以為逺人謀握兵􅊶藏莫測遂罷待詔元失意縱酒不事事朝廷亦優容之保大末周師入淮南元請對言兵事元宗大悦命従齊王景逹救夀州元善撫士䘚與之同甘苦每臨戦誓衆詞指慷慨流涕被面聞者皆有効死赴敵之意破舒和二州以功加淮南西北面行營應援都監與邊鎬許文縝柵紫金山軍聲頗振益栅且及夀州元恃功時或違景逹節制監軍使陳覺與元素有隙且嫉其䏻屡表元本學縦横不可信不冝付以兵柄元宗乃命楊守忠代之守忠至元帥府景逹檄元計事元憤怒欲自殺其客宋垍曰大夫何徃不可乃爲妻子死耶遂舉寨萬餘人降周由是諸軍皆潰邊鎬許文縝揚守忠皆被擒夀州亦不守遂畫江請􅉀矣元在江南娶查氏文徽女至是伏誅文徽累表乞貸死不従以珠裯覆屍扵市哭之隕絶觀者皆爲垂泣元㱕周復姓舒世宗愛其驍果以爲蔡州團練使其毋猶在沈丘遂迎飬焉太祖受禅遷沂州防禦使太平興國初卒論曰亡國之君必先壊其紀綱而後其國従焉方是時疆埸之臣非皆不才也敗于敵未必誅一有成功讒先殺之故強者玩冦弱者降敵自古非一世也南唐如陳覺馮延鲁查文徽邊鎬軰䘮敗塗地未嘗少正典刑朱元取两州于周兵将遯之時固未為雋功而陳覺巳不能容此元之所以降也元降諸将束手無䇿相與為俘纍以去而唐遂失淮南臣事于周雖未即亡而亡形成矣欲知南唐之亡者當扵是觀之南唐書列傳卷苐九
