body:
  text: 南唐書列傳卷苐六劉彥貞兖州中都人父信初為羣盜戰敗奔吳事武王數有功王遇之厚嘗召信計事醉不能言王嫚罵之信即仗一劒棄去左右請追之王曰信醉耳醒當復來眀日杲至積功至鎮南軍節度使宣王建國加征南大將軍唐莊宗滅梁遣諌議大夫薛昭文使閩假道洪州信燕勞之謂昭文曰皇帝知有信否昭文曰主上新平河南未知公之名信曰漢有韓信吳有劉信一等人也因指牙旗銀首舉酒屬昭文曰幸而中此碩為我飲一彂中之烈祖受禪以舊故贈太師彥貞信苐四子以父任為大理評事遷屯田貟外郎父喪起復將軍連刺海椘二州善騎射矢不虗發軍中號曰劉一箭吏事亦以強濟見稱遷濠州節度使移夀州始黷貨自殖市肆不問貧冨概出資助之而收其贏州有安豐塘溉田萬頃以故無凶嵗彥貞託以浚城濠決水入濠中民田皆涸而督賦益急皆賣田去彥貞擇尤膏腴者以下價售之乃復瀦塘水如初歲入不可勝計時南唐政衰用事者多貪墨彥貞廣賂遺以致聲譽于是魏岑等雜然推倡其用兵治民之能以為一面長城在鎮久疑當受代輒妄造邊遽以固其位久之乃入為神武統軍及周師侵淮南拜北面行營都部署帥三萬人援夀州次來逺鎮兵車旗幟亘數百里戰艦銜尾蔽淮而上周將李穀慮我師斷浮橋腹背受敵燒營退保正陽彥貞雖名將家子生長冨貴初不練兵事裨將武彥暉張延翰咸師朗皆鬪將無籌略見周師退以為怯惟恐不淂速戰士未及朝食即督以進遇周將李重進于正陽東彥貞置陳橫布拒馬聮貫利刃以鐡繩維之刻木為猛獸攫拿狀飾以丹碧立陳前號揵馬牌又以革囊貯鐡蒺藜布于地周兵望而笑其怯鋭氣已增一戰我師大敗師朗等皆被擒彥貞沒于陳南唐喪地千里國幾亡其敗自彥貞始雖死王事議者不與也後數年贈中書令諡曰壯亦不𣸪録其孤云髙越字沖逺幽州人精詞賦有名燕趙間盧文進鎮上黨具禮幣致之初以客從及文進徙安州越又從之遂為其掌書記文進仲女有才色能屬文號女學士因以妻越文進奔吳亦與俱行吳以為祕書郎烈祖受禪遷水部貟外郎改祠部浙西營田判官與江文蔚俱以能賦擅名江表時人謂之江髙保大初文進卒有欲傾其家者越上書訟之出為蘄州司士參軍語在文進傳就遷軍事判官與隱士陳曙為物外交淡然不志榮利久之乃徙廣陵令還判吏部歷侍御史知雜元帥府掌書記起居郎中書舍人淮南交兵書詔多出越手援筆立成詞采溫麗元宗以為稱職不徙官者纍年後主立始遷御史中丞勤政殿學士左諌議大夫兼户部侍郎修國史卒年六十二諡曰穆貧不能葬後主為給葬費世歎其清兄子逺逺字攸逺父操袁州别駕逺少孤為人夷雅沖淡而遇事有竒節杜門力學不交人事烈祖受禪招來四方秀傑得逺以為祕書省正字保大初遷校書郎兼太常修撰遂為太常博士淮南兵興元宗召見賜金紫使典戎府書檄歷禮部貟外郎樞密判官侍御史知雜史館修撰起居郎知館事遂為勤政殿學士國初命兵部尚書陳濬修吳史未成而卒其後領史職者多貴遊或新進少年纂述殆廢逺自保大中預史事始撰烈祖實録二十卷敘事詳密後主嗣位逺猶在史館與徐鉉喬匡舜潘佑共成吳録二十卷逺又自撰元宗實録十卷未及上會屬疾取史藳及他所著書凡百餘卷悉燔之卒年五十七贈給事中諡曰良後主欲修國史訪稿于其家無𣸪在者逺有精識方邊鎬入潭州湖南悉平百官入賀逺獨曰我乘楚亂取之甚易觀諸君之才守之實難聞者愕然以為過及後如所料乃服其先見盧文進字大用幽州人事後唐眀宗至安州節度使事具五代史晉髙祖起晉陽與契丹耶律德光約為父子文進少嘗奔契丹娶虜公主為其平州刺史眀宗時率衆數萬來歸至是不自安且本燕人尚氣不能屈于晉乃決計歸吳時烈祖輔吳為齊王將受禪吳遣將祖全恩以兵二千陳于安州近境俟文進出殿之而至拜天雄統軍宣潤節度使委任賔佐政績甚美潤州市大火文進使馬步使救之益熾文進怒自出府門斬馬步使傳聲而火止人皆異之召還以左衛上將軍兼中書令范陽郡王奉朝請猶給藩鎮俸卒馮延巳惡文進文進亦以素貴不少下及卒乃誣以隂事盡收文進諸子欲籍其家文進以女妻髙越越乃上書訟文進冤指延巳過惡詞氣甚厲時延巳方用事人頞壯之元宗怒以越屬吏貶蘄州司士參軍而盧氏亦賴以得全文進在金陵為客言昔陷契丹嘗獵于郊遇晝晦如夜星緯􅙾然大駭偶得一胡人問之曰此謂之笪日何足異頃自當復良久果如其言日方午也又嘗至無㝎河見人脛骨大如柱長可七尺云陳覺揚州海陵人烈祖以東海王輔吳作禮賢院聚圖書萬卷及琴奕遊戲之具以延四方賢士政事之暇多與之講評古今覺亦預焉烈祖居金陵以次子景遷留東都為同平章事知左右軍使輔政命覺為之佐謂曰吾蚤暮與賢士相接今老矣尚未逹天下之事景遷年少當國故屈君子無憚也景遷卒還朝為宣徽副使烈祖晚多暴怒近臣多得譴罰覺心懼稱疾家居纍月以宣遺詔日入朝判大理寺蕭儼劾之元宗不從遷光政院副使太僕少卿覺有兄居鄉里時海陵巳為泰州覺兄犯法刺史褚仁規笞之覺挾私怨密譛仁規貪殘侍御史王仲璉亦劾之元宗薄其罪止罷刺史仁規忿上章自訴元宗命覺馳往鞠之仁規皇恐伏罪覺還條其罪狀甚衆詔賜死覺之竊㺯威福蓋始于此覺與李徴古皆宋齊丘客徴古者袁州冝春人于齊丘有中外事齊王景逹為宫官齊丘告歸九華逾年不召徴古使其僚謝仲宣諷景逹言于元宗曰齊丘先帝布衣之舊雖不用不當棄之齊丘既召歸益以腹心寄覺欲使立功以取柄任時唐兵初得建州諸將請用其鋒攻取福州齊丘獨薦覺為宣諭使召節度使李弘義入朝可不勞寸刃盡得閩地元宗意方向覺遂遣之既至弘義倨甚覺氣折不敢言歸至劒州耻于無功矯詔召弘義自稱權福州事擅興汀建撫信州兵及戍卒命馮延魯將之攻福州敗績衆潰而歸死者萬計亡失金帛戈甲之類不可勝數朝論謂必死元宗亦怒欲置軍法齊丘上表待罪實營救覺等馮延已助之于是財貶蘄州逾年復起任事始與徴古為死黨相倡和如出一口淮南兵興我師屢北度不可𣸪支元宗遣鍾謨李德眀孫忌王崇質使周丗宗請獻夀濠泗椘光海六州以罷兵丗宗不許而夀州日危蹙德眀懼乃白世宗言碩寬臣數日之誅歸白寡君盡獻淮南地周乃遣德眀王崇質先還德眀至金陵盛稱周兵之強請必割地元宗不悅齊丘覺徴古素惡忌及德眀擲語王崇質使異其辭覺徴古因極言德眀賣國德眀褊忿知見排攘袂大言周師必克元宗遂斬德眀于都市覺徴古勢熖益熏灼道路以目德明既誅不復議請􅉀乃命齊王景逹率大兵拒周而以覺為監軍使軍政皆出覺聚兵五萬無決戰意朱元數有功覺忌之奪其兵元遂叛降周諸軍悉潰覺歸為樞密使如故而徴古為副使不以敗事自咎方相與挾齊丘為耐久計議事元宗前橫甚元宗嘗言及家國感概泣下徴古輒曰陛下當以兵力拒敵涕泣何為飲酒過量耶乳保不至耶帝色變左右股栗而徴古驁然自若司天言天文變異人主冝避位祈禳元宗曰此固吾意苐不知孰可付耳覺徴古遽以為誠言輒曰天命如此冝使宋公攝政陛下深居禁中俟國事定歸政未晚元宗亟召中書舍人陳喬草詔實出于憤怒喬固陳不可元宗嘻笑而止周師益進丗宗駐迎鑾鎮元宗遣覺奉表貢方物覺至迎鑾見周之戰艦陳列江津且南渡矣大懼請遣人取夲國畫江為界表丗宗可之覺頓首謝退遣其屬劉承遇南還以告畫江稱藩奉正朔之議遂決周亦班師遣覺還錫賚豐渥覺將彂獻詩一首敘感别賜金器百兩初覺徴古以德眀請割地為賣國誅死及是覺身自為之使還以兵部尚書致仕徴古先出為洪州節度副使時晉王景遂為帥不堪徴古之傲狠常欲斬之自拘于有司左右力諌乃已鍾謨自周還屢言齊丘覺徴古之罪不可容覺嘗傳丗宗之語告元宗曰聞江南拒命謀出其相嚴續當殺續以謝我元宗知覺與續有宿怨疑之謨請至周覆實其事元宗遣謨行以手表引咎且言非續之罪丗宗省表大驚曰嚴續能拒命乃忠臣聯為天下主其肯教人殺忠臣乎謨還具奏之元宗大怒齊丘既斥覺亦責授國子博士饒州安置道殺之徴古削奪官爵賜自盡于洪州李德誠廣陵人少事宣州節度使趙鍠為給使吳攻宣州鍠出降德誠與韓球俱從之不去城中𣸪推立裨將周進思以拒吳鍠使德誠入城説進思降將行暴得疫疾委頓不克往乃改命球球既至進思斬之擲其首城外德誠是日即愈人皆異之鍠死事吳武王常從征討積功為江南馬步軍使與諸將圍潤州安仁義諸將每見仁義臨城督戰必嫚罵之德誠獨否及城破仁義操弓矢坐城上衆莫敢近德誠至仁義忽顧曰汝見我獨不失禮且有竒相他日將大貴吾以為汝㓛即擲弓矢就㼬武王即拜德誠潤州刺史歷撫虔洪三鎮節度使平南大將軍中書令烈祖受禪拜太師封南平王進封趙王德誠事吳最久至南唐之興又為佐命首與周本勸進初無大勳勞特以際會至髙位冨貴夀考世罕及者然為人謙恭沈厚終始如一自洪州入覲烈祖命宫人逆勞于途百官班謁于都門入對日朝堂設次以待之升元四年卒年七十八廢朝五日諡曰忠懿子二十八人苐四子建勳建勳字致堯少好學能屬文尤工詩德誠在潤州嘗秉燭夜出候者以告義祖疑有變徙江州德誠猶慮讒間遣建勳入謁義祖見之釋然妻建勳以女所謂廣德公主也建勳家世將相又娶于徐氏為其國貴遊然杜門不預世事所與交皆寒畯裘馬取具而巳烈祖鎮金陵用為副使預禪代之䇿拜中書侍郎同平章事加左僕射監修國史領滑州節度使自開國至升元五年猶輔政比他相最久烈祖鑒吳之亡由權在大臣意頗忌之而建勳無引退意會建議政事當更張者且言事大體重不可自臣下出請以中旨行之烈祖雖從之未有命也建勳遽命舍人草制給事中常夢錫劾奏建勳擅造制書歸怨于上烈祖得奏適會本意乃降制放還私苐廣德公主剛果有智入謂烈祖曰吾父無恙時兄亦嘗求見于李郎書今何見負烈祖曰此自國事吾與李郎骨肉之情固無間也召見慰勉焉未幾𣸪相元宗嗣立以開國勳勞又聮􅊚戚尊遇之與宋齊丘埒每謂為史館而不名聽朝之暇多開延英殿召公卿議當世事人皆欣然望治建勳獨謂所親曰上寬仁大度優于先帝但性習未定冝得方正之士朝夕獻替不然恐未必能守先朝基業也出為撫州節度使建州之役諸將無復紀律建勳請官出金帛贖俘掠還其家見聽及出師平湖南國人相賀建勳獨以為憂曰祻始于此矣召拜司空稱疾乞骸骨以司徒致仕賜號鍾山公營别墅于山中放意水石或謂之曰公未老又無大疾恙遽為此舉欲𣸪為九華先生耶建勳曰吾平生笑宋公輕出處何至效之自知不夀欲求數年間適爾疾革遺令曰時事如此吾得全歸幸矣勿封樹立碑貽他日毁斫之祻保大十年五月卒贈太保諡曰靖及南唐亡公卿冡墓鮮不彂者惟建勳不知葬所宋齊丘當國深忌同列少所推遜然獨稱建勳曰李相清談不待潤色自成文章論曰李建勳非不智也然湖南之師必敗知其國且亡皆如蓍龜然其智獨施之一巳故生則保冨貴死則能全其骸于地下至立于群枉間無所可否唯喏而巳視覆軍亡國君父憂辱若已無與者方區區請出金帛以贖俘虜真婦人之仁哉廖居素將樂人仕烈祖元宗之間為人堅正不為當國者所喜由校書郎二十年始淂大理司直後主嗣位稍遷至瓊林光慶使檢校太保判三司後主孱昏而羣臣方充位保冨貴國益削居素獨慷慨驟諌兾後主一悟終不見聽乃閉門却食服朝衣冠立死井中已而得手書大字于篋笥曰吾之死不忍見國破也徐鍇為文弔之以比屈原伍貟後幾百年將樂父老猶叩頭稱之盱江李遘為之傳云南唐書列傳卷苐六
