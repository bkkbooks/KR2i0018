  - {type: variant, offset: 5530, length: 1084, content: 詔而遽書警奏日夜狎至元瑀等輒屏不以聞王師屯城南十里閉門守陴國主猶不知也初烈祖有國凡民産二千巳上出一䘚號義軍分籍者又岀一䘚號生軍新置産亦出一䘚號新擬軍客戸有三丁者出一䘚號㧞山軍元宗時許郡縣村社競渡每歲重午日官閲試之勝者給綵帛銀椀皆籍姓名至是盡取為䘚號􅓸波軍募民奴及贅壻號義勇軍募豪民以私財招聚亡賴亡命號自在軍至是又大蒐境内自老弱外皆募為䘚號排門軍民間又有自相率拒敵以𥿄為甲農器為兵者號白甲軍凡十三等皆使捍禦然實皆不可用奔潰相踵乙亥歲春二月壬戌王師㧞金陵闕城三月丁巳吴越攻我常州權知州事禹萬誠以城降誅神衞都指揮使皇甫繼勳彗岀五車色白長五丈夏六月轉見西方犯太㣲六十日滅王師及吴越圍潤州留後劉澄以城降吴越遂㑹王師圍金陵洪州節度使朱令贇帥勝兵十五萬赴難旌旗戦艦甚盛編木爲㭖長百餘丈大艦容千人令贇所乗艦尤大擁甲士建大将旗鼓将㫁采石浮橋至皖口與王師遇傾火油焚北船適北風反熖自㷊我軍大潰令贇及戦棹都虞候王暉皆被執外援既絶金陵益危蹙王師百道攻城晝夜不休城中米斗萬錢人病足弱死者相枕藉國主两遣徐鉉等厚貢方物求緩兵守祭祀皆不報冬十一月白虹貫日畫晦乙未城䧟将軍咼彦馬承信及弟承俊帥壮士數百力戦而死勤政殿學士鍾蒨朝服坐于家亂兵至舉族就死不去光政使右内史侍郎陳喬請死不許自縊死國主帥司空知左右内史事殷崇義等肉袒降扵軍門眀年正月辛未至京師乙亥授右千牛衛上将軍封違命侯太宗即位加特進改封隴西公太平興國三年七月辛卯殂年四十二是日七夕也後主盖以是日生贈太師追封吴王葬洛陽北邙山後主天資純孝事元宗盡子道居䘮哀毁杖而後𧺫嗣位之初屬保大軍興之後國削勢弱帑庾空竭専以􅋢民爲急蠲賦息役以𥙿民力尊事中原不惮卑屈境内賴以少安者十有五年憲司章䟽有䋲紏過訐者皆寝不下論决死刑多従末減有司固爭乃得少正猶垂泣而後許之嘗獵于青山還如大理寺親録繋囚多所原釋中書侍郎韓熈載奏獄訟有司之事囹圄非車駕所冝臨幸請罰内庫錢三百萬以資國用雖不聴亦不怒也殂問至江南父老有巷哭者然酷好浮屠崇墖廟度僧尼不可勝莫罷朝輒造佛屋易服膜拜以故頗廢政事又置澄心堂扵内苑引能文士及徐元機元榆元樞兄弟居其間中旨由之而岀中書宻院乃同散地兵興之際降御扎移易将帥大臣無知者皇甫繼勲誅死之後夜出萬人研營招討使但署牒遣兵竟不知何徃盖皆澄心堂直承宣命也長圍既合内外隔絶城中之人惶怖無死所後主方幸淨居室聴沙門徳眀雲眞義倫崇節講楞嚴圎覺經用鄱陽隱士周惟簡爲文館詩易侍講學士延入後苑講易否卦賜惟簡金紫群臣皆知國亡在旦暮而張洎猶謂北師巳老将自遯去後主益甘其言晏然自安命户部貟外郎伍喬扵圍城中放進士孫確等三十八人及苐其所施爲大扺類此故雖仁􅋢足以感其遺民而䘚不能保社稷云南唐書本紀卷苐三, WYG: ''}
