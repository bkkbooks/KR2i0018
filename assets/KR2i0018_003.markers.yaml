  - {type: variant, offset: 3699, length: 166, content: 後主名煜字重光元宗苐六子初名従嘉母曰光穆皇后鍾氏従嘉廣顙豐頬駢齒一目重瞳子文獻太子惡其有竒表従嘉避旤惟覃思經籍歴封安㝎郡公鄭王文獻太子䘚徙吴王以尚書令知政事居東宫建隆二年遂立為太子元宗南廵太子留金陵監國以嚴續殷崇義輔之張洎主箋奏六月元宗殂太子嗣立于金陵更名煜居䘮哀毁幾不勝赦境内尊鍾后曰聖尊后以后父名泰章也立妃周氏為國后徙信王景逷為, WYG: 陳}
