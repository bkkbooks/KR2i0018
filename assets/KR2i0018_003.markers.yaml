  - {type: variant, offset: 3866, length: 1663, content: 王鄧王従善為韓王立弟従鎰為鄧王従謙為冝春王従信爲文陽郡公従度爲昭平郡公従度景遷子也令諸司四品至九品無職事者日二貟待制扵内殿以右僕射嚴續爲司空平章事餘進位有差遣中書侍郎馮延鲁如京師奉表陳襲位太祖賜詔答之自是始降詔秋九月太祖遣鞍轡庫使梁義來弔祭冬十月太祖遣樞宻承旨王文來賀襲位初元宗雖臣于周惟去帝號他猶用王者禮至是國主始易紫袍見使者使退如初服十二月置龍翔軍以教水戦建隆三年春三月遣馮延鲁入貢京師泉州節度使中書令晋江王劉従効䘚子紹鎡自稱留後夏田月泉州将陳洪進執紹鎡㱕金陵推副使張漢思爲留後六月遣客省使翟如璧入貢京師太祖放降䘚千人南還冬十一月遣水部郎中頋彛入貢京師乾徳元年春正月太祖遣使來賜羊馬槖駞三月太祖出師平荆湖國主遣使犒軍夏四月泉州副使陳洪進廢張漢思自稱權知軍府來吿國主即以洪進爲節度使秋七月太祖詔國主遣還顯徳以來中朝将士在江南者及令揚州民遷江南者還其故土十二月國主表乞罷詔書不名之禮乾徳二年春三月行鐡錢每十錢以鐵錢六權銅錢四而行其後銅錢遂廢民間止用鐡錢末年銅錢一直鐵錢十比國亡諸郡所積銅錢六十七萬緡命吏部侍郎修國史韓熈載知貢舉放進士王崇古等九人國主命中書舎人徐鉉覆試舒雅等五人雅等不就國主乃自命詩賦題以中書官莅其事五人皆見黜秋八月太祖于江北置折博務禁商旅過江九月立子仲㝢為清源郡公仲宐宣城郡公十月甲辰仲㝢䘚國后周氏已寝疾哀傷増革遂亦䘚十一月太祖遣作坊副使魏丕來弔祭乾徳三年夏五月司空平章事嚴續罷為鎮海軍節度使秋九月両沙聖尊后鍾氏殂冬十月太祖遣染院使李光圗來弔乾德四年秋八月國主遣龔愼儀持書使南漢約與俱事中朝九月愼儀至番禺被執乾徳五年春命两省侍郎諌議給事中中書舎人集賢勤政殿學士更直光政殿召對咨訪率至夜分開寶元年春三月戊申以樞宻使右僕射殷崇義為左僕射同平章事境内旱太祖賜米麥十萬石冬十一月立國后周氏開寳二年春三月以㳺簡言為左僕射兼門下侍郎同平章事夏五月簡言䘚是歳右僕射同平章事殷崇義罷為潤州節度使同平章事開寳三年夏太白晝見二日相觸開寳四年冬十月國主聞太祖滅南漢屯兵扵漢陽大懼遣太尉中書令鄭王従善朝貢稱江南國主請罷詔書不名従之有商人來告中朝造戦艦數千艘在荆南請宻徃㷊之國主懼不敢從開寳五年春二月國主下令貶損儀制改詔為教中書門下省為左右内史府尚書省為司會府御史臺為司憲府翰林院為文館樞宻院為光政院大理寺為詳刑院客省爲延賔院官號亦從改易以避中朝初金陵官闕皆設鴟吻元宗雖臣于周猶如故乾徳後遇中朝使至則去之使還復設至是遂去不𣸪用降諸弟封王者皆爲公従善椘國従鎰江國従謙鄂國内史舎人張佖知禮部貢舉放進士楊遂等三人清輝殿學士張洎言佖多遺才國主命洎考覆不中苐者扵是又放王綸等五人閏月癸巳太祖命進奉使楚國公従善爲泰寧軍節度使留京師賜第汴陽坊示欲召國主入朝也國主遣户部尚書馮延鲁謝従善爵命延鲁至京師疾病不能朝而㱕開寳六年夏太祖遣翰林學士盧多遜來國主聞太祖欲興師上表願受爵命不許以司空殷崇義知左右内史事冬十月内史舎人潘佑上書切諌佑素與户部侍郎李平交厚國主以為事皆由平始先以平属吏遣使収佑佑自殺平縊死獄中皆徙其家外郡甲戌歳秋國主上表求従善㱕國不許太祖遣閤門使梁迥來使従容言曰天子今冬行紫燎之禮國主冝徃助祭國主不答九月丁卯復遣知制誥李穆為國信使持詔來曰朕将以仲冬有事圜丘思與卿同閲犠牲且諭以将出師冝早入朝之意國主辭以疾且曰臣事大朝兾全宗祀不意如是今有死而已時太祖已遣潁州團練使曺翰率師先出江陵宣徽南院使曺彬侍衞馬軍都虞候李漢瓊賀州刺史田欽祚率舟師繼發及是又命山南東道節度使潘美侍衞歩軍都虞候劉遇東上閤門使梁㢠率師水陸並進與國信使李穆同日行冬十月國主遣江國公従鎰貢帛二十萬匹白金二十萬觔又遣𧺫居舎人潘慎修貢買宴帛萬匹錢五百萬築城聚糧大為守備閏十月王師㧞池州國主于是下令戒嚴去開寶紀年稱甲戌歳辛未王師進㧞蕪湖及雄逺軍吴越亦大舉兵犯常潤國主遺吴越王書曰今日無我眀日豈有君一旦眀天子易地賞功王亦大梁一布衣耳吴越王表其書于朝王師次采石磯作浮橋成長驅渡江遂至金陵每歲大江春夏㬥漲謂之黄花水及王師至而水皆縮小國人異之國主以軍旅委皇甫繼勳機事委陳喬張洎又以徐元瑀刀衎為内殿, WYG: 毛列}
