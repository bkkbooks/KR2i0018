  - {type: variant, offset: 8324, length: 1, content: 苐, WYG: 三欽定四庫全書南唐書卷四宋陸游撰宋齊丘列傳第一宋齊丘字子嵩世為廬陵人父誠與鍾傳同起兵髙騈表傳為洪州節度使以誠副之卒官因家洪州齊丘好學工屬文尤喜縱横長短之説烈祖為昇州刺史齊丘因騎將姚克贍得見暇日陪燕游賦詩以獻曰養花如養賢去草如去惡松竹無時衰蒲栁先秋落烈祖奇其志待以國士從鎮京口入定朱瑾之難常參祕畫因説烈祖講典禮明賞罰禮賢能寛征賦多見聽用烈祖為築小亭池中以橋度至則徹之獨與齊丘議事率至夜分又為髙堂不設屏障中置灰爐而不設火兩人終日擁爐畫灰為字旋即平之人以比劉穆之之佐宋髙祖然齊丘資躁褊或議不合則拂衣徑起烈祖謝之乃已義祖獨惡其為人每欲進拔輒不果浮沉下僚十餘年義祖末年議者多請以徐氏諸子執國政烈祖聞之亟欲自請出鎮齊丘請徐之俄而義祖殂自殿直軍判官擢右司員外郎進右諫議大夫兵部侍郎居中用事且倚以為相齊丘自以資望尚淺或不為國中所服乃告歸洪州改葬因入九華山累啓求致仕不許時元宗已為大將軍烈祖以呉主命命元宗躬往迎之於是齊丘誼不得已而起遂拜中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔委齊丘左右之初烈祖權位日隆舉國皆知代謝之勢呉主謙恭無失徳烈祖懼羣情未協欲待嗣君與齊丘議合已而都押衙周宗揣微指請急至都以禪代事告齊丘齊丘黙計大議本自己出今若遽行則功歸周宗欲因以釣名乃留與夜飲亟遣使手書切諌以為時事未可後數日馳至金陵請斬宗以謝國人烈祖亦悔將從之徐玠固爭纔黜宗為池州副使玠乃與李建勲等遂極言宜從天人之望復召宗還舊職齊丘由是頗見疎忌留為諸道都統判官加司空無所闗預從容而已數請退烈祖以南園給之俄而齊國建猶以勲舊為左丞相而不預事李徳誠周本自廣陵持呉帝詔來行傳禪齊丘謂徳誠子建勲曰尊公呉室元勲今日掃地矣獨稱疾卧家不預勸進烈祖既受禪徐玠為侍中李建勲為中書侍郎同平章事周宗為樞密使齊丘但遷司徒中懐不平及宣制至布衣之交忽抗聲曰臣為布衣時陛下亦一刺史耳今為天子可不用老臣矣烈祖優容之嘗夜燕天泉閣李徳誠曰陛下應天順人惟宋齊丘不悦因出齊丘諷止勸進書烈祖却之曰子嵩三十年故人豈負我者齊丘頓首謝自是為求媚計更請降讓皇為公侯絶呉太子璉婚乆之表言備位丞相不當不聞國政又自陳為人所間烈祖大怒齊丘歸第白衣待罪而烈祖怒已解謂左右曰宋公有才特不識大體爾孤豈忘舊臣者命呉王璟持手詔召見遂以丞相同平章事寖復委任兼知尚書省事與張居詠李建勲更日入閤議政契丹耶律徳光遣使來齊丘隂謀間契丹使與晉人相攻則江淮益安密請厚其原幣遣還至淮北潛令人刺殺之契丹與晉人果成嫌隙齊丘親吏夏昌圖盜庫金數百萬特判傅輕典烈祖命斬昌圖齊丘慚稱疾求罷省事許之遂不復朝謁帝遣夀王景遂勞問許鎮故鄉始入朝因召與宴飲齊丘酒酣輒曰陛下中興實老臣之力乃忘老臣可乎烈祖怒曰太保始以游客干朕今為三公足矣齊丘詞色愈厲曰臣為游客時陛下亦偏裨耳今不過殺老臣遂引去烈祖頗悔明日手詔曰朕之性子嵩所知少相親老相怨可乎拜鎮南節度使至鎮起大第窮極宏麗坊中居人皆使修飾垣屋民不堪其擾有逃去者初赴鎮烈祖曰衣錦晝行古人所貴賜以錦袍親為著之遂服錦袍視事元宗即位召拜太保中書令與周宗並相齊丘之客最親厚者陳覺元宗亦以為才馮延已延魯魏岑查文徽與覺深相附結内主齊丘時人謂之五鬼相與造飛語傾周宗宗泣訴於元宗而岑覺又更相攻於是出齊丘為鎮海軍節度使齊丘怏怏力請歸九華舊隠從之賜號九華先生封青陽公食青陽一縣租税元宗欲傳位齊王景遂詔景遂總庶政惟魏岑查文徽得奏事餘非特召不得見國人大駭齊丘自九華上疏極論不可㑹言者衆元宗乃收所下詔或謂齊丘先帝勛舊不宜乆棄山澤遣馮延已召之不起遣燕王景達再持詔往乃起拜太傅中書令封衛國公賜號國老奉朝請然不得預政益輕財好客識與不識皆附之薦陳覺使福州諭李𢎞義入朝覺至福州不敢言而専命出兵敗事僉謂必坐誅齊丘上表待罪置不問覺亦不死齊丘方且怒韓熙載議其黨與黜之元宗不悦復使鎮洪州周侵淮北起齊丘為太師領劍南東川節度使進封楚國公與謀難齊丘固讓仍為太傅建議發諸州兵屯淮泗擇偏裨可任者將之周人未能測虚實勢不敢輕進及春水生轉饟道阻彼師老食匱自當北歸然後遣使乞盟度可無大喪敗元宗惶惑不能用又力陳割地無益與朝論頗異及明年暑雨周棄所得淮南地北歸議者謂扼險要擊可以有功且懲後齊丘乃謂擊之怨益深不如縱其歸以為徳由是周兵皆聚於正陽而夀州之圍遂不可解終失淮南方是時陳覺李徵古同為樞密副使皆齊丘之黨躁妄専肆無人臣禮自度事定必不為羣臣所容若齊丘專大柄則可以無患覺乃椉間言宋公造國於艱危如此陛下宜以國事一委宋公元宗意謀出齊丘大銜之㑹鍾謨使還挾周以為已重所言率見聽而謨本善李徳明欲為報讐屢陳齊丘椉國危殆竊懐非望且黨與衆謀不可測元宗遂命殷崇義草詔曰惡莫甚於無君罪莫深於賣國放歸九華山而不奪其官爵初命穴牆給食俄又絶之以餒卒諡醜繆覺徵古皆誅死未幾元宗燕居見齊丘為厲叱之不退遂遷南都後主立召其家還金陵廩給甚厚方齊丘敗時年七十三且無子若謂窺伺謀簒竊則過也特好權利尚詭譎造虛譽植朋黨矜功忌能飾詐䕶非富貴滿溢猶不知懼狃於要君闇於知人釁隙遂成䝉大惡以死悲夫論曰世言江南精兵十萬而長江天塹可當十萬國老宋齊丘機變如神可當十萬周世宗欲取江南故齊丘以反間死方五代之際天下分裂大亂賢人君子皆自引於深山大澤之間以不仕為得而馮道有重名於中原齊丘擅衆譽於江表觀其人可以知其時之治亂矣周師之犯淮南齊丘實預議論雖元宗不盡用然使展盡其籌䇿亦非能决勝保境者且世宗豈畏齊丘機變而間之者哉蓋鍾謨自周歸力排齊丘殺之故其黨附㑹為此説非其實也予論序齊丘事盡黜當時愛憎之論而録其實覽者得詳焉南唐書卷四欽定四庫全書南唐書卷五宋陸游撰周徐查邊列傳第}
