  - {type: variant, offset: 40, length: 772, content: 方輒稱職端敏可仗㤙頋日洽烈祖鎮金陵為都押衙時用宋齊丘議迎吴譲皇都金陵繕府治為宫馬歩都虞候蔡弘業為宫城營奉使徙都統府于古臺城使都教練使孔昌祚營之都統府成凡二千四百間環一千五百步烈祖已徙居且迎譲皇矣宗請間曰若主上西遷則公當東駕勞費方始怨嗟将日聞矣烈祖納之託以歳不利而止自是宗孟預議論齊丘始忌之一日烈祖臨鏡理白鬚太息曰功業成而吾老矣柰何宗適侍側悟㣲指乃請如廣陵諷譲皇以禅代事亦請諭齊丘齊丘心忌大議自宗彂及其将還留與飲酒而遣騎以手䟽切諌烈祖得之大悔懼後數日齊丘馳至金陵為險語動烈祖請斬宗以謝國人烈祖将従之徐玠固爭事乃已但黜宗為池州副使玠乃與李建勲等言天人之望巳集宻定大計復召宗還舊職烈祖受禅宗躐進至内樞使同平章事遷侍中時以樞宻為内樞者猶避吴武王諱也烈祖常召宗及宋齊丘馬仁𥙿宴于崇英院歡宴道舊為樂它将相莫得預然待宗尤親厚不甚以職務嬰之宗亦能澹然畏逺權勢居家節儉俸賜皆積不用故齊丘黨雖日讒之不能害久之乃罷為江州節度使有俞文貞者早逰烈祖幕府宗及馬仁𥙿皆趋走執事左右及宗出鎭文貞仕宦蹭蹬猶為其州廵官方旅見輒越次問曰馬押衙亡恙宗曰馬相公已鎮廬州文貞頋同列匿笑而退他日預公設宗勸以酒文貞俛首曰下官小户令公所􅍄知也聞者大駭而宗怡然不動其寛厚如此徙宣州節度使入覲賜宴元宗親為摺襆頭脚以表殊禮復岀留守東都請老以司徒致仕㱕金陵馮延鲁代為留守㑹周師䧟廣陵延鲁自髠而逃見執于周人束縛桎梏僅得免死時人益以宗享福終始為異俄而宗病䘚年七十餘宋齊丘時以太傅奉朝請撫其棺哭曰君大黠來亦得時去亦得時元宗聞之不平二女皆為後主后徐鍇字椘金㑹稽人父延休字德文風度淹雅故唐乾符中進士昭宗狩石門無學士草詔延休來調官適在㫄近逆旅左右言其工文詞即召見命視草昭宗善之及還長安不淂用梁蔣元暉辟為其佐延休棄去依鍾傳扵洪州吴取江西得延休仕至光祿卿江都少尹䘚二子鉉鍇遂家廣陵鍇四歲而孤母方教鉉就學未暇及鍇鍇自能知, WYG: 庫全}
