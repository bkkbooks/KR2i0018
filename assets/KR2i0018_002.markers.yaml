  - {type: variant, offset: 813, length: 2449, content: 稍長文詞與鉉齊名昇元中議者以文人浮薄多用經義法律取士鍇恥之杜門不求仕進鉉與常夢錫同直門下省出鍇文示之夢錫賞􅋢不已薦于烈祖未及用而烈祖殂元宗嗣位起家秘書郎齊王景遂奏授記室時殷崇義為學士草軍書用事謬誤鍇竊議之崇義方得君誣奏鍇泄禁省語貶烏江尉嵗餘召還授右拾遺集賢殿直學士論馮延魯有罪無才人望至淺不當為廵撫使重忤權要以秘書郎分司東都然元宗􅋢其才復召為虞部貟外郎後主立遷屯田郎中知制誥集賢殿學士改官名拜右内史舎人賜金紫宿直光政殿兼兵吏部選事與兄鉉俱在近侍號二徐初鍇久次當遷中書舎人㳺簡言當國每抑之諧乃詣簡言簡言従容曰以君才地何止一中書舎人然伯仲並居清要亦物忌太甚不若少遲之鍇頗怏怏簡言徐出妓佐酒所歌詞皆鍇所為鍇大喜乃起謝曰丞相所言乃鍇意也㱕以告鉉鉉歎息曰汝癡絶乃為數闋歌換中書舎人乎鍇凡四知貢舉號得人後主裒所製文命為之序士以為榮鍇酷嗜讀書隆寒烈暑未嘗少輟後主嘗得周載齊職儀江東初無此書人無知者以訪鍇一一條對無所遺忘其博記如此既久處集賢朱黄不去手非暮不岀少精小學故所讐書尤審諦每指其家語人曰吾惟寓宿于此耳江南藏書之盛為天下冠鍇力居多後主嘗歎曰群臣勤其官皆如徐鍇在集賢吾何憂㢤李穆來使見鉉及鍇歎曰二陸之流也嘗夜直召對論天下事因及用人才行孰先後主曰多難當先才鍇曰有人才如韓彭而無行陛下敢以十萬兵付之乎後主稱善時國勢日削鍇憂憤鬱鬱得疾謂家人曰吾今乃免為俘虜矣開寳七年七月䘚年五十五贈禮部侍郎謚曰文著說文通釋方輿記古今國典賦苑歲時廣記及他文章凡數百卷鍇卒逾年江南見討比國破其遺文多散逸者查文徽歙州休寜人㓜好學能自刻苦手寫經史數百卷稍長任氣好俠聞人困乏雖不識必濟之家本冨坐是窮空不悔也或遺以金帛一夕盗入其家盡取去文徽不言雖鄰里莫知者久之盗敗于㫄邑移文訊驗人始知之咸推其量烈祖輔政初入謁烈祖召與語偉其論宋齊丘亦稱薦之徐知諤鎮浙西以文徽為其判官或獻玉杯知諤喜酬以錢百萬趣開宴出杯行酒至文徽偶墮地碎一坐皆驚而文徽自若烈祖受禅入為監察御史元宗立進諌議大夫中書舎人樞宻副使閩主延羲與其兄延政相攻延政以建州建國稱殷而延羲為其下所殺推立大捋朱文進元宗欲討文進文徽以為延政首亂當先致討有翰林待詔臧循者與文徽同里巷少嘗為賈入閩習知其山川險易為陳進兵之䇿文徽本好言兵遂請行元宗乃以為江西安撫使令至境上審觀可否文徽鋭于成功至上饒復命盛言必克詔彂洪州屯兵以邉鎬為将従文徽攻建州建人厭王氏之亂伐木開道迎我師行次益竹遇建州兵至又聞泉漳汀州皆㱕延政恐懼退保建陽時臧循亦為别将屯邵武延政襲破之獲循斬于建州軍聲大挫元宗遣何敬洙等來援敬洙鎬與建州兵相持文徽得建之降将孟堅使濳師出其後擊之建州兵大敗潰去遂傅其城雖下建州諸軍無紀律殺掠不禁民始失望有叛志矣元宗知而置不問䇿功遷撫州觀察使又拜建州留後由是文徽益自用時李弘義挾吴越兵據福州偽遣諜來告福州亂文徽喜率劍州刺史陳誨赴之誨将舟師至福州城下擊敗其兵執吴越将馬先進等三人文徽以歩騎繼至弘義陽遣䘚數百人出迎而設伏西門以待文徽傳令徑入其城陷伏中大敗墜馬被執送錢唐将士死者萬人元宗遣使㱕馬先進于吴越而求文徽吴越王遣還将發為置酒遇毒㱕至金陵毒始作元宗使醫視之醫以珠置口中有頃珠色變黒醫曰疾不可為然猶十年乃死文徽遂病瘖以工部尚書致仕朱元降周坐親黨安置宣州䘚年七十距遇毒之歳正十年云謚曰宣子元方元規元素元範元賞元方事後主為水部貟外郎吉王從謙掌書記従謙朝京師太祖命知制誥盧多遜燕従謙于館多遜奕棋次顧元方曰江南竟何如元方歛袵曰江南事大朝十餘年極君臣之禮不知其他多遜推枰媿謝曰勿謂江南無人使還通判建州盧綘據歙州傳檄至建元方立斬其使及絳平太祖聞元方所為大悦擢殿中侍御史知泉州䘚官元方子道龍圗閣待制始徙家海陵純厚長者以文行稱于時道從兄陶及事後主國亡入朝仕至秘書少監知審刑院與道尤極友􅋢自金陵破士族流離多貧困失職惟道兄弟盡力収恤聚食常數十百人得任子恩皆以与族人以少長為先後無親踈之間異姓亦分俸給之時其婚􅊚由是常苦貧而查氏至今為海陵望族許國籥皆其後也邊鎬金陵人少事烈祖為通事舎人以通敏稱保大初循州人張遇賢本羅縣小吏有神降于縣之刻衫鎮語人曰張遇賢非常人當事我遇賢徃事之㑹州境群盜𧺫各擁衆數百無所統相與禱于神神又大言曰張遇賢汝主也遇賢遂稱王改元置百官度嶺襲虔州節度使賈浩閉門登陴不敢出遇賢據白雲洞衆十餘萬元宗遣洪州營屯都虞候嚴思率所部討之鎬為監軍䖍有書生白昌𥙿沉宻有謀鎬引與㝎計刋木開道􅊞白雲洞㑹遇賢所事神棄去不復降語賊衆遂潰其禆将李台執之以降䇿功遷洪州營屯諸軍都虞候二年查文徽以樞宻副使出師伐建州詔鎬為行營招討洪撫饒信歙等州諸指揮都虞候從文徽行然衆纔數千戰敗退舎元宗聞之遣何敬洙祖全㤙姚鳳來援敬洙與鎬進兵奪其險要自崇安進次赤嶺與建兵方相持爲背水陣文徽使騎繚出建兵之後與敬洙鎬夾擊大破之遂取建州降王延政鎬又南取鐔州事平諸将皆爭功鎬獨無一言七年椘馬氏兄弟相攻希萼雖勝而尤無道元宗知楚難方殷以鎬爲信州刺史領屯營兵兼湖南安撫使駐袁州萍鄊有警許便冝従事楚人果復廢立鎬自萍鄊帥師入潭州遷馬氏之族及文武将吏于金陵遂拜潭州節度使南漢将潘崇徹攻郴州鎬岀兵爭之敗績遂失郴州鎬懼南漢㓂邊未已請除道全二州刺史詔以廖偃爲道州刺史張巒權知全州然湖湘之憂實不在南漢也自馬氏廢立以來帑庾空竭土地既㱕我馮延已為相矜平楚之功不欲取費于國專掊歛楚人以給經費人心巳離鎬柔而無㫁日飯沙門希福紀綱頽弛不之問初咸師朗來㱕以其所部為奉節軍従鎬入楚廩給薄于椘之降䘚偶語怨望而糧料使王紹顔每給奉節糧輒刻削之軍校孫朗欲殺紹顔紹顔匿囷下得免官屬請斬紹顔以謝将士鎬不聴朗乃謀殺鎬及紹顔據湖南㱕中原夜率所部取草燒府門火輒不彂良久傳漏者覺之以告鎬出衙兵以鬪勝貧未决鎬命吹角亂兵少以為将旦亟斬關奔朗州盡以潭州虗實告劉言言久懐叛志得朗言大喜遣其将王進逹周行逢來攻鎬初亦俻言已而聞人謂忠順傾意信之及言兵已㧞益陽遂夜棄城岀奔列城皆潰盡䘮楚地坐削官流饒州而它将棄城者皆斬初湘中謡言馬去不用鞭至是而驗十四年周師大入齊王景逹為元帥岀兵援夀州起鎬為大将戦敗被執丗宗命為右千牛衞上将軍及元宗割淮南地請􅉀丗宗乃㱕鎬䘚扵金陵, WYG: ''}
