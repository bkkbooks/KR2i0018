  - {type: variant, offset: 8326, length: 0, content: '', WYG: 周宗字君太廣陵人少遇亂孤窮事烈祖為給使閑於擯相辭令方時艱難每使四方輙稱職端敏可仗恩顧日洽烈祖鎮金陵為都押衙時用宋齊丘議迎呉讓皇都金陵繕府治為宫馬步都虞候蔡𢎞業為宫城營奉使徙都統府於古臺城使都教練使孔昌祚營之都統府成凡二千四百間環一千五百步烈祖已徙居且迎讓皇矣宗請問曰若主上西遷則公當東駕勞費方始怨嗟將日聞矣烈祖納之託以歲不利而止自是宗益預議論齊丘始忌之一日烈祖臨鏡理白鬚太息曰功業成而吾老矣奈何宗適侍側悟㣲指乃請如廣陵諷讓皇以禪代事亦請諭齊丘齊丘心忌大議自宗發及其將還留與飲酒而遣騎以手疏切諫烈祖得之大悔懼後數日齊丘馳至金陵為險語動烈祖請斬宗以謝國人烈祖將從之徐玠固爭事乃已但黜宗為池州副使玠又與李建勲等言天人之望已集密定大計復召宗還舊職烈祖受禪宗躐進至内樞使同平章事遷侍中時以樞密為内樞者猶避呉武王諱也烈祖常召宗及宋齊丘馬仁裕宴於崇英院歡燕道舊為樂他將相莫預然待宗尤親厚不甚以職務嬰之宗亦能澹然畏逺權勢居家節儉俸賜皆積不用故齊丘黨雖日讒之不能害乆之乃罷為江州節度使有俞文貞者早遊烈祖幕府宗及馬仁裕皆趨走執事左右及宗出鎮文貞仕宦蹭蹬猶為其州巡官方旅見輙越次問曰馬押衙亡恙宗曰馬相公已鎮廬州文貞顧同列匿笑而退他日預公設宗勸以酒文貞俛首曰下官小戸令公所熟知也聞者大駭而宗怡然不動其寛厚如此徙宣州節度使入覲賜燕元宗親為摺襆頭脚以表殊禮復出留守東都請老以司徒致仕歸金陵馮延魯代為留守㑹周師陷廣陵延魯自髠而逃見執於周人束縳桎梏僅得免死時人益以宗享福終始為異俄而宗病卒年七十餘宋齊丘時以太傅奉朝請撫其棺哭曰君大黠來亦得時去亦得時元宗聞之不平宗二女皆為後主后徐鍇字楚金㑹稽人父延休字徳文風度淹雅故唐乾符中進士昭宗狩石門無學士草詔延休來調官適在旁近逆旅左右言其工文詞即召見命視草昭宗善之及還長安不得用梁蔣𤣥暉辟為其佐延休棄去依鍾傳於洪州呉取江西得延休仕至光禄卿江都少尹卒二子鉉鍇遂家廣陵鍇四嵗而孤母方教鉉就學未暇及鍇鍇自能知書稍長文詞與鉉齊名昇元中議者以文人浮薄多用經義法律取士鍇恥之杜門不求仕進鉉與常夢錫同直門下省出鍇文示之夢錫賞愛不已薦於烈祖未及用而烈祖殂元宗嗣位起家祕書郎齊王景達奏授記室時殷崇義為學士草軍書用事謬誤鍇竊議之崇義方得君誣奏鍇泄禁省語貶烏江尉嵗餘召還授右拾遺集賢殿直學士論馮延魯有罪無才人望至淺不當為巡撫使重忤權要以祕書郎分司東都然元宗愛其才復召為虞部員外郎後主立遷屯田郎中知制誥集賢殿學士改官名拜右内史舍人賜金紫宿直光政殿兼吏兵部選事與兄鉉俱在近侍號二徐初鍇久次當遷中書舍人游簡言當國每抑之鍇乃詣簡言簡言從容曰以君才地何止一中書舍人然伯仲並居清要亦物忌太盛不若少遲之鍇頗怏怏簡言徐出妓佐酒所歌詞皆鍇所為鍇大喜乃起謝曰丞相所言乃鍇意也歸以告鉉鉉歎息曰汝癡絶乃為數闋歌換中書舍人乎鍇凡四知貢舉號得人後主裒所製文命為之序士以為榮鍇酷嗜讀書隆寒烈暑未嘗少輟後主嘗得周載齊職儀江東初無此書人無知者以訪鍇一一條對無所遺忘其博記如此既久處集賢朱黄不去手非莫不出少精小學故所讐書尤審諦每指其家語人曰吾惟寓宿於此耳江南蔵書之盛為天下冠鍇力居多後主嘗歎曰羣臣勤其官皆如徐鍇在集賢吾何憂哉李穆來使見鍇及鉉歎曰二陸之流也嘗夜直召對論天下事因及用人才行孰先後主曰多難當先才鍇曰有人才如韓彭而無行陛下敢以兵十萬付之乎後主稱善時國勢日削鍇憂憤鬱鬱得疾謂家人曰吾今乃免為俘虜矣開寳七年七月卒年五十五贈禮部侍郎謚曰文著説文通釋方輿記古今國典賦苑嵗時廣記及他文章凡數百卷鍇卒逾年江南見討比國破其遺文多散逸者查文徽歙州休寧人幼好學能自刻苦手寫經史數百卷稍長任氣好俠聞人困乏雖不識必濟之家本富坐是窮空不悔也或遺以金帛一夕盜入其家盡取去文徽不言雖鄰里莫知者乆之盜敗於旁邑移文訊驗人始知之咸推其量烈祖輔政初入謁烈祖召與語偉其論宋齊丘亦稱薦之徐知諤領浙西以文徽為其判官或獻玉盃知諤喜酧以錢百萬趣開宴出盃行酒至文徽偶墮地碎一坐皆驚而文徽自若烈祖受禪入為監察御史元宗立進諌議大夫中書舍人樞密副使閩主延義與其兄延政相攻延政以建州建國稱殷而延義為其下所殺推立大將朱文進元宗欲討文進文徽以為延政首亂當先致討有翰林待詔臧循者與文徽同里巷少嘗為賈入閩習知其山川險易為陳進兵之䇿文徽本好言兵遂請行元宗乃以為江西安撫使令至境上審觀可否文徽鋭於成功至上饒復命盛言必克詔發洪州屯兵以邊鎬為將從文徽攻建州建人厭王氏之亂伐木開道迎我師行次蓋竹遇建州兵至又聞泉漳汀州皆歸延政恐懼退保建陽時臧循亦為别將屯邵武延政襲破之獲循斬於建州軍聲大剉元宗遣何敬洙等來援敬洙鎬與建州兵相持文徽得建之降將孟堅使潛師出其後擊之建州兵大敗潰去遂傅其城雖下建州諸軍無紀律殺掠不禁民始失望有叛志矣元宗知而置不問䇿功遷撫州觀察使又拜建州留後由是文徽益自用時李𢎞義挾呉越兵據福州偽遣諜來告福州亂文徽喜率劍州刺史陳誨赴之誨將舟師至福州城下擊敗其兵執呉越將馬先進等三人文徽以步騎繼至𢎞義陽遣卒數百人出迎而設伏西門以待文徽傳令徑入其城陷伏中大敗墜馬被執送錢塘將士死者萬人元宗遣使歸馬先進于呉越而求文徽呉越王遣還將發為置酒寘毒歸至金陵毒始作元宗使醫視之醫以珠置口中有頃珠色變黒醫曰疾不可為然猶十年乃死文徽遂病瘖以工部尚書致仕朱元降周坐親黨安置宣州卒年七十距遇毒之歲正十年云謚曰宣子元方元規元素元範元賞元方事後主為水部員外郎吉王從謙掌書記從謙朝京師太祖命知制誥盧多遜燕從謙於館多遜奕棋次顧元方曰江南竟何如元方歛衽曰江南事大朝十餘年極君臣之禮不知其他多遜推枰愧謝曰勿謂江南無人使還通判建州盧絳據宣州傳檄至建元方立斬其使及絳平太祖聞元方所為大悦擢殿中侍御史知泉州卒官元方子道龍圖閣待制始徙家海陵純厚長者以文行稱於時道從兄陶及事後主國亡入朝仕至祕書少監知審刑院與道尤極友愛自金陵破士族流離多貧困失職惟道兄弟盡力收恤聚食常數十百人得任子恩皆以與族人以少長為先後無親疎之間異姓亦分俸給之時其婚姻由是常苦貧而查氏至今為海陵望族許國籥皆其後也邊鎬金陵人少事烈祖為通事舍人以通敏稱保大初循州人張遇賢本羅縣小吏有神降於縣之刻杉鎮語人曰張遇賢非常人當事我遇賢往事之㑹州境羣盜起各擁衆數百無所統相與禱於神神又大言曰張遇賢汝主也遇賢遂稱王改元置百官度嶺襲䖍州節度使賈浩閉門登陴不敢出遇賢據白雲洞衆十餘萬元宗遣洪州營屯都虞候嚴思率所部討之鎬為監軍䖍有書生白昌裕沉密有謀鎬引與定計刋木開道襲白雲洞㑹遇賢所事神棄去不復降語賊衆遂潰其裨將李台執之以降䇿功遷洪州營屯諸軍都虞候二年查文徽以樞密副使出師伐建州詔鎬為行營招討洪撫饒信歙等州諸指揮都虞候從文徽行然衆纔數千戰敗退舍元宗聞之遣何敬洙祖全恩姚鳳來援敬洙與鎬進兵奪其險要自崇安進次赤嶺與建兵方相持為背水陣文徽使騎繚出建兵之後與敬洙鎬夾擊大破之遂取建州降王延政復取漳州事平諸將皆爭功鎬獨無一言七年楚馬氏兄弟相攻希蕚雖勝而尤無道元宗知楚難方殷以鎬為信州刺史領屯營兵兼湖南安撫使駐袁州萍鄉有警許便宜從事楚人果復廢立鎬自萍鄉帥師入潭州遷馬氏之族及文武將吏于金陵遂拜潭州節度使南漢將潘崇徹攻郴州鎬出兵爭之敗績遂失郴州鎬懼南漢寇邊未已請除道全二州刺史詔以廖偃為道州刺史張巒權知全州然湖湘之憂實不在南漢也自馬氏廢立以來帑蔵空竭土地既歸我馮延己為相矜平楚之功不欲取費於國専掊歛楚人以給經費人心已離鎬柔而無斷日飯沙門希福紀綱頺弛不之問初成師朗來歸以其所部為奉節軍從鎬入楚廩給薄于楚之降卒偶語怨望而糧料使王紹顔每給奉節糧輒刻削之軍校孫朗欲殺紹顔紹顔匿囷下得免官屬請斬紹顔以謝將士鎬不聽朗乃謀殺鎬及紹顔據湖南歸中原夜率所部取草燒府門火輒不發良乆傳漏者覺之以告鎬出衙兵與鬬勝負未决鎬命吹角亂兵少以為將旦亟斬闗奔朗州盡以潭州虚實告劉言言久懐叛志得朗言大喜遣其將王進逺周行逢來攻鎬亦備言已而聞人謂忠順傾意信之及言兵已拔益陽遂夜棄城出奔列城皆潰盡喪楚地坐削官流饒州而他將棄城者皆斬湘中謠言馬去不用鞭至是而驗十四年周師大入齊王景達為元帥出兵援夀州起鎬為大將戰敗被執世宗命為右千牛衛上將軍及元宗割淮南地請盟世宗乃歸鎬卒于金陵南唐書卷五欽定四庫全書南唐書卷六宋陸游撰周柴何王張馬游刁列傳第}
