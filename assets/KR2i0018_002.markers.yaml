  - {type: variant, offset: 8323, length: 0, content: '', WYG: 第三後主名煜字重光元宗第六子初名從嘉母曰光穆皇后鍾氏從嘉廣顙豐頰騈齒一目重瞳子文獻太子惡其有奇表從嘉避旤惟覃思經籍厯封安定郡公鄭王文獻太子卒徙呉王以尚書令知政事居東宫建隆二年遂立為太子元宗南巡太子留金陵監國以嚴續殷崇義輔之張洎主牋奏六月元宗殂太子嗣立於金陵更名煜居喪哀毁幾不勝赦境内尊鍾后曰聖尊后以后父名太章也立妃周氏為國后徙信王景逷為江王鄧王從善為韓王立弟從鎰為鄧王從謙為宜春王從信為文陽郡公從度為昭平郡公從度景遷子也令諸司四品至九品無職事者日二員待制於内殿以右僕射嚴續為司空平章事餘進位有差遣中書侍郎馮延魯於京師奉表陳襲位太祖賜詔答之自是始降詔秋九月太祖遣鞍轡庫使梁義來弔祭冬十月太祖遣樞密承㫖王文來賀襲位初元宗雖臣於周惟去帝號他猶用王者禮至是國主始易紫袍見使者使退如初服十二月置龍翔軍以教水戰建隆三年春三月遣馮延魯入貢京師泉州節度使中書令晉江王劉從効卒子紹鎡自稱留後四月泉州將陳洪進執紹鎡歸金陵推副使張漢思為留後六月遣客省使翟如璧入貢京師太祖放降卒千人南還冬十一月遣水部郎中顧彞入貢京師乾徳元年春正月太祖遣使來賜羊馬槖駞三月太祖出師平荆湖國主遣使犒軍夏四月泉州副使陳洪進廢張漢思自稱權知軍府來告國主即以洪進為節度使秋七月太祖詔國主遣還顯徳以來中朝將士在江南者及令揚州民遷江南者還其故土十二月國主表乞罷詔書不名之禮不從乾徳二年春三月行鐵錢每十錢以鐵錢六權銅錢四而行其後銅錢遂廢民間止用鐵錢末年銅錢一直鐵錢十比國亡諸郡所積銅錢六十七萬緡命吏部侍郎脩國史韓熈載知貢舉放進士王崇古等九人國主命中書舍人徐鉉覆試舒雅等五人雅等不就國主乃自命詩賦題以中書官蒞其事五人皆見黜秋八月太祖於江北置折博務禁商旅過江九月立子仲㝢為清源郡公仲宣宣城郡公十月甲辰仲㝢卒國后周氏已寢疾哀傷増革遂亦卒十一月太祖遣作坊副使魏丕來弔祭乾徳三年夏五月司空平章事嚴續罷為鎮海軍節度使秋九月雨沙聖尊后鍾氏殂冬十月太祖遣染院使李光圖來弔祭乾徳四年秋八月國主遣龔慎儀持書使南漢約與俱事中朝九月慎儀至番禺被執乾徳五年春命兩省侍郎諫議給事中中書舍人集賢勤政殿學士更直光政嚴召對咨訪率至夜分開寶元年春三月戊申以樞密使右僕射殷崇義為左僕射同平章事境内旱太祖賜米麥十萬石冬十一月立國后周氏開寶二年三月以游簡言為左僕射兼門下侍郎同平章事夏五月簡言卒是歲右僕射同平章亊殷崇義罷為潤州節度使同平章亊開寶三年夏太白晝見二日相觸開寶四年冬十月國主聞太祖滅南漢屯兵於漢陽大懼遣太尉中書令鄭王從善朝貢稱江南國主請罷詔書不名從之有商人來告中朝造戰艦數千艘在荆南請密往焚之國主懼不敢從開寶五年春二月國主下令貶損儀制改詔為教中書門下省為左右内史府尚書省為司㑹府御史臺為司憲府翰林院為文館樞密院為光政院大理寺為詳刑院客省為延賓院官號亦從改易以避中朝初金陵殿闕皆設鴟吻元宗雖臣於周猶如故乾徳後遇中朝使至則去之使還復設至是遂去不復用降諸弟封王者皆為公從善楚國從鎰江國從謙鄂國内史舍人張佖知禮部貢舉放進士楊遂等三人清耀殿學士張洎言佖多遺才國主命洎考覆遺不中第者於是又放王倫等五人閏月癸巳太祖命進奉使楚國公從善為泰寧軍節度使留京師賜第汴陽坊示欲召國主入朝也國主遣戸部尚書馮延魯謝從善爵命延魯至京師疾病不能朝而歸開寶六年夏太祖遣翰林院學士盧多遜來國主聞太祖欲興師上表願受爵命不許以司空殷崇義知左右内史事冬十月内史舍人潘佑上書切諌佑素與戸部侍郎李平交厚國主以為事皆由平始先以平屬吏遣使收佑佑自殺平縊死獄中皆徙其家外郡甲戌歲秋國主上表求從善歸國不許太祖遣閤門使梁迥來使從容言曰天子今冬行柴燎之禮國主宜往助祭國主不答九月丁夘復遣知制誥李穆為國信使持詔來曰朕將以仲冬有事圜丘思與卿同閲犧牲且諭以將出師宜早入朝之意國主辭以疾且曰臣事大朝冀全宗祀不意如是今有死而已時太祖已遣潁州團練使曹翰率師先出江陵宣徽南院使曹彬侍衛馬軍都虞候李漢瓊賀州刺史田欽祚率舟師繼發及是又命山南東道節度使潘美侍衛步軍都虞候劉遇東上閤門使梁迥率師水陸並進與國信使李穆同日行冬十月國主遣江國公從鎰貢帛二十萬疋白金二十萬斤又遣起居舍人潘慎修貢買宴帛萬疋錢五百萬築城聚糧大為守備閏十月王師拔池州國主於是下令戒嚴去開寶紀年稱甲戌歲辛未王師進拔蕪湖及雄逺軍呉越亦大舉兵犯常潤國主遺呉越王書曰今日無我明日豈有君一旦明天子易地賞功王亦大梁一布衣耳呉越王表其書於朝王師次采石磯作浮橋成長驅渡江遂至金陵每歲大江春夏暴漲謂之黄花水及王師至而水皆縮小國人異之國主以軍旅委皇甫繼勲機事委陳喬張洎又以徐元瑀刁衎為内殿傳詔而遽書警奏日夜狎至元瑀等輒屛不以聞王師屯城南十里閉門守陴國主猶不知也初烈祖有國凡民産二千以上出一卒號義軍分籍者又出一卒號生軍新置産亦出一卒號新擬軍客戸有三丁者出一卒號拔山軍元宗時許郡縣村社競渡毎嵗重午日官閲試之勝者給綵帛銀椀皆籍姓名至是盡取為卒號凌波軍民奴及贅壻號義勇軍募豪民以私財招聚亡賴亡命號自在軍至是又大蒐境内自老弱外皆募為卒號排門軍民間又有自相率拒敵以紙為甲農器為兵者號白甲軍凡十三等皆使捍禦然實皆不可用奔潰相踵乙亥嵗春二月壬戌王師拔金陵闗城三月丁巳呉越攻我常州權知州事禹萬誠以城降誅神衛都指揮使皇甫繼勲彗出五車色白長五尺夏六月轉見西方犯太㣲六十日滅王師及呉越圍潤州留後劉澄以城降呉越遂㑹王師圍金陵洪州節度使朱令贇帥勝兵十五萬赴難旌旗戰艦甚盛編木為栰長百餘丈大艦容千人令贇所椉艦尤大擁甲士建大將旗鼓將斷采石浮橋至皖口與王師遇傾火油焚北船適北風反焰自焚我軍大潰令贇及戰櫂都虞候王暉皆被執外援既絶金陵益危蹙王師百道攻城晝夜不休城中米斗萬錢人病足弱死者相枕籍國主兩遣徐鉉等厚貢方物求緩兵守祭祀皆不報冬十一月白虹貫日晝晦乙未城陷將軍咼彦馬承信及弟承俊帥壯士數百力戰而死勤政殿學士鍾蒨朝服坐於家亂兵至舉族就死不去光政使右内史侍郎陳喬請死不許自縊死國主帥司空知左右内史事殷崇義等肉袒降於軍門明年正月辛未至京師乙亥授右千牛衛上將軍封違命侯太宗即位加特進改封隴西公太平興國三年七月辛夘殂年四十二是日七夕也後主蓋以是日生贈太師追封呉王葬洛陽北邙山後主天資純孝事元宗盡子道居喪哀毁杖而後起嗣位之初屬保太軍興之後國削勢弱帑庾空竭専以愛民為急蠲賦息役以裕民力尊事中原不憚卑屈境内賴以少安者十有五年憲司章疏有繩糾過訐皆寢不下論决死刑多從末減有司固爭乃得少正猶垂泣而後許之常獵於青山還如大理寺親録繫囚多所原釋中書侍郎韓熙載奏獄訟有司之事囹圄非車駕所宜臨幸請罰内庫錢三百萬以資國用雖不聽亦不怒也殂問至江南父老有巷哭者然酷好浮屠崇塔廟度僧尼不可勝算罷朝輒造佛屋易服膜拜以故頗廢政事又置澄心堂於内苑引能文士及徐元機元榆元樞兄弟居其間中㫖由之而出中書密院乃同散地兵興之際降御札移易將帥大臣無知者皇甫繼勲誅死之後夜出萬人斫營招討使但署牒遣兵竟不知何往蓋皆澄心堂直承宣命也長圍既合内外隔絶城中之人惶怖無死所後主方幸淨居室聽沙門徳明雲真義倫崇節講楞嚴圓覺經用鄱陽隠士周惟簡為文館詩易侍講學士延入後苑講易否卦賜惟簡金紫羣臣皆知國亡在旦暮而張洎猶謂北師已老將自遁去後主益甘其言晏然自安命戸部員外郎伍喬于圍城中放進士孫確等三十八人及第其所施為大抵𩔖此故雖仁愛足以感其遺民而卒不能保社稷云南唐書}
