  - {type: variant, offset: 0, length: 5797, content: 南唐書列傳卷苐一宋齊丘字子嵩丗為廬陵人父誠與鍾傳同起兵髙駢表傳為洪州節度使以誠副之䘚官因家洪州齊丘好學工屬文尤喜縦横長短之說烈祖為昇州刺史齊丘因騎将姚克瞻得見暇日陪燕㳺賦詩以獻曰飬花如飬賢去草如去惡松竹無時衰蒲桞先秋落烈祖竒其志待以國士従鎮京口入定朱瑾之難常参祕畫因説烈祖講典禮眀賞罰禮賢能寛征賦多見聴用烈祖為築小亭池中以橋度至則徹之獨與齊丘議事率至夜分又為髙堂不設屏障中置灰鑪而不設火两人終日擁爐畫灰為字旋即平之人以比劉穆之之佐宋髙祖然齊丘資躁𥚹或議不合則拂衣􅏙𧺫烈祖謝之而已義祖獨惡其為人每欲進㧞輒不果浮沉下僚十餘年義祖末年議者多請以徐氏諸子執國政烈祖聞之亟欲自請出鎮齊丘請徐之俄而義祖殂自殿直軍判官擢右司貟外郎進右諌議大夫兵部侍郎居中用事且倚以為相齊丘自以資望尚淺或不為國中所服乃吿㱕洪州改葬因入九華山累啓求致仕不許時元宗已為大将軍烈祖以吴主命命元宗躬徃迎之扵是齊丘託不得已而𧺫遂拜中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔委齊丘左右之初烈祖權位日隆舉國皆知代謝之勢吴主謙恭無失徳烈祖懼群情未協欲待嗣君與齊丘議合已而都押衙周宗揣㣲指請急至都以禅代事吿齊丘齊丘黙計大議本自巳出今若遽行則功㱕周宗欲因以釣名乃留與夜飲亟遣使手書切諌以為時事未可後數日馳至金陵請斬宗以謝國人烈祖亦悔将従之徐玠固爭財黜宗為池州副使玠乃與李建勲等遂極言冝従天人之望𣸪召宗還舊職齊丘由是頗見踈忌留為諸道都統判官加司空無所關預従容而已數請退烈祖以南園給之俄而齊國建猶以勳舊為左丞相而不預事李徳誠周本自廣陵持吴帝詔來行傳禅齊丘謂徳誠子建勲曰尊公吴室元勳今日掃地矣獨稱疾臥家不預勸進烈祖既受禅徐玠為侍中李建勲為中書侍郎同平章事周宗為樞宻使齊丘但遷司徒中懐不平及宣制至布衣之交忽抗聲曰臣為布衣時陛下亦一刺史耳今為天子可不用老臣矣烈祖優容之嘗夜宴天泉閣李徳誠曰陛下應天順人惟宋齊丘不悅因出齊丘諷止勸進書烈祖却之曰子嵩三十年故人豈負我者齊丘頓首謝自是為求媚計更請降譲皇為公侯絶吴太子璉婚久之表言備位丞相不當不聞國政又自陳為人所間烈祖大怒齊丘㱕苐白衣待罪而烈祖怒已解謂左右曰宋公有才特不識大體爾孤豈忘舊臣者命吴王璟持手詔召見遂以丞相同平章事寖𣸪委任兼知尚書省事與張居詠李建勲更日入閤議政契丹耶律徳光遣使來齊丘隂謀間契丹使與晋人相攻則江淮益安宻請厚其禮幣遣還至淮北潜令人刺殺之契丹與晉人果成嫌隙齊丘親吏夏昌圗盗庫金數百萬特判傅輕典烈祖命斬昌圖齊丘慚稱疾求罷省事許之遂不𣸪朝謁帝遣夀王景遂勞問許鎭故鄊始入朝因召與宴飲齊丘酒酣輒曰陛下中興實老臣之力乃忘老臣可乎烈祖怒曰太保始以㳺客干朕今為三公足矣齊丘詞色愈厲曰臣為㳺客時陛下亦偏禆耳今不殺老臣遂引去烈祖頗悔眀日手詔曰朕之性子嵩所知少相親老相怨可乎拜鎮南節度使至鎮𧺫大苐窮極宏麗坊中居人皆使修飾垣屋民不堪其擾有逃去者初赴鎭烈祖曰衣錦晝行古人所貴賜以錦袍親為着之遂服錦袍視事元宗即位召拜太保中書令與周宗並相齊丘之客最親厚者陳覺元宗亦以為才馮延巳延鲁魏岑查文徽與覺深相附結内主齊丘時人謂之五鬼相與造飛語傾周宗宗泣訴與元宗而岑覺又更相攻扵是出齊丘為鎮海軍節度使齊丘怏怏力請㱕九茟舊隱従之賜號九華先生封青陽公食青陽一縣租稅元宗欲傳位齊王景遂詔景遂總庶政惟魏岑查文徽得奏事餘非特召不得見國人大駭齊丘自九華上䟽極論不可會言者衆元宗乃収所下詔或謂齊丘先帝勲舊不冝久棄山澤遣馮延已召之不起遣燕王景逹再持詔徃乃起拜太傅中書令封衞國公賜號國老奉朝請然不得預政益輕財好客識與不識皆附之薦陳覺使福州諭李弘義入朝覺至福州不敢言而尃命岀兵敗事僉謂必坐誅齊丘上表待罪置之不問覺亦不死齊丘方且怒韓熈載議其黨與黜之元宗不悦𣸪使鎭洪州周侵淮北起齊丘為太師領劒南東川節度使進封楚國公與謀難齊丘固譲仍為太傅建議發諸州兵屯淮泗擇偏禆可任者将之周人未䏻測虗實勢不敢䡖進及春水生轉饟道阻彼師老食匱自當北㱕然後遣使乞􅉀庶可無大䘮敗元宗惶惑不能用又力陳割地無益與朝論頗異及眀年署雨周棄所得淮南地北㱕議者謂扼險要擊可以有功且懲後齊丘乃謂擊之怨益深不如縦其㱕以為徳由是周兵皆聚扵正陽而夀州之圍遂不可解終失淮南方是時陳覺李徴古同為樞宻副使皆齊丘之黨躁妄􅌹肆無人臣禮自度事定必不為群臣所容若齊丘􅌹大柄則可以無患覺乃乗間言宋公造國手艱危如此陛下冝以國事一委宋公元宗意謀出齊丘大銜之會鍾謨使還挾周以為已重所言率見聴而謨本善李徳眀欲為報仇屢陳齊丘乗國危殆竊懐非望且黨與衆謀不可測元宗遂命殷崇義草詔曰惡莫甚于無君罪莫深于賣國放㱕九華山而不奪其官爵初命穴牆給食俄又絶之以餒䘚謚醜繆覺徴古皆誅死未㡬元宗燕居見齊丘為厲叱之不退遂遷南都後主立召其家還金陵廩給甚厚方齊丘敗時年七十三且無子若謂窺伺謀纂竊則過也特好權利詭譎造虗譽植朋黨矜功忌能飾詐護前冨貴滿溢猶不知懼狃扵要君闇于知人釁隙遂成蒙大悪以死悲夫論曰丗言江南精兵十萬而長江天塹可當十萬國老宋齊丘機變如神可當十萬周丗宗欲取江南故齊丘以反間死方五代之際天下分裂大亂賢人君子皆自引于深山大澤之間以不仕爲得而馮道有重名于中原齊丘擅衆譽于江表觀其人可以知其時之治亂矣周師之犯淮南齊丘實預議論雖元宗不盡用然使展盡其籌䇿亦非能决勝保境者且丗宗豈畏齊丘機變而間之者㢤盖鍾謨自周㱕力排齊丘殺之故其黨附㑹為此説非其實也予論序齊丘事盡黜當時􅋢憎之論而録其實覽者得詳焉南唐書列傳卷苐一南唐書本紀苐一烈祖光文肅武孝髙皇帝名昪字正倫小字彭奴徐州人姓李氏唐憲宗苐八子建王恪之玄孫恪生超早䘚超生志仕爲徐州判司䘚官因家馬志生榮榮性謹厚喜從浮屠㳺多晦跡精舎時號李道者帝以光啓四年十二月二日生于彭城六歲而孤遇亂伯父球携帝及毋劉氏避地淮泗至濠州乾寧二年淮南節度使楊行宻見而竒之飬以爲子行宻長子渥惡帝不以爲兄弟行宻乃以與大将徐温曰是兒状貌非常吾度渥終不䏻容故以乞汝遂冐姓徐氏名知誥帝事温盡子道温妻李氏以其同姓鞠飬甚至及長身七尺方顙隆凖脩上短下語聲如鐘精采鑠人常緩歩而従者疾行莫䏻及温有疾與其婦晨夜侍㫄不去温益􅋢之行宻亦謂温曰知誥雋傑諸将子皆不逮也天祐六年六月自元従指揮使遷昇州防遏使兼樓船軍使治戦艦于昇七年五月授昇州副使知州事九年副柴再用平宣州以功遷昇州刺史時江淮初定守令皆武夫專事軍旅帝獨襃廉吏課農桒求遺書招延四方士大夫傾身下之雖以節儉自勵而輕財好施無所􅋢吝以宋齊丘王令謀王翃主議論曾禹張洽孫魴徐融為賔客馬仁𥙿周宗曺悰為親吏十一年加檢校司徒始城昇州十四年五月城成温來觀喜其制度壮麗徙治焉而以帝為檢校太保潤州團練使帝本意在宣州不恱時温子知訓以内外馬步都軍副使専制楊氏驕滛失衆宋齊丘納說曰知訓旦暮且敗是行天所贊也十五年朱瑾殺知訓馬仁𥙿自蒜山渡馳告帝帝即日帥師入廣陵定亂遂代知訓為淮南節度行軍副使内外馬歩都軍副使勤儉寛簡盡反知訓之政上下恱服吳王建國以帝為左僕射参政事國人謂之政事僕射乘剥亂之後曾未期歳紀綱憲度粲然並舉温雖遥執國政而人情頗已㱕属于帝有徐玠者事温為金陵行軍司馬工揣摩捭闔宻說温曰居中輔政豈冝假之它姓請更用嫡子知詢帝刺知皇恐表乞罷政事出鎮江西表未上而温疾亟遂止温䘚知詢嗣為金陵節度使諸道副都統數與帝爭權帝乃使人誘之來朝留為左統軍悉奪其兵而帝以太尉中書令出鎭金陵如温故事吳帝命帝開大元帥府置僚属進封齊王用天子制度改名誥昇元元年冬十月呉帝禅位于我甲申即皇帝位改吳天祚二年為昇元元年國號齊以十二月二日為仁夀節尊吴帝為髙尚思玄弘古譲皇帝上冊稱受禅老臣誥追尊考温為太祖武皇帝丙申以平章事張延翰為右僕射兼門下侍郎同平章事門下侍郎張居詠中書侍郎李建勲皆為同平章事以建康為西都廣陵為東都改尚書省為尚書都省東都尚書省為留守院丙戌改齊眀門為朝元門丁亥封弟知證為江王知諤饒王戊子降吳太子璉為弘農郡公辛卯降吳建安王珙江夏王璘等十一人爵一等而加官増户邑詔獄訟未經本處論决者毋得詣闕訴乙未降吴公主為國君甲午立王后宋氏為皇后丙申封女弟𣏌國君為廣徳長公主庚子遣使如漢閩吴越荆南吿即位辛丑追封吴歷陽公濛為臨川王謚曰靈以禮改葬戊申封子景通為吴王諸道副元帥判六軍諸衞事十一月庚戌朔改東都舊苐為崇徳宮癸丑改承宣院為宣徽院丙辰追冊故妃魏國君楊氏為順妃丁巳追封長子景遷為髙平郡王長女為豐城公主改辭状司為清訟院立姪景邁為晉陵郡公景遜為上饒郡公景邈為桂陽郡公景逸為平陽郡公封女五人為盛唐太和永興建昌玉山公主戊午立子景遂為吉王景逹夀陽郡公以景遂為東都留守江都尹赴東都己未陞東都海陵縣為泰州割鹽城泰興如臯興化縣属焉丁卯髙從誨表請置邸建康從之己巳吴越王使将軍袁韜來賀即位乙亥追封故髙平王景遷妃吴上饒公主為燕國君謚貞荘十二月庚寅上太祖武皇帝陵曰定陵進尊髙祖以下皆為公王而稱宗配皆稱國君及妃墓皆稱陵惟武皇帝之配李氏曰眀德皇后丙午有星孛扵北方昇元二年春正月己酉朔日有食之避殿停朝賀甲子荆南髙從誨使龎守規來賀即位甲戌詔臣僚三品以上追贈父毋将相贈三丗二月壬戌閩使内客省使朱文進來賀即位夏五月讓皇屢請徙居南平王李徳誠等亦引漢隋故事有請戊午改潤州州治為丹陽宫以平章事李建勲充奉迎譲皇使己未漢使集賢殿學士鄒禹謨來賀即位甲寅徙譲皇居丹陽宫丁卯廣濟倉災㷊米三十萬石作渾天儀六月庚辰月入太微西華門犯右執法辛巳犯東垣上相甲申陞池州為康化軍是月髙麗使正朝廣評侍郎柳勳律來朝貢秋七月壬申以左丞相宋齊丘為平章事八月戊寅陞洪州淵灘鎭為清江縣不隸州丁亥契丹使梅里捺盧古來聘冬十月丙子立太學命刪定禮樂癸未新羅使來朝貢壬辰命吴王璟勒步騎八萬講武銅駞橋十二月辛丑譲皇殂詔不視朝二十七日帝率百官素服舉哀是歳徙吴王璟為齊王昇元三年春正月庚戌江王知證饒王知諤表請帝𣸪姓李氏不許癸亥右丞相齊丘平章事居詠建勲樞宻使同平章事宗等表請復姓甲子御扎詳議𣸪姓乙丑齊丘等議冝如所請從之丙寅至壬申齊王璟等三上尊號曰應乾紹聖文武孝眀皇帝不許詔曰迺者干戈相㝷地茀而不藝桑殞而不𧖟衣食日耗朕甚閔之民有嚮風來㱕者授之土田仍給𣸪三歲二月乙亥改太祖武皇帝廟號義祖己卯帝御興祥殿復姓為考妣發哀與皇后皆服􅛓縗居廬如始䘮禮服考妣䘮各二十七日凡五十四日不視朝旦暮臨詔國事委宋齊丘惟軍旅以聞群臣固諌詔以墨縗聽政帝初欲更名昻以犯文宗諱乃名晃或云朱全忠名也又更名坦御史王鵠言字從旦犯􅌖宗諱庚寅詔更名昇甲午月犯南斗苐六星乙未契丹使曷魯來以兄禮事帝蜀使來賀即位追尊髙祖建王恪曰定宗孝靜皇帝配程氏曰貞靜皇后曾祖超曰成宗孝平王配崔氏曰平眞妃祖志曰恵宗孝安王配盧氏曰安荘妃考榮曰慶宗孝徳皇帝配劉氏曰德恭皇后庚午作南郊行宫千間夏四月庚辰朝享于太廟辛巳有事于南郊以髙祖神堯皇帝配用上辛也大赦百官進位将士勞賜有差民三年藝桒及三千本者賜帛五十匹每丁墾田及八十畆者賜錢二萬皆五年勿収租稅詔曰朕以眇躬托于民上常懼弗類以羞髙祖太宗之遺業群公卿士頋欲舉上尊號之禮朕甚不取其勿復以聞戊子進封李徳誠趙王徐知證韓王知諤梁王辛亥進封景遂夀王景逹宣城王丙寅以齊王璟為諸道兵馬大元帥丁未吴越王使左武衞上将軍沈韜文荆南髙從誨使王崇嗣來賀南郊作北郊于玄武湖西熒惑犯月秋七月丙午放諸州所獻珎禽竒獸于鍾山命有司作昇元格與吴令並行甲寅歳星晝見自五月不雨至于閏七月冬十月丁丑御後樓閔戦馬昇元四年春二月詔罷營造力役母妨農時三月丁未頒中正曆曆官陳承勛所譔也丙戌漢人閩人來聘夏五月晋安州節度副使李金全來降六月癸亥罷宣州歳貢木瓜雜果太師中書令趙王李徳誠䘚秋八月立齊王璟為皇太子仍兼大元帥録尚書事璟固譲従之丁卯月掩歳星九月戊辰契丹使梅里掠姑米里來聘獻孤白裘冬十月癸巳朔月熒惑塡歲星聚于南斗壬寅以齊王璟譲儲貮赦殊死以下京師賜餔内外諸軍給優賜禁表奏言聖􅌖二字違者以大不敬論乙巳詔幸東都命齊王璟監國庚戌帝自保徳門御舟辛亥次迎鑾鎮甲寅至東都入建元門帝感念疇昔泫然流涕丁巳遣使問東畿士民不能自存者己未髙麗使廣評侍郎柳兢質來貢方物十一月乙丑宴群臣于崇徳宫故苐也以聽事為光慶殿庚辰改東都文眀殿為乾元殿英武殿為眀光殿應乾殿為垂拱殿朝陽殿為福昌殿積慶官為崇道宫西都崇英殿為延英殿凝華内殿前為昇元殿後為雍和殿興祥殿為昭德殿積慶殿為穆清殿乙酉賜東畿髙年疾苦惸獨米人二石漢使都官郎中鄭翶閩使客省使葛𥙿吴越使刑部尚書楊嚴來賀仁夀節十二月丙申帝至自東都昇元五年春二月己未殺泰州刺史禇仁規三月戊辰契丹使來秋七月詔曰右僕射兼中書侍郎同平章事監修國史李建勲幸処台司且聮戚里靡循紀律敢黷彞章其罷㱕私苐八月有星孛于天市長數文廣數尺七十日沒遣使振貸黄州旱傷户口是歳吴越水民就食境内遣使振恤安集之昇元六年春正月甲子月犯塡星退行在畢閏月甲申朔改天長制置使爲建武軍漢使區延保來聘癸巳閩使尚食使林弘嗣來聘都下大水秦淮溢東都火焚數千家二月己丑以左丞相太保宋齊丘知尚書省事初齊丘累求預政帝許中書視事又以两省事多委給事舎人劇務多在尚書省又求知省事許之夏五月左丞相太保宋齊丘罷為鎮南軍節度使六月常宣歙三州大雨漲溢漢使蕭規來告哀廢朝三日庚午契丹使掠姑米里來聘獻馬五駟大蝗自淮北蔽空而至辛未命州縣捕蝗瘞之庚辰熒惑犯房次将辛巳禁節度刺史給攝署牒秋八月甲申漢使法物使公孫恵來謝襲位九月庚寅頒昇元刪㝎條令十月詔曰前朝失御四方崛起者衆武人用事徳化壅而不宣朕甚悼焉三事大夫其為朕舉用儒者罷去苛政與吾民更始十二月閩使徐弘績漢使滕紹英吴越使右武衛大将軍蔣璠來賀仁夀節昇元七年春正月契丹使逹羅干等二十七人來聘獻馬三百羊三萬五千二月庚午帝崩于昇元殿年五十六十一月壬寅葬永陵帝臨崩謂齊王璟曰徳昌宫儲我器金帛七百萬汝守成業冝善交鄰國以保社稷吾服金石欲延年反以速死汝冝視以為戒帝生長兵間知民厭亂在位七年兵不妄動境内賴以休息性節儉常躡蒲履用鐵盆盎暑月寢殿施青葛帷左右宫婢裁數人服飾撲陋建國始即金陵治所為宮惟加鴟尾設䦨檻而已終不改作元宗為太子欲得杉木作板障有司以聞帝曰杉木固有之但欲作戦艦以竹作障可也江准間連年豐樂兵食盈溢群臣多請恢拓境土帝歎息曰吾少在軍旅見兵之為民害深矣誠不忍𣸪言使彼民安吾民亦安矣吴越國大火㷊其宫室帑藏甲兵㡬盡将帥皆言乗其敝可以得志帝一切不聴遣使厚持金幣唁之仁厚恭儉務在飬民有古賢主之風焉論曰昔馬元康胡恢皆常作南唐書自烈祖以下元康謂之書恢謂之載記蘇丞相頌得恢書而非之曰夫所謂紀者盖摘其事之綱要繋于歲月属于時君秦荘襄王而上與項羽皆未嘗有天下而史遷著扵本紀范曄漢書又有皇后紀以是質之言紀者不足以别正閏陳夀三國志吴蜀不稱紀是又非可法者也蘇丞相之言天下之公言也今取之自烈祖而下皆為紀而用史遷法總謂之南唐紀云南唐書本紀卷苐一, WYG: ''}
