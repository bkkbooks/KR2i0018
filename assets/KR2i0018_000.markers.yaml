  - {type: variant, offset: 0, length: 8, content: 余嘗閲宋馬令南唐, WYG: ''}
  - {type: variant, offset: 9, length: 769, content: 未及見陸放翁書也聞陸子虗家藏宋刻本借而讀之夏日課農田舎携之篋笥因手錄一帙計百五十有六葉昉五月十三日迄六月十三日間嘗還家數日置而不錄實二十日而告成然余以始衰之歳觸炎履畆揮汗濡毫形既仍勞目亦時眩或手隨意勌或心以言馳多致脱訛難免塗竄殊爲潦草聊備覽觀云爾嘉靖二十九年歳在庚戍夏六月十五日王穀祥識扵婁東别業適志軒陸放翁南唐書本紀三卷列傳十五卷乃酉室吏部王公手錄夲也嘉靖甲子上元大病𧺫靜坐齋閤屏謝人事日無聊藉遂借錄一過所恨目力昏眊用意踈脱塗抺太多殊不成書間閲馬令書互有不同抑不知胡恢所著又何如耳他日覓得善本併錄置齋中用備参校亦快事也二書人物損益襃貶去取史家自有法度非穀所知兹不敢贅云錄成謹記歲月于後是歲三月初七日錢穀扵榮木軒中書南唐書目録本紀苐一卷烈祖苐二卷元宗苐三卷後主列傳苐一卷宋齊丘苐二卷周宗徐鍇查文徽邊鎬苐三卷周本子鄴柴克宏何敬洙王㑹張延翰馬仁𥙿㳺簡言刁彦能苐四卷徐玠髙審思鍾謨李徳眀常夢錫史虗白沈彬陳况陳曙陳陶江夢孫毛炳苐五卷徐知證徐知諤徐逰王建封王彦儔朱匡業朱令贇王崇文胡則申屠令堅劉茂忠喬匡舜睦昭符苐六卷劉彦貞髙越兄子逺盧文進陳覺李徴古李德誠子建勲廖居素苐七卷張義方李金全皇甫暉子繼勲江文蔚歐陽廣苐八卷馮延巳弟延鲁孫忌廖偃彭師暠苐九卷孟堅陳誨韓熈載朱元苐十卷劉仁贍潘佑李平嚴續張易龔慎儀苐十一卷郭廷謂張彦卿林仁肇盧綘蒯鼇陳喬陳起苐十二卷周惟簡鄭彦華李貽業劉崇俊劉洞江爲汪台符郭昭慶伍喬蕭儼劉承勳李元清盧郢朱弼王輿魏岑苐十三卷烈祖元敬皇后宋氏烈祖後宫种氏元宗光穆皇后鍾氏後主昭恵國后周氏後主國后周氏後主保儀黄氏烈祖諸子楚王景遷晉王景遂齊王景逹江王景逷元宗諸子弘兾弘茂從善從鎰從謙従慶従信後主二子仲㝢仲宣苐十四卷雜藝方士吳廷紹潘扆李冠某御厨申漸髙譚紫霄史守沖潘扆耿先生節義叚處常趙仁澤張雄陳襃永興公主余洪妻鄭氏吳媛苐十五卷浮屠契丹髙麗目録終, WYG: ''}
