body:
  text: 南唐書列傳卷苐十五嗚呼南唐褊國短丗無大淫虐徒以寖衰而亡要其最可為後丗監者酷好浮屠也初烈祖輔吳吳都廣陵而烈祖居建業大築其居窮極土木之工既成用浮屠說作無遮大齊七㑹為工匠役夫死者薦福俄有胡僧自身毒中印土來以貝葉㫄行及所謂舍利者為贄烈祖召豫章龍興寺僧智玄譯其㫄行之書又命文房書華嚴論四十部奩秩副焉并圖寫製論李長者像班之境內此事佛之權輿也然烈祖未甚惑後胡僧為姦利逐出之國人則寖已成俗矣及其末年溧水天興寺桑生木人長六寸如僧狀右袒而左跪衣裓皆備其色純􅃮可鑑謂之須菩提縣掇置龕中以仁夀節日來獻烈祖始大驚異迎置宫中奉事甚謹其徒因誇以為感應而識者桉譙氏五行書知且有大喪不三月烈祖殂及元宗後主之丗好之遂篤幸臣徐逰專主齊祠事群臣和附惟恐居後宫中造佛寺十餘出金錢募民及道士為僧都城至萬僧悉取給縣官後主退朝與后著僧伽帽服袈裟課誦佛經胡跪稽顙至為瘤贅手常屈指作佛印僧尼犯姦淫獄成後主每曰此等毁戒本圗婚嫁若冠笄之是中其所欲命禮佛百而捨之奏死刑日適遇其齊則于宫中佛前燃燈以逹旦為驗謂之命燈未旦而滅則論如律不然率貸死冨人賂官官竊續膏油往往獲免上下狂惑不恤政事有諌者輒被罪歙州進士汪渙上封事言梁武惑浮屠而亡陛下所知也奈何效之後主雖擢渙為校書郎終不能用其言開寶初有北僧號小長老自言募化而至多持珍寶怪物賂貴要為奧助朝夕入論天宫地獄果報之說後主大悅謂之一佛出丗服飾皆縷金絳羅後主疑其非法答曰陛下不讀華嚴經安知佛冨貴因說後主多造塔像以耗其帑庾又請于牛頭山造寺千餘間聚徒千人日給盛饌有食不能盡者眀旦再具謂之折倒蓋故造不祥語以搖人心及王師渡江即其寺為營又有北僧立石塔于采石磯草衣藿食後主及國人施遺之皆拒不取及王師下池州繫浮橋于右塔然後知其為間也金陵受圍後主召小長老求助對曰北兵雖強豈䏻當我佛力登城一麾圍城之師為小却後主真以為佛力合爪歎異厚賜之下令軍民皆誦救苦菩薩如江濤未幾梯衝環城矢石亂下如雨倉皇𣸪召小長老稱疾不至始悟其姦鴆殺之羣僧懼并坐誅乃共乞授甲出鬪死國難後主曰教法其可毀乎弗許及國亡後主入朝過臨淮往禮普光王塔施金帛猶以千計其後弟從鎰之子祝髮為僧名惟淨景德祥符中天下治安西域獻佛書甚衆惟淨博聞通梵學翻繹精審莫能及者積官試光祿卿譯經三藏亦南唐之餘習云契丹事見唐書本傳及五代史四夷附録今取其事之繫南唐者為傳烈祖升元二年契丹主耶律德光及其弟東丹王各遣使以羊馬入貢别持羊三萬口馬二百匹來鬻以其價市羅紈茶藥烈祖從之于是翰林院進二丹入貢圗詔中書舍人江文蔚作贊其詞曰皇帝建西都之歲神功邁于三古皇風格于四裔華夷咸若駿奔結軌粵六月契丹使梅里捺盧古東丹使兵器寺少令髙徒煥奉書致貢咸集都邑公卿庶尹拜手稽首稱賀以為文德所服受命之符也若乃鴻荒以降驟步相侔耀武以信威有所不及任算以御物有所不從詩頌太原之師則用伐矣漢開朔方之地則崇力矣若我宣猷大麓儷德無私刑于朝廷以及于荒服旃裘左袵捧日分光殊方異産充庭納賮曰垂衣裳而天下治斯之謂矣有司紀美列于績事傳曰主上眀聖而德不聞有司之過也臣職在翰墨親睹隆平散獻贊曰赫矣皇武纂唐之緒要荒之長駿奔來附伏波之柱單于之臺遺鏃徒費獻琛靡來我后穆穆我網恢恢重譯日貢皇哉唐哉四年德光遣使獻馬百匹于是烈祖遣通事舍人判四方館事歐陽遇借鴻臚少卿使契丹假道于晉髙祖不可遇及境而𣸪元宗嗣位遣使者公乘鎔航海繼好既至而契丹亂兀欲被弒弟述律遺元宗書曰大契丹天順皇帝謹致書大唐皇帝闕下貴朝使公乘鎔等自去秋巳逹東京海岸適遭國禍今年正月二十六日部署一行并諸儀物兵鎧已至燕京兹蒙敦念先朝踐修舊好既增摧痛又切感銘貴國長直官王朗陳篆取間道先回用附咨報公乘鎔等巳遣伴送使陳植等同回止俟便風即令引道而公乘鎔亦以蠟封帛書其詞曰臣鎔自去年六月離罌油七月至鎮東關遣王朗奉表契丹九月乃有番官夷離畢部牛車百餘乘及鞍馬㳂路置頓十月至東京留三月契丹主遣間廏使王廷秀稱詔勞問兼述泰寧王燕王九月同行大事兀欲即丗毋妻併命又遼東以西水潦壞道數百里車馬不通今年正月方至幽州館于愍忠寺先迎御真入宫言先欲識唐皇帝面乃引見如舊儀問國書中機事臣即述奕世歡好當謀分裂之事契丹主喜問𣸪有何事臣云軍機别有密書契丹主接置袖間乃云吾與唐皇帝一如先朝往來因置酒合樂又諭臣曰使人逺泛臣海而至不期骨肉間忽起此事道路所聞必亦憂恐手斟一玉鍾酒先自啜乃以勸臣令飲釂自旦至日晡始罷自是數遣使宣勞三日一賜食謹遣王朗齎骰號子歸聞奏骰號子不知何等語也初宋齊丘謀間晉㑹契丹使燕人髙霸來聘㱕至淮北唐隂遣人刺殺之霸有子乾從行匿之濠州于是契丹頗信以為霸之死出于晉人保大十二年述律遣其舅來夜宴清風驛起更衣忽仆于地視之失其首矣厚賞捕賊不淂久乃知周大將荆罕儒知契丹使至思遣客刺之以問唐乃下令能得吾枕者賞三百緡俄有劒客田英淂之即給賞如約仍屏人語之曰能淂江南畨使頭賞三千緡英果淂之自是唐與契丹遂絶及丗宗兵出淮南敕㬥我罪曰蠢爾淮甸敢拒大邦跋扈飛揚垂六十載幸纍朝多事與北虜交通厚啓戎心誘為邊患所罪狀我雖非一然首以通契丹為興師之名方石晉以父事契丹而契丹每以兄事南唐蓋戎狄習見唐之威靈故聞後裔在江南猶尊之不敢與他國齒南唐亦頗恃以自驕其實相結約撓中原皆虗辭非能為南唐助也髙麗事具唐書及五代史四夷附録今書南唐所載異聞及髙麗通南唐之見于傳記者髙麗至五代初國名曰大封其王髙氏名躬乂躬乂晚年果于誅殺吳順義二年當梁之龍德二年為海軍統帥王建所殺建自立去大封之名𣸪稱髙麗以開州為東京平壤為西京吳天祚二年當晉之天福元年敗新羅百濟于是倭耽羅歡干羅鐡勒東夷諸國皆附之有二京六府九節度百二十郡內列十省四部官朝服紫丹徘緑青碧青碧以年序遷緑以上選才能賜之俸祿賦以田租尚冠禮略如古制婚􅊚男女執手自相媒許俗重匾頭生男旦旦桉壓其首惟恐不匾也升元二年遣使來貢方物所上書稱箋大略云今年六月內當國中原府入吳越國使張訓等回伏聞大吳皇帝巳行禪禮中外推戴即登大寶者伏惟皇帝陛下道契三無恩涵九有堯知天命巳去即禪瑶圗舜念歷數在躬遂傳玉璽建夙惟庸陋獲託生成所恨沃日波遙浮天浪濶幸遇龍飛之旦阻申燕賀之儀無任㱕仁戴聖鼓舞激切之至儀式如表而不稱臣烈祖御武功殿設細仗見其使自言代主朝覲拜舞甚恭宴于崇英殿出龜兹樂作畨戲召學士承㫖孫忌侍宴三年又遣其廣評侍郎桞勳律來貢方物其後史冊殘缺來與否不可考矣列傳卷苐十五終
