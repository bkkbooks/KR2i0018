body:
  text: 南唐書列傳卷苐十四吳廷紹為太醫令烈祖因食飴喉中㘆國醫皆莫能愈廷紹尚未知名獨謂當進楮實湯一服疾失去馮延巳苦腦中痛纍日不減廷紹密詰厨人曰相公平日嗜何等對曰多食山雞鷓鴣廷紹曰吾淂之矣授以甘豆湯亦愈羣醫默識之它日取用皆不驗或扣之答曰噎因甘起故以楮實湯治之山雞鷓鴣皆食烏頭半夏故以甘豆湯解其毒耳聞者大服潘扆往來江淮間自稱野客嘗依海州刺史鄭匡國不甚見禮館之馬廄旁一日從匡國獵近郊匡國妻行至廄中因視扆所居四壁蕭然葦席竹笥而巳發笥覩二錫丸亦頗怪之扆歸大驚曰何物婦人觸吾劒賴吾攝其光􅉭不然身首殊矣或以告匡國匡國竦然曰殆劒客也求學其術扆姑一試之乃俱至靜院探懷出二錫九置掌中俄而氣出指端如二白虹旋繞匡國頸有聲錚然匡國汗下如雨曰先生之術神矣觀止矣扆笑引手收之復為錫丸匡國表薦于烈祖召居紫極宫數年卒李冠善吹洞簫悲壯入雲元宗將召之會軍旅事興不暇司徒李建勳亦知音絶歎賞之冠既不遇周顯德中北逰梁宋每醉輒登市樓長嘯後不知所終某御厨者失其姓名唐長安舊人也從中使至江表未還聞崔胤誅北司遂亡命而某留事吳及烈祖受禪御膳宴設賴之略有中朝承平遺風其食味有鷺鷥餅天喜餅駝蹄餤春分餤密雲餅鐺糟炙瓏璁餤紅頭簽五色餛飩子毋饅頭舊法具存申漸髙優人升元中為教坊部長時關征苛急屬畿內旱一日宴北苑烈祖顧侍臣曰近郊頗得雨獨都城未雨何也得非刑獄有冤乎漸髙遽進曰大家何怪此乃雨畏抽稅故不敢入京爾烈祖大笑眀日下詔弛稅額信宿大雨霑洽周本自吳時有威望烈祖憲其難制因內宴引鴆酒賜本本覺之輒取御杯均酒之半以進曰碩以此上千萬壽庶眀君臣一心烈祖失色左右莫知所為漸髙託俳戲舞袂升殿曰敕賜臣漸髙併飲之納杯懷中而出烈祖密遣中人持藥解之不及腦裂而卒至元宗時又有李家眀亦優人宋齊丘止一子輒死悲哭踰月齊王景遂勉之不從家眀曰是易喻爾作紙鳶大書其上曰一子不能捨如讓皇百口何傱中墜其苐中齊丘取觀為抆淚而止元宗失江北遷豫章龍舟至趙屯舉酒望皖公山曰好青峭數峯不知何名家眀對曰此舒州皖公山也因獻詩曰皖公山縱好不落御觴中元宗太息罷酒去談紫霄泉州人幼為道士初有陳守元者亦道士嘗斸地得木扎數十貯銅盎中皆漢張道陵符篆朱墨如新藏去而不能用以授紫霄紫霄盡能通之遂自言得道陵天心正法核鬼魅治疾病多效閩王王昶尊事之號金門羽客正一先生閩亡遁居廬山棲隱洞學者百餘人武昌節度使何敬洙嘗殺女奴投尸井中人無知者遇疾召紫霄中夜被髮仗劒考治見女厲自訴詰旦屏人以語敬洙乃丹篆符遣之疾即愈廬山僧闢路有大石堅不可鑱紫霄往視曰此固易爾索杯水噀之命工施鑱應手如粉後主聞其名召見賜官階辭不受俄無疾卒年百餘歲今言天心法者皆祖紫霄史守沖潘扆皆不知何許人烈祖嘗夢得神丹既覺語左右欲物色訪求而守沖適詣宫門獻丹方扆亦以方繼進烈祖皆神之以為仙人使煉金石為丹服之多暴怒羣臣奏事往往厲聲色詰讓嘗以其藥賜李建勳建勳乘間言曰臣服甫數日已覺炎躁此豈可常進哉烈祖笑曰孤服之已久寧有是事諌者皆不從俄而疽發遂至大漸臨終謂元宗曰吾服金石求長生今反若此汝冝以為戒也耿先生者父雲軍大校耿少為女道士玉貌烏爪嘗著碧霞帔自稱北大先生始因宋齊丘進嘗見宫婢持糞掃謂元宗曰此物可惜勿令棄之取置鐺中烹煉良久皆成白金嘗遇雪擁爐索金盆貯雪令宫人握雪成鋌投火中徐舉出之皆成白金指䀶猶在又能煼麥粒成圎珠光彩粲然奪真大食國進龍腦油元宗祕􅋢耿視之曰此未為佳者以夾縑囊貯白龍腦數斤懸之有頃瀝液如注香味逾于所進遂得幸于元宗有娠將産之夕雷雨震電及霽娠已失矣久之宫中忽失元敬宋太后所在耿亦隱去凡月餘中外大駭有告者云在都城外二十里方山寶華宫元宗亟命齊王景遂往迎太后見與數道士方酣飲乃迎還宫道士皆誅死耿亦不𣸪得入宫中然猶往來江淮後不知所終金陵好事家至今猶有耿先生寫真云古史官書忠義孝行列女各為傳南唐偏方短丗又史牒放逸不能盡見托其僅可書者合為節義傳假處常失其家丗鄊里保大中為兵部郎中周侵淮南元宗命處常浮海使契丹乞援師處常為契丹陳利害甚辨契丹本通南唐徒持虗辭利南方茶藥珠貝而巳至是了無出師意而留處常不遣處常忿其無信誓死國事數面誚虜主虜主亦愧其言優容之以病卒于虜趙仁澤失其鄊里家丗保大中為常州團練使周人來侵吳越乘間出兵攻常州仁澤戰敗被執歸之錢塘仁澤見吳越王不拜責之曰我烈祖皇帝中興首與先王結好質諸天地王今見利忘義將何面目入先王廟乎吳越王怒以刀抉其口至耳丞相元德昭嘉仁澤之忠以良藥傅瘡獲愈後不知所終張雄失其鄉里家丗周人來侵淮南民自相結為部伍以拒周師謂之義軍而雄所將最有功元宗命為義軍首領及割地徙之江南歷袁汀州刺史後主見討保大中舊將無在者乃擢雄統軍使雄謂諸子曰吾必死國難爾輩不從吾死非忠孝也諸子泣受命與田欽祚戰于溧水敗績他將皆遁士卒死者萬餘人雄與其子力戰俱死不同行者亦死于他陳父子八人無生存者時金陵已危蹙不𣸪議贈恤國人哀之陳褒江州德安縣人唐元和中給事中京之後十丗同居長幼七百人不置奴婢日會食堂上男女異席未冠笄者别又為一席畜犬百餘共以一船貯食飼之一犬不至則羣犬皆不食築書樓延四方學者鄊鄰化其德獄訟為之衰息升元初州以聞詔𣸪徭役表門閭同時見旌者尚數家皆五丗同居云永興公主烈祖女也嫁吳睿帝太子璉及禪代宋齊丘請離婚烈祖不聽公主自以為吳室冡婦而國亡中懷憤悒聞人呼之為公主輒悲傷流涕烈祖愧之乃以璉為中書令池州節度使璉卒公主哭之過哀亦感疾卒余洪妻鄭氏洪為閩將唐師下建州裨將王建封得鄭氏以其有色而自持堅貞不撓不敢犯獻之大將查文徽文徽欲納之鄭大罵曰王師弔伐當褒録節義以表勵風俗建封出行伍尚知見憚君元帥也乃欲為禍首耶文徽大慚亟訪其夫歸之吳媛浚儀人唐史官兢之後父志野義不仕梁南逰吳遂家廬陵媛適段甲生子未晬假卒父母以媛少議嫁之媛𠢐面自誓事舅姑備極孝謹教所生子為善士韓熙載使江南表其節云南唐書列傳卷苐十四
