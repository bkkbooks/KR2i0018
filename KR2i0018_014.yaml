body:
  text: 南唐書列傳卷苐十四吴廷紹為太醫令烈祖因食飴喉中㘆國醫皆莫能愈廷紹尚未知名獨謂當進楮實湯一服疾失去馮延巳苦腦中痛累日不減廷紹宻詰厨人曰相公平日嗜何等對曰多食山雞鷓鴣廷紹曰吾淂之矣授以甘豆湯亦愈羣醫黙識之它日取用皆不驗或扣之答曰噎因甘起故以楮實湯治之山雞鷓鴣皆食烏頭半夏故以甘豆湯解其毒耳聞者大服潘扆徃來江淮間自稱野客嘗依海州刺史鄭匡國不甚見禮館之馬廐㫄一日従匡國獵近郊匡國妻行至厩中因視扆所居四壁䔥然葦席竹笥而巳發笥覩二錫丸亦頗恠之扆㱕大驚曰何物婦人觸吾劒賴吾攝其光􅉭不然身首殊矣或以告匡國匡國竦然曰殆劒客也求學其術扆姑一試之乃俱至靜院探懐出二錫九置掌中俄而氣出指端如二白虹旋繞匡國頸有聲錚然匡國汗下如雨曰先生之術神矣觀止矣扆笑引手収之復為錫丸匡國表薦扵烈祖召居紫極宫數年䘚李冠善吹洞簫悲壮入雲元宗将召之㑹軍旅事興不暇司徒李建勳亦知音絶歎賞之冠既不遇周顯徳中北逰梁宋每醉輙登市樓長嘯後不知所終某御厨者失其姓名唐長安舊人也従中使至江表未還聞崔胤誅北司遂亡命而某留事吴及烈祖受禅御膳宴設賴之畧有中朝承平遺風其食味有鷺鷥餅天喜餅駞蹄餤春分餤宻雲餅鐺糟䏑瓏璁餤紅頭簽五色餛飩子毋饅頭舊法具存申漸髙優人昇元中為教坊部長時關征苛急属畿内旱一日宴北苑烈祖頋侍臣曰近郊頗得雨獨都城未雨何也得非刑獄有冤乎漸髙遽進曰大家何恠此乃雨畏抽税故不敢入京爾烈祖大笑眀日下詔㢮税額信宿大雨霑洽周本自吴時有威望烈祖憲其難制因内宴引鴆酒賜本本覺之輙取御杯均酒之半以進曰碩以此上千萬壽庶眀君臣一心烈祖失色左右莫知所為漸髙託俳戲舞袂升殿曰敕賜臣漸髙併飲之納杯懷中而出烈祖宻遣中人持藥解之不及腦裂而䘚至元宗時又有李家眀亦優人宋齊丘止一子輙死悲哭踰月齊王景遂勉之不従家眀曰是易喻爾作帋鳶大書其上曰一子不能捨如讓皇百口何傱中墜其苐中齊丘取觀為抆淚而止元宗失江北遷豫章龍舟至趙屯舉酒望皖公山曰好青峭數峯不知何名家眀對曰此舒州皖公山也因獻詩曰皖公山縱好不落御觴中元宗太息罷酒去譚紫霄泉州人㓜為道士初有陳守元者亦道士嘗斸地得木扎數十貯銅盎中皆漢張道陵符篆朱墨如新藏去而不能用以授紫霄紫霄盡䏻通之遂自言得道陵天心正法核鬼魅治疾病多効閩王王昶尊事之號金門羽客正一先生閩亡遯居廬山棲隱洞學者百餘人武昌節度使何敬洙嘗殺女奴投屍井中人無知者遇疾召紫霄中夜被髮仗劒考治見女厲自訴詰旦屏人以語敬洙乃丹篆符遣之疾即愈廬山僧闢路有大石堅不可鑱紫霄徃視曰此固易爾索杯水噀之命工施鑱應手如粉後主聞其名召見賜官階辤不受俄無疾䘚年百餘歲今言天心法者皆祖紫霄史守冲潘扆皆不知何許人烈祖嘗夢得神丹既覺語左右欲物色訪求而守沖適詣宫門獻丹方扆亦以方繼進烈祖皆神之以為仙人使煉金石為丹服之多㬥怒羣臣奏事徃徃厲聲色詰譲嘗以其藥賜李建勳建勳乗間言曰臣服甫數日已覺炎躁此豈可常進㢤烈祖笑曰孤服之已久寧有是事諌者皆不従俄而疽發遂至大漸臨終謂元宗曰吾服金石求長生今反若此汝冝以為戒也耿先生者父雲軍大校耿少為女道士玉貌烏爪嘗着碧霞帔自稱北大先生始因宋齊丘進嘗見宫婢持糞埽謂元宗曰此物可惜勿令棄之取置鐺中烹煉良久皆成白金嘗遇雪擁爐索金盆貯雪令宫人握雪成鋌投火中徐舉出之皆成白金指㾗猶在又能煼麥粒成圎珠光彩粲然奪眞大食國進龍腦油元宗祕􅋢耿視之曰此未為佳者以夾縑囊貯白龍腦數觔懸之有頃瀝液如注香味逾于所進遂得幸于元宗有娠将産之夕雷雨震電及霽娠已失矣久之宫中忽失元敬宋太后所在耿亦隱去凡月餘中外大駭有告者云在都城外二十里方山寳華宫元宗亟命齊王景遂徃迎太后見與數道士方酣飲乃迎還宫道士皆誅死耿亦不𣸪得入宫中然猶徃來江淮後不知所終金陵好事家至今猶有耿先生寫眞云古史官書忠義孝行列女各為傳南唐偏方短丗又史牒放逸不能盡見摭其僅可書者合為節義傳叚處常失其家丗鄊里保大中為兵部郎中周侵淮南元宗命處常浮海使契丹乞援師處常為契丹陳利害甚辯契丹本通南唐徒持虗辭利南方茶藥珠貝而巳至是了無出師意而留處常不遣處常忿其無信誓死國事數面誚虜主虜主亦媿其言優容之以病䘚于虜趙仁澤失其鄊里家丗保大中為常州團練使周人來侵吴越乗間出兵攻常州仁澤戦敗被執㱕之錢塘仁澤見吴越王不拜責之曰我烈祖皇帝中興首與先王結好質諸天地王今見利忘義将何面目入先王廟乎吴越王怒以刀抉其口至耳丞相元徳昭嘉仁澤之忠以良藥傅瘡獲愈後不知所終張䧺失其鄉里家丗周人來侵淮南民自相結為部伍以拒周師謂之義軍而䧺所将最有功元宗命為義軍首領及割地徙之江南歷袁汀州刺史後主見討保大中舊将無在者乃擢䧺統軍使雄謂諸子曰吾必死國難爾軰不従吾死非忠孝也諸子泣受命與田欽祚戦于溧水敗績他将皆遯士䘚死者萬餘人䧺與其子力戦俱死不同行者亦死于他陣父子八人無生存者時金陵已危蹙不𣸪議贈䘏國人哀之陳襃江州徳安縣人唐元和中給事中京之後十丗同居長幼七百人不置奴婢日會食堂上男女異席未冠笄者别又為一席畜犬百餘共以一船貯食飼之一犬不至則羣犬皆不食築書樓延四方學者鄊鄰化其德獄訟為之衰息昇元初州以聞詔𣸪徭役表門閭同時見旌者尚數家皆五丗同居云永興公主烈祖女也嫁吴睿帝太子璉及禅代宋齊丘請離婚烈祖不聴公主自以為吴室冡婦而國亡中懐憤悒聞人呼之為公主輙悲傷流涕烈祖愧之乃以璉為中書令池州節度使璉䘚公主哭之過哀亦感疾䘚余洪妻鄭氏洪為閩将唐師下建州裨将王建封得鄭氏以其有色而自持堅貞不撓不敢犯獻之大将查文徽文徽欲納之鄭大罵曰王師弔伐當襃錄節義以表勵風俗建封出行伍尚知見惮君元帥也乃欲為旤首耶文徽大慚亟訪其夫㱕之吴媛浚儀人唐史官兢之後父志野義不仕梁南逰吴遂家廬陵媛適段甲生子未晬叚䘚父母以媛少議嫁之媛𠢐面自誓事舅姑備極孝謹教所生子為善士韓熈載使江南表其節云南唐書列傳卷苐十四
