body:
  text: 余嘗閲宋馬令南唐書未及見陸放翁書也聞陸子虗家藏宋刻本借而讀之夏日課農田舍携之篋笥因手録一帙計百五十有六葉昉五月十三日迄六月十三日間嘗還家數日置而不録實二十日而告成然余以始衰之歲觸炎履畝揮汗濡毫形既仍勞目亦時眩或手隨意倦或心以言馳多致脫訛難免塗竄殊為潦草聊備覽觀云爾嘉靖二十九年歲在庚戍夏六月十五日王穀祥識于婁東别業適志軒陸放翁南唐書本紀三卷列傳十五卷乃酉室吏部王公手録夲也嘉靖甲子上元大病起靜坐齊閣屏謝人事日無聊藉遂借録一過所恨目力昏眊用意踈脫塗抹太多殊不成書間閲馬令書互有不同抑不知胡恢所著又何如耳他日覓得善本併録置齊中用備參校亦快事也二書人物損益褒貶去取史家自有法度非穀所知兹不敢贅云録成謹記歲月于後是歲三月初七日錢穀于榮木軒中書南唐書目録本紀苐一卷烈祖苐二卷元宗苐三卷後主列傳苐一卷宋齊丘苐二卷周宗徐鍇查文徽邊鎬苐三卷周本子鄴柴克宏何敬洙王㑹張延翰馬仁𥙿遊簡言刁彥能苐四卷徐玠髙審思鍾謨李德眀常夢錫史虗白沈彬陳况陳曙陳陶江夢孫毛炳苐五卷徐知證徐知諤徐逰王建封王彥儔朱匡業朱令贇王崇文胡則申屠令堅劉茂忠喬匡舜睦昭符苐六卷劉彥貞髙越兄子逺盧文進陳覺李徴古李德誠子建勳廖居素苐七卷張義方李金全皇甫暉子繼勳江文蔚歐陽廣苐八卷馮延巳弟延魯孫忌廖偃彭師皓苐九卷孟堅陳誨韓熙載朱元苐十卷劉仁贍潘佑李平嚴續張易龔慎儀苐十一卷郭廷謂張彥卿林仁肇盧綘蒯鼇陳喬陳起苐十二卷周惟簡鄭彥華李貽業劉崇俊劉洞江為汪台符郭昭慶伍喬蕭儼劉承勳李元清盧郢朱弼王輿魏岑苐十三卷烈祖元敬皇后宋氏烈祖後宫种氏元宗光穆皇后鍾氏後主昭惠國后周氏後主國后周氏後主保儀黃氏烈祖諸子楚王景遷晉王景遂齊王景逹江王景逖元宗諸子弘兾弘茂從善從鎰從謙從慶從信後主二子仲㝢仲宣苐十四卷雜藝方士吳廷紹潘扆李冠某御厨申漸髙談紫霄史守沖潘扆耿先生節義假處常趙仁澤張雄陳褒永興公主余洪妻鄭氏吳媛苐十五卷浮屠契丹髙麗目録終
