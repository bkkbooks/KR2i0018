body:
  text: 南唐書列傳卷苐八馮延已字正中一名延嗣廣陵人父令頵事烈祖至吏部尚書致仕嘗為歙州鹽鐡院判官刺史滑言病篤或言已死人情頗恟恟延已年十四入問疾出以言命謝將吏外賴以安及長以文雅稱白衣見烈祖起家授祕書郎元宗以吳王為元帥用延巳掌書記與陳覺善因覺以附宋齊丘同府位髙者悉以計出之于是無居已右者元宗亦頗悟其非端士而不能去延巳負其才藝狎侮朝士嘗誚孫忌曰君有何所解而為丞郎忌憤然答曰僕山東書生鴻筆麗藻十生不及君詼諧歌酒百生不及君諂媚險詐纍劫不及君然上所以置君于王邸者欲君以道義規益非遣君為聲色狗馬之友也僕固無所解君之所解適足以敗國家耳延已慙不得對給事中常夢錫屢言延已小人不可使在王右右烈祖感其言將斥之會晏駕元宗立延已喜形于色未聽政屢入白事元宗方哀慕厭之謂曰書記自有常職餘各有司存何為不憚煩也乃少止保大初拜諌議大夫翰林學士遷户部侍郎翰林學士承旨又進中書侍郎四年同平章事集賢殿大學士罷為太子少傅頃之拜撫州節度使以毋憂去鎮起復冠軍大將軍召為太弟太保領潞州節俄以左㒒射同平章事延巳數居柄任揣元宗不能察其姦遂肆為大言謂已之才略經營天下有餘而人主躬覽庶務大臣備位安足致理元宗果謂然悉委以政凡事奏可而巳延巳初以文藝進實無他長紀綱頽弛吏胥用事軍旅一切以委邊帥無所可否愈欲以大言蓋衆而惑人主至譏笑烈祖戢兵以為齷齪無大略嘗曰安陸之役喪兵數千輒食咨嗟者旬日此田舍翁安能成天下事今上暴師數萬于外宴樂擊鞠未嘗少輒此真英雄主也九年湖南平而朗州劉言叛勢張甚元宗亦知用兵之難謂延巳與孫忌曰湖湘之役楚人求息肩吾之出師不復已耳今若授劉言旄節使和其民吾亦得休飬衡湘之民國其庶幾乎忌即欲奉行延已方以克椘為功乃曰本朝出偏師平一國宇縣震動今一旦三分棄其二傷威毁重非所以示天下且諸將行奏功矣持不下又不欲緣軍興取資于國以損其功遣使如長沙調兵賦苛征暴斂重失民心言遂取長沙盡據故楚地周人亦伺釁而動朝論藉藉延已力求去而元宗待之如初及周師大入盡失江北地始罷延已猶為太子少傅數月復相會疾改太子太傅建隆元年五月乙丑卒年五十八諡忠肅延巳工詩雖貴且老不廢如宫瓦數行曉日龍旗百尺春風識者謂有元和詞人氣格尤喜為樂府詞元宗嘗因曲宴內殿從容謂曰吹皺一池春水何干卿事延巳對曰安得如陛下小樓玉笙寒之句時喪敗不支國幾亡稽首稱臣于敵奉其正朔以苟歲月而君臣相語乃如此延巳晚稍自厲為平恕蕭儼嘗廷斥其罪及為大理卿斷軍使李甲妻獄失入坐死議者皆以為當死延已獨揚言曰儼為正卿誤殺一婦人即當以死君等今議殺正卿他日孰任其責乃建議儼素有直聲今所坐已更赦宥冝加弘貸儼遂免人士尤稱之弟延魯延魯字叔文一名謐少負才名烈祖時與兄延巳俱事元帥府元宗立自禮部貟外郎為中書舍人勤政殿學士有江州觀察使杜昌業者聞之歎曰封疆多難駕御賢傑必以爵祿延魯一言合指遽置髙位後有立大功者當以何官賞之然元宗愛其才不以為躐進嘗內宴出寶器貯龍腦數斤賜群臣延魯曰臣請效陳平均分之比遍賜猶餘其半輒曰敕賜録事馮延魯拜舞懷之元宗為歡笑而罷保大中師出平建州以延魯為監軍使諸將欲乘勝遂取福州樞密使陳覺欲自為功乃請銜命宣慰召李弘義入朝既見弘義不敢發還至劒州矯詔起邊兵命延魯將之元宗雖怒覺之􅌹兵業已行因命延魯為南面監軍使與覺及王崇文魏岑會攻福州取其外郛會吳越將余安援兵自海道至白蝦浦將捨舟而濘淖不可行方布竹簀登岸我軍曺射之簀不淂施延魯曰弘義不降恃此援耳若麾我軍稍退使吳越兵至平地盡勦之城主降矣裨將孟堅爭曰援兵已陷死地將盡力與我戰勝負殆未可知延魯不聽頃之吳越至岸鼓譟奮躍而前與城中夾擊我延魯敗走俘馘五千人孟堅戰死諸軍遂大潰死者萬計委軍實戎器數十萬國帑為之虗耗延魯引佩刀自刺人救之不死朝廷議即軍中斬延魯及覺既有命矣會宋齊丘以嘗薦覺使福州自劾乃詔械延魯覺還金陵屬吏皆止流竄延魯流舒州會赦復少府監元宗擇廷臣為巡撫使分按諸州延魯在焉右拾遺徐鍇上疏論其多罪無才不足辱臨遣不聽使還遷中書舍人以工部侍郎出為東都副留守周師南侵分兵下東都延魯宭蹙自髠衣僧服而逃被執世宗釋之賜衣冠授給事中問江南事占奏詳華賜豫加厚留大梁纍年遷刑部侍郎得還拜户部尚書宋興揚州節度使李重進叛伏誅元宗遣延魯朝于行在太祖將乘兵鋒南渡旌旗戈甲皆列江津厲色詰延魯曰爾國何為敢通吾叛臣延魯色不變徐曰陛下徒知其通謀未知其事之詳也重進之使館于臣家國主令臣語之曰大丈夫失意而反世亦有之但時不可耳方宋受禪之初人心未定上黨作亂大兵北征君不以此時友今內外無事乃欲以數千烏合之衆抗天下精兵吾寧能相助乎太祖初意延魯必恐懼失次及聞其言乃大喜因復問曰諸將力請渡江卿以為何如延魯曰重進自謂雄傑無與敵者神武一臨敗不旋踵况小國其能抗天威乎然亦有可慮者本國侍衛數萬皆先主親兵誓同死生固無降理大國亦捐數萬人乃可况大江天塹風濤無常若攻城未下餉道不繼事亦可虞太祖因大笑曰朕本與卿戲耳豈聽卿遊説哉會捕重進叛卒日戮數十人延魯因奏事言曰叛者獨一重進乎亦衆人乎謂衆人則陛下應天順人烏有此理獨一重進則脅從者何罪太祖感悟後獲者皆貸不誅厚賜遣延魯歸南渡之師由是亦輟後主嗣位延魯頗自伐奉使之功嘗宴內殿後主親酌酒賜之飲固不盡誦詩及索琴自鼓以侑之延魯猶自若後主優容不責也椘國公從善入朝太祖授旄節留之闕下後主復遣延魯入謝疾作不能朝太祖待之素厚至是尤憐之遣使挾太醫護視詔放朝還金陵卒于家子僎韓熙載知貢舉放及苐覆試被黜後與其弟侃儀價伉入宋繼取名苐南唐公卿家莫能及者價仕至殿中丞知福州至道咸平間歷典藩郡以政績聞延魯鋭于仕進然喜言髙退事嘗早朝集漏舍歎曰玄宗賜賀監三百里鑑湖非僕所敢望得賜玄武湖亦遂素意徐鉉笑答曰上于近臣豈惜一玄武湖恨無知章爾延魯不能對孫忌髙密人一名鳳又名晟少舉進士如洛陽為進士者例修邊幅尚名檢忌豪舉跌宕不能蹈繩墨遂亡去渡河客趙魏間唐莊宗建號以豆慮革為相革雅知忌辟為判官遷著作郎眀宗天成中與髙輦同事秦王重榮從榮敗忌亡命至正陽未及渡追騎奄至亦疑其狀偉異睨之忌不顧坐淮岸捫敝衣齧蝨追者乃捨去渡淮至夀春節度使劉金淂之延與語忌陽瘖不對授館纍日忽謁漢淮南王安廟金先使人伏神座下悉聞其所禱乃送詣金陵時烈祖輔吳四方豪傑多至忌口吃初與人接不能道寒暄坐㝎辭辨鋒起人多憎嫉之而烈祖獨喜其文詞使出教令輒合指遂預禪代祕計每入見必移時乃出尤務謹密人莫窺其際烈祖受禪歷中書舍人翰林學士中書侍郎元宗立齊王景遂排之出為舒州節度使治軍嚴有歸化卒二人正晝挺白刃入府求忌殺之入自西門吏士倉卒莫能禦適忌間行在東門聞亂得民家馬乘之奔桐城叛卒不得忌乃殺都押衙李建崇而逸忌坐貶光祿卿元宗素重之不以為罪纍遷左㒒射與馮延已並相每鄙延巳侮誚之卒先罷保大十四年周師侵淮南圍夀州分兵破滁州擒皇甫暉江左大震以忌為司空使周奉表請為外臣忌見延已曰此行當屬公然忌若辭則是負先帝也既行知不免中夜歎息語其副禮部尚書王崇質曰吾思之􅍄矣終不忍負永陵一抔土周世宗以樓車載忌于夀州城下使招仁贍仁瞻望見忌戎服拜城上忌遙語之曰君受國恩不可開門納冦世宗詰之忌謝曰臣為唐大臣豈可教節度使外叛于是遣王崇質歸而留忌會暑雨班師忌亦從至大梁館都亭驛遇入閣使班東省官後屢召見飲以醇酒問江南事忌但言寡君實北面無二心周將張永德與李重進不能相倡言重進且反唐人聞之以為有間可乘遣蠟丸書招重進重進表其書于世宗皆斥瀆反間之言世宗遂彂怒時鍾謨亦奉使在館俱召見責讓忌正色請死無撓辭又問江左虗實終不肯對比出命都承旨曺翰護至右軍巡院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死于東相國寺世宗性暴急莫敢救者忌已死乃始追悔元宗聞之流涕贈太傅追封魯國公諡文忠厚恤其家擢其子為祠部郎中賜名魯嗣論曰南唐之衰劉仁贍死于封疆孫忌死于奉使皆天下偉丈夫事雖敵讐不敢議也區區江淮之地有國僅四十年覆亡不暇而後世追考猶為國有人焉蓋自烈祖以來傾心下士士之避亂失職者以唐為歸烈祖于宋齊丘字之而不敢名齊丘一語不合則挈衣笥望秦淮門欲去追謝之乃已元宗接羣臣如布衣交間御小殿以燕服見學士必先遣中使謝曰小疾不能著幘欲冠褐可乎于呼是誠足以得士矣苟含血氣名人類者烏得不以死報之耶傳曰君之視臣如手足則臣視君如腹心詎不信夫廖偃彭師皓皆楚馬殷之臣偃虔州虔化人祖爽父匡圖仕皆至刺史偃少倜儻喜竒節通左氏春秋班固漢書馬殷有國自祕書郎為裨將戍衡山縣殷子希蕚與弟希崇爭國希蕚敗見執師皓不知其世家自殷時為將與希蕚有舊怨希崇避殺兄名于是命師皓幽希蕚于衡山使甘心焉師皓歎曰留後欲使我弒君耶吾豈為是哉至衡山偃在焉相與護視希蕚甚謹未嘗失人臣禮希崇意不快復遣召希萼歸長沙終欲加害偃擇勇士百人執兵衛希蕚晝夜擊柝以警非常遂築行府與師皓奉希萼為衡山王請命于金陵元宗為出師㝎楚亂希萼遂入朝偃師皓俱從行而偃為部署輜重指揮使尤勤瘁希萼流涕曰吾逐于逆竪非偃盡忠豈能免禍至金陵元宗召見兩人歎奬之授偃左殿直軍使萊州刺史師皓殿直都虞候而使偃守道州以備南漢會朗州叛潭州亦潰偃所部多潭人中夜作亂偃率親卒力戰不能支極罵而死元宗下制哀悼贈右領衛大將軍寧州刺史諡曰節而師皓不見用卒于金陵後主時徐鉉為史官有豐城令劉虗巳移書眀偃大節云論曰史之失傳者多矣廖偃彭師皓之事可謂盡忠所事者而五代史則以為馬希崇遣師皓偃囚希蕚而師皓奉希萼為衡山王是偃同受囚希萼之指而師皓獨能全之也江表志則以為師皓且從希崇害希萼偃百計誘諭而寢其謀及衛希萼也師皓之計乃無所施是師皓實欲害希萼獨賴偃以全耳嗚呼何其異也惟十國紀年言兩人者俱有功差可考信故多采之大扺忠于故君兩人實同而偃功為多不可誣也張巡許逺之事著如日星兩家子弟猶有異論況偃師皓耶南唐書列傳卷苐八
