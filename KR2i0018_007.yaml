body:
  text: 南唐書列傳卷苐七張義方不知其所以進烈祖代吴用為侍御史義方既就職即上䟽曰古之任御史者非止平獄訟肅班列也有怙威侮法棄忠賊義樹朋黨蔽聦眀者淂以紏弹至扵人主好逰畋聲色悦奢侈佞媚賞非功罰非罪淂以論爭使諸侯不敢亂法百司不得盜權則御史為不失職今文武材行之士固不為乏而貪墨陵犯傷風教棄仁義者猶未革心臣欲奉陛下徳音先舉忠孝㓗廉請頒爵賞然後䋲紏乖戾以正典刑小則上䟽論列大則對仗弹奏臣每痛國家之敗非獨人君不眀盖官卑者畏罪而不言位尊者持禄而不諌上下苟且至扵淪亡今臣誠不忍君親之義有所不盡惟陛下幸赦之䟽奏烈祖親扎曰孤始受禅任義方以風憲乃能力振朝綱詞皆讜切可宣示朝野賜義方衣一襲以旌直言義方始名元逹烈祖方倚以肅正邪慝取前朝王義方名以易之故義方淂盡忠焉後之議者謂義方為御史弹劾奸邪諌正過失則可若請舉善頒爵賞則為奪輔相權矣然所言凛然守正有漢唐名臣之風惜其事迹散落不得盡載云李金全其先吐谷渾人事唐眀宗為厮養以戦功貴事具五代史晉髙祖時為安州節度使任中門使胡漢榮漢榮貪戾專政失軍民心髙祖遣賈仁沼代㱕京師金全奏漢榮病不任行仁沼至酖殺之事聞髙祖乃以馬全節代金全鎮安州漢榮懼紿告曰邸吏劉珂宻遣人馳報朝廷召公有異處分金全懼使其従事張緯奉表詣金陵請降烈祖命鄂州屯營使李承𥙿叚處恭帥兵三千人逆金全陳于城外俟金全出殿之而來承𥙿等至之夕金全帥數百人來奔而承𥙿違命輒大掠城中得金帛不可計數乃還晉将安審輝追敗之于馬黄谷處恭死于陣亟𥙿帥餘兵扼雲夢橋𣸪為審輝所敗執而殺之金全至拜天威統軍出為潤州節度使漢隱帝時李守貞以河中叛來乞師魏岑查文徽議冝為出師劉彦貞以攻取自任元宗欲藉金全宿将威望以為北面行營招討使救河中彦貞副之文徽為監軍使岑為㳂淮廵檢使師出沐陽次沂州金全曰諸君以河中在何處而欲自此轉戦以前耶勢必不相及徒為國生事爾嘗㑹食帳中候騎告北兵數百並澗皆羸弱諸将欲掩擊之金全下令曰敢言過澗者斬及暮伏兵四起旗幟蔽日金鼓聲聞十餘里諸将乃服金全善料敵逾月退保海州遂引㱕金全曰吾全軍而還不淂為無功矣拜右衞聖統軍領義成軍節度使兼侍中保大八年八月䘚于金陵年六十多内寵子男女凡三十二人元宗命少府監王仲連持節冊贈中書令謚曰順金全卒後閩椘云後興用事者皆少年不更軍旅覆敗相踵周人乗我罷敝攻取淮南國遂衰削不𣸪能振人始思金全恨其已䘚云皇甫暉魏州人事唐晉事具五代史契丹入中原暉時為宻州刺史與棣州刺史王建俱來奔元宗遣使具舟檝逆之将至暉念本起盗賊不自安至秦淮赴水不死舟人援出之自言如履大石入朝歷歙州刺史神衞軍都虞候江州節度使加同中書門下平章事周師攻淮南為北面行營應援使㑹劉彦貞姚鳳兵以行彦貞舉動操撓人測其必敗暉獨持重部分甚整士亦樂為用周人頗惮之及彦貞敗死暉鳳退保清流關周世宗親帥衆盡銳攻夀州而分兵擊清流暉陳山下周兵出山後要擊暉大敗猶收兵且戦且行入滁州滁州刺史王紹顔已委城遯暉無所㱕方斷橋自守周兵􅍱水踰城而入執暉鳳送夀州行在見世宗曰臣力憊欲暫坐及坐曰欲暫臥不俟命而臥神色自若曰臣非不盡力國事南北勇怯不敵臣在晉屡與契丹戦安能如今日大朝兵甲之盛昨退保滁州城不意大軍攀堞如飛而入臣智力俱惮故被擒耳世宗賜之馬及衣帶數日創甚暉不肯治而死子繼勲繼勲少従暉兵間為軍校以父死難擢将軍歷池饒二州刺史頗以吏事稱入為神衞統軍都指揮使諸老将繼死繼勲雖尚少且無戦功徒以家世遂為大将貲産優贍名園甲苐冠于金陵多蓄聲妓厚自奉飬及開寳中大兵傅城繼勲保惜冨貴無効死之意弟欲後主亟降聞諸軍敗績則幸災見于詞色偏禆有募死士謀夜出奮擊者輒鞭而囚之自度罪惡日聞稀復朝謁後主召議事亦辤以軍務不至内結傳詔使一切蔽塞及後主登城見王師旌旗壘柵彌徧四郊始大駭失色繼勲従還至宫乃以属吏始出宫門軍士雲集臠之斯須皆盡江文蔚字君章建安人博學工属文後唐眀宗時擢苐為河南府館驛廵官坐秦王重榮事奪官南奔烈祖輔吴用為宣州觀察廵官歷比部貟外郎知制誥國初改主客郎中拜中書舎人烈祖殂元宗以䘮亂之後國恤舊典散亡命文蔚以給事中判太常卿事與韓熈載蕭儼共加討論時稱其精練保大初遷御史中丞持憲平直無所阿枉馮延已當國與弟延鲁魏岑陳覺竊㺯威福及伐閩敗績詔斬覺及延鲁以謝國人而延已岑置不問文蔚對仗弹奏曰賞罰者帝王所重賞以進君子不自私㤙罰以退小人不由私怒陛下踐祚以來所信重者馮延巳延鲁魏岺陳覺四人皆擢自下僚驟升髙位未嘗進一賢臣成國家之美隂狡圗權引用群小陛下初臨大政常夢錫居封駁之職正言讜論首罹譴逐棄忠拒諌此其始也姦臣得計欲擅威權扵是有保大二年正月八日敕公卿庶僚不得進見履霜堅氷言者恟恟再降御扎方釋群疑御史張緯論事忤傷權要其貶官敕曰㒺思職分傍有奏論御史奏弹尚為越職況非御史孰敢正言嚴續國之戚里備位大臣不附奸憸尚邅排斥張義方上䟽僅免嚴刑自是守正者得罪朋邪者信用上之視聴惟在數人雖日接群臣終成孤立陛下深思逺慮始信終疑復常夢錫宥宻擢䔥儼侍従授張緯赤令群小疑懼與酷吏司馬正彝同惡相濟廹脅忠臣髙越之于盧氏義兼親故受其寄托痛其侵陵訴扵君父乃敢蔽陛下聰眀枉法竄逐羣㓙勢力可以囘天在外者握兵居中者當國師克在和而三凶邀利迭為前却天生五村國之利器一旦為小人忿爭妄動之其使精鋭者奔北饋運者死亡穀帛戈甲委而資冦取弱鄰邦貽譏海内周行之中有敢議論則馮魏毁之扵中正彝持之于外搆成罪状死而後已今陳覺馮延魯雖已伏辜而魏岑猶在本根未殄枝葉復生馮延巳善柔其色才業無聞憑恃舊恩遂階任用蔽惑天聰歛怨歸上髙審知累朝宿将墳土未乾逐其子孫奪其居苐使輿臺竊議将率狐疑陛下方以孝理天下而延巳毋封縣太君妻為國夫人與弟異居捨棄其毋作為威福專任愛憎咫尺天威敢行欺罔以至剛紀大壞刑賞失中風雨由是不時隂陽以之失序傷風敗俗蠧政害人蝕日月之眀累乾坤之徳天生魏岑道合延巳蛇豕成性專利無厭逋逃㱕國䑕姦狐媚讒疾君子交結小人善事延已遂當樞要而欺人主孩視親王侍宴喧譁逺近驚駭進俳優以取容作淫巧以求寵視國用如私財奪君㤙為已恵上下相家道路以目征討之柄在岑折簡帑藏取與繫岑一言先帝卑宫勤儉陛下守之勿失而岑營建大苐廣役丁夫孽子之居過于内殿亭觀之侈踰于上林前年建州勞還文徽入覲西苑㑹燕捨爵策勳岑披猖無禮狂悖妄言與延已用意多私行㤙不當俾軍士懷恨怒之志受賞無感勵之心将校爭功諠動京邑奸謀詭計誑惑國朝致漳州屠害使者福州違拒朝命百姓肝腦塗地國家帑藏空虗福州之役岑為東南面應援使而自㷊營壁縱兵入城使窮冦堅心大軍失勢軍法逗遛畏懦者斬律云主将守城為賊所攻不固守而棄去及守備不設為賊掩覆者皆斬昨敕赦諸将盖以軍威政令各非已出岑與覺延鲁更相違戾互肆威權號令並行理在無赦烈祖孝髙皇帝櫛風沐雨勤勞二紀成此慶基付之陛下比諸隣邦我為强國柰何賞罰大柄肆姦宄之謀軍國資儲為兇狡所散昨天兵敗衂統内震驚将雪祖宗之羞冝醢姦臣之肉已誅二罪未塞群情盡去四凶方袪衆怒今民多饑饉政未和平東有伺隙之隣北有伯强之國市里訛言遐邇危懼陛下冝軫慮殷憂誅鋤虺蜮延已不忠不孝在法難原魏岑同罪異誅觀聴疑惑請行典法以謝四方文蔚将上䟽先具小舟載老母以待左降元宗果怒貶江州司士参軍而覺延鲁以宋齊丘救解復皆不死延巳雖暫罷旋𣸪柄用方宣延巳制百官在廷常夢錫大言曰白麻雖佳要不如江文蔚䟽耳逾年召還南唐建國以來憲度草創言事遇合即隨才進用不𣸪設禮部貢舉至是始命文蔚以翰林學士知舉略用唐故事放進士廬陵王克貞等三人及苐元宗問文蔚卿知舉取士孰與北朝文蔚曰北朝公薦私謁相半臣一以至公取才元宗嘉歎中書舎人張緯後唐應順中及苐大銜其言執政又皆不由科苐進相與排沮貢舉遂𣸪罷矣保大十年䘚年五十二謚曰簡歐陽廣吉州吉水人保大中詣闕上書曰臣近逰潭州伏見節度使邊鎬偶逢聖代初非将才措置乖刺大失人心致奉節兵乘夜呼噪共㷊譙門㑹眀而遁不然㡬致大變是仁不足恵下也朗陵近在肘腋曾不為虞乃圗桂林以取奔敗是智不足謀逺也與監軍使昌延恭不相協和動輙疑阻是義不足和衆也幕府無賢才是禮不足得士也號令朝出夕改是信不足使人也五者無一長考之前古未或不敗請擇帥濟師以全境土書入不省及失湖南元宗思廣言命授以官執政請召試廣言非人主尊賢待士之意不肎就試乃授本縣令亦辤不受而䘚南唐書列傳卷第七
