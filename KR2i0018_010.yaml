body:
  text: 南唐書列傳卷苐十劉仁贍字守恵淮隂洪澤人父金事吴武王者戦功至濠州團練使長子仁規娶武王女貴于其國嘗為清淮軍節度使仁贍略通儒術好兵書有名扵國中事烈祖歷黄表二州刺史入為龍衞軍都虞候拜鄂州節度使元宗伐楚仁瞻帥舟師克巴陵撫納降附甚得人心保大中湖湘戍兵潰㱕復失故楚地上書者多謂周人有南侵之謀淮上石偶人言元宗聞而惡之㫁其首自六月至冬不雨長淮可􅍱民流入周邊城遮殺之不能禁唐亦興屯田修邊備以夀州最為要地十三年徙仁贍為清淮軍節度使自楊氏有吴歲暮淮涸輙増戍以備侵軼謂之把淺監軍吴廷紹以為無事徒費糧糗罷之仁贍表陳不可罷未及行周巳遣将李穀王彦超韓令坤等帥師大入詔書㬥我納李金全援李守貞慕容彦超結契丹太原之罪報至上下失色仁贍獨部分號令宴勞吏士間暇如平時十一月出兵破城南大柵殺周兵數千人元宗遣神武統軍劉彦貞将三萬人救夀州十四年正月彦貞至來逺鎮距夀州二百里軍容甚盛李穀燒營夜遯保正陽彦貞率戦艦數百艘泝淮而上仁贍曰敵已畏君矣當持重飬威以俟間若遽求戦而不能勝則大事去矣彦貞不従仁贍曰周人遯必設伏遇之将敗績乃率勵其下益兵固守彦貞果大敗沒于陣伏屍三十餘里亡戈甲三十萬周世宗自将攻城屯于城西北淝水之陽徴宋亳陳潁許蔡徐宿州丁夫數十萬備攻城雲梯洞屋下臨城中數道同時進攻塡塹䧟壁晝夜不少休如是者累月每鼔角四彂聲震墙壁皆動我援兵在外者見利輒進常陷伏中以故屢敗而終不悟仁贍雖知外援之敗意氣益壮覘世宗在城下據胡牀督攻城仁贍素善射自引弓射之箭去胡牀數步輙墮丗宗命進胡牀扵前墮處後箭復逺數步而墮仁贍知之投弓扵地曰天果不佑唐耶吾有死于城下耳終不失節扵是世宗遣中使來諭曰知卿忠義然士民何罪耶又親駕臨城招之皆不従自正月至四月不可下世宗還京師揚泰滁和舒蘄諸州皆復為唐守渦口定逺周兵戍守者皆亦為我師敗破江左㡬復振而夀州之圍獨不解元宗遣元帥齊王景逹以兵數萬來援分重兵據紫金山列寨十餘與城中傳烽相應築甬道􅔰城以通餽饟六月仁贍出兵殺周兵數百焚攻城洞屋甚衆周将李重進等兵力頗屈仁贍因請乗世宗之㱕以邊鎬守城自出决戦景逹畏懦又方任陳覺固不許仁贍憤鬰得疾少子崇諌夜泛小舟渡淮謀紆家禍為軍校所執仁贍命腰斬之監軍使文徳殿使周廷搆哭于中門又求救于仁贍妻薛氏薛氏曰崇諌㓜子固所不忍然貸其死則劉氏為不忠之門促命斬之然後成䘮聞者皆為出涕十五年二月世宗復親征屢戦皆克唐軍被俘馘者四萬人餘衆不能𣸪整朱元朱仁裕孫璘皆降周仁贍聞扼吭憤歎世宗知夀州且下心獨嘉仁贍之忠恐城破殺之乃下詔諭使自擇禍福三月甲辰又耀兵城北而仁贍巳困篤不知人監軍周廷搆營田使孫羽等為仁贍表請降戊申世宗次城北受之舁仁贍至幄前撫勞嘉歎拜天平軍節度使兼中書令命還城飬疾辛亥晝晦而黄沙如霧世宗在下蔡疑有變馳騎覘之乃仁贍卒年五十八州人皆哭偏裨及士䘚自剄以狥者數十人世宗遣使弔祭追封彭城郡王錄其子崇讚為懷州刺史賜荘宅各一區元宗聞仁贍死哭之慟贈太師中書令謚忠肅歎曰仁贍有知其肎捨我而受周命耶是夕夢仁贍若拜謝庭中加封衛王後主立進封越王開寳中仁贍子崇諒為進奉使太祖嘉其忠臣之後特命為都官郎中仁贍至命廟食夀春不絶論曰政和中先君㑹稽公為淮西常平使者實請于朝列仁贍扵典祀且名其廟曰忠顯後又嘗寓家夀春方世宗攻下夀州廢為夀春縣而徙夀州扵下蔡故夀春父老喜言仁贍死時事言其夫人不食五日亦死葢傳記所不載廟在邑中歲時奉祀甚盛乾道湻熈之間予逰蜀在成都見梓潼令金君所藏周世宗除仁贍天平軍節度使吿身白𥿄書墨色印文皆如新金君言仁贍獨一裔孫賣藥新安市客死無後故得之其詞與王溥所修周世宗實錄皆合若歐陽氏五代史所稱盡忠所事抗節無虧前代名臣㡬人可比予之南伐得汝為多葢摘取一制中語載之本不相連屬又頗有潤色也以仁贍之忠天報之冝如何而其後于今遂絶天理之難知如此可悲也夫潘佑幽州人祖貴事劉仁恭為将守光殺之父處常脱身南奔事烈祖為散騎常侍佑生而狷介髙潔閉門苦學不交人事文章議論見推流軰陳喬韓熈載共薦扵元宗起家秘書省正字後主在東宫開崇文館以招賢士佑預其間後主嗣位遷虞部貟外郎史館修撰議納后禮援據精博合指遷知制誥召草南漢主書文不加點後主咨賞遷中書舎人每以潘卿稱之而不名佑酷喜老荘之言嘗作文一篇名曰贈别其辭曰荘周有言得者時也失者順也安時處順哀樂不能入也僕佩斯言久矣夫得者如人之生自一歳至百歲自少得壮自壮得老歲運之來不可却也此所謂得之者時也失之者亦如一歲至百歳暮則失早今則失昔壮則失少老則失壮行年之去不可留也此所謂失之者順也凡天下之事皆然也逹者知我無柰物何物亦無柰物何両不相干故泛然之也故浩然之也其視天下之事如奔車之歷蟻垤也值之非得也去之非失也燕之南越之北日月所生是為中國其間含齒戴髪食粟衣帛者是為人剛柔動植林林而無窮者是為物以聲相命是為名倍物相聚是為利彚首而芸芸是為事事徃而記之扵心為喜為悲為怨為㤙其名雖衆實一心之變也始則無物終復何有而扵是强分彼我彼謂我為彼我亦謂彼為彼彼自謂為我我亦自謂為我終不知孰為彼耶孰為我耶而世方狥欲嗜利繫心扵物局促若轅下駒安得如列禦冦荘周者㷊天下之轅釋天下之駒浩浩乎復㱕扵無物歟此吾平昔所言也足下之行書以贈别開寳五年更官名改内史舎人初與張洎親厚及俱在西省所趋既異情好頓衰每嘆曰堂堂乎張也難與並為仁矣時南唐日衰削用事者充位無所為佑憤切上䟽極論時政歷詆大臣将相詞甚激訐後主雖數賜手扎嘉歎終無所施用佑七䟽不止且請㱕田廬乃命佑專修國史悉罷他職而佑復上䟽曰三軍可奪帥也匹夫不可奪志也臣乃者繼上表章凡數萬言詞窮理盡忠邪洞分陛下力蔽姦邪曲容謟偽遂使家國愔愔如日将暮古有桀紂孫皓者破國亡家自已而作尚為千古所笑今陛下取則姦囘敗亂國家不及桀紂孫皓逺矣臣終不能與姦臣雜處事亡國之主陛下必以臣為罪則請賜誅戮以謝中外詞既過切張洎従而擠之後主遂彂怒以潘佑素與李平善意佑之狂直多平激之而平又以建白造民籍為衆所排乃先収平属吏併使収佑佑聞命自剄年三十六徙其家饒州處士劉洞賦詩弔之國中人人傳誦為泣下及王師南征下詔數後主殺忠臣盖謂佑也子華仕宋至屯田貟外郎以疾致仕景徳中眞宗皇帝憐佑之忠起華于家授故官論曰佑學老荘齊死生輕冨貴故其上䟽縱言詆訐若惟恐不得死者雖激于一時忠憤亦少過矣後主非強愎䧺猜之君而䧟之扵殺諌臣使佑學聖人之道知事君之義豈至是㢤不幸既死同時諸臣已默默為降虜矣猶醜正嫉賢視之如仇誣之以狂愚惑溺淫祀左道之罪至斥為人妖雖後之良史有不䏻盡察其說者扵戲悲夫李平夲姓名曰楊訥少為嵩山道士與汝隂布衣舒元共學數年業成同㳺蒲中客扵節度使李守貞守貞叛漢使两人懐表間行乞師扵金陵元宗為出師數萬為之聲援甫出境而守貞敗两人無所復命且唐遇之厚囙留事唐而訥始自稱李平元亦易姓朱元宗皆以為尚書郎吴越侵常州欲以平為将固辭遷衞尉少卿周兵取蘄州不䏻有復棄而㱕乃以平爲刺史朱元叛元宗以平本與元同㱕唐慮其不自安召還金陵使者失指械平以㱕元宗大驚慰勉之拜建州節度使召爲衞尉卿潘佑好老荘平少爲道士習其說因相與逰平請復井田法造民籍復造牛籍課民種桑後主本好古務農甚悦其言使判司農寺平急扵成功施設無漸人不以爲便後主亦中悔罷之而潘歷詆一時公卿獨稱薦平請以司㑹府群議並不平㑹佑以直諌得罪因坐以與平淫祀鬼神事繫平大理獄縊死獄中嚴續字興宗馮翊人祖實仕故唐爲江淮水陸轉運判官徙家廣陵父可求為吴武王謀臣及景王宣王嗣主又皆有功宣王建國可求為尚書左僕射同平章事大和二年䘚續十餘歲以父䕃補千牛備身遷秘書郎尚烈祖女生長冨貴而性恭謹歷兵部侍郎尚書左丞元宗即位進禮部尚書中書侍郎出牧池州復拜中書侍郎兼三司使又出為江西節度使數年復入知尚書省遂為門下侍郎同平章事初續之未出池州也宋齊丘專國公卿多附之惟續持正不為屈翰林學士常夢錫嘗指言齊丘過咎元宗語之曰大臣惟嚴續能自立然才短恐不能勝其黨卿冝助之夢錫退諭指于續續因與夢錫親厚然不能盡用其言也䘚為黨人所排與夢錫俱補外及為相雖自以肺腑盡忠不貳然寡學識聴用多非其人不䏻稱職或作螃蠏賦以譏切之是時以軍興百司政事徃徃㱕樞宻院續言多不見用求罷拜鎮海軍節度使属疾還都已革猶不亂與客言論如平時後主使内夫人問之歴陳羣臣邪正某當進某當退辭氣慷慨不及其私翌日䘚年五十七謚曰懿初續以不學見輕同列遂力教子弟諸子及孫舉進士中其科者十餘人張易字簡能魏州元城人髙祖萬福故唐金吾将軍後徙萊州掖縣易性豪舉尚氣少讀書扵長白山又徙王屋及嵩山苦學自勵食無鹽酪者五歲齊有髙士王逹靈居海上博學精識少許可易従之逰數年入洛舉進士不中以昇元二年南㱕授校書郎大理評事時方重赤縣拜上元令元宗立以水部貟外郎通判歙州刺史朱匡業平居甚謹然醉則使酒陵人果扵誅殺無敢犯者易至赴其宴先已飲醉就席酒甫一再行擲杯推案攘袂大呼詬責鋒起匡業尚醒愕然不敢對惟曰通判醉甚不可當也易嵬峩喑嗚自若俄引去匡業使吏掖就馬自是見易加敬不敢復使酒郡事亦賴以濟太弟景遂初立髙選宫僚召爲􅐌善大夫景遂召飲以玉杯行酒因與坐客傳玩至易忽大言曰殿下有重寳輕士之意何耶扺于柱礎碎之坐皆失色其他規正皆類此景遂不爲忤待易益厚遷刑部郎中判大理寺周人南侵時江淮乆安人不知戦我師屡北上下震恐易獨揚言朝路曰國家被山帶河守奕世之業昔者夫差以無道之兵威陵齊晉孫權以草創之國勢遏曺劉今若上下併力敵何足畏㢤元宗聞而異之召使宿直禁中議事然亦不能用也陳覺李徴古方用事朝野側目易一日朝退歎曰吾忝廷尉軄誅邪孽當手斃二竪以謝曠官俄以吴越犯邊出為宣歙招諭使判宣州前刺史方築州城役徒數萬一切羅遣之曰自守者弱逺圗者強何以城為吴越聞懾服不敢復犯後主封吴王召易為吴王司馬東宫建又為左庶子後主即位遷右諌議大夫復判大理寺㝷乞觧大理改勤政殿學士判御史臺采武徳至寳曆君臣問對及臣下論奏骨鯁者七十二事為七卷曰諌奏集上之注太玄未成卒年六十一龔慎儀後主時為給事中開寳三年太祖欲討南漢未决詔後主諭劉鋹令奉正朔後主乃遣慎儀持書使南漢書曰㒒與足下叨累世之􅉀雖疆畿阻濶休戚實同敢奉尺書敬布腹心昨大朝伐楚足下疆吏弗靖遂成釁隙初為足下危之今敝邑使臣入貢皇帝幸以此宣示曰彼若能憣然改圖单車之使造廷則百萬之師不復出矣不然将有不得巳者僕料大朝之心非貪土地也怒人之不賔而巳且古之用武不計强弱大小而必戦者有四父毋宗廟之讎一也彼此烏合而民無㝎心二也敵人進不捨我退無守路戦亦亡退亦亡三也彼有敗亡之勢我乗進取之機四也今足下與大朝無是四者而坐受天下之兵决一旦之命有國家利社稷者固如是乎夫疆則南面而王弱則玉帛事大屈伸在我何常之有違天不祥好戦危事天方相楚尚未可爭而况今日之事耶地莫險于劒閣而蜀亡矣兵莫強扵上黨而李筠失守矣竊意足下國中必有矜智好謀之臣獻尊主強國之䇿以謂五䫈之險非可遽前堅壁清野絶其饟道依山阻水射以强弩彼雖百萬之兵安䏻成功不幸而敗則輕舟浮海猶足自全豈能以萬乗之主而屈扵人㢤此說士之常談可言而不可用異時王師南伐水陸並舉百道俱進豈暇俱絶其饟道盡保其壁壘或用吴越舟師自泉州航海不數日至足下國都矣人情恟恟則舟中皆為敵國忠義効死之士未易可見雖有臣海孰與足下俱行乎敢布腹心惟與大臣􅍄計之史館修撰潘佑之詞也鋹得書怒囚慎儀不遣後主表聞太祖遂决興師南漢平乃得㱕後主之亡也愼儀為歙州刺史㑹昭武留後盧綘聞國破提兵自宣州欲入福建過歙愼儀閉城拒守絳怒曰愼儀吾故人何為見拒遣裨将馬䧺攻之愼儀朝服而出為䧺所害南唐書列傳卷苐十
