body:
  text: 南唐書列傳卷弟五義祖生六子知訓知詢知誨知諌知證知諤及烈祖開國惟知證知諤在餘皆前䘚徐知證義祖苐五子也事吴歷州刺史至節度使烈祖初尊義祖為太祖復姓改義祖封拜徐氏與李氏同知證王江改王魏元宗嗣位尤見尊禮内宴用家人禮𧺫舞拜跪為夀知證亦以叔父自處無所譲䘚年四十二徐知諤義祖苐六子在吴亦為節鎭代知詢為金陵尹烈祖初封饒王進王梁鎮潤州兼中書令好竒寳恠物所蓄不可計有蜀估持鳳首至自言得之徼外蠻夷状如䧺雞廣五寸冠上正平可用爲枕朱冠金喙文彩煥爛如生人咸異之一日逰蒜山除地爲塲連虎皮爲大幄號虎帳與賔僚㑹飲其中忽暴風至裂帳盡碎如飛蜨知諤懼而歸屬疾數日䘚平生常語客曰人生七十爲大限吾生長王家窮極歡樂一日可敵世人二日年三十五其死乎至是如其言廢朝七日烈祖悲悼復詔不視朝者七日歛以衮冕及上方秘器謚曰懷十子皆貴顯國中所著文賦歌詩十卷號閤中集徐逰知誨子也初名景逰避元宗名去景字知誨扵元宗有舊恩故元宗待逰及兄汝南郡公遼尤親厚出入宫者備頋問預籌畫專典宫室營繕及浮屠事當時言蠧政者以两人為首後主嗣位好為文章逰復以能屬文見眤封文安郡公燕飲則流連酣詠更相倡和雖后妃在席不避也昭恵后好音時出新聲或得唐盛時遺曲逰輙従㫄稱美有三閣狎客之風間㞐講論古今得失後主設問逰具以所聞對或逰有疑以請後主亦引經義或古事稱制答之君臣相矜至國亡不悟也逰有巧思歌器之制久不傳人無知者逰獨以意創製皆合古法太平興國中蘇易簡為學士得之暇日試于玉堂太宗皇帝聞而取視之歎賞不巳方金陵之将亡也徐鍇属疾忽夢臣人持大鐡簁取已及兄鉉并逰同納簁中簁之鍇與逰皆墜地而鉉獨否俄鍇逰皆以疾卒云王建封上元人少従軍以任俠驍勇知名元宗取建州建封為先鋒橋道使㷊建州外郛克之王延政降何敬洙功最諸将建封忿曰我縱火先登克城諸軍乃能入我功當苐一敬洙因推之曰君言是也具以聞諸朝苐賞拜信州刺史人皆多敬洙而薄建封陳覺馮延鲁魏岑攻福州李弘義圍之敗吴越援兵福州援絶危蹙且㧞矣而覺延鲁岑各欲功在巳不相應接偏裨莫肯用命故未能克覺奏請建封濟師建封率五千人㑹之破福州版寨入東武門而建封亦與諸将争功遽歛兵先退弘義乗之我軍𣸪敗遂潰而㱕元宗深銜建封頋方治覺等擅興未及治也建封内不自安元宗懼其作亂吕為天威軍都虞候付以親軍建封遂泰然恃恩僣侈無𣸪頋惮㑹户部貟外郎范沖敏疾魏岑鍾謨李徳眀用事摘建封上書歷詆岑等請更用正人元宗遂彂怒謂建封武臣握精兵敢干國政謀進退柄臣其漸不可長流池州未至殺之沖敏棄市未㡬岑見沖敏為厲請道士上章訴天數月竟死云王彦儔蔡州上蔡人少為州軍校唐同光末諸郡多亂彦儔亦樂祻思奮㑹同列六人者來與謀曰四郊恟恟能者得冨貴我軰不可後人彦儔許諾且曰今夕吾直府中公等可持兵來吾亦衷甲為内應既夜六人者如約俱至彦儔伏壮士盡捕斬之持其首叩帳門告刺史曰姦盜竊發幸巳伏誅懼有佚黨為變碩公亟號令以安衆心刺史驚喜而出彦儔即斬之㱕其罪于六人者翌日悉族六家據蔡州無敢動唐兵來討彦儔自計不能守匿其妻子于村舎奉父毋來奔烈祖輔吴以為都押衙歷和州刺史始遣間使迎妻子南㱕彦儔有政績善撫境内和遂為冨州入拜統軍自以彂迹兇亂扵是務為恭謹烈祖嘉之嘗陞堂拜其父開國以為池州節度使常夢錫自給事中以直諌貶判官彥儔事之如在朝廷人士稱之䘚于鎮朱匡業廬州舒城人父延夀以姊為吴武王夫人故自少得幸従征討摧堅陷陣功冠諸将好以寡擊衆不勝而返者必盡戮之嘗與梁戦遣二百人持大劒斫陣将行指一䘚留之䘚請行延夀以違命立斬之其令出必行皆類此然每得賞賜悉分賚其下無以入家者唐昭宗在岐下聞其名遣使間道授延夀蔡州節度使武王疑其難制誘殺之出夫人使更嫁然猶以舊功貸其妻子時匡業尚幼稍長授以官烈祖輔吴㧞為軍校積功至諸軍都虞候嗜酒使氣烈祖優容之出為歙州刺史有政績改建州留後還朝授神衞統軍周侵淮南中外震駭盗投隙多竊彂以匡業為内外廵檢使嚴而無私犯令無所貸戮一二人中外肅然夜户不閉正陽䘮師朱元叛元宗議親征召匡業及統軍劉存中問以方畧匡業輙對曰運數之興天地皆助大事若去雖英䧺亦無如之何存中従㫄贊之元宗怒貶匡業撫州團練使流存中饒州後主襲位召拜神武統軍加中書令䘚子崇後短陋羸瘠而妙于騎擊馳突若神早䘚朱令贇大将軍業従子少従軍椎額鷹目趫捷善射積遷至鎮南節度使開寳中後主見討王師兵已圍金陵召令贇赴難軍至湖口與諸将謀曰今爲前進則北軍據我後上江阻隔進未破敵退絶餽饟柰何乃檄南都留守柴克貞赴軍欲伺其至使代拒湖口乃彂而後主危急手書督兵者接踵令贇不能守初議乃與戦棹都虞候王暉乗流而前自潯陽湖編木爲大栰長百餘丈大艦至容千人将突下㫁采石浮梁㑹江水涸舟栰艱阻王師得設備比至虎蹲州合戦令贇所乗艦尤大建大将旗鼓王師舟小聚攻之令贇以火油縱燒王師不能支㑹北風反熖自焚水陸諸軍十五萬不戦皆潰令贇惶駭赴火死糧糗戈甲俱焚無孑遺烟熖不止者旬日自是金陵外援遂絶以至于亡是時王師上露布稱生獲令贇則非也論曰金陵之被圍也以守備任皇甫繼勳以外援付朱令贇繼勳既懐貳心而令贇孺子復非大将才其亡冝矣使林仁肇不以間死盧絳得當攻守之任胡則申屠令堅軰宣力圍城中雖天威臨之豈易遽亡㢤然則江南雖弱曺彬等所以成功者獨乗其任人乖刺而巳吾以此知伐國之難也王崇文父綰吴大将崇文以門苐選尚烈祖妹廣徳公主歷百勝永安二鎮廬陵民尚氣喜訟以先正為怯素號難治崇文一以法治之不少貸訟為衰息建州初平崇文安集之民忘其亂又徙武昌自南唐興崇文内典禁兵出更籓任位兼将相終始冨貴而平居被服儒雅風度夷曠在武昌方閱騎士于鞠塲㫄古屋數十間崩壊聲震數里聞者莫知所為崇文指揮號令訖事不失常度竟亦不問後主初立上䟽歷陳朝政賜書襃之加中書令䘚胡則不知其世家後主末為江州指揮使金陵陷曺彬喻後主以手書命郡縣悉以城降書至江州刺史謝彦賔集将佐示之謀納款則憤形于色亟出謂其下曰吾属丗受李氏㤙安可負之且都城久受圍此書眞偽不可知刺史不忠欲汙吾州爾軰䏻従我死忠義乎衆皆曰善乃帥同列宋徳眀等大譟入攻彥賔彦賔懼逃簷霤中執而殺之衆推則為刺史號令肅然莫敢不聴則嘗為夀州禆将従劉仁瞻城守累年盡得其方畧乃日夜閲丁壮勒部伍為堅壁死守計太祖命南面行營招安廵檢使曺翰攻之城帶江負山樓櫓髙險堅不可破屡遣使諭降則誓死不従翰軍死傷者衆詔書切責督戦㑹則疾革不䏻𧺫城始陷衆猶巷鬪雪涕奮擊不少退翰軍尤多死則臥牀上翰執之數其違命之罪對曰犬吠非其主爾何恠也即舁置木驢上将磔之俄死腰斬其屍以徇并殺宋徳眀而隳其城七尺使後不可守時右補闕張霽被命知江州與翰偕行既入城翰軍士掠民家民訴扵霽霽按誅軍士翰因彂怒屠城死者數万人取其屍投井坎皆滿溢餘悉投江流因誣奏霽太祖薄霽罪徙知饒州民家資貨鉅萬翰悉耴之初太祖聞江州城垂破遣使持詔賜翰使勿多殺使者至獨樹浦大風斷渡比至已無噍類矣申屠令堅山東人少無賴勇敢絶人晉漢間嘗為盜被獲以計脱來㱕保大末禦周師于夀春破城南大砦有功擢神武都虞候劉茂忠吉州安福人本名徹或謂之曰劉徹乃漢武帝也非人臣所冝名乃改焉少亦為群盜㑹赦書募盜為兵茂忠出應募且請擒盗自洗湔乃詐亡命入盜中自言工風雲占盗信之乃宻約吏為内應悉擒戮無遺者惟廬陵鷓鴣洞賊帥吴先狡有謀且據巖險不可捕茂忠鞭二䘚使佯為得罪奔先示以鞭創先乃納之月餘斬先其黨皆潰積功為吉州兵馬都押衙開寳中令堅為吉州刺史茂忠為袁州刺史金陵破後主㱕京師两人者相約不以主在亡易節誓死報國前二年令堅寐則夢與人鬪大呼而寤乃聚侍婢歌舞喧笑逹旦始䏻寐至是若與人搏擊于帳中者踰時而䘚茂忠度不䏻獨奮遂降将行悉燔州縣軍興科歛文籍所留田稅簿而巳袁人徳之入朝舟次淮口謁關吏稱袁州刺史吏擲刺于地曰此亡國之俘何刺史也叱令執杖庭参至京師授登州刺史關吏扺􅖄適編管登州茂忠見之曰乃汝耶日責拜謁两衙必令植立庭下吏慚憤死茂忠還朝病金痍卒喬匡舜字亞元髙郵人弱冠能属文以典贍稱烈祖輔吴用為秘書者正字開國宋齊丘辟置幕中十餘年歷大理評事屯田貟外郎齊丘喜人䛕已而匡業眞率故雖賞其文藝未嘗薦㧞烈祖獨知之嘗詔公卿舉可親民者意齊丘且舉匡舜奏上烈祖喟然謂常夢錫曰吾不意其捨匡舜也夢錫與韓熈載素惡齊丘每相語曰宋公誤識亞元正可恠也久之齊丘出鎮豫章始表為節度掌書記保大中召為駕部郎中知制誥進中書舎人周侵淮南諸将無功元宗議親率六軍拒之匡舜上䟽切諌帝怒坐以沮國動人心流撫州然亦䘚不能親行也後主嗣位復起為司農少卿歷殿中監修國史給事中兼獻納使知貢舉放及第樂史軰五人多久滯名塲者時稱得人而少年輕薄子嘲之謂之陳橘皮牓遷刑部侍郎老病乞骸骨後主憫其貧給俸終身開寶五年䘚年七十五謚曰貞睦昭符金陵人不知所以進保大中為常州刺史州當吴越之衝屡交兵城邑荒殘昭符為政寛簡招納逋亡未㡬遂冨實一日坐􅈦事雷雨暴至電光如金蛇繞案吏䘚皆震仆昭符不懾撫案叱之雷電遽散及舉案惟得鐵索重百觔昭符亦不變色徐命舉索納庫中顕徳五年元宗既稱籓扵周秋八月命昭符為進奏使置邸大梁太祖受周禅昭符乃更名後主嗣位御宫門立金雞竿降赦如天子禮太祖聞而怒召昭符詰之色甚厲昭符徐以鄙語對太祖為笑因置不問然昭符常徃來金陵後主數貢奉帑藏空竭昭符市于冨民石守信家得絹十萬後主大悦太祖已遣李穆吕後主入朝因問昭符曰汝度汝主來否對曰君命召不俟駕安有不來及後主稱疾王師致討昭符又言于太祖曰臣主必死社稷已而後主降罷奏邸不得調䘚初名匡符建隆初改以避上名云南唐書列傳卷苐五
