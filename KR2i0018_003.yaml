body:
  text: 南唐書列傳卷苐三周本舒州宿松人漢南郡太守瑜之後瑜葬宿松即墓為祠子孫居其㫄者猶數十家本少孫覊貧有勇力嘗獨格虎殺之吴武王𧺫隷帳下勇冠三軍每奮躍先登攻堅摧鋒蒙犯矢石身無完膚戦罷輒自燒鐡烙其創食飲言笑自如累遷至淮南馬步使武王取江西撫州刺史危全諷率諸州兵十萬來爭其地屯象牙潭楚人圍髙安以援全諷江西守将劉威警書至武王謀可将者判官嚴可求薦本時本従軍取蘇州不能下恥之稱疾臥家可求自徃強起本本曰吴門之役非賊果強徒以我将帥權䡖下皆専命故無功今必見起勿用偏裨乃可許之得精䘚七千晨夜兼行武王初命之解髙安圍本曰楚人非欲下髙安苐爲全諷聲援耳今先敗全諷椘人必棄髙安走何足擊㢤乃馳至象牙潭急擊之大破其軍擒全諷楚人亦遯吉州刺史彭玕信州刺史危仔倡皆棄城去江西之地始㝎本之初至也即揮兵進劉威欲留宴犒不許或曰敵兵盛冝審觀形勢何遽如此本曰賊衆加我十倍使我兵知之未戦先奪氣矣急乗其鋒用之乃可有功已而果如所料武王竒其能遂用爲信州刺史吴城将陳璋據衢州㱕𣢾越人圍之武王遣本迎璋越人解圍岀璋而列兵不動本遂以璋還禆将吕師造曰越有輕我心必怠請擊之本不可越人躡我軍至中道宿夜半本陽驚棄輜重走而設伏扵㫄越人果急追伏彂前後夾擊盡殱其衆唐荘宗入洛吴遣司農卿靈蘋徃聘還言荘宗知本名由是召為碓武統軍俄出鎮夀州改廬州加安西大将軍太尉中書令西平王本不知書然䏻尊禮儒士遇僚属以禮士民􅋢之性朴拙無它才惟軍旅之事若生知者烈祖将受吴禅徐玠周宗等以本及李徳誠名位隆重諷之使率群臣勸進本已昬老其子祚懼家禍代署表上之本初不知猶謂所親曰我受吴室厚恩老矣復能推戴異姓乎吴宗室臨川王濛廢居歷陽聞将傳禅乃殺監守者與親信两人走詣本本即出見之祚固執不可本怒曰我家郎君也柰何不使我一見祚拒閉中門令外人執濛吿之濛遂誅死本愧恨屬疾數月䘚年七十七本晚好飲酒樂施予或曰公春秋已髙冝少儲積為子孫計本曰吾繫芒屫事吴武王位至将相何人所遺乎既䘚太常言凖令廢朝三日烈祖以本舊将命有司講求優典禮官言前朝嘗為汾陽王郭子儀廢朝五日詔用之諡恭烈葬給鹵簿子鄴鄴本長子也少驍勇每従其父征討本為信州刺史畧地至建州道經險阨被圍垂困鄴躍馬救之手殺數十人翼本而岀建人駭懼潰去事烈祖典親軍岀為滁州刺史㬥猛狼戾常蓄飛揚之志烈祖以本故優容之聞歷陽公楊濛被執歎憤逾月國人亦以此稱其好義本䘚後仕至廬州節度使昇元六年䘚柴克宏父再用事吴有功至徳勝軍節度使克宏以父任為郎将常為宣州廵檢使初至城塹皆湮圯不治吏云自田頵王茂章李遇相繼叛無敢為守備者克宏嘻笑曰豈有是㢤大加營繕後吴越兵至賴以得全積遷泗州刺史罷㱕為龍武軍都虞候好施予不事産業故家常窮空然性豪舉博奕縦酒自若也時元宗自謂唐後䂓取中原復舊業群臣多為大言以迎合主意克宏獨未常一語及軍旅人亦不以為知兵以故不遷久之出為撫州刺史時淮南交兵吴越伺間來㓂克宏乃請効死行陣元宗嘉之授右衞将軍遣與右衞将軍袁州刺史陸益俊同救常州精兵悉在江北克宏所将財羸䘚數千樞宻副使李徴古給戈甲皆朽鈍克宏言于徴古曰䘚已非素練得器械堅利猶可用柰何所給乃此等徴古嫚罵之見者皆忩克宏知徴古狂生不足與較是非怡然不少動至潤州徴古終不快白召克宏㱕以神武衞統軍朱匡業代之燕王弘兾獨以為克宏可任䘚遣行克宏帥師至常州徴古猶遣使趣其㱕克宏曰吾計日破㓂爾何為者必錢氏所遣姦人也命斬之使者曰受李樞宻命來克宏曰李樞宻來吾亦斬之遂斬使者以狥然後勒兵進大破吴越兵于常州斬萬級獲其将數十人自保大末邊事大起克敵之功莫先克宏者拜奉化軍節度使復上䟽請援夀春行至泰興彂瘍數日䘚國人莫不痛惜謚威烈㦯云初克宏母自表其子可為将徴古抑之母又言克宏有父風苟不勝任分甘孥􅓍元宗始用焉及徴古誅死詔㬥其罪亦以折辱克宏爲言云何敬洙廣陵人㓜遇亂吴将椘州刺史李簡得之給事左右簡酷㬥僕使有小過率置之死不少貸敬洙與其伍戲小􅈦下有持簡所寳研過焉頋曰孰敢毁此者敬洙時被酒奮曰死生有命何不敢之有奪研擲石階上碎之翌旦簡視事退聞研毁詰主者具以實對即命擒至皆謂必死矣簡妻素竒敬洙匿之堂奥旬日簡謂巳逃去亦置不問㑹有烏逐簡而噪避之亦隨至大怒曰恨何敬洙不在此敬之善射命中無所遺故思之語未畢敬洙挾朱弹鐡丸拜于前拜𧺫一彂斃之簡大喜不復詰毁研事有善相者簡使相諸子曰雖皆善然無及公者獨指敬洙曰此人殆過公簡由是益􅋢之及長用為軍校簡䘚事烈祖為禆将進天威軍都虞候建州之役為行營招討長步軍都指揮使㑹查文徽進討敬洙堅謂閩地僻陋不足勞大兵文徽開譬之不得已而行及平建州敬洙功最諸将然以功推王建封無吝色拜椘州團練使敬洙自以初事李簡扵是州尤自感勵常微服逰里巷察民疾苦有科調輒先為經畫民不知勞坐聴事與賔客談燕民有訴事者立引入親自剖析曲直皆厭服而岀保大八年楚朗州節度使馬希萼來附且乞師元宗命敬洙援之遷武昌軍節度使周人侵淮南命武安軍節度使王進逵領所部州師入江南境進逹奉詔行且遣部将潘叔嗣為先鋒取鄂州長山寨殺三千人元宗命敬洙清野入保敬洙挌詔岀城除地為戦塲曰敵至吾與兵民俱死于此文夫豈䏻惴惴閉門自守耶㑹叔嗣自常山囘戈襲朗州進逵狼狽而去人重其决加鎮國将軍中書令後主嗣位以病足乞解官授右衞上将軍芮國公致仕給全俸苐門列㦸乾徳二年二月䘚年七十七廢朝三日命樞宻使中書侍郎朱鞏持節䇿贈鄂州大都督左衞上将軍謚威烈王㑹廬州廬江人本名安少事吴武王王嘗臨戦升髙冡望敵安捧唾壺侍側左右皆注目前視忽有䘚持矟徑趨王莫䏻禦者㑹置壺于地引弓射之一彂而殪徐納弓􅋶中復捧壺立色不變王喜撫其背曰汝器度如此它日必冨貴積功至袁州刺史烈祖代吴用爲百勝軍節度使䖍州與嶺南地接南漢使者徃來節度使當燕勞問遺而㑹故名犯漢主祖諱乃賜今名昇元五年䘚年七十三張延翰字徳華宋州睢陽人故唐之末仕爲陜州司馬従父愼思權徐州留後延翰徃省之告以北方将亂欲避地江淮以全家祀慎思是其言慨然遣之入吴為鹽城令有治績烈祖以平章事領江州封潯陽侯表延翰為江州觀察廵官通判軍府事烈祖代吴入為侍御史判臺事張宣為左街使恃功驕㬥延翰廷劾之強豪屏跡進禮部侍郎自以起䟽逺遭時被知得盡已才感㮣自盡時未設貢舉士有獻書論事者苐其優劣選用烈祖悉以委延翰號為精効稱職兼選事務進孤貧吏不敢為奸利元宗輔政謂人曰張君議論公正處事悉有條理吾得傾心聴之由是六司總領殆遍時望㱕重拜中書侍郎同平章事時年財五十餘人猶以為柄用晚屬疾益侵不𣸪能治事烈祖以國器方一意任之不許其去遣使勞問賜良藥㫄午于道䘚年五十七贈太傅馬仁𥙿徐州人唐北平王燧裔孫丗為武寧軍校仁𥙿母方娠夢傳呼北平王來㱕及生紫氣充庭數歳學兵法通解若素習遇亂南奔事烈祖為昇州牙吏烈祖鎮潤州仁𥙿監蒜山渡首聞朱瑾之亂馳入白之烈祖即日渡江定亂以功遷左領軍将軍歷楚州刺史左金吾衞大将軍烈祖代吴拜潤州節度使徙廬州為政寛簡廉平甚得民心昇元六年䘚于鎮初烈祖左右小臣親信者惟周宗及仁𥙿两人任遇略等宗力贊禅代事遂輔政其後冨盛冠一時仁𥙿資長者獨退然安于外鎮晚益貧窶不悔也䘚年六十三謚曰匡㳺簡言字敏中建安人父恭吴駕部貟外郎知制誥簡言少孤力學起家祕書省正字烈祖鎮金陵以為户曺參軍典元帥府書檄遷觀察推官烈祖代吴為中書舎人元宗嗣位遷翰林學士禮部侍郎貞介獨不附權要元宗頗重其為人命判中書省兼吏兵部選事裁抑僥倖憎疾者衆選人邵唐試判不中上書言簡言父恭嘗為鄂州杜洪掌書記洪奨成朱温纂弑恭預其謀簡言逆臣子當斬請正國法元宗怒唐挾私忿謗讟决杖流饒州及淮南交兵吴越亦伺釁攻常州執團練使趙仁澤㱕于錢唐仁澤見吴越王責以敗􅉀吴越王怒抉其口至耳方議遣使詰責吴越群臣畏懾莫敢徃元宗以命簡言簡言不辤見其子愻為千牛備身将彂拜中書侍郎未岀境召還及遷都豫章立吴王為太子留西都監國以簡言為輔簡言力辤言久備近臣不忍去帷幄元宗嘉其一心事主無徼後福竟即従其請更用嚴續而後主亦由是賢之拜吏部尚書知省事簡言親治簿書督責嚴峻人或以事請寄必固違咈雖直亦不得伸議者譏其過拜左僕射兼門下侍郎同平章事疾巳篤不及視事䘚年五十七刁彦䏻字徳眀上蔡人父禮遇亂徙家宣州彦能少孤事毋篤孝家貧無以飬乃事節度使王茂章茂章叛吴歸吴越彦能以帳下當従乃使家人扶其毋伺于道左彦能泣告茂章曰彦能有老母在此不䏻捨而従公敢請死茂章哀其意許之乃馳還宣州而城中已亂彦䏻登城以劒招之曰我従王府來大軍已近爾軰無妄動衆信之稍㝎義祖聞而嘉之以為軍校事其子知訓于廣陵知訓狂恣彦能每切諌不聴然亦不加罪牙将馬謙以衆擁吴主登宫門将殺知訓彦能従朱瑾入手㫁謙以獻賞賚甚厚然彦能警敏觀知訓必敗而人望在烈祖心常附焉知訓忌烈祖數欲害之嘗與烈祖飲酒而伏劒士室中彦能行酒以爪語烈祖烈祖悟亟起去而嘗従知訓宴烈祖于山光寺復欲加害弟知諌擿語烈祖烈祖亦馳去知訓取佩刀授彦能使追殺之及于途舉刀示先主乃還以不及吿及知訓死義祖見彦能諌書歎異𣸪使事知諌于潤州遷禆将烈祖代吴入為環衞遷至夭威軍都虞候左街使金陵數大水秦淮溢東關尤被害彦能請築隄為斗門䟽導之水患稍息元宗嗣立出爲饒州節度使徙信州又徙建州留後撫州節度使彦能好讀書在鎮委文吏頗有治稱好作詩嘗與李建勲相酬贈建勳因燕見及之元宗笑曰殊不知彦䏻乃西班學士也性矜荘燕居容服不少墮時貴宴飲或蓬首裸袒彦能在坐則皆粛然保大末䘚年六十八子衎事後主爲祕書郎集賢校理以文翰見知擢直清輝殿閱中外章奏國亡入朝仕至兵部郎中直秘閣崇文院檢討淳淡夷粹恬于仕進暇日鼓琴圍棋不交人事衎孫約亦名士久在三館晚築室潤州號藏春隖王安石蘇軾皆尊􅋢之南唐書列傳卷苐三南唐書本紀卷苐三後主名煜字重光元宗苐六子初名従嘉母曰光穆皇后鍾氏従嘉廣顙豐頬駢齒一目重瞳子文獻太子惡其有竒表従嘉避旤惟覃思經籍歴封安㝎郡公鄭王文獻太子䘚徙吴王以尚書令知政事居東宫建隆二年遂立為太子元宗南廵太子留金陵監國以嚴續殷崇義輔之張洎主箋奏六月元宗殂太子嗣立于金陵更名煜居䘮哀毁幾不勝赦境内尊鍾后曰聖尊后以后父名泰章也立妃周氏為國后徙信王景逷為江王鄧王従善為韓王立弟従鎰為鄧王従謙為冝春王従信爲文陽郡公従度爲昭平郡公従度景遷子也令諸司四品至九品無職事者日二貟待制扵内殿以右僕射嚴續爲司空平章事餘進位有差遣中書侍郎馮延鲁如京師奉表陳襲位太祖賜詔答之自是始降詔秋九月太祖遣鞍轡庫使梁義來弔祭冬十月太祖遣樞宻承旨王文來賀襲位初元宗雖臣于周惟去帝號他猶用王者禮至是國主始易紫袍見使者使退如初服十二月置龍翔軍以教水戦建隆三年春三月遣馮延鲁入貢京師泉州節度使中書令晋江王劉従効䘚子紹鎡自稱留後夏田月泉州将陳洪進執紹鎡㱕金陵推副使張漢思爲留後六月遣客省使翟如璧入貢京師太祖放降䘚千人南還冬十一月遣水部郎中頋彛入貢京師乾徳元年春正月太祖遣使來賜羊馬槖駞三月太祖出師平荆湖國主遣使犒軍夏四月泉州副使陳洪進廢張漢思自稱權知軍府來吿國主即以洪進爲節度使秋七月太祖詔國主遣還顯徳以來中朝将士在江南者及令揚州民遷江南者還其故土十二月國主表乞罷詔書不名之禮乾徳二年春三月行鐡錢每十錢以鐵錢六權銅錢四而行其後銅錢遂廢民間止用鐡錢末年銅錢一直鐵錢十比國亡諸郡所積銅錢六十七萬緡命吏部侍郎修國史韓熈載知貢舉放進士王崇古等九人國主命中書舎人徐鉉覆試舒雅等五人雅等不就國主乃自命詩賦題以中書官莅其事五人皆見黜秋八月太祖于江北置折博務禁商旅過江九月立子仲㝢為清源郡公仲宐宣城郡公十月甲辰仲㝢䘚國后周氏已寝疾哀傷増革遂亦䘚十一月太祖遣作坊副使魏丕來弔祭乾徳三年夏五月司空平章事嚴續罷為鎮海軍節度使秋九月両沙聖尊后鍾氏殂冬十月太祖遣染院使李光圗來弔乾德四年秋八月國主遣龔愼儀持書使南漢約與俱事中朝九月愼儀至番禺被執乾徳五年春命两省侍郎諌議給事中中書舎人集賢勤政殿學士更直光政殿召對咨訪率至夜分開寶元年春三月戊申以樞宻使右僕射殷崇義為左僕射同平章事境内旱太祖賜米麥十萬石冬十一月立國后周氏開寳二年春三月以㳺簡言為左僕射兼門下侍郎同平章事夏五月簡言䘚是歳右僕射同平章事殷崇義罷為潤州節度使同平章事開寳三年夏太白晝見二日相觸開寳四年冬十月國主聞太祖滅南漢屯兵扵漢陽大懼遣太尉中書令鄭王従善朝貢稱江南國主請罷詔書不名従之有商人來告中朝造戦艦數千艘在荆南請宻徃㷊之國主懼不敢從開寳五年春二月國主下令貶損儀制改詔為教中書門下省為左右内史府尚書省為司會府御史臺為司憲府翰林院為文館樞宻院為光政院大理寺為詳刑院客省爲延賔院官號亦從改易以避中朝初金陵官闕皆設鴟吻元宗雖臣于周猶如故乾徳後遇中朝使至則去之使還復設至是遂去不𣸪用降諸弟封王者皆爲公従善椘國従鎰江國従謙鄂國内史舎人張佖知禮部貢舉放進士楊遂等三人清輝殿學士張洎言佖多遺才國主命洎考覆不中苐者扵是又放王綸等五人閏月癸巳太祖命進奉使楚國公従善爲泰寧軍節度使留京師賜第汴陽坊示欲召國主入朝也國主遣户部尚書馮延鲁謝従善爵命延鲁至京師疾病不能朝而㱕開寳六年夏太祖遣翰林學士盧多遜來國主聞太祖欲興師上表願受爵命不許以司空殷崇義知左右内史事冬十月内史舎人潘佑上書切諌佑素與户部侍郎李平交厚國主以為事皆由平始先以平属吏遣使収佑佑自殺平縊死獄中皆徙其家外郡甲戌歳秋國主上表求従善㱕國不許太祖遣閤門使梁迥來使従容言曰天子今冬行紫燎之禮國主冝徃助祭國主不答九月丁卯復遣知制誥李穆為國信使持詔來曰朕将以仲冬有事圜丘思與卿同閲犠牲且諭以将出師冝早入朝之意國主辭以疾且曰臣事大朝兾全宗祀不意如是今有死而已時太祖已遣潁州團練使曺翰率師先出江陵宣徽南院使曺彬侍衞馬軍都虞候李漢瓊賀州刺史田欽祚率舟師繼發及是又命山南東道節度使潘美侍衞歩軍都虞候劉遇東上閤門使梁㢠率師水陸並進與國信使李穆同日行冬十月國主遣江國公従鎰貢帛二十萬匹白金二十萬觔又遣𧺫居舎人潘慎修貢買宴帛萬匹錢五百萬築城聚糧大為守備閏十月王師㧞池州國主于是下令戒嚴去開寶紀年稱甲戌歳辛未王師進㧞蕪湖及雄逺軍吴越亦大舉兵犯常潤國主遺吴越王書曰今日無我眀日豈有君一旦眀天子易地賞功王亦大梁一布衣耳吴越王表其書于朝王師次采石磯作浮橋成長驅渡江遂至金陵每歲大江春夏㬥漲謂之黄花水及王師至而水皆縮小國人異之國主以軍旅委皇甫繼勳機事委陳喬張洎又以徐元瑀刀衎為内殿傳詔而遽書警奏日夜狎至元瑀等輒屏不以聞王師屯城南十里閉門守陴國主猶不知也初烈祖有國凡民産二千巳上出一䘚號義軍分籍者又岀一䘚號生軍新置産亦出一䘚號新擬軍客戸有三丁者出一䘚號㧞山軍元宗時許郡縣村社競渡每歲重午日官閲試之勝者給綵帛銀椀皆籍姓名至是盡取為䘚號􅓸波軍募民奴及贅壻號義勇軍募豪民以私財招聚亡賴亡命號自在軍至是又大蒐境内自老弱外皆募為䘚號排門軍民間又有自相率拒敵以𥿄為甲農器為兵者號白甲軍凡十三等皆使捍禦然實皆不可用奔潰相踵乙亥歲春二月壬戌王師㧞金陵闕城三月丁巳吴越攻我常州權知州事禹萬誠以城降誅神衞都指揮使皇甫繼勳彗岀五車色白長五丈夏六月轉見西方犯太㣲六十日滅王師及吴越圍潤州留後劉澄以城降吴越遂㑹王師圍金陵洪州節度使朱令贇帥勝兵十五萬赴難旌旗戦艦甚盛編木爲㭖長百餘丈大艦容千人令贇所乗艦尤大擁甲士建大将旗鼓将㫁采石浮橋至皖口與王師遇傾火油焚北船適北風反熖自㷊我軍大潰令贇及戦棹都虞候王暉皆被執外援既絶金陵益危蹙王師百道攻城晝夜不休城中米斗萬錢人病足弱死者相枕藉國主两遣徐鉉等厚貢方物求緩兵守祭祀皆不報冬十一月白虹貫日畫晦乙未城䧟将軍咼彦馬承信及弟承俊帥壮士數百力戦而死勤政殿學士鍾蒨朝服坐于家亂兵至舉族就死不去光政使右内史侍郎陳喬請死不許自縊死國主帥司空知左右内史事殷崇義等肉袒降扵軍門眀年正月辛未至京師乙亥授右千牛衛上将軍封違命侯太宗即位加特進改封隴西公太平興國三年七月辛卯殂年四十二是日七夕也後主盖以是日生贈太師追封吴王葬洛陽北邙山後主天資純孝事元宗盡子道居䘮哀毁杖而後𧺫嗣位之初屬保大軍興之後國削勢弱帑庾空竭専以􅋢民爲急蠲賦息役以𥙿民力尊事中原不惮卑屈境内賴以少安者十有五年憲司章䟽有䋲紏過訐者皆寝不下論决死刑多従末減有司固爭乃得少正猶垂泣而後許之嘗獵于青山還如大理寺親録繋囚多所原釋中書侍郎韓熈載奏獄訟有司之事囹圄非車駕所冝臨幸請罰内庫錢三百萬以資國用雖不聴亦不怒也殂問至江南父老有巷哭者然酷好浮屠崇墖廟度僧尼不可勝莫罷朝輒造佛屋易服膜拜以故頗廢政事又置澄心堂扵内苑引能文士及徐元機元榆元樞兄弟居其間中旨由之而岀中書宻院乃同散地兵興之際降御扎移易将帥大臣無知者皇甫繼勲誅死之後夜出萬人研營招討使但署牒遣兵竟不知何徃盖皆澄心堂直承宣命也長圍既合内外隔絶城中之人惶怖無死所後主方幸淨居室聴沙門徳眀雲眞義倫崇節講楞嚴圎覺經用鄱陽隱士周惟簡爲文館詩易侍講學士延入後苑講易否卦賜惟簡金紫群臣皆知國亡在旦暮而張洎猶謂北師巳老将自遯去後主益甘其言晏然自安命户部貟外郎伍喬扵圍城中放進士孫確等三十八人及苐其所施爲大扺類此故雖仁􅋢足以感其遺民而䘚不能保社稷云南唐書本紀卷苐三
